        const UserManagementModal = ({ isOpen, onClose, users, onSaveUsers, allCinemas }) => {
            const [editingUsers, setEditingUsers] = React.useState([]);

            React.useEffect(() => {
                if (isOpen) setEditingUsers(JSON.parse(JSON.stringify(users)));
            }, [isOpen, users]);

            if (!isOpen) return null;

            const handleAddUser = () => {
                setEditingUsers([...editingUsers, { username: '', password: '', role: 'programmer', allowedCinemas: [] }]);
            };

            const handleUpdateUser = (index, field, value) => {
                const updated = [...editingUsers];
                updated[index][field] = value;
                setEditingUsers(updated);
            };

            const handleToggleCinema = (index, cinemaId) => {
                const updated = [...editingUsers];
                const currentUser = updated[index];
                if (currentUser.allowedCinemas.includes(cinemaId)) {
                    currentUser.allowedCinemas = currentUser.allowedCinemas.filter(id => id !== cinemaId);
                } else {
                    currentUser.allowedCinemas.push(cinemaId);
                }
                setEditingUsers(updated);
            };

            const handleDeleteUser = (index) => {
                if (editingUsers[index].username === 'admin') {
                    alert('Cannot delete the primary admin account.');
                    return;
                }
                setEditingUsers(editingUsers.filter((_, i) => i !== index));
            };

            const handleSave = () => {
                if (editingUsers.some(u => !u.username.trim() || !u.password.trim())) {
                    alert('All users must have a username and password.');
                    return;
                }
                onSaveUsers(editingUsers);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                    <div className="bg-white dark:bg-cinema-surface rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] flex flex-col border border-gray-200 dark:border-gray-700">
                        <div className="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
                            <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                                <UserIcon size={20} className="text-cinema-accent"/>
                                User Management
                            </h2>
                            <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md text-gray-500 transition-colors">
                                <XIcon size={20} />
                            </button>
                        </div>
                        
                        <div className="p-4 flex-1 overflow-y-auto space-y-4">
                            {editingUsers.map((u, i) => (
                                <div key={i} className="border border-gray-200 dark:border-gray-700 rounded-lg p-4 bg-gray-50 dark:bg-gray-800/30">
                                    <div className="flex gap-4 items-start">
                                        <div className="flex-1 space-y-3">
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Username</label>
                                                    <input type="text" value={u.username} onChange={e => handleUpdateUser(i, 'username', e.target.value)} disabled={u.username === 'admin'} className="w-full text-sm p-2 border border-gray-200 dark:border-gray-700 rounded bg-white dark:bg-gray-800 dark:text-white" />
                                                </div>
                                                <div className="flex-1">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Password</label>
                                                    <input type="text" value={u.password} onChange={e => handleUpdateUser(i, 'password', e.target.value)} className="w-full text-sm p-2 border border-gray-200 dark:border-gray-700 rounded bg-white dark:bg-gray-800 dark:text-white" />
                                                </div>
                                                <div className="w-32">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Role</label>
                                                    <select value={u.role} onChange={e => handleUpdateUser(i, 'role', e.target.value)} disabled={u.username === 'admin'} className="w-full text-sm p-2 border border-gray-200 dark:border-gray-700 rounded bg-white dark:bg-gray-800 dark:text-white">
                                                        <option value="admin">Admin</option>
                                                        <option value="programmer">Programmer</option>
                                                    </select>
                                                </div>
                                            </div>
                                            
                                            {u.role === 'programmer' && (
                                                <div>
                                                    <label className="block text-xs font-medium text-gray-500 mb-2">Assigned Cinemas</label>
                                                    <div className="flex flex-wrap gap-2">
                                                        {allCinemas.length === 0 ? <span className="text-xs text-gray-400">No cinemas available to assign.</span> : null}
                                                        {allCinemas.map(cinema => (
                                                            <label key={cinema.id} className="flex items-center space-x-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-3 py-1.5 rounded-full cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={u.allowedCinemas.includes(cinema.id)}
                                                                    onChange={() => handleToggleCinema(i, cinema.id)}
                                                                    className="rounded border-gray-300 text-cinema-accent focus:ring-cinema-accent"
                                                                />
                                                                <span className="text-gray-700 dark:text-gray-300">{cinema.name}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        <button onClick={() => handleDeleteUser(i)} disabled={u.username === 'admin'} className="mt-6 p-2 text-gray-400 hover:text-red-500 disabled:opacity-30 transition-colors">
                                            <Trash2Icon size={18} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                            
                            <button onClick={handleAddUser} className="w-full py-3 border-2 border-dashed border-gray-300 dark:border-gray-700 text-gray-500 hover:text-cinema-accent hover:border-cinema-accent hover:bg-cinema-accent-soft rounded-lg transition-colors flex justify-center items-center gap-2 text-sm font-medium">
                                <PlusIcon size={16} /> Add New User
                            </button>
                        </div>
                        
                        <div className="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-2 bg-gray-50 dark:bg-gray-800/50 rounded-b-xl">
                            <button onClick={onClose} className="px-4 py-2 border border-gray-200 dark:border-gray-700 rounded text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</button>
                            <button onClick={handleSave} className="px-4 py-2 bg-cinema-accent text-white rounded text-sm font-medium hover:bg-cinema-accent-hover shadow-sm">Save Changes</button>
                        </div>
                    </div>
                </div>
            );
        };

        const LoginForm = () => {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    await window.fbAuth.signInWithEmailAndPassword(email.trim(), password);
                    // onAuthStateChanged in App will pick up the user and route them in
                } catch (err) {
                    const code = err.code || '';
                    if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
                        setError('Invalid email or password');
                    } else if (code === 'auth/invalid-email') {
                        setError('Please enter a valid email address');
                    } else if (code === 'auth/too-many-requests') {
                        setError('Too many failed attempts. Try again in a few minutes.');
                    } else if (code === 'auth/network-request-failed') {
                        setError('Network error â€” check your internet connection.');
                    } else {
                        setError(err.message || 'Sign in failed');
                    }
                } finally {
                    setLoading(false);
                }
            };

            const handleForgotPassword = async () => {
                if (!email.trim()) { setError('Enter your email first, then click "Forgot password?"'); return; }
                try {
                    await window.fbAuth.sendPasswordResetEmail(email.trim());
                    setError('Password reset link sent to ' + email.trim() + '. Check your inbox.');
                } catch (err) {
                    setError(err.message || 'Could not send reset email');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-cinema-base text-gray-900 dark:text-gray-100">
                    <div className="max-w-md w-full p-8 bg-white dark:bg-cinema-surface rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700">
                        <div className="flex flex-col items-center mb-8">
                            <div className="h-10 text-[#003B7B] dark:text-blue-400 flex items-center justify-center mb-6">
                                <svg className="h-full w-auto" viewBox="0 0 1000 226.4" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                   <g transform="matrix(1.1712163 0 0 -1.1712163 2 224.39875)">
                                      <path d="m54.9453 62.4922c-12.914 0-23.6406 9.1914-26.0508 21.4531l-28.8945-5.582c4.92969-25.832 27.6914-45.3125 54.9453-45.3125 15.5391 0 29.5469 6.3476 39.7305 16.5273l-23.6445 18.2774c-4.4883-3.2852-10.0665-5.3633-16.086-5.3633m0 53.0818c6.0195 0 11.5977-2.078 16.086-5.472l23.6445 18.277c-10.1836 10.176-24.1914 16.527-39.7305 16.527-27.2539 0-50.01561-19.484-54.9453-45.3122l28.8945-5.6915c2.3008 12.3677 13.0274 21.6717 26.0508 21.6717m398.5977-57.0232c-14.664 0-25.391 10.7265-27.031 26.4883v8.3164c1.64 15.5425 12.367 26.2655 27.031 26.2655 16.75 0 28.566-12.586 28.566-30.4218-.109-18.0625-11.816-30.6484-28.566-30.6484m8.648 86.3552c-14.886 0-27.25-6.457-35.789-17.402v14.992h-30.207v-142.496h30.207v50.6719c8.43-11.1641 20.903-17.6211 35.789-17.6211 28.567 0 49.25 23.2031 49.25 56.039 0 32.7232-20.683 55.8162-49.25 55.8162m119.735-86.3552c-16.09 0-29.551 14.0078-29.551 30.6484 0 16.5238 13.461 30.4218 29.551 30.4218 15.867 0 29.332-13.898 29.332-30.4218.109-16.6406-13.356-30.6484-29.332-30.6484m0 86.3552c-31.848 0-58.555-25.394-58.555-55.8162 0-30.4296 26.707-56.039 58.555-56.039 31.629 0 58.113 25.6094 58.113 56.039 0 30.4222-26.484 55.8162-58.113 55.8162m72.453-109.3396h30.203v144.4726h-30.203zm144.906 66.3286c-14.449 3.937-18.824 5.578-18.824 11.378 0 3.723 5.144 6.457 12.586 6.457 9.082 0 20.246-3.5 29.988-9.519l12.149 21.449c-11.821 7.883-26.926 13.246-42.137 13.246-25.172 0-41.918-14.449-41.809-34.695.219-21.1212 17.184-27.1446 39.071-32.5079 10.949-2.8437 18.824-4.9258 18.824-11.5976 0-4.7071-5.801-8.1016-13.899-8.1016-14.226 0-26.265 5.1445-35.789 12.0391l-12.914-20.793c12.805-10.2891 30.977-16.0898 48.157-16.0898 26.269 0 43.449 13.4609 43.449 34.4765 0 23.3125-20.465 29.5508-38.852 34.2583m-94.89-66.3286h30.207v106.9296h-30.207zm15.214 154.2106c-9.304 0-16.527-7.66-16.527-16.089 0-9.083 7.223-16.528 16.527-16.528 8.864 0 16.086 7.445 16.086 16.528.114 8.429-7.113 16.089-16.086 16.089m-365.004-9.851h-30.207l-11.273-22.981h30.207zm-49.359-79.02c3.942 10.727 13.461 17.403 24.844 17.403 12.262 0 20.027-6.786 22.984-17.403zm23.641 44.106c-31.192 0-55.051-23.418-55.051-55.5979 0-32.8321 24.844-56.2539 56.691-56.2539 15.762 0 34.149 6.5664 43.672 16.5273l-19.265 19.6992c-5.801-5.582-16.086-9.5195-24.625-9.5195-12.586 0-21.891 7.8789-25.391 19.4805h77.051c0 40.1643-19.594 65.6643-53.082 65.6643m-108.024-.106c-13.898 0-25.828-6.129-32.285-15.871v13.461h-30.207v-106.9296h30.207v63.3711c0 11.6015 9.957 20.5745 22.543 20.5745 12.043 0 20.25-9.082 20.25-22.3245v-61.6211h29.109v68.0786c.114 24.187-16.414 41.261-39.617 41.261m-98.828 44.981c-9.305 0-16.527-7.66-16.527-16.086 0-9.086 7.222-16.531 16.527-16.531 8.863 0 16.09 7.445 16.09 16.531 0 8.426-7.227 16.086-16.09 16.086m-15.324-154.3206h30.207v106.9296h-30.207z" />
                                      <path d="m850.398 39.0703c0-3.6133-2.847-6.457-6.57-6.457-3.719 0-6.676 2.8437-6.676 6.457 0 3.6133 2.957 6.457 6.676 6.457 3.723-.1093 6.57-2.957 6.57-6.457zm-11.601 0c0-2.8476 2.074-5.1445 5.031-5.1445 2.848 0 4.926 2.2969 4.926 5.1445 0 2.8477-2.078 5.1445-4.926 5.1445-2.844 0-5.031-2.2968-5.031-5.1445zm4.047-3.3945h-1.531v6.4609c.546.1094 1.421.2188 2.515.2188 1.203 0 1.75-.2188 2.188-.4375.332-.3282.66-.7696.66-1.4219 0-.6602-.551-1.207-1.317-1.5352v-.1093c.657-.2188.989-.6563 1.204-1.5313.222-.9883.332-1.4219.441-1.6445h-1.645c-.214.2226-.328.8789-.546 1.5351-.106.6563-.547.9844-1.313.9844h-.656zm0 3.6133h.656c.875 0 1.531.3281 1.531.9843 0 .5469-.433.9883-1.422.9883-.437 0-.656 0-.875-.1133z" />
                                   </g>
                                </svg>
                            </div>
                            <h2 className="text-2xl font-bold tracking-widest text-gray-800 dark:text-white uppercase mb-2">CINEFLOW</h2>
                            <p className="text-gray-500 dark:text-gray-400 text-sm text-center font-medium">Please sign in to access the scheduling system</p>
                        </div>
                        
                        {error && (
                            <div className="mb-4 p-3 bg-red-100 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded text-red-600 dark:text-red-400 text-sm">
                                {error}
                            </div>
                        )}
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                                <input
                                    type="email"
                                    autoComplete="username"
                                    className="w-full p-2.5 border border-gray-300 dark:border-gray-600 rounded bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-white focus:ring-cinema-accent focus:border-cinema-accent transition-colors"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="you@cinepolis.com"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                                <input
                                    type="password"
                                    autoComplete="current-password"
                                    className="w-full p-2.5 border border-gray-300 dark:border-gray-600 rounded bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-white focus:ring-cinema-accent focus:border-cinema-accent transition-colors"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full py-2.5 mt-2 bg-cinema-accent text-white font-medium text-sm rounded hover:bg-cinema-accent-hover transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
                            >
                                {loading ? 'Signing inâ€¦' : 'Sign In'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button
                                type="button"
                                onClick={handleForgotPassword}
                                className="text-xs text-gray-500 dark:text-gray-400 hover:text-cinema-accent underline-offset-2 hover:underline transition-colors"
                            >
                                Forgot password?
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            // Firebase Auth drives login now. `user` is null until onAuthStateChanged fires,
            // or after logout. `authReady` lets us show a loader instead of flashing the login screen.
            // `dataReady` blocks rendering MainApp until cineSync.pullAll() has bootstrapped
            // localStorage from Firestore â€” otherwise the app would mount with stale data.
            const [user, setUser] = React.useState(null);
            const [authReady, setAuthReady] = React.useState(false);
            const [dataReady, setDataReady] = React.useState(false);
            const [dataLoadStatus, setDataLoadStatus] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [appMode, setAppMode] = React.useState('scheduler'); // 'scheduler' | 'allocation'
            const [remoteUpdateNotice, setRemoteUpdateNotice] = React.useState('');
            const [schedulerReloadKey, setSchedulerReloadKey] = React.useState(0);
            const [selectedDate, setSelectedDate] = React.useState(() => {
                const lsDate = localStorage.getItem('showtime_manager_date');
                return lsDate || new Date().toISOString().split('T')[0];
            });
            React.useEffect(() => { localStorage.setItem('showtime_manager_date', selectedDate); }, [selectedDate]);

            // When the date picker changes after login, reload data for the new date from Firestore.
            const handleDateChange = React.useCallback(async (newDate) => {
                setSelectedDate(newDate);
                if (!dataReady || !window.cineStorage.uid) return;
                setDataLoadStatus(`Loading schedule for ${newDate}...`);
                try {
                    window.cineMainState.stopSubscriptions();
                    window.cineMainState._lastPushed = { registry: window.cineMainState._lastPushed.registry, shows: {}, allocs: {}, movies: {} };
                    const primed = await window.cineMainState.pullMergedState(newDate);
                    window.localStorage.setItem('showtime_manager_state', JSON.stringify({ history: [primed], currentIndex: 0 }));
                    window.cineMainState._primedState = null;
                    // Restart subscriptions using the new date-keyed docs.
                    const cinemaIds = (primed.cinemas || []).map(c => c.id);
                    window.cineMainState.startSubscriptions(cinemaIds, (change) => {
                        window.dispatchEvent(new CustomEvent('cinesync:mainstate', { detail: change }));
                    });
                    window.dispatchEvent(new CustomEvent('cinesync:reload', { detail: primed }));
                    setDataLoadStatus('');
                } catch(e) {
                    console.error('Date switch failed', e);
                    setDataLoadStatus('');
                }
            }, [dataReady]);


            // User management modal used to mutate localStorage. Until Phase D rewires it to
            // Firestore, admins manage accounts in the Firebase Console.
            const users = [];
            const handleUpdateUsers = () => {
                alert('User management has moved to the Firebase Console for now. A built-in admin UI will come in a later update.');
            };

            React.useEffect(() => {
                const unsub = window.fbAuth.onAuthStateChanged(async (fbUser) => {
                    try {
                        if (!fbUser) {
                            window.cineSync.stopSubscriptions();
                            if (window.cineMainState) window.cineMainState.stopSubscriptions();
                            if (window.cineMainState) window.cineMainState._primedState = null;
                            window.cineStorage.clearProfile();
                            setUser(null);
                            setDataReady(false);
                            setAuthReady(true);
                            return;
                        }
                        // Load Firestore profile (role, allowedCinemas, displayName)
                        const profile = await window.cineStorage.loadProfile(fbUser.uid);
                        if (!profile) {
                            setAuthError('Your account exists in Firebase Auth but has no CINEFLOW profile yet. Contact the admin (Jagmeet) to provision it.');
                            await window.fbAuth.signOut();
                            setUser(null);
                            setAuthReady(true);
                            return;
                        }
                        // Shape the user object so existing components (MainApp header etc.) keep working:
                        // they read user.username and user.role, plus user.allowedCinemas.
                        setUser({
                            uid: fbUser.uid,
                            email: fbUser.email,
                            username: profile.shortName || profile.displayName || fbUser.email.split('@')[0],
                            displayName: profile.displayName || fbUser.email,
                            role: profile.role || 'programmer',
                            allowedCinemas: profile.allowedCinemas || [],
                            supervises: profile.supervises || []
                        });
                        setAuthReady(true);

                        // Bootstrap localStorage from Firestore, then start real-time listeners.
                        setDataLoadStatus('Loading shared data from cloud...');
                        await window.cineSync.pullAll();
                        window.cineSync.startSubscriptions();

                        // Phase D: prime the main scheduler state from per-cinema Firestore docs.
                        setDataLoadStatus('Loading scheduler state from cloud...');
                        let primed = await window.cineMainState.pullMergedState(selectedDate);

                        // First-run migration: if the admin logs in and the cloud registry is empty
                        // but this browser has legacy localStorage data, push local â†’ cloud once so
                        // the existing scheduler content survives the cutover.
                        if (window.cineStorage.isAdmin()
                            && (!primed.cinemas || primed.cinemas.length === 0)) {
                            try {
                                const raw = window.localStorage.getItem('showtime_manager_state');
                                if (raw) {
                                    const parsed = JSON.parse(raw);
                                    const localSlice = parsed && parsed.history && parsed.history[parsed.currentIndex];
                                    if (localSlice && Array.isArray(localSlice.cinemas) && localSlice.cinemas.length) {
                                        setDataLoadStatus('First-run migration: uploading local scheduler state to cloud...');
                                        await window.cineMainState.pushInitial(localSlice);
                                        primed = await window.cineMainState.pullMergedState(selectedDate);
                                    }
                                }
                            } catch (migErr) {
                                console.error('CINEFLOW: first-run migration failed', migErr);
                            }
                        }

                        // Phase G migration: if the cloud still has legacy movies in the registry
                        // (pre-per-user-catalogs), copy them to the admin's personal catalog and
                        // clear the registry's movies field. Admin-only, one-shot.
                        if (window.cineStorage.isAdmin()) {
                            try {
                                const rawReg = await window.cineStorage.getGlobal('mainRegistry');
                                const legacyMovies = rawReg && Array.isArray(rawReg.movies) ? rawReg.movies : [];
                                if (legacyMovies.length > 0) {
                                    setDataLoadStatus('Phase G migration: moving movies to admin catalog...');
                                    const adminUid = window.cineStorage.uid;
                                    // Merge with any existing admin catalog (dedupe by id, keep existing ownerUid if set).
                                    const existing = await window.cineStorage._getUserMoviesDoc(adminUid);
                                    const byId = new Map();
                                    for (const m of (existing || [])) {
                                        if (m && m.id) byId.set(m.id, { ...m, ownerUid: m.ownerUid || adminUid });
                                    }
                                    for (const m of legacyMovies) {
                                        if (!m || !m.id) continue;
                                        if (!byId.has(m.id)) byId.set(m.id, { ...m, ownerUid: adminUid });
                                    }
                                    const merged = Array.from(byId.values());
                                    await window.cineStorage._setUserMoviesDoc(adminUid, merged);
                                    // Clear legacy movies from registry so we don't migrate twice.
                                    const cinemasOnly = { cinemas: Array.isArray(rawReg.cinemas) ? rawReg.cinemas : [] };
                                    await window.cineStorage.setGlobal('mainRegistry', cinemasOnly);
                                    console.log('CINEFLOW: Phase G migration moved', legacyMovies.length,
                                                'legacy movies to admin catalog', adminUid);
                                    // Re-pull so primed includes the relocated movies under admin ownerUid.
                                    primed = await window.cineMainState.pullMergedState(selectedDate);
                                }
                            } catch (gErr) {
                                console.error('CINEFLOW: Phase G legacy-movies migration failed', gErr);
                            }
                        }

                        window.cineMainState._primedState = primed;
                        setDataLoadStatus('');
                        setDataReady(true);
                    } catch (err) {
                        console.error('Auth state handler failed:', err);
                        setAuthError('Failed to initialize: ' + (err.message || err.code || 'unknown error'));
                        setAuthReady(true);
                    }
                });
                return () => {
                    unsub();
                    window.cineSync.stopSubscriptions();
                };
            }, []);

            // When another user updates a shared key, show a soft banner. Don't auto-reload â€”
            // user might be mid-edit. Phase D main-state changes ARE merged into React state
            // automatically by useCloudMainState â€” the banner is just an FYI.
            React.useEffect(() => {
                const handler = (e) => {
                    if (!dataReady) return;  // ignore the initial pull's own writes
                    const k = (e.detail && e.detail.key) || '';
                    if (k.startsWith('showtime_manager_state:')) {
                        return;
                        // Main-state change auto-applied in-place. Just flash a brief FYI.
                        setRemoteUpdateNotice('Scheduler updated by another user â€” your view just refreshed.');
                    } else {
                        setRemoteUpdateNotice('Another user updated shared data (' + k + '). Refresh to see the latest.');
                    }
                };
                window.addEventListener('cinesync:update', handler);
                return () => window.removeEventListener('cinesync:update', handler);
            }, [dataReady]);

            React.useEffect(() => {
                const handler = () => {
                    if (window.cineMainState) window.cineMainState._primedState = null;
                    setSchedulerReloadKey(prev => prev + 1);
                };
                window.addEventListener('cinesync:reload', handler);
                return () => window.removeEventListener('cinesync:reload', handler);
            }, []);

            const handleLogout = async () => {
                try {
                    window.cineSync.stopSubscriptions();
                    await window.fbAuth.signOut();
                } catch (e) { console.error('signOut failed', e); }
            };

            if (!authReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 dark:bg-cinema-base">
                        <div className="flex flex-col items-center space-y-4">
                            <div className="w-10 h-10 border-4 border-cinema-accent/20 border-t-cinema-accent rounded-full animate-spin"></div>
                            <div className="text-sm font-bold tracking-[0.2em] text-[#003B7B] dark:text-blue-400 uppercase">Loading Cineflow</div>
                        </div>
                        {authError && <div className="mt-6 max-w-md text-xs text-red-500 text-center px-4 font-medium">{authError}</div>}
                    </div>
                );
            }
            if (!user) {
                return (
                    <div>
                        {authError && (
                            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[300] max-w-md bg-red-50 dark:bg-red-900/40 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-200 text-xs rounded px-3 py-2 shadow-lg">
                                {authError}
                                <button onClick={() => setAuthError('')} className="ml-2 font-bold">×</button>
                            </div>
                        )}
                        <LoginForm />
                    </div>
                );
            }
            if (!dataReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 dark:bg-cinema-base">
                        <div className="flex flex-col items-center space-y-4">
                            <div className="w-10 h-10 border-4 border-cinema-accent/20 border-t-cinema-accent rounded-full animate-spin"></div>
                            <div className="text-sm font-bold tracking-[0.2em] text-[#003B7B] dark:text-blue-400 uppercase">Syncing Cloud</div>
                            <div className="mt-2 text-[11px] font-medium text-gray-500 tracking-wider">{dataLoadStatus || 'Connecting...'}</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col">
                    {/* Remote update notice â€” appears when another user changes shared data */}
                    {remoteUpdateNotice && (
                        <div className="flex items-center justify-between px-4 py-1.5 bg-amber-100 dark:bg-amber-900/40 border-b border-amber-300 dark:border-amber-700 text-amber-900 dark:text-amber-100 text-xs flex-shrink-0">
                            <span>🔄 {remoteUpdateNotice}</span>
                            <div className="flex items-center space-x-2">
                                <button onClick={() => window.location.reload()} className="px-2 py-0.5 bg-amber-600 hover:bg-amber-700 text-white rounded font-semibold transition-colors">Refresh now</button>
                                <button onClick={() => setRemoteUpdateNotice('')} className="font-bold text-amber-700 dark:text-amber-300 hover:opacity-70">×</button>
                            </div>
                        </div>
                    )}
                    {/* Mode Switcher Bar */}
                    <div className="flex items-center justify-between px-4 py-1.5 bg-[#002a5c] text-white border-b border-[#003B7B] flex-shrink-0" style={{minHeight:'36px'}}>
                        <div className="flex items-center space-x-1">
                            <button
                                onClick={() => setAppMode('scheduler')}
                                className={`px-4 py-1 rounded text-xs font-semibold transition-all ${appMode === 'scheduler' ? 'bg-white text-[#003B7B] shadow-md' : 'bg-white/10 text-white/80 hover:bg-white/20'}`}
                            >
                                <span className="inline-flex items-center space-x-1.5"><ClapperboardIcon size={13} /><span>CINEFLOW</span></span>
                            </button>
                            <button
                                onClick={() => setAppMode('allocation')}
                                className={`px-4 py-1 rounded text-xs font-semibold transition-all ${appMode === 'allocation' ? 'bg-white text-[#003B7B] shadow-md' : 'bg-white/10 text-white/80 hover:bg-white/20'}`}
                            >
                                <span className="inline-flex items-center space-x-1.5"><BarChartIcon size={13} /><span>Show Allocation</span></span>
                            </button>
                        </div>
                        <div className="flex items-center space-x-3">
                            <span className="text-[10px] text-white/70 font-medium uppercase">Date:</span>
                            <input 
                                type="date"
                                value={selectedDate}
                                onChange={(e) => handleDateChange(e.target.value)}
                                className="px-2 py-0.5 text-xs rounded text-gray-900 bg-white focus:outline-none border border-transparent focus:border-cinema-accent"
                            />
                            <div className="w-px h-4 bg-white/20 mx-1"></div>
                            <span className="text-[10px] text-white font-medium uppercase">{user.username}</span>
                            <button onClick={handleLogout} className="text-[10px] text-white font-medium hover:text-gray-200 transition-colors">Logout</button>
                        </div>
                    </div>
                    {/* Content */}
                    <div className="flex-1 overflow-hidden">
                        {appMode === 'scheduler' ? (
                            <MainApp key={`${selectedDate}:${schedulerReloadKey}`} user={user} users={users} onUpdateUsers={handleUpdateUsers} onLogout={handleLogout} selectedDate={selectedDate} />
                        ) : (
                            <ShowAllocationStandalone selectedDate={selectedDate} />
                        )}
                    </div>
                </div>
            );
        };

        // Standalone Show Allocation view (not a modal — renders inline)
        const ShowAllocationStandalone = ({ selectedDate }) => {
            const lsData = JSON.parse(localStorage.getItem('showtime_manager_state') || '{}');
            const targetState = lsData.history ? lsData.history[lsData.currentIndex || 0] : lsData;
            
            const allCinemas = targetState.cinemas || [];
            const allMovies = targetState.movies || [];
            const plannedAllocations = targetState.plannedAllocations || {};
            
            const scopedAllocations = {};
            for (const c of allCinemas) {
                scopedAllocations[c.id] = plannedAllocations[`${c.id}_${selectedDate}`] || {};
            }

            const handleSaveAllocations = (updates, customMovies = {}, deletedIds = []) => {
                const currentLsData = JSON.parse(localStorage.getItem('showtime_manager_state') || '{}');
                const isWrapped = !!currentLsData.history;
                const stateToUpdate = isWrapped ? currentLsData.history[currentLsData.currentIndex || 0] : currentLsData;

                const scopedUpdates = {};
                Object.keys(updates).forEach(cid => {
                    scopedUpdates[`${cid}_${selectedDate}`] = updates[cid];
                });

                stateToUpdate.plannedAllocations = { ...(stateToUpdate.plannedAllocations || {}), ...scopedUpdates };

                if (deletedIds.length > 0) {
                    const delSet = new Set(deletedIds);
                    stateToUpdate.movies = (stateToUpdate.movies || []).filter(m => !delSet.has(m.id));
                    // Intentionally DO NOT touch stateToUpdate.shows here.
                    // Scheduler shows are owned exclusively by the scheduler view — allocation saves must never mutate them.
                    Object.keys(stateToUpdate.plannedAllocations).forEach(allocKey => {
                        delSet.forEach(mid => { delete stateToUpdate.plannedAllocations[allocKey][mid]; });
                    });
                }

                const FORMATS = ['2D IMAX','3D IMAX','3D ATMOS','2D','3D','ATMOS','JUNIOR'];
                const LANGS = ['HINDI','ENGLISH','BHOJPURI','BENGALI','TELUGU','TAMIL','KANNADA','MALAYALAM','MARATHI','GUJARATI','PUNJABI','ODIA'];
                const CERTS = ['UA','U','A'];

                const parseMovieString = (str) => {
                    let cn = str.trim();
                    let format = '', language = '', censorRating = '', duration = 120, tat = 15;
                    const dMatch = cn.match(/\[(\d+)\]/); if (dMatch) { duration = parseInt(dMatch[1], 10); cn = cn.replace(dMatch[0], ''); }
                    const tatMatch = cn.match(/\{(\d+)\}/); if (tatMatch) { tat = parseInt(tatMatch[1], 10); cn = cn.replace(tatMatch[0], ''); }
                    cn = cn.trim();
                    for (const f of FORMATS) { const re = new RegExp('\\b'+f.replace(/\s+/g,'\\s+')+'\\b','i'); if (re.test(cn)) { format = f; cn = cn.replace(re, ''); break; } }
                    for (const l of LANGS) { const re = new RegExp('\\b'+l+'\\b','i'); if (re.test(cn)) { language = l; cn = cn.replace(re, ''); break; } }
                    for (const c of CERTS) { const re = new RegExp('\\b'+c+'\\b','i'); if (re.test(cn)) { censorRating = c; cn = cn.replace(re, ''); break; } }
                    const title = cn.replace(/\s+/g,' ').trim();
                    return { title, format, language, censorRating, duration, tat };
                };

                const currentMovies = stateToUpdate.movies || [];
                const myUid = (window.cineStorage && window.cineStorage.uid) || null;
                let moviesChanged = false;
                Object.entries(customMovies).forEach(([id, rawTitle]) => {
                    if (!rawTitle.trim()) return;
                    const parsed = parseMovieString(rawTitle);
                    const existing = currentMovies.find(m => m.id === id);
                    if (existing) {
                        // Update all fields (preserve existing ownerUid â€” don't steal other users' movies).
                        if (parsed.title && existing.title !== parsed.title) { existing.title = parsed.title; moviesChanged = true; }
                        if (parsed.format !== (existing.format||'')) { existing.format = parsed.format; moviesChanged = true; }
                        if (parsed.language !== (existing.language||'')) { existing.language = parsed.language; moviesChanged = true; }
                        if (parsed.censorRating !== (existing.censorRating||'')) { existing.censorRating = parsed.censorRating; moviesChanged = true; }
                        if (parsed.duration !== existing.duration) { existing.duration = parsed.duration; moviesChanged = true; }
                        if (parsed.tat !== existing.tat) { existing.tat = parsed.tat; moviesChanged = true; }
                    } else {
                        // New movie — tag with current user's uid so it routes to their own catalog.
                        currentMovies.push({ id, title: parsed.title, format: parsed.format, language: parsed.language, censorRating: parsed.censorRating, duration: parsed.duration, tat: parsed.tat, isRegional: false, ownerUid: myUid });
                        moviesChanged = true;
                    }
                });
                if (moviesChanged) stateToUpdate.movies = currentMovies;

                if (isWrapped) {
                    currentLsData.history[currentLsData.currentIndex || 0] = stateToUpdate;
                    localStorage.setItem('showtime_manager_state', JSON.stringify(currentLsData));
                } else {
                    localStorage.setItem('showtime_manager_state', JSON.stringify(stateToUpdate));
                }

                if (window.cineMainState) window.cineMainState._primedState = null;

                // Push ONLY allocations + movies to Firestore. Never pushInitial here:
                // pushInitial writes shows for every cinema in the registry, which can clobber
                // the scheduler's shows if any cinemaId mismatches â€” that's the wipe bug.
                if (window.cineMainState && window.cineStorage && window.cineStorage.uid) {
                    window.cineMainState.pushAllocationsOnly(stateToUpdate)
                        .then(() => alert("Allocations synced with CINEFLOW. Scheduler shows untouched."))
                        .catch(err => {
                            console.error('CINEFLOW: standalone alloc push failed', err);
                            const isPerm = (err && (err.code === 'permission-denied' || /permission/i.test(err.message || '')));
                            alert(isPerm
                                ? "Saved locally. Some changes require a cinema you don't have write access to — allocations were saved where permitted."
                                : "Saved locally, but cloud sync failed. Check console for details.");
                        });
                } else {
                    alert("Saved locally. Cloud not ready — log in to sync.");
                }
            };

            return (
                <ShowAllocationModal
                    isOpen={true}
                    onClose={() => {}} /* no-op; standalone mode */
                    selectedDate={selectedDate}
                    allCinemas={allCinemas}
                    allMovies={allMovies}
                    plannedAllocations={scopedAllocations}
                    onSaveAllocations={handleSaveAllocations}
                />
            );
        };


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
