                                />
                            </div>

                            {/* Status Bar */}
                            <StatusBar cinema={selectedCinema} shows={shows} canUndo={canUndo} canRedo={canRedo} />
                        </main>
                    </div>
                    {screenContextMenu && ReactDOM.createPortal(
                        <div className="fixed inset-0 z-[99]" onClick={() => setScreenContextMenu(null)}>
                            <div 
                                className="fixed z-[100] bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-xl py-1 min-w-[180px]"
                                style={{ top: screenContextMenu.y, left: screenContextMenu.x }}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="px-4 py-2 text-[10px] font-bold text-gray-400 uppercase border-b dark:border-gray-700 mb-1">{screenContextMenu.screen.name} Options</div>
                                <button 
                                    className="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center space-x-2"
                                    onClick={() => {
                                        setScreenForTat(screenContextMenu.screen);
                                        setScreenTatModalOpen(true);
                                        setScreenContextMenu(null);
                                    }}
                                >
                                    <ClockIcon size={14} />
                                    <span>Set Audi-Specific TAT</span>
                                </button>
                                <button 
                                    className="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center space-x-2"
                                    onClick={() => {
                                        handleUpdateScreenTat(screenContextMenu.screen.id, '');
                                        setScreenContextMenu(null);
                                    }}
                                >
                                    <XIcon size={14} />
                                    <span>Reset to Global TAT</span>
                                </button>
                            </div>
                        </div>,
                        document.body
                    )}
                    {/* All modals */}
                    <Tooltip show={tooltip.show} position={tooltip.position} />
                    <Modal isOpen={isAddCinemaModalOpen} onClose={() => setAddCinemaModalOpen(false)} title="Add New Cinema"><CinemaForm onSave={handleAddCinema} onCancel={() => setAddCinemaModalOpen(false)} /></Modal>
                    <Modal isOpen={isEditModalOpen} onClose={() => setEditModalOpen(false)} title="Edit Cinema"><CinemaForm initialData={cinemaToEdit} onSave={handleUpdateCinema} onCancel={() => setEditModalOpen(false)} /></Modal>
                    <Modal isOpen={isUploadCinemaModalOpen} onClose={() => setUploadCinemaModalOpen(false)} title="Upload Cinemas"><UploadCSVForm itemType="Cinemas" onSave={handleAddCinemasCSV} onCancel={() => setUploadCinemaModalOpen(false)} /></Modal>
                    <Modal isOpen={isAddMovieModalOpen} onClose={() => { setAddMovieModalOpen(false); setMovieToEdit(null); }} title={movieToEdit ? "Edit Movie" : "Add New Movie"}><AddMovieForm initialData={movieToEdit} onSave={(data) => { if(movieToEdit) handleEditMovie({...data, id: movieToEdit.id}); else handleAddMovie(data); }} onCancel={() => { setAddMovieModalOpen(false); setMovieToEdit(null); }} /></Modal>
                    <Modal isOpen={isUploadMoviesModalOpen} onClose={() => setUploadMoviesModalOpen(false)} title="Upload Movies"><UploadCSVForm itemType="Movies" onSave={handleAddMoviesCSV} onCancel={() => setUploadMoviesModalOpen(false)} /></Modal>
                    <UploadScheduleModal isOpen={isUploadScheduleModalOpen} onClose={() => setUploadScheduleModalOpen(false)} onSave={handleUploadSchedule} movies={movies} cinema={selectedCinema} />
                    <AllocationModal isOpen={isAllocationModalOpen} onClose={() => setAllocationModalOpen(false)} movies={movies} initialAllocations={selectedCinema ? (plannedAllocations[`${selectedCinema.id}_${selectedDate}`] || {}) : {}} onSave={handleSaveAllocations} />
                    <BulkAllocationModal isOpen={isBulkAllocationModalOpen} onClose={() => setBulkAllocationModalOpen(false)} movies={movies} cinemas={cinemas} onSave={handleBulkSaveAllocations} />
                    <OpsDownloadModal isOpen={isOpsDownloadModalOpen} onClose={() => setIsOpsDownloadModalOpen(false)} cinemas={cinemas} onDownload={handleDownloadSelectedOpsSchedules} />
                    <CopyScheduleModal isOpen={isCopyScheduleModalOpen} onClose={() => setIsCopyScheduleModalOpen(false)} cinemas={cinemas} onCopy={handleCopySchedule} />
                    <ScreenTatModal isOpen={isScreenTatModalOpen} onClose={() => setScreenTatModalOpen(false)} screen={screenForTat} onSave={(tat) => handleUpdateScreenTat(screenForTat.id, tat)} />
                    <DeleteConfirmationModal isOpen={isDeleteModalOpen} onClose={() => setDeleteModalOpen(false)} itemType="Cinema" itemName={itemToDelete?.name} onConfirm={handleDeleteCinema} />
                    <ConfirmationModal 
                        isOpen={isClearDataModalOpen} 
                        onClose={() => setIsClearDataModalOpen(false)} 
                        onConfirm={handleClearAllData}
                        title="Clear All Data"
                        message="Are you sure you want to delete all your work? This action cannot be undone."
                        confirmText="Yes, Clear Everything"
                    />
                    <ConfirmationModal 
                        isOpen={isClearScheduleModalOpen} 
                        onClose={() => setIsClearScheduleModalOpen(false)} 
                        onConfirm={handleClearSchedule}
                        title="Clear Schedule"
                        message={`Are you sure you want to clear the schedule for "${selectedCinema?.name}" on ${selectedDate}? This action cannot be undone.`}
                        confirmText="Yes, Clear Schedule"
                    />

                    <Modal isOpen={isBulkScheduleModalOpen} onClose={() => setIsBulkScheduleModalOpen(false)} title="Bulk Auto-Schedule All Cinemas">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Global Start Time</label>
                                <input type="time" value={bulkScheduleConfig.startTime} onChange={e => setBulkScheduleConfig({...bulkScheduleConfig, startTime: e.target.value})} className="block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm" />
                                <p className="text-xs text-gray-400 mt-1">This single start time will be applied globally to all scheduled cinemas.</p>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Scheduling Engine</label>
                                <select value={bulkScheduleConfig.engine} onChange={e => setBulkScheduleConfig({...bulkScheduleConfig, engine: e.target.value})} className="block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm">
                                    <option value="ALGO">Standard Algorithm (Offline/Instant)</option>
                                    <option value="AI">Gemini AI Engine (Cloud/Smart/Slow)</option>
                                </select>
                                {bulkScheduleConfig.engine === 'AI' && <p className="text-xs text-orange-400 mt-1">Warning: Bulk AI scheduling invokes the Gemini Engine sequentially for every active cinema. It may take several minutes to generate and API rate limits may apply.</p>}
                            </div>
                            <div className="flex justify-end space-x-3 pt-4 border-t dark:border-gray-700">
                                <button onClick={() => setIsBulkScheduleModalOpen(false)} className="px-4 py-2 border border-gray-200 dark:border-gray-700 rounded text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</button>
                                <button onClick={handleApplyBulkSchedule} disabled={isBulkProcessing || !bulkScheduleConfig.startTime} className="px-4 py-2 bg-cinema-accent text-white rounded text-sm font-medium hover:bg-cinema-accent-hover shadow-sm disabled:opacity-50">{isBulkProcessing ? 'Iterating over Cinemas...' : 'Start Global Schedule'}</button>
                            </div>
                        </div>
                    </Modal>
                    <CustomAlertModal isOpen={alertInfo.isOpen} onClose={() => setAlertInfo({ isOpen: false })} title={alertInfo.title} message={alertInfo.message} />
                    <ScheduleListModal isOpen={isScheduleListModalOpen} onClose={() => setScheduleListModalOpen(false)} cinema={selectedCinema} movies={movies} shows={shows} />
                    <EmailDraftModal 
                        isOpen={isEmailDraftModalOpen} 
                        onClose={() => setEmailDraftModalOpen(false)} 
                        allCinemas={cinemas}
                        allShows={shows}
                        allMovies={movies}
                    />
                    <UserManagementModal 
                        isOpen={isUserManagementModalOpen} 
                        onClose={() => setIsUserManagementModalOpen(false)} 
                        users={users} 
                        onSaveUsers={onUpdateUsers} 
                        allCinemas={allCinemas} 
                    />
                    <ShowAllocationModal
                        isOpen={isShowAllocationModalOpen}
                        onClose={() => setIsShowAllocationModalOpen(false)}
                        allCinemas={cinemas}
                        allMovies={movies}
                        selectedDate={selectedDate}
                        plannedAllocations={React.useMemo(() => {
                            const res = {};
                            cinemas.forEach(c => {
                                res[c.id] = plannedAllocations[`${c.id}_${selectedDate}`] || {};
                            });
                            return res;
                        }, [cinemas, plannedAllocations, selectedDate])}
                        onSaveAllocations={(updates, customMovies = {}, deletedIds = []) => {
                            const FORMATS = ['2D IMAX','3D IMAX','3D ATMOS','2D','3D','ATMOS','JUNIOR'];
                            const LANGS = ['HINDI','ENGLISH','BHOJPURI','BENGALI','TELUGU','TAMIL','KANNADA','MALAYALAM','MARATHI','GUJARATI','PUNJABI','ODIA'];
                            const CERTS = ['UA','U','A'];
                            const parseMovieString = (str) => {
                                let cn = (str || '').trim();
                                let format='', language='', censorRating='', duration=120, tat=15;
                                const dM = cn.match(/\[(\d+)\]/); if (dM) { duration = parseInt(dM[1],10); cn = cn.replace(dM[0],''); }
                                const tM = cn.match(/\{(\d+)\}/); if (tM) { tat = parseInt(tM[1],10); cn = cn.replace(tM[0],''); }
                                cn = cn.trim();
                                for (const f of FORMATS) { const re = new RegExp('\\b'+f.replace(/\s+/g,'\\s+')+'\\b','i'); if (re.test(cn)) { format=f; cn=cn.replace(re,''); break; } }
                                for (const l of LANGS)   { const re = new RegExp('\\b'+l+'\\b','i');                              if (re.test(cn)) { language=l; cn=cn.replace(re,''); break; } }
                                for (const c of CERTS)   { const re = new RegExp('\\b'+c+'\\b','i');                              if (re.test(cn)) { censorRating=c; cn=cn.replace(re,''); break; } }
                                return { title: cn.replace(/\s+/g,' ').trim(), format, language, censorRating, duration, tat };
                            };

                            // Use functional setState so we read the FRESHEST state — not a stale
                            // closure snapshot captured when the modal opened. Any scheduler edits
                            // made in the background won't be clobbered.
                            const myUid = (window.cineStorage && window.cineStorage.uid) || null;
                            setState(prev => {
                                let newMovies = [...(prev.movies || [])];
                                const scopedUpdates = {};
                                Object.keys(updates).forEach(cid => {
                                    scopedUpdates[`${cid}_${selectedDate}`] = updates[cid];
                                });
                                const newPlannedAllocations = { ...prev.plannedAllocations, ...scopedUpdates };

                                // Apply customMovies: update existing or add new
                                Object.entries(customMovies).forEach(([id, rawTitle]) => {
                                    if (!rawTitle || !rawTitle.trim()) return;
                                    const p = parseMovieString(rawTitle);
                                    const idx = newMovies.findIndex(m => m.id === id);
                                    if (idx >= 0) {
                                        newMovies[idx] = { ...newMovies[idx], title: p.title || newMovies[idx].title, format: p.format, language: p.language, censorRating: p.censorRating, duration: p.duration, tat: p.tat };
                                    } else {
                                        newMovies.push({ id, title: p.title, format: p.format, language: p.language, censorRating: p.censorRating, duration: p.duration, tat: p.tat, isRegional: false, ownerUid: myUid });
                                    }
                                });

                                // Apply deletions: remove from movies and per-cinema allocations.
                                // Shows are intentionally NOT touched here — scheduler owns them exclusively.
                                if (deletedIds.length > 0) {
                                    const delSet = new Set(deletedIds);
                                    newMovies = newMovies.filter(m => !delSet.has(m.id));
                                    Object.keys(newPlannedAllocations).forEach(cid => {
                                        const a = { ...(newPlannedAllocations[cid] || {}) };
                                        delSet.forEach(mid => { delete a[mid]; });
                                        newPlannedAllocations[cid] = a;
                                    });
                                }

                                return { ...prev, movies: newMovies, plannedAllocations: newPlannedAllocations };
                            });
                        }}
                    />
                </>
            );
        };


        // ————————————————————————————————————————————————————————————————————————
        //  SHOW ALLOCATION MODAL — Full replication of Excel workbook
        // ————————————————————————————————————————————————————————————————————————


        const ShowAllocationModal = ({ isOpen, onClose, allCinemas, allMovies, plannedAllocations, onSaveAllocations, selectedDate }) => {
            const allocWorkStorageKey = `sm_alloc_work_${selectedDate}`;
            const [activeProgrammer, setActiveProgrammer] = React.useState('JAGMEET');
            const [weekendData, setWeekendData] = React.useState(() => {
                try { return JSON.parse(localStorage.getItem('sm_weekend_data') || '{}'); } catch(e) { return {}; }
            });
            const [editedAllocations, setEditedAllocations] = React.useState({});
            const [isDirty, setIsDirty] = React.useState(false);
            const [selectedCinemaForWeekend, setSelectedCinemaForWeekend] = React.useState(null);

            const [programmerMap, setProgrammerMap] = React.useState(() => {
                const local = localStorage.getItem('sm_programmer_map');
                return local ? JSON.parse(local) : PROGRAMMER_CINEMA_MAP;
            });
            const [customMovieNames, setCustomMovieNames] = React.useState({});
            const [deletedMovieIds, setDeletedMovieIds] = React.useState(() => new Set());
            const [movieOrder, setMovieOrder] = React.useState([]);
            const [cinemaStats, setCinemaStats] = React.useState({});
            const [activeMovieEditor, setActiveMovieEditor] = React.useState(null);
            const [customBlankCount, setCustomBlankCount] = React.useState(0);
            const [weekendPanelOpen, setWeekendPanelOpen] = React.useState(false);
            const [cinemaContextMenu, setCinemaContextMenu] = React.useState(null);
            const [activeCell, setActiveCell] = React.useState({row:-1, col:-1});
            const [allocHistory, setAllocHistory] = React.useState([]);
            const [allocFuture, setAllocFuture] = React.useState([]);
            const tableRef = React.useRef(null);

            React.useEffect(() => {
                if (!isOpen) return;
                setEditedAllocations(JSON.parse(JSON.stringify(plannedAllocations || {})));
                setIsDirty(false);
                setSelectedCinemaForWeekend(null);
            }, [isOpen, plannedAllocations, selectedDate]);

            React.useEffect(() => {
                if (Object.keys(weekendData).length > 0) localStorage.setItem('sm_weekend_data', JSON.stringify(weekendData));
            }, [weekendData]);

            const [globalTat, setGlobalTat] = React.useState(() => parseInt(localStorage.getItem('sm_global_tat')) || 15);
            const handleTatChange = (e) => {
                const nv = parseInt(e.target.value) || 0;
                setGlobalTat(nv);
                localStorage.setItem('sm_global_tat', nv);
                // Synchronize global TAT directly to the currently active movies in the table
                // so the user sees it reflect instantly under each movie.
                if (typeof activeMovieIds !== 'undefined' && activeMovieIds.length > 0) {
                    activeMovieIds.forEach(mid => {
                        const m = allMovies.find(mv => mv.id === mid);
                        if (m) m.tat = nv;
                    });
                    setIsDirty(true);
                }
            };

            const getMatchedCinemas = (progCinemaNames) => {
                return progCinemaNames.map(name => {
                    const lower = name.toLowerCase().replace(/[^a-z0-9]/g, '');
                    const existing = allCinemas.find(c => {
                        const cn = c.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                        return cn === lower || cn === lower + 'p' || lower === cn + 'p';
                    });
                    return existing || { id: 'temp_c_' + name, name: name, screens: Array.from({length: 4}) };
                });
            };

            const handleUploadWeekend = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const processData = (rows) => {
                    const parsed = {};
                    let currentCinema = null;
                    let inHeaders = false;
                    rows.forEach(row => {
                        const firstCell = String(row[0] || '').trim();
                        if (!firstCell || firstCell === 'undefined' || firstCell === 'null') return;
                        if (firstCell === 'Film') { inHeaders = true; return; }
                        if (firstCell.startsWith('Grand Total')) {
                            if (currentCinema && parsed[currentCinema]) {
                                parsed[currentCinema].total = { shows: parseFloat(row[1])||0, sold: parseFloat(row[2])||0, gross: parseFloat(row[3])||0, net: parseFloat(row[4])||0, occPct: parseFloat(row[5])||0, aps: parseFloat(row[6])||0, atp: parseFloat(row[7])||0 };
                            }
                            inHeaders = false; currentCinema = null; return;
                        }
                        if (!inHeaders) { currentCinema = firstCell; parsed[currentCinema] = { films: [], total: null }; return; }
                        if (currentCinema && inHeaders) {
                            parsed[currentCinema].films.push({ film: firstCell, shows: parseFloat(row[1])||0, sold: parseFloat(row[2])||0, gross: parseFloat(row[3])||0, net: parseFloat(row[4])||0, occPct: parseFloat(row[5])||0, aps: parseFloat(row[6])||0, atp: parseFloat(row[7])||0 });
                        }
                    });
                    setWeekendData(parsed);
                    alert(`Loaded Weekend Data for ${Object.keys(parsed).length} cinemas.`);
                };
                if (file.name.match(/\.xlsx?$/i) && window.XLSX) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        try {
                            const workbook = window.XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                            processData(rows);
                        } catch(err) { console.error('Excel parse error:', err); }
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    Papa.parse(file, { header: false, skipEmptyLines: true, complete: results => { try{ processData(results.data); } catch(err){console.error(err);} } });
                }
                event.target.value = '';
            };

            const handleUploadAllocation = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const processData = (rows) => {
                    if (rows.length < 2) return;
                    const cinemaHeaders = rows[0].slice(1);
                    const cinemaMap = {};
                    cinemaHeaders.forEach((cN, idx) => {
                        const t = String(cN||'').trim().toLowerCase();
                        if (!t) return;
                        const f = allCinemas.find(c => c.name.toLowerCase().includes(t) || t.includes(c.name.toLowerCase()));
                        cinemaMap[idx] = f ? f.id : ('temp_c_' + String(cN||'').trim());
                    });
                    const na = {};
                    rows.slice(1).filter(r => { const l=String(r[0]||'').toLowerCase().trim(); return l && !['total shows','screens proposed','as','operational'].includes(l); })
                    .forEach(row => {
                        const mn = String(row[0]||'').trim();
                        let mv = allMovies.find(m => m.title.toLowerCase().includes(mn.toLowerCase()) || mn.toLowerCase().includes(m.title.toLowerCase()));
                        if (!mv) { mv = { id: 'temp_m_' + mn, title: mn }; }
                       
                        for (let ci=0; ci<cinemaHeaders.length; ci++) {
                            const cid = cinemaMap[ci]; if (!cid) continue;
                            const cnt = parseInt(row[ci+1])||0;
                            if (cnt > 0) { if (!na[cid]) na[cid]={}; na[cid][mv.id] = (na[cid][mv.id]||0)+cnt; }
                        }
                    });
                    setEditedAllocations(prev => ({...prev,...na}));
                    setIsDirty(true);
                };
                
                if (file.name.match(/\.xlsx?$/i) && window.XLSX) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        try {
                            const workbook = window.XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                            const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                            processData(rows);
                        } catch(err) { console.error('Excel error:', err); }
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    Papa.parse(file, { header: false, skipEmptyLines: true, complete: results => { try{ processData(results.data); } catch(err){console.error(err);} } });
                }
                event.target.value = '';
            };

            const handleCellChange = (cinemaId, movieId, value) => {
                const nv = parseInt(value)||0;
                setAllocHistory(h => [...h.slice(-30), editedAllocations]);
                setAllocFuture([]);
                setEditedAllocations(prev => { const u={...prev}; if(!u[cinemaId]) u[cinemaId]={}; u[cinemaId]={...u[cinemaId],[movieId]:nv}; return u; });
                setIsDirty(true);
            };

            const handleUndo = () => {
                if (allocHistory.length === 0) return;
                const prev = allocHistory[allocHistory.length-1];
                setAllocFuture(f => [editedAllocations, ...f]);
                setAllocHistory(h => h.slice(0,-1));
                setEditedAllocations(prev);
                setIsDirty(true);
            };

            const handleRedo = () => {
                if (allocFuture.length === 0) return;
                const next = allocFuture[0];
                setAllocHistory(h => [...h, editedAllocations]);
                setAllocFuture(f => f.slice(1));
                setEditedAllocations(next);
                setIsDirty(true);
            };

            const focusCell = (rowIdx, colIdx, cinemas, movieIds) => {
                if (rowIdx < 0 || rowIdx >= movieIds.length || colIdx < 0 || colIdx >= cinemas.length) return;
                const inp = tableRef.current?.querySelector(`[data-row="${rowIdx}"][data-col="${colIdx}"]`);
                if (inp) { inp.focus(); inp.select(); }
                setActiveCell({row: rowIdx, col: colIdx});
                setSelectedCinemaForWeekend(cinemas[colIdx].name);
                setWeekendPanelOpen(true);
            };

            const handleSave = () => {
                if (!window.confirm('Save local work and Sync allocation data to CINEFLOW?')) return;
                const saveData = { editedAllocations, customMovieNames, movieOrder, movieStatus, activeProgrammer, cinemaStats };
                localStorage.setItem(allocWorkStorageKey, JSON.stringify(saveData));
                onSaveAllocations(editedAllocations, customMovieNames, Array.from(deletedMovieIds));
                setDeletedMovieIds(new Set());
                setIsDirty(false);
            };

            const handleExportCSV = () => {
                const prog = PROGRAMMER_CINEMA_MAP.find(p => p.name === activeProgrammer);
                if (!prog) return;
                const cinemas = getMatchedCinemas(prog.cinemas);
                const movieIds = getActiveMovieIds(cinemas);
                const rows = [['Movies', ...cinemas.map(c => c.name)]];
                movieIds.forEach(mid => {
                    const m = allMovies.find(x => x.id === mid);
                    if (!m) return;
                    const fullName = getFullMovieName(m);
                    rows.push([`"${fullName}"`, ...cinemas.map(c => editedAllocations[c.id]?.[mid] || '')]);
                });
                const blob = new Blob([rows.map(r => r.join(',')).join('\n')], {type:'text/csv'});
                const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`show_allocation_${activeProgrammer}.csv`; a.click();
            };

            // Movie status: 'new' or 'continued' per movie id
            const [movieStatus, setMovieStatus] = React.useState(() => {
                try { return JSON.parse(localStorage.getItem('sm_movie_status') || '{}'); } catch(e) { return {}; }
            });
            React.useEffect(() => { localStorage.setItem('sm_movie_status', JSON.stringify(movieStatus)); }, [movieStatus]);

            // Right-click context menu for movie rows
            const [movieContextMenu, setMovieContextMenu] = React.useState(null);

            const handleClearAllAllocations = () => {
                if (!window.confirm(`Clear allocation numbers for ${selectedDate} only? Movie rows will stay, but all numbers for this date will be wiped.`)) return;
                setAllocHistory(prev => [...prev, JSON.parse(JSON.stringify(editedAllocations))]);
                setAllocFuture([]);
                const cleared = {};
                Object.keys(editedAllocations).forEach(cid => { cleared[cid] = {}; });
                setEditedAllocations(cleared);
                setIsDirty(true);
            };

            const handleSaveLocal = () => {
                const saveData = { editedAllocations, customMovieNames, movieOrder, movieStatus, activeProgrammer, cinemaStats };
                localStorage.setItem(allocWorkStorageKey, JSON.stringify(saveData));
                setIsDirty(false);
                alert('Show Allocation work saved successfully!');
            };

            // Load saved allocation work for the selected date only
            React.useEffect(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem(allocWorkStorageKey) || 'null');
                    if (saved) {
                        if (saved.editedAllocations && Object.keys(saved.editedAllocations).length > 0) setEditedAllocations(prev => ({...prev, ...saved.editedAllocations}));
                        if (saved.customMovieNames) setCustomMovieNames(prev => ({...prev, ...saved.customMovieNames}));
                        if (saved.movieOrder && saved.movieOrder.length > 0) setMovieOrder(saved.movieOrder);
                        if (saved.activeProgrammer) setActiveProgrammer(saved.activeProgrammer);
                        if (saved.cinemaStats) setCinemaStats(saved.cinemaStats);
                    }
                } catch(e) {}
            }, [allocWorkStorageKey]);

            const isStandalone = onClose.toString().includes('{}') || onClose.toString().includes('()=>{}');



            const getActiveMovieIds = (cinemas) => {
                const ids = new Set();
                cinemas.forEach(c => { const a=editedAllocations[c.id]; if(a) Object.keys(a).forEach(mid => { if(a[mid]>0) ids.add(mid); }); });
                allMovies.forEach(m => ids.add(m.id));
                Object.keys(customMovieNames).forEach(mid => ids.add(mid));
                deletedMovieIds.forEach(mid => ids.delete(mid));
                const base = Array.from(ids);
                for (let i=1; i<=customBlankCount; i++) base.push('temp_blank_' + i);
                if (base.length === 0) base.push('temp_blank_1');
                // Apply movieOrder array for sorting
                const ordered = [...movieOrder.filter(id => base.includes(id)), ...base.filter(id => !movieOrder.includes(id))];
                return ordered;
            };

            const moveRow = (mid, direction) => {
                const ids = getActiveMovieIds(activeCinemas);
                const idx = ids.indexOf(mid);
                if (idx < 0) return;
                const newIdx = direction === 'up' ? Math.max(0, idx - 1) : Math.min(ids.length - 1, idx + 1);
                const newOrder = [...ids];
                [newOrder[idx], newOrder[newIdx]] = [newOrder[newIdx], newOrder[idx]];
                setMovieOrder(newOrder);
            };

            const findWeekendForCinema = (cinemaName) => {
                if (!cinemaName) return null;
                const lower = cinemaName.toLowerCase();
                const key = Object.keys(weekendData).find(k => { const kl=k.toLowerCase(); return kl===lower || kl.includes(lower) || lower.includes(kl); });
                return key ? { name: key, ...weekendData[key] } : null;
            };

            const handleAddCinema = () => {
                const name = window.prompt("Enter new Cinema name for " + activeProgrammer + ":");
                if (name) {
                    setProgrammerMap(prev => {
                        const u = JSON.parse(JSON.stringify(prev));
                        const p = u.find(x => x.name === activeProgrammer);
                        if (p && !p.cinemas.includes(name)) p.cinemas.push(name);
                        localStorage.setItem('sm_programmer_map', JSON.stringify(u));
                        return u;
                    });
                }
            };
            const handleRenameCinema = (oldName) => {
                const name = window.prompt("Rename Cinema:", oldName);
                if (name && name !== oldName) {
                    setProgrammerMap(prev => {
                        const u = JSON.parse(JSON.stringify(prev));
                        const p = u.find(x => x.name === activeProgrammer);
                        if (p) {
                            const idx = p.cinemas.indexOf(oldName);
                            if (idx > -1) p.cinemas[idx] = name;
                        }
                        localStorage.setItem('sm_programmer_map', JSON.stringify(u));
                        return u;
                    });
                    if (selectedCinemaForWeekend === oldName) setSelectedCinemaForWeekend(name);
                }
            };
            const handleDeleteCinema = (oldName) => {
                if (window.confirm("Remove " + oldName + " from " + activeProgrammer + "?")) {
                    setProgrammerMap(prev => {
                        const u = JSON.parse(JSON.stringify(prev));
                        const p = u.find(x => x.name === activeProgrammer);
                        if (p) p.cinemas = p.cinemas.filter(c => c !== oldName);
                        localStorage.setItem('sm_programmer_map', JSON.stringify(u));
                        return u;
                    });
                    if (selectedCinemaForWeekend === oldName) setSelectedCinemaForWeekend(null);
                }
            };

            if (!isOpen) return null;

            const activeProg = programmerMap.find(p => p.name === activeProgrammer);
            const activeCinemas = activeProg ? getMatchedCinemas(activeProg.cinemas) : [];
            const activeMovieIds = getActiveMovieIds(activeCinemas);
            const weekendForSelected = selectedCinemaForWeekend ? findWeekendForCinema(selectedCinemaForWeekend) : null;

            const handleKeyDown = (e, rowIdx, colIdx) => {
                const numRows = activeMovieIds.length;
                const numCols = activeCinemas.length;
                let nr = rowIdx, nc = colIdx;
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); handleUndo(); return; }
                if (e.ctrlKey && e.key === 'y') { e.preventDefault(); handleRedo(); return; }
                switch(e.key) {
                    case 'ArrowRight': nc = Math.min(numCols-1, colIdx+1); break;
                    case 'ArrowLeft':  nc = Math.max(0, colIdx-1); break;
                    case 'ArrowDown':  nr = Math.min(numRows-1, rowIdx+1); break;
                    case 'ArrowUp':    nr = Math.max(0, rowIdx-1); break;
                    case 'Tab':  e.preventDefault(); nc = e.shiftKey ? Math.max(0,colIdx-1) : Math.min(numCols-1,colIdx+1); if(nc===colIdx) { nr = e.shiftKey ? Math.max(0,rowIdx-1) : Math.min(numRows-1,rowIdx+1); nc = e.shiftKey ? numCols-1 : 0; } break;
                    case 'Enter': e.preventDefault(); nr = Math.min(numRows-1, rowIdx+1); break;
                    default: return;
                }
                e.preventDefault();
                focusCell(nr, nc, activeCinemas, activeMovieIds);
            };


            return (
                <div className={isStandalone ? 'w-full h-full flex flex-col relative' : 'fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex justify-center items-start p-2 pt-4 overflow-y-auto'} onClick={isStandalone ? undefined : onClose}>
                    {activeMovieEditor && (() => {
                        const existingMovie = allMovies.find(m => m.id === activeMovieEditor);
                        const customName = customMovieNames[activeMovieEditor] || '';
                        const FORMATS = ['2D','3D','2D IMAX','3D IMAX','ATMOS','3D ATMOS','JUNIOR'];
                        const LANGS = ['HINDI','ENGLISH','BHOJPURI','BENGALI','TELUGU','TAMIL','KANNADA','MALAYALAM','MARATHI','GUJARATI','PUNJABI','ODIA'];
                        const CERTS = ['U','UA','A'];
                        let parsedName = '', parsedFormat = '', parsedLang = '', parsedCert = '', parsedDur = '', parsedTat = '';
                        // Always start from actual movie object if available
                        if (existingMovie) {
                            parsedName = existingMovie.title || '';
                            parsedFormat = existingMovie.format || '';
                            parsedLang = existingMovie.language || '';
                            parsedCert = existingMovie.censorRating || existingMovie.censor || '';
                            parsedDur = existingMovie.duration ? String(existingMovie.duration) : '';
                            parsedTat = existingMovie.tat ? String(existingMovie.tat) : '';
                        }
                        // For custom/new movies with no existing movie object, parse from customName
                        if (!existingMovie && customName) {
                            let cn = customName;
                            const durM = cn.match(/\[(\d+)\]/); if (durM) { parsedDur = durM[1]; cn = cn.replace(durM[0], ''); }
                            const tatM = cn.match(/\{(\d+)\}/); if (tatM) { parsedTat = tatM[1]; cn = cn.replace(tatM[0], ''); }
                            cn = cn.trim();
                            for (const f of [...FORMATS].sort((a,b)=>b.length-a.length)) { const re = new RegExp('\\b'+f.replace(/\s+/g,'\\s+')+'\\b','i'); if (re.test(cn)) { parsedFormat = f; cn = cn.replace(re, ''); break; } }
                            for (const l of LANGS) { const re = new RegExp('\\b'+l+'\\b','i'); if (re.test(cn)) { parsedLang = l; cn = cn.replace(re, ''); break; } }
                            for (const c of CERTS) { const re = new RegExp('\\b'+c+'\\b','i'); if (re.test(cn)) { parsedCert = c; cn = cn.replace(re, ''); break; } }
                            parsedName = cn.replace(/\s+/g,' ').trim();
                        }
                        return (
                        <div className="fixed inset-0 z-[200] bg-black/60 flex items-center justify-center pointer-events-auto" onClick={e=>e.stopPropagation()}>
                            <div className="bg-white dark:bg-gray-800 rounded-xl p-6 shadow-2xl w-[450px] border border-gray-200 dark:border-gray-700">
                                <h4 className="font-bold mb-5 text-gray-800 dark:text-gray-100 text-lg">Movie Details</h4>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-semibold text-gray-500 mb-1 block">Movie Name</label>
                                        <input id="mod_movie_name" className="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-900 rounded-md p-2.5 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-semibold" defaultValue={parsedName} placeholder="e.g. PROJECT HAIL MARY" />
                                    </div>
                                    <div className="flex space-x-4 border-t border-gray-100 dark:border-gray-700 pt-4">
                                        <div className="flex-1">
                                            <label className="text-xs font-semibold text-gray-500 mb-1 block">Format</label>
                                            <select id="mod_movie_format" defaultValue={parsedFormat} className="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-900 rounded p-2 text-sm focus:border-blue-500">
                                                <option value="">None</option><option value="2D">2D</option><option value="3D">3D</option><option value="2D IMAX">2D IMAX</option><option value="3D IMAX">3D IMAX</option><option value="ATMOS">ATMOS</option><option value="3D ATMOS">3D ATMOS</option><option value="JUNIOR">JUNIOR</option>
                                            </select>
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs font-semibold text-gray-500 mb-1 block">Language</label>
                                            <select id="mod_movie_lang" defaultValue={parsedLang} className="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-900 rounded p-2 text-sm focus:border-blue-500">
                                                <option value="">None</option><option value="HINDI">HINDI</option><option value="ENGLISH">ENGLISH</option><option value="BHOJPURI">BHOJPURI</option><option value="BENGALI">BENGALI</option><option value="TELUGU">TELUGU</option><option value="TAMIL">TAMIL</option><option value="KANNADA">KANNADA</option><option value="MALAYALAM">MALAYALAM</option><option value="MARATHI">MARATHI</option><option value="GUJARATI">GUJARATI</option><option value="PUNJABI">PUNJABI</option><option value="ODIA">ODIA</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex space-x-4">
                                        <div className="flex-1">
                                            <label className="text-xs font-semibold text-gray-500 mb-1 block">Certification</label>
                                            <select id="mod_movie_cert" defaultValue={parsedCert} className="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-900 rounded p-2 text-sm focus:border-blue-500"><option value="">None</option><option value="U">U</option><option value="UA">UA</option><option value="A">A</option></select>
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs font-semibold text-gray-500 mb-1 block">Duration</label>
                                            <input id="mod_movie_dur" type="number" placeholder="120" defaultValue={parsedDur} className="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-900 rounded p-2 text-sm focus:border-blue-500" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs font-semibold text-gray-500 mb-1 block">TAT (min)</label>
                                            <input id="mod_movie_tat" type="number" placeholder={String(globalTat)} defaultValue={parsedTat || String(globalTat)} className="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-900 rounded p-2 text-sm focus:border-blue-500" />
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center mt-6 pt-5 border-t border-gray-100 dark:border-gray-700">
                                    <button onClick={()=>{
                                        if (window.confirm("Remove this movie row?")) {
                                            setCustomMovieNames(prev => { const n={...prev}; delete n[activeMovieEditor]; return n; });
                                            setEditedAllocations(prev => { const u = JSON.parse(JSON.stringify(prev)); Object.keys(u).forEach(cid => { if (u[cid][activeMovieEditor]) delete u[cid][activeMovieEditor]; }); return u; });
                                            setMovieOrder(prev => prev.filter(id => id !== activeMovieEditor));
                                            setDeletedMovieIds(prev => { const n = new Set(prev); n.add(activeMovieEditor); return n; });
                                            setIsDirty(true);
                                            setActiveMovieEditor(null);
                                        }
                                    }} className="px-3 py-1.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-md text-sm font-semibold transition-colors">Delete Row</button>
                                    <div className="space-x-2">
                                        <button onClick={()=>setActiveMovieEditor(null)} className="px-4 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-md text-sm font-semibold transition-colors">Cancel</button>
                                        <button onClick={()=>{
                                            const n = document.getElementById('mod_movie_name').value.trim();
                                            if(!n) return setActiveMovieEditor(null);
                                            const f = document.getElementById('mod_movie_format').value;
                                            const l = document.getElementById('mod_movie_lang').value;
                                            const c = document.getElementById('mod_movie_cert').value;
                                            const d = document.getElementById('mod_movie_dur').value.trim();
                                            const tat = document.getElementById('mod_movie_tat').value.trim();
                                            // Build display title for customMovieNames
                                            let title = n;
                                            if(f) title += ` ${f}`;
                                            if(l) title += ` ${l}`;
                                            if(c) title += ` ${c}`;
                                            if(d) title += ` [${d}]`;
                                            if(tat) title += ` {${tat}}`;
                                            setCustomMovieNames(prev => ({...prev, [activeMovieEditor]: title.toUpperCase()}));
                                            // Also update allMovies object directly for palette/scheduler sync
                                            const existingIdx = allMovies.findIndex(m => m.id === activeMovieEditor);
                                            if (existingIdx >= 0) {
                                                allMovies[existingIdx].title = n.toUpperCase();
                                                allMovies[existingIdx].format = f || '';
                                                allMovies[existingIdx].language = l || '';
                                                allMovies[existingIdx].censorRating = c || '';
                                                if(d) allMovies[existingIdx].duration = parseInt(d);
                                                if(tat) allMovies[existingIdx].tat = parseInt(tat);
                                            }
                                            setIsDirty(true);
                                            setActiveMovieEditor(null);
                                        }} className="px-5 py-2 bg-cinema-accent hover:bg-cinema-accent-hover text-white rounded-md text-sm font-semibold transition-colors">Save Details</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ); })()}
                    <div className={`bg-white dark:bg-cinema-surface ${isStandalone ? 'w-full h-full flex flex-col' : 'rounded-xl shadow-2xl w-full max-w-[98vw] modal-animate border border-gray-200 dark:border-gray-700/50'}`} onClick={e => e.stopPropagation()} style={isStandalone ? {} : {maxHeight:'94vh'}}>
                        <div className="flex justify-between items-center px-3 py-1.5 border-b border-gray-200 dark:border-gray-700/50 bg-white dark:bg-cinema-surface rounded-t-xl flex-shrink-0">
                            <div className="flex items-center space-x-2">
                                <div className="flex items-center space-x-1.5">
                                    <BarChartIcon size={14} className="text-[#003B7B] dark:text-blue-400" />
                                    <span className="text-[#003B7B] dark:text-blue-400 font-extrabold uppercase tracking-tight text-sm">Show Allocation Panel</span>
                                </div>
                                {isDirty && <span className="text-[9px] bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400 border border-yellow-300 dark:border-yellow-600 px-2 py-0.5 rounded-full uppercase tracking-widest font-semibold flex items-center gap-1"><AlertTriangleIcon size={10} /> Unsaved</span>}
                                <div className="h-4 w-px bg-gray-200 dark:bg-gray-700 mx-1"></div>
                                <div className="flex items-center space-x-1.5 bg-gray-50 dark:bg-gray-800 px-2 py-1 rounded border border-gray-200 dark:bg-gray-700" title="TAT">
                                    <span className="text-[10px] uppercase font-bold text-gray-500 dark:text-gray-400 tracking-wider">TAT:</span>
                                    <input type="number" min="0" value={globalTat} onChange={handleTatChange} className="w-12 h-6 px-1.5 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white rounded text-[11px] font-bold outline-none text-center" />
                                </div>
                                <select value={activeProgrammer} onChange={(e) => { setActiveProgrammer(e.target.value); setSelectedCinemaForWeekend(null); }} className="block pl-2 py-1 text-xs border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-gray-800 focus:ring-cinema-accent focus:border-cinema-accent font-semibold cursor-pointer">
                                    {programmerMap.map(prog => (
                                        <option key={prog.name} value={prog.name}>{prog.name}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="flex items-center space-x-1">
                                <button onClick={handleAddCinema} className="px-2.5 py-1 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-xs font-medium hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors flex items-center gap-1.5"><span className="text-gray-400 font-bold">+</span> Add Cinema</button>
                                <button onClick={handleExportCSV} className="px-2.5 py-1 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-xs font-medium hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors flex items-center gap-1.5"><DownloadIcon size={13}/> Export CSV</button>
                                <label className="px-2.5 py-1 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-xs font-medium hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors cursor-pointer flex items-center gap-1.5"><UploadIcon size={13}/> Upload Allocation<input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" onChange={handleUploadAllocation} className="hidden" /></label>
                                <label className="px-2.5 py-1 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-xs font-medium hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors cursor-pointer flex items-center gap-1.5"><UploadIcon size={13}/> Upload Weekend<input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" onChange={handleUploadWeekend} className="hidden" /></label>
                                <button onClick={handleClearAllAllocations} className="px-2.5 py-1 border border-red-200 dark:border-red-700/50 text-red-600 dark:text-red-400 rounded-lg text-xs font-medium hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors flex items-center gap-1.5" title="Clear all allocation numbers across every cinema (movie rows stay)">Clear All</button>
                                <div className="h-4 w-px bg-gray-200 dark:bg-gray-700 mx-0.5"></div>
                                <button onClick={handleSaveLocal} className="px-2.5 py-1 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-xs font-medium hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors flex items-center gap-1.5"><DownloadIcon size={13} /> Save</button>
                                <button onClick={handleSave} className={`px-2.5 py-1 border border-gray-200 dark:border-gray-700 rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5 ${isDirty ? 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700/50' : 'text-gray-300 cursor-not-allowed'}`} disabled={!isDirty}><RefreshCwIcon size={13} /> Sync to App</button>
                                {!isStandalone && <button onClick={onClose} className="text-gray-400 hover:text-gray-700 dark:hover:text-white rounded-lg p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700/50 ml-1"><XIcon size={18} /></button>}
                            </div>
                        </div>

                        <div className={`flex flex-1 overflow-hidden relative`} style={isStandalone ? {} : {maxHeight:'calc(94vh - 46px)'}}>
                            {cinemaContextMenu && (
                                <div className="fixed z-[300] bg-white dark:bg-gray-800 rounded-lg shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden" style={{top: cinemaContextMenu.y, left: cinemaContextMenu.x}} onClick={e=>e.stopPropagation()}>
                                    <div className="bg-[#003B7B] text-white px-3 py-2 text-xs font-bold truncate max-w-[200px]">{cinemaContextMenu.name}</div>
                                    <button onClick={() => { handleRenameCinema(cinemaContextMenu.name); setCinemaContextMenu(null); }} className="w-full text-left px-4 py-2.5 text-sm hover:bg-blue-50 dark:hover:bg-blue-900/20 text-gray-700 dark:text-gray-200 flex items-center gap-2"><span>âœŽ</span> Rename Cinema</button>
                                    <button onClick={() => { handleDeleteCinema(cinemaContextMenu.name); setCinemaContextMenu(null); }} className="w-full text-left px-4 py-2.5 text-sm hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 flex items-center gap-2"><span>×</span> Delete Cinema</button>
                                    <div className="border-t border-gray-100 dark:border-gray-700"></div>
                                    <button onClick={() => setCinemaContextMenu(null)} className="w-full text-left px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
                                </div>
                            )}
                            {movieContextMenu && (
                                <div className="fixed z-[300] bg-white dark:bg-gray-800 rounded-lg shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden" style={{top: movieContextMenu.y, left: movieContextMenu.x}} onClick={e=>e.stopPropagation()}>
                                    <div className="bg-[#003B7B] text-white px-3 py-2 text-xs font-bold truncate max-w-[300px]">{movieContextMenu.name}</div>
                                    <button onClick={() => { setMovieStatus(prev => ({...prev, [movieContextMenu.mid]: 'new'})); setIsDirty(true); setMovieContextMenu(null); }} className={`w-full text-left px-4 py-2.5 text-sm hover:bg-blue-50 dark:hover:bg-blue-900/20 flex items-center gap-2 ${movieStatus[movieContextMenu.mid]==='new' ? 'bg-[#003B7B] text-white font-bold' : 'text-gray-700 dark:text-gray-200'}`}>
                                        <span className="w-3 h-3 rounded-sm bg-[#003B7B] border border-[#003B7B] inline-flex items-center justify-center text-white text-[8px] font-bold">N</span> New Release
                                    </button>
                                    <button onClick={() => { setMovieStatus(prev => ({...prev, [movieContextMenu.mid]: 'continued'})); setIsDirty(true); setMovieContextMenu(null); }} className={`w-full text-left px-4 py-2.5 text-sm hover:bg-blue-50 dark:hover:bg-blue-900/20 flex items-center gap-2 ${movieStatus[movieContextMenu.mid]==='continued' ? 'bg-blue-50 text-[#003B7B] font-bold' : 'text-gray-700 dark:text-gray-200'}`}>
                                        <span className="w-3 h-3 rounded-sm bg-white border border-[#003B7B] inline-flex items-center justify-center text-[#003B7B] text-[8px] font-bold">C</span> Continued
                                    </button>
                                    <div className="border-t border-gray-100 dark:border-gray-700"></div>
                                    <button onClick={() => { setMovieStatus(prev => { const n={...prev}; delete n[movieContextMenu.mid]; return n; }); setIsDirty(true); setMovieContextMenu(null); }} className="w-full text-left px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-sm bg-gray-200 inline-block"></span> Clear Status
                                    </button>
                                </div>
                            )}
                            <div className="overflow-auto flex-1" ref={tableRef} style={{position:'relative'}} onKeyDown={e => { if (activeCell.row >= 0 && activeCell.col >= 0) handleKeyDown(e, activeCell.row, activeCell.col); }} onClick={() => setMovieContextMenu(null)}>
                                <table className="excel-table border-collapse text-[11px]" style={{tableLayout:'fixed', width: `${300 + activeCinemas.length * 95}px`}}>
                                    <colgroup>
                                        <col style={{width:'300px', minWidth:'300px'}} />
                                        {activeCinemas.map(c => <col key={c.id} style={{width:'95px', minWidth:'80px'}} />)}
                                    </colgroup>
                                    <thead>
                                        <tr className="bg-[#003B7B] text-white">
                                            <th className="sticky left-0 z-30 bg-[#003B7B] px-2 py-1 font-bold border-r-2 border-white/30 text-xs" style={{width:'300px',minWidth:'300px',top:0,position:'sticky'}}>
                                                <div className="flex items-center justify-center">
                                                    <span className="text-center text-sm tracking-wide">Movies</span>
                                                </div>
                                            </th>
                                            {activeCinemas.map((c, ci) => (
                                                <th key={c.id} className={`z-20 px-1 py-0 font-bold text-xs align-bottom leading-tight cursor-pointer border-r border-white/10 transition-colors ${selectedCinemaForWeekend === c.name && weekendPanelOpen ? 'bg-amber-600' : 'hover:bg-amber-500 bg-[#003B7B]'}`}
                                                    style={{top:0, position:'sticky', verticalAlign:'bottom', width:'95px'}}
                                                    title={'Click: Weekend Data • Right-click: Rename/Delete'}
                                                    onClick={(e) => { e.stopPropagation(); setSelectedCinemaForWeekend(c.name); setWeekendPanelOpen(true); }}
                                                    onContextMenu={(e) => { e.preventDefault(); setCinemaContextMenu({name: c.name, x: e.clientX, y: e.clientY}); }}>
                                                    <div className="w-full text-center px-0.5 pb-1 pt-1" style={{wordBreak:'break-word', overflowWrap:'break-word', lineHeight:'1.1', minHeight:'45px', display:'flex', alignItems:'flex-end', justifyContent:'center'}}>
                                                        <span style={{display:'block', whiteSpace:'normal'}}>{c.name}</span>
                                                    </div>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {activeMovieIds.map((mid, rowIdx) => {
                                            const movie = allMovies.find(m => m.id === mid) || { id: mid, title: customMovieNames[mid] || (String(mid).startsWith('temp_blank') ? '' : String(mid).replace('temp_m_', '')), isCustom: true };
                                            if (!movie) return null;
                                            if (!movie.title && activeMovieIds.filter(id => customMovieNames[id] || allMovies.find(m=>m.id===id)).length > 0) return null;
                                            const mStatus = movieStatus[mid]; // 'new' | 'continued' | undefined
                                            const isNewMovie = mStatus === 'new';
                                            const isContinued = mStatus === 'continued';
                                            return (
                                                <tr key={mid} className={isNewMovie ? '' : isContinued ? '' : 'hover:bg-blue-50/50 dark:hover:bg-blue-900/10'}
                                                    onMouseEnter={e=>e.currentTarget.querySelector('.row-actions')?.classList.remove('invisible')}
                                                    onMouseLeave={e=>e.currentTarget.querySelector('.row-actions')?.classList.add('invisible')}>

                                        <tr className="bg-yellow-50 dark:bg-yellow-900/20 font-bold border-t-2 border-[#003B7B]">

                                            {activeCinemas.map(c => { const t=activeMovieIds.reduce((s,mid)=>s+(editedAllocations[c.id]?.[mid]||0),0); return <td key={c.id} className={`text-center font-bold text-xs ${activeCell.col===activeCinemas.indexOf(c) ? 'bg-yellow-100 text-blue-700' : 'text-[#003B7B] dark:text-blue-400'}`}>{t||''}</td>; })}

                                            {activeCinemas.map(c => {

                                                return <td key={c.id} className="text-center text-gray-700 dark:text-gray-300 hover:bg-green-100 cursor-pointer text-xs font-bold" onClick={() => {

                                                const scr = cinemaStats[c.id]?.screens ?? c.screens?.length ?? 4;

                                                        <thead className="sticky top-0">
                                                            <tr className="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-[10px]">

                                                                <th className="px-1 py-1.5 font-semibold border-b border-r border-gray-200 text-center">Shows</th>
                                                                <th className="px-1 py-1.5 font-semibold border-b border-r border-gray-200 text-center">Admits</th>
                                                                <th className="px-1 py-1.5 font-semibold border-b border-r border-gray-200 text-center">Gross</th>

                                                                const totalOcc = weekendForSelected.total?.occPct || 0;
                                                                const isHighlight = f.occPct > totalOcc;
                                                                return (
                                                                <tr key={idx} className={`border-b border-gray-100 dark:border-gray-800 ${isHighlight ? 'bg-green-50 dark:bg-green-900/20' : idx%2===0?'bg-white dark:bg-gray-900':'bg-gray-50 dark:bg-gray-800/50'} hover:bg-blue-50 dark:hover:bg-blue-900/20`}>
                                                                    <td className="text-left px-2 py-1.5 font-medium text-gray-900 dark:text-gray-200 border-r border-gray-100" title={f.film}>
                                                                        <div className="flex items-start gap-1">
                                                                            {isHighlight && <span className="text-green-500 mt-0.5 flex-shrink-0"><ChevronUpIcon size={10} /></span>}

                                                                    <td className="text-center px-1 py-1.5 text-gray-900 font-medium border-r border-gray-100">{f.shows}</td>
                                                                    <td className="text-center px-1 py-1.5 text-gray-900 border-r border-gray-100">{f.sold?.toLocaleString('en-IN')||'-'}</td>

                                                                <td className="text-center px-1 py-1.5 border-r border-gray-200">{(weekendForSelected.total.occPct*100).toFixed(1)}%</td>
                                                                <td className="text-center px-1 py-1.5 border-r border-gray-200">{weekendForSelected.total.aps}</td>

                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-40 text-center px-4">
                                                <div className="mb-3 opacity-20 text-gray-400"><BarChartIcon size={40} /></div>
