                    movie.title.toLowerCase().includes(searchTerm.toLowerCase())
                ), [movies, searchTerm]);

            React.useEffect(() => {
                onOpenChange(isOpen);
                if (isOpen) {
                    setTimeout(() => inputRef.current?.focus(), 0);
                }
            }, [isOpen]);

            React.useEffect(() => {
                setActiveIndex(0);
            }, [searchTerm]);

            React.useEffect(() => {
                if (isOpen && listRef.current) {
                    const activeElement = listRef.current.children[activeIndex];
                    if (activeElement) {
                        activeElement.scrollIntoView({ block: 'nearest' });
                    }
                }
            }, [activeIndex, isOpen]);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            
            React.useEffect(() => {
                if (isActive && !isOpen) {
                    const handleStartSearch = (e) => {
                        if (e.ctrlKey || e.metaKey || e.altKey) return;
                        const target = e.target;
                        if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable) {
                            return;
                        }
                        if (e.key.length === 1 && e.key.match(/\S/)) {
                            e.preventDefault();
                            e.stopPropagation();
                            setIsOpen(true);
                            setSearchTerm(e.key);
                        }
                    };
                    document.addEventListener('keydown', handleStartSearch);
                    return () => {
                        document.removeEventListener('keydown', handleStartSearch);
                    };
                }
            }, [isActive, isOpen]);

            const handleSelect = (movie) => {
                onChange(movie);
                setIsOpen(false);
                setSearchTerm('');
            };

            const handleKeyDown = (e) => {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    setActiveIndex(prev => (prev + 1) % filteredMovies.length);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    setActiveIndex(prev => (prev - 1 + filteredMovies.length) % filteredMovies.length);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (filteredMovies[activeIndex]) {
                        handleSelect(filteredMovies[activeIndex]);
                    }
                } else if (e.key === 'Escape') {
                    setIsOpen(false);
                }
            };

            if (!isOpen) {
                const movieColor = selectedMovie ? stringToColor(selectedMovie.title) : null;
                return (
                       <div
                            onClick={() => setIsOpen(true)}
                            className={`w-full border-none rounded p-1 text-xs cursor-pointer text-center truncate transition-colors`}
                            style={selectedMovie ? {
                                backgroundColor: movieColor.pastel,
                                color: movieColor.text,
                            } : undefined}
                        >
                            {selectedMovie ? getFullMovieName(selectedMovie) : <span className="text-gray-400">+</span>}
                        </div>
                );
            }

            return (
                <div className="relative" ref={dropdownRef}>
                       <input
                            ref={inputRef}
                            type="text"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            onKeyDown={handleKeyDown}
                            placeholder="Search movie..."
                            className="w-full p-1 text-xs border-b dark:border-gray-700 focus:ring-0 focus:border-cinema-accent dark:bg-cinema-base bg-white text-center"
                            onClick={(e) => e.stopPropagation()}
                        />
                    {isOpen && (
                        <div className="absolute z-20 w-full mt-1 bg-white dark:bg-cinema-surface border dark:border-gray-700 rounded-lg shadow-xl">
                            <ul ref={listRef} className="max-h-40 overflow-y-auto text-left">
                                {filteredMovies.length > 0 ? filteredMovies.map((movie, index) => (
                                    <li
                                        key={movie.id}
                                        onClick={() => handleSelect(movie)}
                                        className={`px-2 py-1.5 text-xs cursor-pointer transition-colors ${index === activeIndex ? 'bg-cinema-accent/20 dark:bg-cinema-accent/20' : 'hover:bg-gray-50 dark:hover:bg-gray-700/50'}`}
                                    >
                                        {getFullMovieName(movie)}
                                    </li>
                                )) : (
                                     <li className="px-2 py-1.5 text-xs text-gray-500">No movies found</li>
                                )}
                            </ul>
                        </div>
                    )}
                </div>
            );
        };

        // --- TimeInput ---
        const TimeInput = ({ initialTime, initialKey, onSave, onCancel }) => {
            const [timeStr, setTimeStr] = React.useState(initialKey !== null && initialKey !== undefined ? initialKey : minutesToTime(initialTime));
            const inputRef = React.useRef(null);

            React.useEffect(() => {
                inputRef.current?.focus();
                if (initialKey !== null && initialKey !== undefined) {
                    const len = inputRef.current.value.length;
                    inputRef.current.setSelectionRange(len, len);
                } else {
                    inputRef.current?.select();
                }
            }, [initialKey]);

            const handleBlur = () => {
                const newMinutes = timeToMinutes(timeStr);
                if (newMinutes !== null && newMinutes !== initialTime) {
                    onSave(newMinutes);
                } else {
                    onCancel();
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleBlur();
                } else if (e.key === 'Escape') {
                    onCancel();
                }
            };

            return (
                <input
                    ref={inputRef}
                    type="text"
                    value={timeStr}
                    onChange={(e) => setTimeStr(e.target.value)}
                    onBlur={handleBlur}
                    onKeyDown={handleKeyDown}
                    onClick={(e) => e.stopPropagation()}
                    className="absolute inset-0 w-full h-full p-1 text-xs text-center bg-white dark:bg-gray-800 border-2 border-cinema-accent focus:outline-none z-10"
                />
            );
        };

        // --- ExcelScheduler (Improved) ---
        const ExcelScheduler = ({ cinema, shows, movies, onShowMove, onShowMovieChange, onDeleteShow, onShowTimeChange, onToggleWA, setDraggedItem, draggedItem, onDeselect, activeCell, setActiveCell, onTimeHover, onDropdownOpenChange, onTimeEditStart, isTimeEditing, timeEditInitialKey, onScreenContextMenu, onScreenHeaderClick, isSwapModeActive, swapSourceScreenId }) => {
            const [dragOverCell, setDragOverCell] = React.useState(null);
            const [contextMenu, setContextMenu] = React.useState(null); // { x, y, show }

            React.useEffect(() => {
                const closeMenu = () => setContextMenu(null);
                document.addEventListener('click', closeMenu);
                document.addEventListener('contextmenu', closeMenu);
                return () => { document.removeEventListener('click', closeMenu); document.removeEventListener('contextmenu', closeMenu); };
            }, []);
            
            const { showsByScreen, maxShows } = React.useMemo(() => {
                if (!cinema) return { showsByScreen: {}, maxShows: 0 };
                const grouped = {};
                cinema.screens.forEach(screen => {
                    grouped[screen.id] = shows
                        .filter(show => show.screenId === screen.id)
                        .sort((a, b) => a.startTime - b.startTime);
                });
                const max = Math.max(0, ...Object.values(grouped).map(s => s.length));
                return { showsByScreen: grouped, maxShows: Math.max(10, max + 1) };
            }, [shows, cinema]);

            const handleDragStart = (e, show) => {
                e.stopPropagation();
                setDraggedItem({ type: 'existing', data: show });
            };
            const handleDragOver = (e, screenId, sessionIndex) => {
                e.preventDefault();
                setDragOverCell({ screenId, sessionIndex });
            };
            const handleDrop = (e, screenId, sessionIndex) => {
                e.preventDefault();
                setDragOverCell(null);
                if (!draggedItem) return;
                onShowMove(draggedItem, screenId, sessionIndex);
                setDraggedItem(null);
            };
            
            if (!cinema) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 p-8">
                        <ClapperboardIcon size={64} />
                        <p className="mt-4 text-lg font-medium">Create your first cinema to get started</p>
                        <p className="mt-1 text-sm">Use the Cinema menu in the toolbar to add or upload cinemas</p>
                    </div>
                );
            }

            return (
                <React.Fragment>
                <div className="flex-1 overflow-auto p-2" onDragLeave={() => setDragOverCell(null)} onClick={onDeselect}>
                    <table className="min-w-full border-collapse excel-table">
                        <thead className="sticky top-0 z-20 sticky-shadow">
                            <tr>
                                <th rowSpan="2" className="w-14 bg-gray-100 dark:bg-cinema-surface">Session</th>
                                {cinema.screens.map(screen => {
                                    const audiTat = screen.audiTat;
                                    return (
                                        <th 
                                            key={screen.id} 
                                            colSpan="2" 
                                            onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); onScreenContextMenu?.(e, screen); }}
                                            onClick={() => onScreenHeaderClick && onScreenHeaderClick(screen)}
                                            className={`bg-cinema-accent/10 dark:bg-cinema-accent/10 text-cinema-accent font-semibold ${isSwapModeActive ? 'cursor-pointer hover:bg-orange-100 dark:hover:bg-orange-900/50' : 'cursor-help'} group ${swapSourceScreenId === screen.id ? 'ring-2 ring-inset ring-orange-500 bg-orange-100 dark:bg-orange-900/50' : ''}`}
                                        >
                                            <div className="flex flex-col items-center justify-center">
                                                <span>{screen.name}</span>
                                                <span className="font-normal text-[10px] text-gray-500 dark:text-gray-400">({screen.format}) {screen.capacity}s</span>
                                                {audiTat && <span className="text-[9px] text-orange-500 font-bold uppercase tracking-tighter">TAT: {audiTat}m</span>}
                                            </div>
                                        </th>
                                    );
                                })}
                            </tr>
                            <tr>
                                {cinema.screens.map(screen => (
                                    <React.Fragment key={screen.id}>
                                        <th className="w-48 bg-gray-50 dark:bg-cinema-surface/80">Movie</th>
                                        <th className="w-24 min-w-[6rem] bg-gray-50 dark:bg-cinema-surface/80">Time</th>
                                    </React.Fragment>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {Array.from({ length: maxShows }).map((_, sessionIndex) => (
                                <tr key={sessionIndex}>
                                    <td className="font-semibold bg-gray-50 dark:bg-cinema-surface/50">
                                        <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-200 dark:bg-gray-700 text-[10px] font-bold">{sessionIndex + 1}</span>
                                    </td>
                                    {cinema.screens.map(screen => {
                                        const show = showsByScreen[screen.id]?.[sessionIndex];
                                        const isDragOver = dragOverCell?.screenId === screen.id && dragOverCell?.sessionIndex === sessionIndex;
                                        const isActiveRow = activeCell?.screenId === screen.id && activeCell?.sessionIndex === sessionIndex;
                                        const isMovieActive = isActiveRow && activeCell?.column === 'movie';
                                        const isTimeActive = isActiveRow && activeCell?.column === 'time';
                                        const isCurrentlyEditingTime = isTimeEditing && isTimeActive;
                                        const movieObj = show ? movies.find(m => m.id === show.movieId) : null;
                                        const screenTat = getScreenTat(screen.id, cinema);
                                        const endTime = show && movieObj ? show.startTime + movieObj.duration + (show.isWA ? 25 : screenTat) : null;

                                        return (
                                            <React.Fragment key={screen.id}>
                                                <td
                                                    onClick={(e) => { e.stopPropagation(); setActiveCell({ screenId: screen.id, sessionIndex, column: 'movie' }); }}
                                                    onDoubleClick={() => { /* movie cell double-click does nothing special */ }}
                                                    onDragOver={(e) => handleDragOver(e, screen.id, sessionIndex)}
                                                    onDrop={(e) => handleDrop(e, screen.id, sessionIndex)}
                                                    className={`${isDragOver ? 'drag-over' : ''} ${isMovieActive ? 'active-cell' : ''}`}
                                                >
                                                    {show ? (
                                                        <div
                                                            draggable
                                                            onDragStart={(e) => handleDragStart(e, show)}
                                                            onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); setContextMenu({ x: e.clientX, y: e.clientY, show }); }}
                                                            className="cursor-grab relative group"
                                                        >
                                                             <SearchableDropdown
                                                                isActive={isMovieActive}
                                                                movies={movies}
                                                                value={show.movieId}
                                                                onOpenChange={onDropdownOpenChange}
                                                                onChange={(newMovie) => {
                                                                    onShowMovieChange(show, newMovie);
                                                                    setActiveCell(prev => ({ ...prev, sessionIndex: prev.sessionIndex + 1, column: 'movie' }));
                                                                }}
                                                            />
                                                            {show.isWA && <span className="block text-center text-[8px] font-bold text-orange-500 dark:text-orange-400 -mt-0.5">(W/A)</span>}
                                                            <button 
                                                                onClick={(e) => { e.preventDefault(); e.stopPropagation(); onDeleteShow(show.id); }}
                                                                className="absolute -top-1 -right-1 p-0.5 rounded-full bg-red-500 text-white opacity-0 group-hover:opacity-100 transition-opacity z-10"
                                                            >
                                                                <XIcon size={10}/>
                                                            </button>
                                                        </div>
                                                    ) : (
                                                        <SearchableDropdown
                                                            isActive={isMovieActive}
                                                            movies={movies}
                                                            value={null}
                                                            onOpenChange={onDropdownOpenChange}
                                                            onChange={(newMovie) => {
                                                                onShowMove({ type: 'new', data: newMovie }, screen.id, sessionIndex);
                                                                setActiveCell({ screenId: screen.id, sessionIndex: sessionIndex + 1, column: 'movie' });
                                                            }}
                                                        />
                                                    )}
                                                </td>
                                                <td
                                                    onClick={(e) => { e.stopPropagation(); setActiveCell({ screenId: screen.id, sessionIndex, column: 'time' }); }}
                                                    onDoubleClick={() => { if (show) onTimeEditStart(screen.id, sessionIndex); }}
                                                    onDragOver={(e) => handleDragOver(e, screen.id, sessionIndex)}
                                                    onDrop={(e) => handleDrop(e, screen.id, sessionIndex)}
                                                    onMouseEnter={(e) => onTimeHover(e, show)}
                                                    onMouseLeave={() => onTimeHover(null, null)}
                                                    className={`w-24 min-w-[6rem] ${isDragOver ? 'drag-over' : ''} cursor-pointer ${isTimeActive ? 'active-cell' : ''}`}
                                                >
                                                    <span className={isCurrentlyEditingTime ? 'opacity-0' : ''}>
                                                      {show ? (
                                                        <span className="flex flex-col leading-tight">
                                                            <span className="text-xs font-medium">{minutesToTime(show.startTime)}</span>
                                                            {endTime && <span className="text-[9px] text-gray-400 dark:text-gray-500">{minutesToTime(endTime)}</span>}
                                                        </span>
                                                      ) : ''}
                                                    </span>
                                                    {isCurrentlyEditingTime && (
                                                        <TimeInput 
                                                            initialTime={show.startTime}
                                                            initialKey={timeEditInitialKey}
                                                            onSave={(newMinutes) => onShowTimeChange(show.id, newMinutes)}
                                                            onCancel={() => onTimeEditStart(null, null)}
                                                        />
                                                    )}
                                                </td>
                                            </React.Fragment>
                                        );
                                    })}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
                {/* Right-click context menu for W/A toggle */}
                {contextMenu && ReactDOM.createPortal(
                    <div
                        className="fixed z-50 bg-white dark:bg-cinema-surface border border-gray-200 dark:border-gray-700 rounded-lg shadow-xl py-1 min-w-[160px]"
                        style={{ left: contextMenu.x, top: contextMenu.y }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <button
                            className="w-full text-left px-3 py-1.5 text-xs hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-2"
                            onClick={() => { onToggleWA(contextMenu.show.id); setContextMenu(null); }}
                        >
                            {contextMenu.show.isWA
                                ? 'ðŸŽ¬ Change to Normal (Full TAT)'
                                : 'âš¡ Change to W/A (Reduced TAT)'}
                        </button>
                        <button
                            className="w-full text-left px-3 py-1.5 text-xs hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-2 text-red-500"
                            onClick={() => { onDeleteShow(contextMenu.show.id); setContextMenu(null); }}
                        >
                            ðŸ—‘ï¸ Delete Show
                        </button>
                    </div>,
                    document.body
                )}
                </React.Fragment>
            );
        };

        // --- FilmStock (Improved Collapsible Sidebar with Search) ---
        const FilmStock = ({ movies, onAddMovieClick, onUploadMoviesClick, onDeleteMovie, onEditMovie, setDraggedItem, isCollapsed, onToggleCollapse }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const handleDragStart = (e, movie) => {
                setDraggedItem({ type: 'new', data: movie });
            };

            const filteredMovies = React.useMemo(() => {
                if (!searchTerm) return movies;
                return movies.filter(m => m.title.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [movies, searchTerm]);

            const getFormatBorder = (format) => {
                const f = (format || '').toLowerCase();
                if (f.includes('imax')) return 'border-l-cinema-accent';
                if (f.includes('3d')) return 'border-l-blue-400';
                if (f.includes('4dx')) return 'border-l-purple-400';
                return 'border-l-gray-300 dark:border-l-gray-600';
            };

            if (isCollapsed) {
                return (
                    <aside className="w-10 bg-white dark:bg-cinema-surface border-l border-gray-200 dark:border-gray-700/50 flex flex-col items-center pt-2 sidebar-collapse">
                        <button onClick={onToggleCollapse} className="p-2 mb-2 rounded-lg text-[#003B7B] dark:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors" title="Show Palette">
                            <PanelLeftIcon size={24} />
                        </button>
                        <div className="mt-2 -rotate-90 whitespace-nowrap text-[10px] font-medium text-gray-400 tracking-wider uppercase">Palette ({movies.length})</div>
                    </aside>
                );
            }

            return (
                <aside className="w-1/5 min-w-[200px] bg-white dark:bg-cinema-surface border-l border-gray-200 dark:border-gray-700/50 flex flex-col sidebar-collapse">
                    <div className="p-2 border-b border-gray-200 dark:border-gray-700/50 flex-shrink-0 flex items-center justify-between">
                        <div className="flex items-center space-x-2">
                            <h2 className="text-sm font-semibold text-gray-900 dark:text-white">Palette</h2>
                            <span className="text-[10px] font-medium bg-cinema-accent/10 text-cinema-accent px-1.5 py-0.5 rounded-full">{movies.length}</span>
                        </div>
                        <button onClick={onToggleCollapse} className="p-1.5 rounded-lg text-[#003B7B] dark:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors" title="Collapse Palette">
                            <PanelLeftIcon size={20} />
                        </button>
                    </div>
                    
                    <div className="px-2 pt-2 flex-shrink-0">
                        <div className="relative">
                            <input 
                                type="search" 
                                placeholder="Search movies..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full pl-7 pr-2 py-1.5 text-xs bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-1 focus:ring-cinema-accent focus:border-cinema-accent"
                                style={{ paddingLeft: '28px' }}
                            />
                            <div className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400">
                                <SearchIcon size={12} />
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-2 space-y-1 overflow-y-auto">
                        {filteredMovies.length === 0 && movies.length === 0 && (
                            <div className="text-center py-8 px-4">
                                <FilmIcon size={32} />
                                <p className="mt-2 text-xs text-gray-400">Add movies to your palette to begin scheduling</p>
                            </div>
                        )}
                        {filteredMovies.length === 0 && movies.length > 0 && (
                            <p className="text-center text-xs text-gray-400 py-4">No movies match "{searchTerm}"</p>
                        )}
                        {filteredMovies.map(movie => {
                            const movieColor = stringToColor(movie.title);
                            return (
                            <div 
                                key={movie.id} 
                                draggable 
                                onDragStart={(e) => handleDragStart(e, movie)}
                                onDragEnd={() => setDraggedItem(null)}
                                className={`py-1 px-2 rounded-lg border-l-[3px] ${getFormatBorder(movie.format)} bg-gray-50 dark:bg-gray-800/50 cursor-grab group relative hover:shadow-sm transition-shadow`}
                            >
                                <p className="font-semibold text-[11px] text-gray-900 dark:text-white truncate">{getFullMovieName(movie)}</p>
                                <div className="text-[10px] text-gray-500 dark:text-gray-400 flex justify-between items-center">
                                    <span>{formatDuration(movie.duration)} + {getGlobalTat()}m</span>
                                    <div className="flex items-center space-x-1">
                                        {movie.language && <span className="bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 px-1 rounded text-[9px]">{movie.language}</span>}
                                        {movie.censorRating && <span className="bg-gray-200 dark:bg-gray-700 px-1 rounded text-[9px]">{movie.censorRating}</span>}
                                        {movie.format && <span className="bg-gray-200 dark:bg-gray-700 px-1 rounded text-[9px]">{movie.format}</span>}
                                    </div>
                                </div>
                                <div className="absolute top-0.5 right-0.5 flex flex-col space-y-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onClick={(e) => { e.stopPropagation(); onEditMovie?.(movie); }} className="p-0.5 rounded-full bg-blue-500 hover:bg-blue-600 text-white shadow-sm">
                                        <EditIcon size={10}/>
                                    </button>
                                    <button onClick={(e) => { e.stopPropagation(); onDeleteMovie(movie.id); }} className="p-0.5 rounded-full bg-red-500 hover:bg-red-600 text-white shadow-sm">
                                        <XIcon size={10}/>
                                    </button>
                                </div>
                            </div>
                            );
                        })}
                    </div>

                    <div className="flex-shrink-0 p-2 space-y-1.5 border-t border-gray-200 dark:border-gray-700/50">
                        <button onClick={onAddMovieClick} className="w-full flex items-center justify-center px-3 py-2 text-xs font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors"><PlusIcon size={12} /><span className="ml-1.5">Add Movie</span></button>
                        <button onClick={onUploadMoviesClick} className="w-full flex items-center justify-center px-3 py-2 text-xs font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600 transition-colors"><UploadIcon size={12} /><span className="ml-1.5">Upload Movies</span></button>
                    </div>
                </aside>
            );
        };

        // --- Tooltip (Improved) ---
        const Tooltip = ({ show, position }) => {
            if (!show || !position) return null;
            const effectiveDuration = show.duration + (show.tat || 0);
            const movieObj = show;
            return (
                <div 
                    className="fixed z-50 p-3 bg-gray-900 dark:bg-gray-800 text-white rounded-lg shadow-2xl pointer-events-none border border-gray-700 min-w-[180px]"
                    style={{ top: position.y + 15, left: position.x + 15 }}
                >
                    <p className="font-bold text-sm">{show.title}</p>
                    <div className="mt-1.5 space-y-0.5">
                        <div className="flex justify-between text-xs">
                            <span className="text-gray-400">Time</span>
                            <span className="font-medium">{minutesToTime(show.startTime)} â€” {minutesToTime(show.startTime + effectiveDuration)}</span>
                        </div>
                        <div className="flex justify-between text-xs">
                            <span className="text-gray-400">Duration</span>
                            <span>{formatDuration(show.duration)}</span>
                        </div>
                        {show.tat > 0 && <div className="flex justify-between text-xs">
                            <span className="text-gray-400">TAT</span>
                            <span>{show.tat}m</span>
                        </div>}
                    </div>
                    <div className="mt-2 flex items-center space-x-1.5">
                        {show.censorRating && <span className="text-[10px] bg-blue-500/20 text-blue-300 px-1.5 py-0.5 rounded font-medium">{show.censorRating}</span>}
                        {show.format && <span className="text-[10px] bg-purple-500/20 text-purple-300 px-1.5 py-0.5 rounded font-medium">{show.format}</span>}
                    </div>
                </div>
            );
        };

        // --- ShowAllocationRibbon (Improved with progress bars) ---
        const ShowAllocationRibbon = ({ allocations, onEdit }) => {
            // Sort allocations: unallocated (planned === 0 && actual > 0) go to the end
            const sortedAllocations = [...allocations].sort((a, b) => {
                const aUnplanned = a.planned === 0 && a.actual > 0;
                const bUnplanned = b.planned === 0 && b.actual > 0;
                if (aUnplanned && !bUnplanned) return 1;
                if (!aUnplanned && bUnplanned) return -1;
                return 0;
            });

            return (
                <div className="bg-white dark:bg-cinema-surface/80 border-b border-gray-200 dark:border-gray-700/50 flex-shrink-0">
                    <div className="flex items-center space-x-2 p-1.5 px-3">
                        <h3 className="text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider flex-shrink-0">Allocations</h3>
                        <div className="flex-1 flex items-center space-x-2 overflow-x-auto py-0.5">
                            {allocations.length === 0 && <p className="text-center text-[11px] text-gray-400 italic">No allocations set. Click Edit to set targets.</p>}
                            {sortedAllocations.map(alloc => {
                                const isUnplanned = alloc.planned === 0 && alloc.actual > 0;
                                const pct = isUnplanned ? 100 : (alloc.planned > 0 ? Math.min(100, (alloc.actual / alloc.planned) * 100) : 0);
                                const barColor = isUnplanned ? 'bg-purple-400' : (pct >= 100 ? 'bg-green-500' : pct > 0 ? 'bg-amber-500' : 'bg-red-400');
                                const textColor = isUnplanned ? 'text-purple-600 dark:text-purple-400' : (pct >= 100 ? 'text-green-600 dark:text-green-400' : pct > 0 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500');
                                
                                return (
                                    <div key={alloc.id} className={`flex-shrink-0 px-2 py-1 rounded-lg min-w-[130px] ${isUnplanned ? 'bg-purple-50 dark:bg-purple-900/20 border border-purple-100 dark:border-purple-800' : 'bg-gray-50 dark:bg-gray-800/50'}`}>
                                        <div className="flex items-center justify-between" title={isUnplanned ? "Planned Separately (No Target)" : ""}>
                                            <p className="text-[10px] font-medium text-gray-700 dark:text-gray-300 truncate max-w-[80px]">{alloc.title}</p>
                                            <span className={`text-[10px] font-bold ${textColor}`}>{alloc.actual}/{alloc.planned}</span>
                                        </div>
                                        <div className={`mt-0.5 w-full rounded-full h-1 ${isUnplanned ? 'bg-purple-100 dark:bg-purple-900/50' : 'bg-gray-200 dark:bg-gray-700'}`}>
                                            <div className={`alloc-progress ${barColor} rounded-full`} style={{ width: `${pct}%` }}></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <button onClick={onEdit} className="ml-1 flex-shrink-0 px-2.5 py-1 text-[11px] font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover flex items-center transition-colors"><EditIcon size={10} /><span className="ml-1">Edit</span></button>
                    </div>
                </div>
            );
        };

        // --- Timeline / Gantt View ---
        const TimelineView = ({ cinema, shows, movies, onScreenHeaderClick, isSwapModeActive, swapSourceScreenId }) => {
            if (!cinema) return null;

            const TIMELINE_START = 8 * 60; // 8 AM
            const TIMELINE_END = 24 * 60; // Midnight
            const TOTAL_MINUTES = TIMELINE_END - TIMELINE_START;
            const hourMarkers = [];
            for (let h = 8; h <= 24; h++) {
                hourMarkers.push(h);
            }

            const movieMap = new Map(movies.map(m => [m.id, m]));
            const cinemaShows = shows.filter(s => s.cinemaId === cinema.id);

            return (
                <div className="p-3 overflow-auto border-t border-gray-200 dark:border-gray-700/50 bg-gray-50 dark:bg-cinema-base/50">
                    <h3 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Timeline View â€” {cinema.name}</h3>
                    <div className="min-w-[800px]">
                        {/* Time axis */}
                        <div className="flex items-end mb-1 ml-[120px]">
                            {hourMarkers.map(h => (
                                <div key={h} className="text-[9px] text-gray-400 dark:text-gray-500" style={{ position: 'absolute', left: `calc(120px + ${((h * 60 - TIMELINE_START) / TOTAL_MINUTES) * 100}% * (100% - 120px) / 100%)` }}>
                                </div>
                            ))}
                            <div className="flex-1 flex">
                                {hourMarkers.map((h, i) => (
                                    <div key={h} className="text-[9px] text-gray-400 dark:text-gray-500 font-medium" style={{ width: `${(60 / TOTAL_MINUTES) * 100}%` }}>
                                        {h <= 12 ? `${h}AM` : h === 12 ? '12PM' : h === 24 ? '12AM' : `${h - 12}PM`}
                                    </div>
                                ))}
                            </div>
                        </div>
                        {/* Screen rows */}
                        {cinema.screens.map(screen => {
                            const screenShows = cinemaShows.filter(s => s.screenId === screen.id).sort((a, b) => a.startTime - b.startTime);
                            return (
                                <div key={screen.id} className="flex items-center mb-1">
                                    <div 
                                        onClick={() => onScreenHeaderClick && onScreenHeaderClick(screen)}
                                        className={`w-[120px] flex-shrink-0 text-[10px] font-medium text-gray-600 dark:text-gray-400 truncate pr-2 ${isSwapModeActive ? 'cursor-pointer hover:text-orange-500' : ''} ${swapSourceScreenId === screen.id ? 'text-orange-500 font-bold bg-orange-100 dark:bg-orange-900/30 rounded pl-1' : ''}`}
                                    >
                                        {screen.name}
                                    </div>
                                    <div className="flex-1 relative h-7 bg-gray-100 dark:bg-gray-800/50 rounded overflow-hidden">
                                        {/* Hour grid lines */}
                                        {hourMarkers.map(h => (
                                            <div key={h} className="absolute top-0 bottom-0 border-l border-gray-200 dark:border-gray-700/30" style={{ left: `${((h * 60 - TIMELINE_START) / TOTAL_MINUTES) * 100}%` }} />
                                        ))}
                                        {/* Show bars */}
                                        {screenShows.map(show => {
                                            const movie = movieMap.get(show.movieId);
                                            if (!movie) return null;
                                            const duration = movie.duration + (movie.tat || 0);
                                            const left = Math.max(0, ((show.startTime - TIMELINE_START) / TOTAL_MINUTES) * 100);
                                            const width = (duration / TOTAL_MINUTES) * 100;
                                            const color = stringToColor(movie.title);
                                            return (
                                                <div
                                                    key={show.id}
                                                    className="timeline-bar absolute top-0.5 bottom-0.5 flex items-center px-1.5"
                                                    style={{ left: `${left}%`, width: `${width}%`, backgroundColor: color.pastel, color: color.text, minWidth: '2px' }}
                                                    title={`${getFullMovieName(movie)}${show.isWA ? ' (W/A)' : ''}: ${minutesToTime(show.startTime)} - ${minutesToTime(show.startTime + duration)}`}
                                                >
                                                    <span className="truncate font-medium">{getFullMovieName(movie)}{show.isWA ? ' (W/A)' : ''}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- AllocationModal ---
        const AllocationModal = ({ isOpen, onClose, movies, onSave, initialAllocations }) => {
            const [allocations, setAllocations] = React.useState({});
            const [activeTab, setActiveTab] = React.useState('manual');
            const [file, setFile] = React.useState(null);
            const [error, setError] = React.useState('');

            React.useEffect(() => {
                setAllocations(initialAllocations || {});
            }, [initialAllocations]);

            const handleManualChange = (movieId, value) => {
                setAllocations(prev => ({ ...prev, [movieId]: Number(value) || 0 }));
            };
            
            const handleFileChange = (e) => { setError(''); setFile(e.target.files[0]); };

            const handleCSVUpload = () => {
                if (!file) { setError('Please select a CSV file.'); return; }
                if (!window.Papa) { setError('CSV parsing library not ready. Please refresh.'); return; }
                
                window.Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    transformHeader: header => header.trim().toLowerCase().replace(/\s+/g, '_'),
                    complete: (results) => {
                        const { data, errors } = results;
                        if (errors.length) {
                            setError(`Error parsing CSV: ${errors[0].message}`);
                            return;
                        }
                        
                        const newAllocations = {};
                        data.forEach(row => {
                            const movieTitleFromCSV = row.movie_title;
                            const plannedShowsFromCSV = row.planned_shows;

                            if (movieTitleFromCSV && plannedShowsFromCSV) {
                                const movie = movies.find(m => m.title.trim().toLowerCase() === String(movieTitleFromCSV).trim().toLowerCase());
                                if (movie) {
                                    const count = parseInt(plannedShowsFromCSV, 10);
                                    if (!isNaN(count)) {
                                        newAllocations[movie.id] = count;
                                    }
                                }
                            }
                        });
                        setAllocations(newAllocations);
                        setError('');
                        setFile(null);
                        setActiveTab('manual');
                    },
                    error: (err) => { setError(`File reading error: ${err.message}`); }
                });
            };

            const handleSave = () => {
                onSave(allocations);
                onClose();
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Manage Show Allocations">
                    <div className="space-y-4">
                        <div className="border-b border-gray-200 dark:border-gray-700">
                            <nav className="-mb-px flex space-x-8" aria-label="Tabs">
                                <button onClick={() => setActiveTab('manual')} className={`whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm transition-colors ${activeTab === 'manual' ? 'border-cinema-accent text-cinema-accent' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>Manual Input</button>
                                <button onClick={() => setActiveTab('csv')} className={`whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm transition-colors ${activeTab === 'csv' ? 'border-cinema-accent text-cinema-accent' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>Upload CSV</button>
                            </nav>
                        </div>

                        {activeTab === 'manual' && (
                            <div className="space-y-2 max-h-[50vh] overflow-y-auto pr-2">
                                {movies.map(movie => (
                                    <div key={movie.id} className="flex justify-between items-center p-2.5 bg-gray-50 dark:bg-gray-800/50 rounded-lg">
                                        <span className="text-sm font-medium text-gray-800 dark:text-gray-200 truncate">{getFullMovieName(movie)}</span>
                                        <input 
                                            type="number" 
                                            value={allocations[movie.id] || ''} 
                                            onChange={(e) => handleManualChange(movie.id, e.target.value)}
                                            className="w-20 px-2 py-1.5 text-center bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"
                                            placeholder="0"
                                        />
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'csv' && (
                            <div className="space-y-4">
                                <div className="p-4 border-2 border-dashed rounded-lg text-center dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50">
                                    <p className="mb-2 text-sm text-gray-600 dark:text-gray-400">CSV format: movie_title, planned_shows</p>
                                    <input type="file" accept=".csv" onChange={handleFileChange} className="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cinema-accent/10 file:text-cinema-accent hover:file:bg-cinema-accent/20"/>
                                    <button type="button" onClick={() => downloadCSV("movie_title,planned_shows\n", "allocations_template.csv")} className="mt-3 inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-lg shadow-sm text-white bg-gray-600 hover:bg-gray-700 transition-colors"><DownloadIcon size={14} /><span className="ml-1.5">Download Template</span></button>
                                </div>
                                {error && <p className="text-red-500 text-sm">{error}</p>}
                                <button onClick={handleCSVUpload} disabled={!file} className="w-full px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover disabled:opacity-50 transition-colors">Upload & Apply</button>
                            </div>
                        )}

                        <div className="flex justify-end space-x-3 pt-4 border-t dark:border-gray-700">
                            <button type="button" onClick={onClose} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                            <button type="button" onClick={handleSave} className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors">Save Allocations</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- BulkAllocationModal ---
        const BulkAllocationModal = ({ isOpen, onClose, movies, cinemas, onSave }) => {
            const [file, setFile] = React.useState(null);
            const [error, setError] = React.useState('');
            const [isProcessing, setIsProcessing] = React.useState(false);

            const handleFileChange = (e) => {
                setError('');
                setFile(e.target.files[0]);
            };

            const handleDownloadTemplate = () => {
                const header = "Movies," + cinemas.map(c => `"${c.name}"`).join(',');
                const movieRows = movies.map(m => `"${getFullMovieName(m)}",` + cinemas.map(() => '').join(','));
                const content = [header, ...movieRows].join("\n") + "\n";
                downloadCSV(content, 'bulk_allocations_template.csv');
            };

            const handleUpload = () => {
                if (!file) { setError('Please select a CSV file.'); return; }
                if (!window.Papa) { setError('CSV parsing library not ready. Please refresh.'); return; }
                setIsProcessing(true);

                window.Papa.parse(file, {
                    skipEmptyLines: true,
                    complete: (results) => {
                        const { data } = results;
                        if (data.length < 2) {
                            setError("Invalid CSV. Must have a header row and at least one movie row.");
                            setIsProcessing(false);
                            return;
                        }

                        const headerRow = data[0];
                        const cinemaNamesFromCSV = headerRow.slice(1).map(name => name.trim().toLowerCase());
                        const movieRows = data.slice(1);

                        const updates = {};

                        cinemaNamesFromCSV.forEach((csvCinemaName, index) => {
                            const cinema = cinemas.find(c => c.name.trim().toLowerCase() === csvCinemaName);
                            if (cinema) {
                                if (!updates[cinema.id]) {
                                    updates[cinema.id] = {};
                                }

                                movieRows.forEach(movieRow => {
                                    const csvMovieTitle = (movieRow[0] || '').trim().toLowerCase();
                                    const movie = movies.find(m => m.title.trim().toLowerCase() === csvMovieTitle);
                                    const showCount = parseInt(movieRow[index + 1], 10);

                                    if (movie && !isNaN(showCount)) {
                                        updates[cinema.id][movie.id] = showCount;
                                    }
                                });
                            }
                        });
                        
                        if (Object.keys(updates).length === 0) {
                            setError("No matching cinemas or movies found in the uploaded file. Please check names and format.");
                            setIsProcessing(false);
                            return;
                        }

                        onSave(updates);
                        setIsProcessing(false);
                        onClose();
                    },
                    error: (err) => {
                        setError(`File reading error: ${err.message}`);
                        setIsProcessing(false);
                    }
                });
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Upload Bulk Allocations">
                    <div className="space-y-4">
                        <div className="p-6 border-2 border-dashed rounded-lg text-center dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50">
                            <p className="mb-3 text-sm text-gray-600 dark:text-gray-400">Upload a CSV with movies as rows and cinemas as columns.</p>
                            <input type="file" accept=".csv" onChange={handleFileChange} className="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cinema-accent/10 file:text-cinema-accent hover:file:bg-cinema-accent/20"/>
                            <button type="button" onClick={handleDownloadTemplate} className="mt-3 inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-lg shadow-sm text-white bg-gray-600 hover:bg-gray-700 transition-colors"><DownloadIcon size={14} /><span className="ml-1.5">Download Template</span></button>
                        </div>
                        {error && <p className="text-red-500 text-sm">{error}</p>}
                        <div className="flex justify-end space-x-3 pt-4">
                            <button onClick={onClose} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                            <button onClick={handleUpload} disabled={isProcessing || !file} className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover disabled:opacity-50 transition-colors">
                                {isProcessing ? 'Processing...' : 'Upload & Save'}
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- UploadScheduleModal ---
        const UploadScheduleModal = ({ isOpen, onClose, onSave, movies, cinema }) => {
            const [file, setFile] = React.useState(null);
            const [error, setError] = React.useState('');
            const [isProcessing, setIsProcessing] = React.useState(false);

            const handleFileChange = (e) => {
                setError('');
                setFile(e.target.files[0]);
            };

            const handleDownloadTemplate = () => {
                const content = "screen_name,movie_title,start_time\n";
                downloadCSV(content, 'schedule_template.csv');
            };

            const handleUpload = () => {
                if (!file) { setError('Please select a CSV file.'); return; }
                if (!cinema) { setError('Please select a cinema first.'); return; }
                if (!window.Papa) { setError('CSV parsing library not ready. Please refresh.'); return; }
                setIsProcessing(true);

                window.Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    transformHeader: header => header.trim().toLowerCase().replace(/\s+/g, '_'),
                    complete: (results) => {
                        const { data, errors } = results;
                        if (errors.length) {
                            setError(`Error parsing CSV: ${errors[0].message}`);
                            setIsProcessing(false);
                            return;
                        }

                        const moviesMap = new Map(movies.map(m => [m.title.toLowerCase(), m]));
                        const screensMap = new Map(cinema.screens.map(s => [s.name.toLowerCase(), s]));

                        const newShows = data.map(row => {
                            const screenName = row.screen_name?.toLowerCase();
                            const movieTitle = row.movie_title?.toLowerCase();
                            const startTimeStr = row.start_time;

                            const screen = screensMap.get(screenName);
                            const movie = moviesMap.get(movieTitle);
                            const startTime = timeToMinutes(startTimeStr);

                            if (screen && movie && startTime !== null) {
                                return {
                                    id: crypto.randomUUID(),
                                    cinemaId: cinema.id,
                                    screenId: screen.id,
                                    movieId: movie.id,
                                    title: movie.title,
                                    duration: movie.duration,
                                    format: movie.format,
                                    tat: movie.tat,
                                    startTime: startTime,
                                };
                            }
                            console.warn("Could not match row:", row);
                            return null;
                        }).filter(Boolean);

                        if (newShows.length === 0 && data.length > 0) {
                             setError("No valid shows could be created from the CSV. Please check screen names, movie titles, and time formats.");
                        } else {
                            onSave(newShows);
                        }
                        setIsProcessing(false);
                    },
                    error: (err) => {
                        setError(`File reading error: ${err.message}`);
                        setIsProcessing(false);
                    }
                });
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Upload Schedule for ${cinema?.name || ''}`}>
                    <div className="space-y-4">
                        <div className="p-6 border-2 border-dashed rounded-lg text-center dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50">
                            <p className="mb-3 text-sm text-gray-600 dark:text-gray-400">CSV format: screen_name, movie_title, start_time (e.g., 10:30 AM)</p>
                            <input type="file" accept=".csv" onChange={handleFileChange} className="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cinema-accent/10 file:text-cinema-accent hover:file:bg-cinema-accent/20"/>
                            <button type="button" onClick={handleDownloadTemplate} className="mt-3 inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-lg shadow-sm text-white bg-gray-600 hover:bg-gray-700 transition-colors"><DownloadIcon size={14} /><span className="ml-1.5">Download Template</span></button>
                        </div>
                        {error && <p className="text-red-500 text-sm">{error}</p>}
                        <div className="flex justify-end space-x-3 pt-4">
                            <button onClick={onClose} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                            <button onClick={handleUpload} disabled={isProcessing || !file} className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover disabled:opacity-50 transition-colors">
                                {isProcessing ? 'Processing...' : 'Upload & Apply'}
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- ScheduleListModal ---
        const ScheduleListModal = ({ isOpen, onClose, cinema, movies, shows }) => {
            if (!isOpen || !cinema) return null;

            const movieMap = new Map(movies.map(m => [m.id, m]));
            const currentCinemaShows = shows.filter(show => show.cinemaId === cinema.id);
            const groupedShowsByMovieTitle = {}; 

            currentCinemaShows.forEach(show => {
                const movie = movieMap.get(show.movieId);
                if (movie) {
                    const movieTitle = getFullMovieName(movie);
                    if (!groupedShowsByMovieTitle[movieTitle]) {
                        groupedShowsByMovieTitle[movieTitle] = [];
                    }
                    groupedShowsByMovieTitle[movieTitle].push(show.startTime);
                }
            });

            for (const key in groupedShowsByMovieTitle) {
                groupedShowsByMovieTitle[key].sort((a, b) => a - b); 
                groupedShowsByMovieTitle[key] = groupedShowsByMovieTitle[key].map(minutesToTime);
            }

            const movieTitles = Object.keys(groupedShowsByMovieTitle);
            let maxShowtimesPerMovie = 0;
            movieTitles.forEach(title => {
                if (groupedShowsByMovieTitle[title].length > maxShowtimesPerMovie) {
                    maxShowtimesPerMovie = groupedShowsByMovieTitle[title].length;
                }
            });

            const tableRows = [];
            for (let i = 0; i < maxShowtimesPerMovie; i++) {
                const row = [];
                movieTitles.forEach(title => {
                    row.push(groupedShowsByMovieTitle[title][i] || '');
                });
                tableRows.push(row);
            }

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Schedule for ${cinema.name}`}>
                    <div className="overflow-x-auto max-h-[70vh] overflow-y-auto">
                        <table className="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                            <thead className="bg-gray-50 dark:bg-gray-800 sticky top-0 z-10">
                                <tr>
                                    {movieTitles.length === 0 ? (
                                        <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">
                                            No Movies Scheduled
                                        </th>
                                    ) : (
                                        movieTitles.map((title, index) => (
                                            <th key={index} scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">
                                                {title}
                                            </th>
                                        ))
                                    )}
                                </tr>
                            </thead>
                            <tbody>
                                {tableRows.length === 0 ? (
                                    <tr>
                                        <td colSpan={movieTitles.length || 1} className="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">
                                            No shows scheduled for this cinema.
                                        </td>
                                    </tr>
                                ) : (
                                    tableRows.map((row, rowIndex) => (
                                        <tr key={rowIndex}>
                                            {row.map((cell, cellIndex) => (
                                                <td key={cellIndex} className="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                                                    {cell || '-'}
                                                </td>
                                            ))}
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </Modal>
            );
        };

        // --- OpsDownloadModal ---
        const OpsDownloadModal = ({ isOpen, onClose, cinemas, onDownload }) => {
            const [selectedIds, setSelectedIds] = React.useState([]);

            React.useEffect(() => {
                setSelectedIds([]);
            }, [isOpen, cinemas]);

            const handleSelectAll = (e) => {
                if (e.target.checked) {
                    setSelectedIds(cinemas.map(c => c.id));
                } else {
                    setSelectedIds([]);
                }
            };

            const handleSelectCinema = (cinemaId) => {
                setSelectedIds(prev => 
                    prev.includes(cinemaId) 
                        ? prev.filter(id => id !== cinemaId)
                        : [...prev, cinemaId]
                );
            };

            const handleDownloadClick = () => {
                onDownload(selectedIds);
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Download Operations Schedule">
                    <div className="space-y-4">
                        <div className="flex items-center p-2 border-b dark:border-gray-700">
                            <input 
                                type="checkbox" 
                                id="select-all" 
                                onChange={handleSelectAll}
                                checked={cinemas.length > 0 && selectedIds.length === cinemas.length}
                                className="h-4 w-4 text-cinema-accent border-gray-300 rounded accent-cinema-accent"
                            />
                            <label htmlFor="select-all" className="ml-3 block text-sm font-medium text-gray-700 dark:text-gray-200">
                                Select All
                            </label>
                        </div>
                        <div className="max-h-60 overflow-y-auto space-y-2 p-2">
                            {cinemas.map(cinema => (
                                <div key={cinema.id} className="flex items-center">
                                    <input 
                                        type="checkbox" 
                                        id={`cinema-${cinema.id}`}
                                        checked={selectedIds.includes(cinema.id)}
                                        onChange={() => handleSelectCinema(cinema.id)}
                                        className="h-4 w-4 text-cinema-accent border-gray-300 rounded accent-cinema-accent"
                                    />
                                    <label htmlFor={`cinema-${cinema.id}`} className="ml-3 block text-sm text-gray-700 dark:text-gray-300">
                                        {cinema.name}
                                    </label>
                                </div>
                            ))}
                        </div>
                        <div className="flex justify-end space-x-3 pt-4 border-t dark:border-gray-700">
                            <button type="button" onClick={onClose} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                            <button type="button" onClick={handleDownloadClick} disabled={selectedIds.length === 0} className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover disabled:opacity-50 transition-colors">
                                Download Selected
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- CopyScheduleModal ---
        const CopyScheduleModal = ({ isOpen, onClose, cinemas, onCopy }) => {
            const [sourceCinemaId, setSourceCinemaId] = React.useState('');
            const [targetCinemaId, setTargetCinemaId] = React.useState('');
            const [screenMapping, setScreenMapping] = React.useState({});
            const [error, setError] = React.useState('');

            const sourceCinema = cinemas.find(c => c.id === sourceCinemaId);
            const targetCinema = cinemas.find(c => c.id === targetCinemaId);

            React.useEffect(() => {
                if (sourceCinema && targetCinema) {
                    const newMapping = {};
                    sourceCinema.screens.forEach((sScreen, index) => {
                        if (targetCinema.screens[index]) {
                            newMapping[sScreen.id] = targetCinema.screens[index].id;
                        } else {
                            newMapping[sScreen.id] = '';
                        }
                    });
                    setScreenMapping(newMapping);
                } else {
                    setScreenMapping({});
                }
                setError('');
            }, [sourceCinema, targetCinema]);

            const handleMappingChange = (sourceScreenId, targetScreenId) => {
                setScreenMapping(prev => ({ ...prev, [sourceScreenId]: targetScreenId }));
            };

            const handleCopy = () => {
                if (!sourceCinema || !targetCinema) {
                    setError('Please select both a source and target cinema.');
                    return;
                }
                if (sourceCinemaId === targetCinemaId) {
                    setError('Source and target cinemas must be different.');
                    return;
                }

                const mappedTargets = Object.values(screenMapping).filter(Boolean);
                if (mappedTargets.length === 0) {
                    setError('Please map at least one screen.');
                    return;
                }

                const uniqueTargets = new Set(mappedTargets);
                if (uniqueTargets.size !== mappedTargets.length) {
                    setError('Multiple source screens cannot be mapped to the same target screen.');
                    return;
                }

                onCopy(sourceCinemaId, targetCinemaId, screenMapping);
                onClose();
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Copy Schedule">
                    <div className="space-y-4">
                        <p className="text-sm text-gray-600 dark:text-gray-400">Copy the schedule from one cinema to another. Map the screens appropriately.</p>
                        
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Source Cinema</label>
                                <select value={sourceCinemaId} onChange={e => setSourceCinemaId(e.target.value)} className="block w-full pl-3 pr-10 py-2.5 text-sm border-gray-300 rounded-lg dark:bg-gray-800 dark:border-gray-600">
                                    <option value="">Select source...</option>
                                    {cinemas.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Target Cinema</label>
                                <select value={targetCinemaId} onChange={e => setTargetCinemaId(e.target.value)} className="block w-full pl-3 pr-10 py-2.5 text-sm border-gray-300 rounded-lg dark:bg-gray-800 dark:border-gray-600">
                                    <option value="">Select target...</option>
                                    {cinemas.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                        </div>

                        {sourceCinema && targetCinema && (
                            <div className="mt-4 border border-gray-200 dark:border-gray-700 rounded-lg p-3 bg-gray-50 dark:bg-gray-800/50">
                                <h4 className="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-3">Screen Mapping</h4>
                                <div className="space-y-2">
                                    {sourceCinema.screens.map(sourceScreen => (
                                        <div key={sourceScreen.id} className="flex items-center space-x-3">
                                            <div className="w-1/2 text-sm font-medium text-gray-600 dark:text-gray-400 truncate text-right">{sourceScreen.name}</div>
                                            <RefreshCwIcon size={14} className="text-gray-400 flex-shrink-0" />
                                            <select 
                                                value={screenMapping[sourceScreen.id] || ''} 
                                                onChange={e => handleMappingChange(sourceScreen.id, e.target.value)}
                                                className="w-1/2 block pl-2 pr-8 py-1.5 text-xs border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600"
                                            >
                                                <option value="">- Do not copy -</option>
                                                {targetCinema.screens.map(targetScreen => (
                                                    <option key={targetScreen.id} value={targetScreen.id}>{targetScreen.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {error && <p className="text-red-500 text-sm text-center">{error}</p>}
                        
                        <div className="flex justify-end space-x-3 pt-4 border-t dark:border-gray-700">
                            <button type="button" onClick={onClose} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                            <button type="button" onClick={handleCopy} className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors">Copy Schedule</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- EmailDraftModal ---
        const EmailDraftModal = ({ isOpen, onClose, allCinemas, allShows, allMovies }) => {
            const [selectedProgrammer, setSelectedProgrammer] = React.useState('');
            const [selectedState, setSelectedState] = React.useState('');
            const [selectedTemplateId, setSelectedTemplateId] = React.useState('tentative');
            const [selectedCinemaIds, setSelectedCinemaIds] = React.useState([]);
            const [cellColors, setCellColors] = React.useState({}); // { [showId]: 'yellow' | 'green' | 'red' }
            // Default to today in local YYYY-MM-DD (avoids UTC skew from toISOString)
            const [selectedDate, setSelectedDate] = React.useState(() => {
                const d = new Date();
                const pad = (n) => String(n).padStart(2, '0');
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            });
            
            const [to, setTo] = React.useState('');
            const [cc, setCc] = React.useState('');
            const [bcc, setBcc] = React.useState('');
            const [subject, setSubject] = React.useState('');
            const [body, setBody] = React.useState('');
            const [savedLists, setSavedLists] = React.useState([]);
            const [selectedListId, setSelectedListId] = React.useState('default');
            const [newListName, setNewListName] = React.useState('');
            const [isSavingList, setIsSavingList] = React.useState(false);
            const [isSending, setIsSending] = React.useState(false);
            const [includeExcel, setIncludeExcel] = React.useState(true);
            const [includePDF, setIncludePDF] = React.useState(false);
            const [validationErrors, setValidationErrors] = React.useState([]);
            const [isLoggedOut, setIsLoggedOut] = React.useState(true);

            // Effect: Handle Programmer Selection
            React.useEffect(() => {
                if (selectedProgrammer) {
