    <script>
      // CINEFLOW Firebase project — public web SDK config (safe to embed; security is enforced by Firestore Rules)
      const firebaseConfig = {
        apiKey: "AIzaSyBtBPunjIMtf5xsuIlIysILDwTsaxdENAU",
        authDomain: "cineflow-b5b97.firebaseapp.com",
        projectId: "cineflow-b5b97",
        storageBucket: "cineflow-b5b97.firebasestorage.app",
        messagingSenderId: "200296817192",
        appId: "1:200296817192:web:82b0fe597ca39946cd4b1d"
      };
      firebase.initializeApp(firebaseConfig);
      window.fbAuth = firebase.auth();
      window.fbDb = firebase.firestore();
      // Enable offline persistence so the app keeps working if network blips
      window.fbDb.enablePersistence({ synchronizeTabs: true }).catch(err => {
        console.warn('Firestore persistence not enabled:', err.code);
      });

      // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      // CINEFLOW storage adapter â€” wraps Firestore with a simple API.
      // Phase A: defined but not yet used. Phase C will replace the 44
      // localStorage calls with calls on this object.
      // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      window.cineStorage = {
        // Current authenticated user's Firestore profile doc (set on login)
        _profile: null,
        _uid: null,

        // Called from the Firebase Auth onAuthStateChanged handler after login.
        async loadProfile(uid) {
          this._uid = uid;
          const snap = await window.fbDb.collection('users').doc(uid).get();
          this._profile = snap.exists ? snap.data() : null;
          return this._profile;
        },
        clearProfile() { this._profile = null; this._uid = null; },
        get profile() { return this._profile; },
        get uid() { return this._uid; },
        get role() { return this._profile?.role || 'programmer'; },
        get allowedCinemas() { return this._profile?.allowedCinemas || []; },
        isAdmin() { return this.role === 'admin'; },
        isManager() { return this.role === 'manager' || this.role === 'admin'; },
        canAccessCinema(cinemaId) {
          if (this.isAdmin()) return true;
          return this.allowedCinemas.includes(cinemaId);
        },

        // â”€â”€â”€ GLOBAL key/value store (everyone reads; managers+admin write) â”€â”€â”€
        // Path: /settings/{key}  â†’  { value, updatedAt, updatedBy }
        async getGlobal(key, fallback = null) {
          try {
            const snap = await window.fbDb.collection('settings').doc(key).get();
            return snap.exists ? snap.data().value : fallback;
          } catch (e) { console.error('cineStorage.getGlobal', key, e); return fallback; }
        },
        async setGlobal(key, value) {
          return window.fbDb.collection('settings').doc(key).set({
            value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: this._uid || null
          });
        },
        subscribeGlobal(key, callback) {
          return window.fbDb.collection('settings').doc(key).onSnapshot(
            snap => callback(snap.exists ? snap.data().value : null),
            err => console.error('subscribeGlobal', key, err)
          );
        },

        // â”€â”€â”€ PER-USER private data (drafts, prefs) â”€â”€â”€
        // Path: /users/{uid}/private/{key}  â†’  { value }
        async getMine(key, fallback = null) {
          if (!this._uid) return fallback;
          try {
            const snap = await window.fbDb.collection('users').doc(this._uid).collection('private').doc(key).get();
            return snap.exists ? snap.data().value : fallback;
          } catch (e) { console.error('cineStorage.getMine', key, e); return fallback; }
        },
        async setMine(key, value) {
          if (!this._uid) return;
          return window.fbDb.collection('users').doc(this._uid).collection('private').doc(key).set({ value });
        },

        // â”€â”€â”€ PER-CINEMA data (granular; avoids cross-programmer write collisions) â”€â”€â”€
        // Path: /cinemas/{cinemaId}/{key}/{docId}
        async getCinemaDoc(cinemaId, key, fallback = null) {
          try {
            const snap = await window.fbDb.collection('cinemas').doc(cinemaId).collection('data').doc(key).get();
            return snap.exists ? snap.data().value : fallback;
          } catch (e) { console.error('cineStorage.getCinemaDoc', cinemaId, key, e); return fallback; }
        },
        async setCinemaDoc(cinemaId, key, value) {
          return window.fbDb.collection('cinemas').doc(cinemaId).collection('data').doc(key).set({
            value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: this._uid || null
          });
        },
        subscribeCinemaDoc(cinemaId, key, callback) {
          return window.fbDb.collection('cinemas').doc(cinemaId).collection('data').doc(key).onSnapshot(
            snap => callback(snap.exists ? snap.data().value : null),
            err => console.error('subscribeCinemaDoc', cinemaId, key, err)
          );
        },

        // â”€â”€â”€ Cinema registry (master list of all cinemas) â”€â”€â”€
        async listAllCinemas() {
          const snap = await window.fbDb.collection('cinemas').get();
          return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        },
        async listMyCinemas() {
          if (this.isAdmin()) return this.listAllCinemas();
          const ids = this.allowedCinemas;
          if (!ids.length) return [];
          // Firestore 'in' queries support up to 30 IDs per query â€” chunk if needed
          const chunks = [];
          for (let i = 0; i < ids.length; i += 30) chunks.push(ids.slice(i, i + 30));
          const results = [];
          for (const chunk of chunks) {
            const snap = await window.fbDb.collection('cinemas').where(firebase.firestore.FieldPath.documentId(), 'in', chunk).get();
            snap.docs.forEach(d => results.push({ id: d.id, ...d.data() }));
          }
          return results;
        },

        // â”€â”€â”€ PER-USER MOVIE CATALOG (Phase G) â”€â”€â”€
        // Path: /users/{uid}/catalog/movies  â†’  { list: [...movies] }
        // Each movie record carries an `ownerUid` so writes can be routed back to
        // the right owner (managers can edit subordinates' catalogs).
        async _getUserMoviesDoc(uid) {
          if (!uid) return [];
          try {
            const snap = await window.fbDb.collection('users').doc(uid).collection('catalog').doc('movies').get();
            return snap.exists ? (snap.data().list || []) : [];
          } catch (e) { console.error('cineStorage.getUserMovies', uid, e); return []; }
        },
        async _setUserMoviesDoc(uid, list) {
          if (!uid) return;
          return window.fbDb.collection('users').doc(uid).collection('catalog').doc('movies').set({
            list,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: this._uid || null
          });
        },
        async getMyMovies() { return this._getUserMoviesDoc(this._uid); },
        async setMyMovies(list) { return this._setUserMoviesDoc(this._uid, list); },
        subscribeUserMovies(uid, callback) {
          if (!uid) return () => {};
          return window.fbDb.collection('users').doc(uid).collection('catalog').doc('movies').onSnapshot(
            snap => callback(snap.exists ? (snap.data().list || []) : []),
            err => console.error('subscribeUserMovies', uid, err)
          );
        },
        // Returns uids whose movies the current user should merge into state.movies.
        // - Manager: self + subordinate programmers (looked up by shortName).
        // - Admin / programmer (Î±): self only.
        async listAccessibleProgrammerUids() {
          if (!this._uid) return [];
          if (this.role !== 'manager') return [this._uid];
          const supervises = (this._profile && this._profile.supervises) || [];
          if (!supervises.length) return [this._uid];
          const uids = [this._uid];
          for (let i = 0; i < supervises.length; i += 30) {
            const chunk = supervises.slice(i, i + 30);
            try {
              const snap = await window.fbDb.collection('users').where('shortName', 'in', chunk).get();
              snap.docs.forEach(d => { if (d.id !== this._uid) uids.push(d.id); });
            } catch (e) { console.error('listAccessibleProgrammerUids chunk', chunk, e); }
          }
          return uids;
        }
      };
      console.log('CINEFLOW: Firebase initialized, storage adapter ready.');

      // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      // CINEFLOW sync shim â€” transparently mirrors localStorage to
      // Firestore so the existing 28 localStorage call sites keep
      // working unchanged. Writes are debounced; remote changes from
      // other users are pulled via real-time subscriptions.
      // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      window.cineSync = {
        // Which localStorage keys mirror to which Firestore location.
        // Keys NOT in this map (e.g. 'theme', MSAL caches) stay device-local.
        KEY_STRATEGY: {
          'sm_global_tat':         { type: 'global', docKey: 'globalTat' },
          'sm_email_history':      { type: 'global', docKey: 'emailHistory' },
          'sm_distribution_lists': { type: 'global', docKey: 'distributionLists' },
          'sm_weekend_data':       { type: 'global', docKey: 'weekendData' },
          'sm_programmer_map':     { type: 'global', docKey: 'programmerMap' },
          'sm_movie_status':       { type: 'global', docKey: 'movieStatus' },
          // NOTE: 'showtime_manager_state' (the master per-cinema blob) intentionally
          // omitted â€” it exceeds the Firestore 1 MB per-doc limit. Phase D will split it
          // into /cinemas/{cinemaId}/state docs. Until then, main scheduler state is
          // device-local (same as before the migration).
          'sm_alloc_work':         { type: 'mine',   docKey: 'allocWork' }
        },

        // Subscriptions to remote changes (set up after login)
        _subscriptions: [],
        _debounceTimers: {},
        _pulling: false,
        _suppressPushKeys: new Set(),   // keys we just pulled â€” don't echo back
        _lastPushedCanon: {},           // lsKey â†’ canonical JSON of value we last pushed
                                        //   (used to recognise our own echo on subscribe)

        // â”€â”€ Canonical JSON: stringify with object keys sorted recursively, so two
        //    objects with identical data but different key insertion orders produce
        //    the exact same string. Needed because Firestore re-orders object keys
        //    on round-trip, which broke the naive `JSON.stringify` self-echo check. â”€â”€
        _canon(v) {
          if (v === null || typeof v !== 'object') return JSON.stringify(v);
          if (Array.isArray(v)) return '[' + v.map(x => this._canon(x)).join(',') + ']';
          const keys = Object.keys(v).sort();
          return '{' + keys.map(k => JSON.stringify(k) + ':' + this._canon(v[k])).join(',') + '}';
        },

        // â”€â”€ Pull every synced key from Firestore â†’ localStorage. Called once after login. â”€â”€
        async pullAll() {
          this._pulling = true;
          const results = [];
          for (const [lsKey, strat] of Object.entries(this.KEY_STRATEGY)) {
            try {
              let value;
              if (strat.type === 'global') value = await window.cineStorage.getGlobal(strat.docKey);
              else if (strat.type === 'mine') value = await window.cineStorage.getMine(strat.docKey);
              if (value !== null && value !== undefined) {
                this._suppressPushKeys.add(lsKey);
                window.localStorage.setItem(lsKey, JSON.stringify(value));
                this._suppressPushKeys.delete(lsKey);
                // Seed the echo-detector with what's in the cloud so the first
                // subscription event after login isn't mis-flagged as "another user".
                this._lastPushedCanon[lsKey] = this._canon(value);
                results.push(`âœ“ ${lsKey}`);
              } else {
                results.push(`Â· ${lsKey} (empty in cloud)`);
              }
            } catch (e) {
              results.push(`âœ— ${lsKey}: ${e.message || e.code}`);
              console.error('cineSync.pullAll', lsKey, e);
            }
          }
          this._pulling = false;
          console.log('CINEFLOW: pullAll complete\n' + results.join('\n'));
          return results;
        },

        // â”€â”€ Push one key to Firestore (called by the localStorage monkey-patch) â”€â”€
        async push(lsKey) {
          const strat = this.KEY_STRATEGY[lsKey];
          if (!strat) return;
          if (this._suppressPushKeys.has(lsKey)) return;
          if (!window.cineStorage.uid) return;  // not logged in yet
          const raw = window.localStorage.getItem(lsKey);
          if (raw === null) return;
          let value;
          try { value = JSON.parse(raw); } catch { value = raw; }
          // Record the canonical form BEFORE the network round-trip so the inbound
          // subscription event triggered by our own write is recognised as an echo.
          this._lastPushedCanon[lsKey] = this._canon(value);
          try {
            if (strat.type === 'global')      await window.cineStorage.setGlobal(strat.docKey, value);
            else if (strat.type === 'mine')   await window.cineStorage.setMine(strat.docKey, value);
          } catch (e) {
            console.error('cineSync.push failed', lsKey, e);
          }
        },

        _pushDebounced(key) {
          clearTimeout(this._debounceTimers[key]);
          this._debounceTimers[key] = setTimeout(() => {
            this.push(key);
          }, 1500);
        },

        // â”€â”€ Start real-time subscriptions for global keys. On remote change, update
        //    localStorage and dispatch a 'cinesync:update' event so the UI can react. â”€â”€
        //    A subscription event triggered by THIS tab's own push is recognised by
        //    matching the incoming canonical form against `_lastPushedCanon[lsKey]`,
        //    and is dropped silently so the amber banner only fires for real remote
        //    changes from other users.
        startSubscriptions() {
          this.stopSubscriptions();
          for (const [lsKey, strat] of Object.entries(this.KEY_STRATEGY)) {
            if (strat.type !== 'global') continue;  // private docs don't need cross-user sync
            const unsub = window.cineStorage.subscribeGlobal(strat.docKey, (value) => {
              if (value === null || value === undefined) return;
              const incomingCanon = this._canon(value);

              // 1. Self-echo: this is the round-trip from our own most recent push.
              if (this._lastPushedCanon[lsKey] === incomingCanon) return;

              // 2. Already in sync locally (key-order-stable compare). No-op + record.
              const localRaw = window.localStorage.getItem(lsKey);
              if (localRaw !== null) {
                try {
                  if (this._canon(JSON.parse(localRaw)) === incomingCanon) {
                    this._lastPushedCanon[lsKey] = incomingCanon;
                    return;
                  }
                } catch (e) { /* fall through and accept the remote value */ }
              }

              // 3. Real remote change from another user â€” apply + notify UI.
              this._suppressPushKeys.add(lsKey);
              window.localStorage.setItem(lsKey, JSON.stringify(value));
              this._suppressPushKeys.delete(lsKey);
              this._lastPushedCanon[lsKey] = incomingCanon;
              window.dispatchEvent(new CustomEvent('cinesync:update', { detail: { key: lsKey, value } }));
            });
            this._subscriptions.push(unsub);
          }
          console.log('CINEFLOW: real-time subscriptions active for', this._subscriptions.length, 'keys');
        },

        stopSubscriptions() {
          this._subscriptions.forEach(u => { try { u && u(); } catch(e){} });
          this._subscriptions = [];
        }
      };

      // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      // CINEFLOW main-state sync (Phase D) — splits the `showtime_manager_state`
      // blob across many small Firestore docs so no single doc exceeds 1 MB, and
      // so programmers only subscribe to cinemas they have access to.
      //
      // Firestore layout:
      //   /settings/mainRegistry             â†’ { cinemas, movies }        (admin writes; all read)
      //   /cinemas/{cinemaId}/data/shows     â†’ value = [ ...shows ]        (per-cinema slice)
      //   /cinemas/{cinemaId}/data/allocations â†’ value = { allocs for cid }
      //
      // Undo history stays local (per-user, per-session â€” doesn't belong in the cloud).
      // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      window.cineMainState = {
        _subs: [],
        _timers: { registry: null, shows: {}, allocs: {}, movies: {} },
        _lastPushed: { registry: null, shows: {}, allocs: {}, movies: {} },
        _primedState: null,          // set by App before MainApp mounts
        _subscribedCinemas: new Set(),
        _accessibleUids: [],         // uids whose movie catalogs feed state.movies
        _activeDate: new Date().toISOString().split('T')[0],  // date-keyed cloud storage

        _canon(v) {
          if (v === null || typeof v !== 'object') return JSON.stringify(v);
          if (Array.isArray(v)) return '[' + v.map(x => this._canon(x)).join(',') + ']';
          const keys = Object.keys(v).sort();
          return '{' + keys.map(k => JSON.stringify(k) + ':' + this._canon(v[k])).join(',') + '}';
        },

        // Determine which cinema IDs the current user is allowed to read/write.
        _accessibleIds(registryCinemas) {
          const allIds = (registryCinemas || []).map(c => c.id);
          if (window.cineStorage.isAdmin()) return allIds;
          const allowed = new Set(window.cineStorage.allowedCinemas || []);
          return allIds.filter(id => allowed.has(id));
        },

        // Pull the full state: registry (cinemas only) + every accessible cinema's
        // shows & allocations + every accessible programmer's movie catalog.
        // date: optional YYYY-MM-DD string; defaults to _activeDate.
        async pullMergedState(date) {
          const d = date || this._activeDate;
          this._activeDate = d;
          const showsKey  = `shows_${d}`;
          const allocsKey = `allocations_${d}`;

          const registry = (await window.cineStorage.getGlobal('mainRegistry')) || { cinemas: [] };
          const cinemas = Array.isArray(registry.cinemas) ? registry.cinemas : [];
          const legacyMovies = Array.isArray(registry.movies) ? registry.movies : [];  // pre-Phase-G fallback
          const ids = this._accessibleIds(cinemas);

          // Per-cinema fetches (shows + allocations) - date-keyed
          const cinemaFetches = ids.map(async (cid) => {
            const [shows, allocs] = await Promise.all([
              window.cineStorage.getCinemaDoc(cid, showsKey,  []),
              window.cineStorage.getCinemaDoc(cid, allocsKey, {})
            ]);
            return { cid, shows: Array.isArray(shows) ? shows : [], allocs: (allocs && typeof allocs === 'object') ? allocs : {} };
          });

          // Per-user movie catalog fetches
          const accessibleUids = await window.cineStorage.listAccessibleProgrammerUids();
          this._accessibleUids = accessibleUids.slice();
          const movieFetches = accessibleUids.map(uid => window.cineStorage._getUserMoviesDoc(uid)
              .then(list => ({ uid, list: Array.isArray(list) ? list : [] })));

          const [cinemaChunks, movieChunks] = await Promise.all([
            Promise.all(cinemaFetches),
            Promise.all(movieFetches)
          ]);

          const allShows = [];
          const plannedAllocations = {};
          for (const { cid, shows, allocs } of cinemaChunks) {
            for (const s of shows) allShows.push(s);
            if (allocs && Object.keys(allocs).length > 0) plannedAllocations[`${cid}_${this._activeDate}`] = allocs;
          }

          // Merge movies across all accessible owners (dedup by id; tag ownerUid).
          const moviesById = new Map();
          for (const { uid, list } of movieChunks) {
            for (const m of list) {
              if (!m || !m.id) continue;
              moviesById.set(m.id, { ...m, ownerUid: m.ownerUid || uid });
            }
            this._lastPushed.movies[uid] = this._canon(list);
          }
          // One-time fallback: if per-user catalogs empty but legacy registry has movies,
          // surface them so the UI isn't blank until the admin migration runs.
          if (moviesById.size === 0 && legacyMovies.length) {
            for (const m of legacyMovies) {
              if (!m || !m.id) continue;
              moviesById.set(m.id, { ...m, ownerUid: m.ownerUid || null });
            }
          }
          const movies = Array.from(moviesById.values());

          // Seed echo-detectors (registry is now cinemas-only)
          this._lastPushed.registry = this._canon({ cinemas });
          for (const { cid, shows, allocs } of cinemaChunks) {
            this._lastPushed.shows[cid]  = this._canon(shows);
            this._lastPushed.allocs[cid] = this._canon(allocs);

        // Diffing push â€” only writes docs whose canonical form changed since last push.
        // Debounced 1.5s per doc so a burst of state updates collapses into one write.
        pushDiff(currentSlice) {
          if (!window.cineStorage.uid) return;
          if (!currentSlice || typeof currentSlice !== 'object') return;
          const isAdmin = window.cineStorage.isAdmin();
          const myUid   = window.cineStorage.uid;

          // Registry (admin only) â€” cinemas ONLY under Phase G; movies live in /users/*/catalog/movies.
          if (isAdmin) {
            const registry = {
              cinemas: Array.isArray(currentSlice.cinemas) ? currentSlice.cinemas : []
            };
            const canon = this._canon(registry);
            if (canon !== this._lastPushed.registry) {
              this._lastPushed.registry = canon;
              clearTimeout(this._timers.registry);
              this._timers.registry = setTimeout(() => {
                window.cineStorage.setGlobal('mainRegistry', registry)
                  .catch(e => console.error('cineMainState.pushRegistry', e));
              }, 1500);
            }
          }

          // Movies â€” group by ownerUid, only push catalogs the user can write.
          // Writable targets: always self; admins & managers can also write subordinates.
          const movies = Array.isArray(currentSlice.movies) ? currentSlice.movies : [];
          const writableUids = new Set(this._accessibleUids || []);
          writableUids.add(myUid);  // self is always writable
          const moviesByOwner = {};
          for (const m of movies) {
            if (!m || !m.id) continue;
            const owner = m.ownerUid || myUid;  // untagged movies default to current user
            if (!writableUids.has(owner)) continue;  // skip movies we can't write
            (moviesByOwner[owner] ||= []).push(m);
          }
          // Ensure every writable uid gets a pushed snapshot (even if now empty, to capture deletions).
          for (const uid of writableUids) {
            if (!moviesByOwner[uid]) moviesByOwner[uid] = [];
          }
          for (const uid of Object.keys(moviesByOwner)) {
            const list  = moviesByOwner[uid];
            const mCanon = this._canon(list);
            // Skip first-time empty pushes for other owners (no prior snapshot + nothing to write).
            if (this._lastPushed.movies[uid] === undefined && list.length === 0 && uid !== myUid) continue;
            if (mCanon !== this._lastPushed.movies[uid]) {
              this._lastPushed.movies[uid] = mCanon;
              clearTimeout(this._timers.movies[uid]);
              this._timers.movies[uid] = setTimeout(() => {
                window.cineStorage._setUserMoviesDoc(uid, list)
                  .catch(e => console.error('cineMainState.pushMovies', uid, e));
              }, 1500);
            }
          }

          // Per-cinema writes: only for cinemas the user can write
          const writable = isAdmin
            ? (Array.isArray(currentSlice.cinemas) ? currentSlice.cinemas.map(c => c.id) : [])
            : (window.cineStorage.allowedCinemas || []);

          const shows = Array.isArray(currentSlice.shows) ? currentSlice.shows : [];
          const byCinema = {};
          for (const s of shows) {
            if (!s || !s.cinemaId) continue;
            (byCinema[s.cinemaId] ||= []).push(s);
          }
          const allocs = (currentSlice.plannedAllocations && typeof currentSlice.plannedAllocations === 'object')
                        ? currentSlice.plannedAllocations : {};

          const showsKey  = `shows_${this._activeDate}`;
          const allocsKey = `allocations_${this._activeDate}`;

          for (const cid of writable) {
            // shows (date-keyed)
            const cShows = byCinema[cid] || [];
            const sCanon = this._canon(cShows);
            if (sCanon !== this._lastPushed.shows[cid]) {
              this._lastPushed.shows[cid] = sCanon;
              clearTimeout(this._timers.shows[cid]);
              this._timers.shows[cid] = setTimeout(() => {
                window.cineStorage.setCinemaDoc(cid, showsKey, cShows)
                  .catch(e => console.error('cineMainState.pushShows', cid, e));
              }, 1500);
            }
            // allocations (date-keyed)
            const cAllocs = allocs[`${cid}_${this._activeDate}`] || {};
            const aCanon = this._canon(cAllocs);
            if (aCanon !== this._lastPushed.allocs[cid]) {
              this._lastPushed.allocs[cid] = aCanon;
              clearTimeout(this._timers.allocs[cid]);
              this._timers.allocs[cid] = setTimeout(() => {

          const isAdmin = window.cineStorage.isAdmin();

            cinemas: Array.isArray(currentSlice.cinemas) ? currentSlice.cinemas : []

          // Movies: group by ownerUid, write each catalog (writable uids only).

          const writableUids = new Set(this._accessibleUids || []);
          writableUids.add(myUid);

            if (!s || !s.cinemaId) continue;

          }
          const allocs = currentSlice.plannedAllocations || {};
          const ids = registry.cinemas.map(c => c.id);
          const showsKey  = `shows_${this._activeDate}`;
          const allocsKey = `allocations_${this._activeDate}`;
          const cinemaWrites = ids.flatMap(cid => {

            this._lastPushed.allocs[cid] = this._canon(cAllocs);

                      Object.keys(moviesByOwner).length, 'movie catalogs to cloud.');

        // Pushes ONLY allocations (and writable movie catalogs) â€” never touches shows or registry.
        // Safe to call from the Show Allocation view: scheduler shows cannot be wiped by this path.

          const myUid   = window.cineStorage.uid;

            ? (Array.isArray(currentSlice.cinemas) ? currentSlice.cinemas.map(c => c.id) : [])
            : (window.cineStorage.allowedCinemas || []);

        // Force-flush all pending debounced writes and push the current state immediately.

          const moviesByOwner = {};
          for (const m of movies) {
            if (!m || !m.id) continue;
            const owner = m.ownerUid || myUid;
            if (!writableUids.has(owner)) continue;

          const byCinema = {};

          }
          const allocs = (currentSlice.plannedAllocations && typeof currentSlice.plannedAllocations === 'object')

            ? (Array.isArray(currentSlice.cinemas) ? currentSlice.cinemas.map(c => c.id) : [])
            : (window.cineStorage.allowedCinemas || []);
          const showsKey  = `shows_${this._activeDate}`;
          const allocsKey = `allocations_${this._activeDate}`;
          for (const cid of writable) {
            const cShows  = byCinema[cid] || [];
            const cAllocs = allocs[`${cid}_${this._activeDate}`] || {};
            this._lastPushed.shows[cid]  = this._canon(cShows);
            this._lastPushed.allocs[cid] = this._canon(cAllocs);
            writes.push(window.cineStorage.setCinemaDoc(cid, showsKey,  cShows));
            writes.push(window.cineStorage.setCinemaDoc(cid, allocsKey, cAllocs));
          }

          await Promise.all(writes);
          console.log('CINEFLOW: flushNow committed', writes.length, 'docs.');

        },

        // Subscribe to the registry + each accessible cinema's shows & allocations
        // + each accessible programmer's movie catalog.
        // `onRemoteChange` receives {type, value}, {type, cinemaId, value}, or {type:'movies', ownerUid, value}.
        startSubscriptions(accessibleCinemaIds, onRemoteChange) {
          this.stopSubscriptions();
          this._subscribedCinemas = new Set(accessibleCinemaIds || []);

          // Registry subscription (cinemas only under Phase G)
          const unsubReg = window.cineStorage.subscribeGlobal('mainRegistry', (value) => {
            if (!value) return;
            // Match the canon form we write (cinemas-only) so self-echoes collapse.
            const canonForm = { cinemas: Array.isArray(value.cinemas) ? value.cinemas : [] };
            const canon = this._canon(canonForm);
            if (canon === this._lastPushed.registry) return;   // self-echo
            this._lastPushed.registry = canon;

          });

          // Per-cinema subscriptions - date-keyed so each date gets its own listener
          const showsKey  = `shows_${this._activeDate}`;
          const allocsKey = `allocations_${this._activeDate}`;
          for (const cid of this._subscribedCinemas) {
            const unsubShows = window.cineStorage.subscribeCinemaDoc(cid, showsKey, (value) => {

              const canon = this._canon(value);
              if (canon === this._lastPushed.shows[cid]) return;
              this._lastPushed.shows[cid] = canon;
              onRemoteChange({ type: 'shows', cinemaId: cid, value });
            });
            this._subs.push(unsubShows);

            const unsubAllocs = window.cineStorage.subscribeCinemaDoc(cid, allocsKey, (value) => {
              if (value === null || value === undefined) return;
              const canon = this._canon(value);
              if (canon === this._lastPushed.allocs[cid]) return;
              this._lastPushed.allocs[cid] = canon;
              onRemoteChange({ type: 'allocations', cinemaId: cid, value });
            });
            this._subs.push(unsubAllocs);
          }

          // Per-user movie catalog subscriptions (self + subordinates for managers/admin).
          const uids = Array.isArray(this._accessibleUids) && this._accessibleUids.length
                       ? this._accessibleUids

          for (const uid of uids) {
            if (!uid) continue;
            const unsubMovies = window.cineStorage.subscribeUserMovies(uid, (list) => {
              if (!Array.isArray(list)) return;
              const canon = this._canon(list);
              if (canon === this._lastPushed.movies[uid]) return;   // self-echo
              this._lastPushed.movies[uid] = canon;
              onRemoteChange({ type: 'movies', ownerUid: uid, value: list });
            });
            this._subs.push(unsubMovies);
          }

                      this._subscribedCinemas.size, 'cinemas +',
                      uids.length, 'movie catalogs + registry.');

                    <h2>JavaScript Error Detected!</h2>
                    <p><b>Message:</b> ${message}</p>
                    <p><b>Source:</b> ${source}:${lineno}:${colno}</p>
                    <p><b>Stack:</b> <pre>${error ? error.stack : 'N/A'}</pre></p>

                    <p><b>Reason:</b> <pre>${event.reason ? event.reason.stack || event.reason : 'N/A'}</pre></p>

            if (msg.includes('SyntaxError') || msg.includes('Babel')) {
                document.body.innerHTML += `
                    <div style="font-family: monospace; color: red; padding: 20px; background: #ffebee;">
                        <h2>Babel/Console Error Detected!</h2>
                        <p><b>Message:</b> <pre>${msg.replace(/</g, "&lt;")}</pre></p>
                    </div>
                `;
            }
        };

            // Step 2: Round all times to 5-min intervals
            fixedShows.forEach(s => {
                const rounded = roundUp(s.startTime);
                if (rounded !== s.startTime) {
                    issues.push(`Rounded ${s.startTime} â†’ ${rounded}`);
                    s.startTime = rounded;
                }
            });

            // Step 3: Enforce time bounds
            fixedShows = fixedShows.filter(s => {
                if (s.startTime > LAST_SHOW) {
                    issues.push(`Removed show starting after 11:40 PM: ${s.startTime}`);
                    return false;
                }
                return true;
            });

            // Step 4: Fix overlaps per screen (repack)
            const byScreen = {};
            fixedShows.forEach(s => {
                if (!byScreen[s.screenId]) byScreen[s.screenId] = [];
                byScreen[s.screenId].push(s);
            });

            let repackedShows = [];
            for (const screenId in byScreen) {
                const screenShows = byScreen[screenId].sort((a, b) => a.startTime - b.startTime);
                for (let i = 1; i < screenShows.length; i++) {
                    const prev = screenShows[i - 1];
                    const prevMovie = moviesMap.get(prev.movieId);
                    const prevEnd = prev.startTime + (prevMovie?.duration || 0) + (prev.isWA ? 25 : getScreenTat(prev.screenId, cinema));
                    if (screenShows[i].startTime < prevEnd) {
                        const old = screenShows[i].startTime;
                        screenShows[i].startTime = roundUp(prevEnd);
                        issues.push(`Fixed overlap on ${screenId}: ${old} â†’ ${screenShows[i].startTime}`);
                    }
                }
                repackedShows.push(...screenShows);
            }

            // Step 5: Remove shows pushed past last show time after repack
            repackedShows = repackedShows.filter(s => s.startTime <= LAST_SHOW);

            // Step 6: Sort by screen then time
            repackedShows.sort((a, b) => {
                if (a.screenId !== b.screenId) return a.screenId.localeCompare(b.screenId);
                return a.startTime - b.startTime;
            });

            return { shows: repackedShows, issues };
        };

        const formatDuration = (minutes) => {
            const mInt = parseInt(minutes, 10);
            if (isNaN(mInt) || mInt < 0) return '0h 0m';
            const h = Math.floor(mInt / 60);
            const m = mInt % 60;
            return `${h}h ${m}m`;
        };
        const minutesToTime = (totalMinutes) => {
            if (isNaN(totalMinutes)) return "00:00";
            const h = Math.floor(totalMinutes / 60) % 24;
            const m = Math.round(totalMinutes % 60);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const twelveHour = h % 12 === 0 ? 12 : h % 12;
            return `${String(twelveHour).padStart(2, '0')}:${String(m).padStart(2, '0')} ${ampm}`;
        };
        const timeToMinutes = (timeString) => {
            if (!timeString || typeof timeString !== 'string') return null;
            const formattedString = timeString.toUpperCase().replace(/\s/g, '');
            const match12hr = formattedString.match(/^(\d{1,2}):(\d{2})(AM|PM)$/);
            if (match12hr) {
                let [, hours, minutes, modifier] = match12hr;
                hours = parseInt(hours, 10);
                minutes = parseInt(minutes, 10);
                if (hours < 1 || hours > 12 || minutes < 0 || minutes > 59) return null;
                if (modifier === 'AM' && hours === 12) hours = 0;
                if (modifier === 'PM' && hours < 12) hours += 12;
                return hours * 60 + minutes;
            }
            const match24hr = timeString.match(/^(\d{1,2}):(\d{2})$/);
            if (match24hr) {
                let [, hours, minutes] = match24hr;
                hours = parseInt(hours, 10);
                minutes = parseInt(minutes, 10);
                if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
                return hours * 60 + minutes;
            }
            return null;
        };

        // User presses Ctrl+V in the Outlook mail body to paste the formatted schedule.
        const sendOutlookEmail = async ({ to, cc, bcc, subject, body }) => {
            const stripHtml = (html) => {
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                return tmp.innerText || tmp.textContent || '';
            };

            // 1) Put rich HTML on clipboard so Outlook pastes it with table formatting + cell colors
            try {
                if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
                    const htmlBlob = new Blob([body], { type: 'text/html' });
                    const textBlob = new Blob([stripHtml(body)], { type: 'text/plain' });
                    await navigator.clipboard.write([
                        new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob })
                    ]);
                } else if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(stripHtml(body));
                }
            } catch (e) {
                console.warn('Clipboard API failed â€” using legacy textarea copy', e);
                const ta = document.createElement('textarea');
                ta.value = stripHtml(body);
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); } catch(_) {}
                document.body.removeChild(ta);
            }

            // 2) Build mailto URI and launch Outlook / default mail client
            const enc = encodeURIComponent;
            const normaliseAddrs = (s) => (s || '').replace(/;/g, ',').trim();
            const parts = [];
            if (cc) { const v = normaliseAddrs(cc); if (v) parts.push('cc=' + enc(v)); }
            if (bcc) { const v = normaliseAddrs(bcc); if (v) parts.push('bcc=' + enc(v)); }
            if (subject) parts.push('subject=' + enc(subject));
            parts.push('body=' + enc('[Press Ctrl+V here to paste the formatted schedule]'));
            const mailto = 'mailto:' + enc(normaliseAddrs(to)) + (parts.length ? '?' + parts.join('&') : '');
            window.location.href = mailto;
            return { opened: true };
        };

        const SunIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const MoonIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;

        const ChevronLeftIcon = ({size=16, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRightIcon = ({size=16, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const MoreHorizontalIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>;

        const UserIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const GridIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>;
        const BarChartIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>;
        const PanelLeftIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>;
        const SearchIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const GlobeIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
        const ClapperboardIcon = ({size=48}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 4"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>;
        const ClockIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;

        // --- Modal Component (Improved) ---
        const Modal = ({ children, isOpen, onClose, title }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-center items-center p-4 transition-opacity duration-200" onClick={onClose}>
                    <div className="bg-white dark:bg-cinema-surface rounded-lg shadow-2xl w-full max-w-4xl modal-animate border border-gray-200 dark:border-gray-700/50" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center px-6 py-4 border-b border-gray-200 dark:border-gray-700/50">
                            <h3 className="text-lg font-semibold text-gray-900 dark:text-white">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-white rounded-lg p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors focus:outline-none focus:ring-2 focus:ring-cinema-accent"><XIcon size={18} /></button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        const CustomAlertModal = ({ isOpen, onClose, title, message }) => {
            if (!isOpen) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={title}>
                    <div className="text-center">
                        <div className="mx-auto w-12 h-12 rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center mb-4">
                            <AlertTriangleIcon size={24} />
                        </div>
                        <p className="text-gray-700 dark:text-gray-300">{message}</p>
                        <div className="mt-6">
                            <button onClick={onClose} className="px-6 py-2.5 bg-cinema-accent text-white font-semibold rounded-lg hover:bg-cinema-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cinema-accent transition-colors">OK</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const ConfirmationModal = ({ isOpen, onClose, onConfirm, title, message, confirmText = "Confirm", confirmColor = "red" }) => {
            if (!isOpen) return null;
            const colorClasses = {
                red: 'bg-red-600 hover:bg-red-700 focus:ring-red-500',
                blue: 'bg-blue-600 hover:bg-blue-700 focus:ring-blue-500',
                green: 'bg-green-600 hover:bg-green-700 focus:ring-green-500',
            };
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={title}>
                    <div className="text-center">
                        <div className="mx-auto w-12 h-12 rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center mb-4">
                            <AlertTriangleIcon size={24} />
                        </div>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mt-2 px-4">{message}</p>
                        <div className="mt-6 flex items-center justify-center space-x-3">
                            <button onClick={onClose} className="px-4 py-2.5 bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 font-medium transition-colors">Cancel</button>
                            <button onClick={onConfirm} className={`px-4 py-2.5 text-white rounded-lg font-medium ${colorClasses[confirmColor]} focus:outline-none focus:ring-2 focus:ring-offset-2 transition-colors`}>{confirmText}</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const ScreenTatModal = ({ isOpen, onClose, screen, onSave }) => {
            const [tat, setTat] = React.useState(screen?.audiTat || getGlobalTat());
            React.useEffect(() => { if (screen) setTat(screen.audiTat || getGlobalTat()); }, [screen]);
            if (!isOpen) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Set TAT for ${screen?.name}`}>
                    <div className="space-y-4 text-left">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Turnaround Time (minutes)</label>
                            <input 
                                type="number" 
                                value={tat} 
                                onChange={e => setTat(e.target.value)} 
                                autoFocus
                                className="block w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm"
                            />
                            <p className="mt-2 text-xs text-gray-500 dark:text-gray-400">This TAT will override the global minimum TAT ({getGlobalTat()}m) for this screen.</p>
                        </div>
                        <div className="flex justify-end space-x-3 pt-2">
                            <button onClick={onClose} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                            <button 
                                onClick={() => { onSave(parseInt(tat) || 0); onClose(); }} 
                                className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors"
                            >
                                Save Audi TAT
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const DeleteConfirmationModal = ({ isOpen, onClose, onConfirm, itemType, itemName }) => {
            if (!isOpen) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Delete ${itemType}`}>
                    <div className="text-center">
                        <div className="mx-auto w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mb-4">
                            <AlertTriangleIcon size={24} />
                        </div>
                        <h3 className="text-lg font-medium text-gray-900 dark:text-white">Delete {itemType}</h3>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mt-2 px-4">Are you sure you want to delete "{itemName}"? This will also delete all associated showtimes. This action cannot be undone.</p>
                        <div className="mt-6 flex items-center justify-center space-x-3">
                            <button onClick={onClose} className="px-4 py-2.5 bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 font-medium transition-colors">Cancel</button>
                            <button onClick={onConfirm} className="px-4 py-2.5 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium transition-colors">Delete</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- Toolbar Dropdown Component ---
        const ToolbarDropdown = ({ label, icon, children }) => {
            const [isOpen, setIsOpen] = React.useState(false);
            const ref = React.useRef(null);

            React.useEffect(() => {
                const handleClickOutside = (e) => {
                    if (ref.current && !ref.current.contains(e.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            return (
                <div className="relative" ref={ref}>
                    <button
                        onClick={() => setIsOpen(!isOpen)}
                        className={`flex items-center space-x-1 px-2.5 py-1.5 text-xs font-medium rounded-lg transition-colors ${isOpen ? 'bg-cinema-accent text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700/50'}`}
                    >
                        {icon}
                        <span>{label}</span>
                        <ChevronDownIcon size={12} />
                    </button>
                    {isOpen && (
                        <div className="dropdown-menu absolute top-full left-0 mt-1 w-52 bg-white dark:bg-cinema-surface rounded-lg shadow-xl border border-gray-200 dark:border-gray-700/50 py-1 z-50">
                            {React.Children.map(children, child =>
                                child ? React.cloneElement(child, { onClick: (...args) => { child.props.onClick?.(...args); setIsOpen(false); } }) : null
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const DropdownItem = ({ onClick, icon, label, disabled, className = '' }) => (
            <button
                onClick={onClick}
                disabled={disabled}
                className={`w-full flex items-center space-x-2.5 px-3 py-2 text-xs text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors ${className}`}
            >
                {icon}
                <span>{label}</span>
            </button>
        );

        // --- SaveButton ---
        // Dedicated toolbar button that force-flushes all pending CINEFLOW writes.
        // Uses React state only (no DOM mutation) so it's safe across re-renders caused
        // by the post-save snapshot callbacks.
        const SaveButton = () => {
            const [status, setStatus] = React.useState('idle'); // 'idle' | 'saving' | 'saved' | 'error'

            const handleClick = async () => {
                if (status === 'saving') return;
                try {
                    const raw = localStorage.getItem('showtime_manager_state');
                    if (!raw) { alert('Nothing to save.'); return; }
                    const parsed = JSON.parse(raw);
                    const slice = (parsed && parsed.history) ? parsed.history[parsed.currentIndex || 0] : parsed;
                    if (!window.cineMainState || !window.cineMainState.flushNow) {
                        alert('Saved locally. Cloud not ready â€” log in to sync.');
                        return;
                    }
                    setStatus('saving');
                    try {
                        await window.cineMainState.flushNow(slice);
                        setStatus('saved');
                        setTimeout(() => setStatus('idle'), 1500);
                    } catch (e) {
                        console.error('Save failed', e);
                        setStatus('error');
                        setTimeout(() => setStatus('idle'), 2000);
                        const isPerm = (e && (e.code === 'permission-denied' || /permission/i.test(e.message || '')));
                        alert(isPerm
                            ? "Some cinemas couldn't be saved (no write access). Rest saved successfully."
                            : 'Save failed: ' + (e.code || e.message || 'unknown'));
                    }
                } catch (e) {
                    console.error('Save handler error', e);
                    setStatus('idle');
                    alert('Save failed: ' + (e.message || 'unknown'));
                }
            };

            const label = status === 'saving' ? 'Savingâ€¦'
                        : status === 'saved'  ? 'Saved'
                        : status === 'error'  ? 'Retry'
                        : 'Save';
            const buttonClasses = status === 'error' ? 'bg-red-600 hover:bg-red-700 text-white'
                        : status === 'saved' ? 'bg-green-500 text-white'
                        : 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700';

            return (
                <button
                    onClick={handleClick}
                    disabled={status === 'saving'}
                    className={`ml-1 flex items-center px-2 py-1.5 text-xs font-medium rounded-md transition-all disabled:opacity-50 disabled:cursor-not-allowed ${buttonClasses}`}
                    title="Force-save all changes to CINEFLOW cloud now (bypasses the 1.5s debounce)"
                >
                    {label}
                </button>
            );
        };

        // --- CinemaForm ---
        const CinemaForm = ({ onSave, onCancel, initialData = null }) => {
            const [cinemaName, setCinemaName] = React.useState(initialData?.name || '');
            const [programmerName, setProgrammerName] = React.useState(initialData?.programmerName || '');
            const [screens, setScreens] = React.useState(initialData?.screens || [{ id: `temp_${Date.now()}_${Math.random()}`, name: 'Screen 1', format: '2D', capacity: 100 }]);
            const [dailyStartTime, setDailyStartTime] = React.useState(initialData?.dailyStartTime || (9 * 60));
            const [alertInfo, setAlertInfo] = React.useState({ isOpen: false, message: '' });
            
            const handleAddScreen = () => {
                if (screens.length < 15) {
                    setScreens([...screens, { id: `temp_${Date.now()}_${Math.random()}`, name: `Screen ${screens.length + 1}`, format: '2D', capacity: 100, audiTat: '' }]);
                } else {
                    setAlertInfo({ isOpen: true, message: 'A maximum of 15 screens is allowed.' });
                }
            };
            const handleRemoveScreen = (index) => setScreens(screens.filter((_, i) => i !== index));
            const handleScreenChange = (index, field, value) => {
                const newScreens = [...screens];
                newScreens[index][field] = value;
                setScreens(newScreens);
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!cinemaName || screens.length === 0) {
                    setAlertInfo({ isOpen: true, message: 'Please provide a cinema name and at least one screen.' });
                    return;
                }
                const cinemaData = { name: cinemaName, programmerName, screens: screens.map(s => ({...s, capacity: Number(s.capacity) || 0})), dailyStartTime: Number(dailyStartTime) };
                await onSave(cinemaData);
            };

            return (
                <>
                    <form onSubmit={handleSubmit} className="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Cinema Name</label>
                            <input type="text" value={cinemaName} onChange={e => setCinemaName(e.target.value)} required className="block w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm"/>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Programmer Name</label>
                            <input type="text" value={programmerName} onChange={e => setProgrammerName(e.target.value)} className="block w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm"/>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Default Daily Start Time</label>
                             <select 
                                value={dailyStartTime} 
                                onChange={e => setDailyStartTime(Number(e.target.value))} 
                                required 
                                className="block w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm"
                            >
                                {Array.from({ length: (13 - 5) * 4 + 1 }).map((_, i) => {
                                    const totalMinutes = (5 * 60) + (i * 15);
                                    return <option key={totalMinutes} value={totalMinutes}>{minutesToTime(totalMinutes)}</option>
                                })}
                            </select>
                        </div>
                        <h4 className="text-sm font-semibold border-t pt-4 dark:border-gray-700">Screens</h4>
                        {screens.map((screen, index) => (
                            <div key={screen.id} className="grid grid-cols-1 md:grid-cols-5 gap-3 p-3 border dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50">
                                <input type="text" placeholder="Screen Name" value={screen.name} onChange={e => handleScreenChange(index, 'name', e.target.value)} required className="md:col-span-2 block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                                <input type="text" placeholder="Format" value={screen.format} onChange={e => handleScreenChange(index, 'format', e.target.value)} required className="block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                                <input type="number" placeholder="Cap" value={screen.capacity} onChange={e => handleScreenChange(index, 'capacity', e.target.value)} required className="block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                                <div className="flex items-center gap-2">
                                    <input type="number" placeholder="TAT" value={screen.audiTat || ''} onChange={e => handleScreenChange(index, 'audiTat', e.target.value)} className="block w-full px-2 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm" title="Screen-specific TAT (optional)"/>
                                    <button type="button" onClick={() => handleRemoveScreen(index)} className="text-red-500 hover:text-red-700 p-1"><Trash2Icon size={18}/></button>
                                </div>
                            </div>
                        ))}
                        <button type="button" onClick={handleAddScreen} className="w-full flex items-center justify-center px-4 py-2.5 text-sm font-medium text-cinema-accent border-2 border-dashed border-cinema-accent/40 rounded-lg hover:bg-cinema-accent/5 transition-colors">Add Screen</button>
                        <div className="flex justify-end space-x-3 pt-4"><button type="button" onClick={onCancel} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button><button type="submit" className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors">Save Cinema</button></div>
                    </form>
                    <CustomAlertModal isOpen={alertInfo.isOpen} onClose={() => setAlertInfo({ isOpen: false, message: '' })} title="Input Error" message={alertInfo.message} />
                </>
            );
        };

        // --- UploadCSVForm ---
        const UploadCSVForm = ({ onSave, onCancel, itemType }) => {
            const [file, setFile] = React.useState(null);
            const [error, setError] = React.useState('');
            const [isProcessing, setIsProcessing] = React.useState(false);
            const handleFileChange = (e) => { setError(''); setFile(e.target.files[0]); };
            
            const handleDownloadTemplate = () => {
                const cinemaContent = "cinema_name,programmer_name,screen_name,screen_format,screen_capacity,screen_tat,daily_start_time\n";
                const movieContent = "title,duration,censor_rating,format,tat,is_regional\n";
                downloadCSV(itemType === 'Cinemas' ? cinemaContent : movieContent, `${itemType.toLowerCase()}_template.csv`);
            };

            const handleUpload = () => {
                if (!file) { setError('Please select a CSV file.'); return; }
                if (!window.Papa) { setError('CSV parsing library not ready. Please refresh.'); return; }
                setIsProcessing(true);
                window.Papa.parse(file, {
                    header: true, skipEmptyLines: true,
                    complete: async (results) => {
                        try {
                            const { data, errors } = results;
                            if (errors.length) { 
                                setError(`Error parsing CSV: ${errors[0].message}`); 
                                return; 
                            }
                            
                            if (itemType === 'Cinemas') {
                                const cinemasData = data.reduce((acc, row) => {
                                    const cinemaName = row.cinema_name;
                                    if (!cinemaName) return acc;
                                    if (!acc[cinemaName]) { acc[cinemaName] = { id: crypto.randomUUID(), name: cinemaName, programmerName: row.programmer_name || '', screens: [], dailyStartTime: Number(row.daily_start_time) || (9 * 60) }; }
                                    const screenIndex = acc[cinemaName].screens.length;
                                    const screenName = (row.screen_name || 'screen').replace(/\s/g, '_');
                                    const uniqueId = `csv_${cinemaName.replace(/\s/g, '_')}_${screenName}_${screenIndex}_${Math.random()}`;
                                    acc[cinemaName].screens.push({ 
                                        id: uniqueId, 
                                        name: row.screen_name || 'Unnamed Screen', 
                                        format: row.screen_format || '2D', 
                                        capacity: Number(row.screen_capacity) || 0,
                                        audiTat: row.screen_tat || ''
                                    });
                                    return acc;
                                }, {});
                                await onSave(Object.values(cinemasData));
                            } else {
                                const moviesData = data.map(row => ({
                                    id: crypto.randomUUID(),
                                    title: row.title,
                                    duration: Number(row.duration) || 0,
                                    censorRating: row.censor_rating || '',
                                    format: row.format || '2D',
                                    tat: Number(row.tat) || 15,
                                    isRegional: (row.is_regional || 'false').toLowerCase() === 'true'
                                })).filter(movie => movie.title && movie.duration);
                                await onSave(moviesData);
                            }
                        } catch (e) {
                            setError(`An unexpected error occurred: ${e.message}`);
                        } finally {
                            setIsProcessing(false);
                        }
                    },
                    error: (err) => { setError(`File reading error: ${err.message}`); setIsProcessing(false); }
                });
            };
            return (
                <div className="space-y-4">
                    <div className="p-6 border-2 border-dashed rounded-lg text-center dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50">
                        <p className="mb-3 text-sm text-gray-600 dark:text-gray-400">Select a CSV file or download the template.</p>
                        <input type="file" accept=".csv" onChange={handleFileChange} className="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cinema-accent/10 file:text-cinema-accent hover:file:bg-cinema-accent/20"/>
                        <button type="button" onClick={handleDownloadTemplate} className="mt-3 inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-lg shadow-sm text-white bg-gray-600 hover:bg-gray-700 transition-colors"><DownloadIcon size={14} /><span className="ml-1.5">Download Template</span></button>
                    </div>
                    {error && <p className="text-red-500 text-sm">{error}</p>}
                    <div className="flex justify-end space-x-3 pt-4"><button onClick={onCancel} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button><button onClick={handleUpload} disabled={isProcessing || !file} className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover disabled:opacity-50 transition-colors">{isProcessing ? 'Processing...' : 'Upload & Save'}</button></div>
                </div>
            );
        };

        // --- AddMovieForm ---
        const AddMovieForm = ({ onSave, onCancel, initialData }) => {
            const [title, setTitle] = React.useState(initialData?.title || '');
            const [duration, setDuration] = React.useState(initialData?.duration || '');
            const [censorRating, setCensorRating] = React.useState(initialData?.censorRating || '');
            const [format, setFormat] = React.useState(initialData?.format || '');
            const [language, setLanguage] = React.useState(initialData?.language || '');
            const [synopsis, setSynopsis] = React.useState(initialData?.synopsis || '');
            const [tat, setTat] = React.useState(''); // Legacy
            const [isRegional, setIsRegional] = React.useState(initialData?.isRegional || false);
            const [isGenerating, setIsGenerating] = React.useState(false);
            const [alertInfo, setAlertInfo] = React.useState({ isOpen: false, message: '' });

            const handleGenerateDetails = async () => {
                if (!title) {
                    setAlertInfo({ isOpen: true, message: 'Please enter a movie title first.' });
                    return;
                }
                setIsGenerating(true);
                try {
                    const prompt = `For the movie titled '${title}', provide a brief, one-sentence synopsis, its likely censor rating in India (e.g., U, U/A, A), and its typical format (e.g., 2D, 3D, IMAX). Return this as a JSON object with keys: "synopsis", "censorRating", and "format".`;
                    
                    let chatHistory = [{ role: "user", parts: [{ text: prompt }] }];
                    const payload = { 
                        contents: chatHistory,
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    "synopsis": { "type": "STRING" },
                                    "censorRating": { "type": "STRING" },
                                    "format": { "type": "STRING" }
                                },
                                required: ["synopsis", "censorRating", "format"]
                            }
                        }
                    };
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${AI_CONFIG.apiKey}`;

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`API request failed with status ${response.status}`);
                    }

                    const result = await response.json();
                    
                    if (result.candidates && result.candidates[0].content && result.candidates[0].content.parts &&
                        result.candidates[0].content.parts.length > 0) {
                        const jsonText = result.candidates[0].content.parts[0].text;
                        const parsedJson = JSON.parse(jsonText);
                        setSynopsis(parsedJson.synopsis || '');
                        setCensorRating(parsedJson.censorRating || '');
                        setFormat(parsedJson.format || '');
                    } else {
                        throw new Error("Unexpected response structure from API.");
                    }
                } catch (error) {
                    console.error("Error generating movie details:", error);
                    setAlertInfo({ isOpen: true, message: `Failed to generate details. ${error.message}` });
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!title || !duration) { 
                    setAlertInfo({isOpen: true, message: 'Title and Duration are required.'});
                    return; 
                }
                const movieData = { title, duration: Number(duration), censorRating, format, language, synopsis, isRegional };
                await onSave(movieData);
            };

            return (
                <>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="flex items-center space-x-2">
                            <input type="text" placeholder="Movie Title" value={title} onChange={e => setTitle(e.target.value)} required className="flex-grow px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                            <button type="button" onClick={handleGenerateDetails} disabled={isGenerating || !title} className="px-3 py-2.5 text-sm font-medium text-white bg-purple-600 rounded-lg hover:bg-purple-700 flex items-center disabled:bg-purple-400 transition-colors whitespace-nowrap">
                                <Wand2Icon size={14} /><span className="ml-1.5">{isGenerating ? 'Generating...' : 'Generate Details'}</span>
                            </button>
                        </div>
                        <textarea placeholder="Synopsis" value={synopsis} onChange={e => setSynopsis(e.target.value)} rows="3" className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <input type="number" placeholder="Duration (minutes)" value={duration} onChange={e => setDuration(e.target.value)} required className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <input type="text" placeholder="Format (e.g., 2D, 3D)" value={format} onChange={e => setFormat(e.target.value)} className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <input type="text" placeholder="Language (e.g., Hindi)" value={language} onChange={e => setLanguage(e.target.value)} className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <div className="flex items-center mt-2">
                            <input type="checkbox" id="isRegional" checked={isRegional} onChange={e => setIsRegional(e.target.checked)} className="mr-2 accent-cinema-accent"/>
                            <label htmlFor="isRegional" className="text-sm text-gray-700 dark:text-gray-300">Regional Content (Schedule after 3 PM)</label>
                        </div>
                        <div className="flex justify-end space-x-3 pt-4"><button type="button" onClick={onCancel} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button><button type="submit" className="px-4 py-2.5 text-sm font-medium text-white bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors">Save Movie</button></div>
                    </form>
                    <CustomAlertModal isOpen={alertInfo.isOpen} onClose={() => setAlertInfo({ isOpen: false, message: '' })} title="Input Error" message={alertInfo.message} />
                </>
            );
        };

        // --- SearchableDropdown ---
        const SearchableDropdown = ({ movies, value, onChange, placeholder = "+ Add Show", onOpenChange, isActive }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const [isOpen, setIsOpen] = React.useState(false);
            const [activeIndex, setActiveIndex] = React.useState(0);
            const dropdownRef = React.useRef(null);
            const inputRef = React.useRef(null);
            const listRef = React.useRef(null);

            const selectedMovie = React.useMemo(() => movies.find(m => m.id === value), [movies, value]);

            const filteredMovies = React.useMemo(() =>
                movies.filter(movie =>
