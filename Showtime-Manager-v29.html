                    const prog = PROGRAMMER_CINEMA_MAP.find(p => p.name === selectedProgrammer);
                    if (prog) {
                        setSelectedListId('default');
                        setTo(prog.defaultTo.join('; '));
                        setCc(prog.defaultCC.join('; '));
                        // Automatically select cinemas if it's a small group, or just reset
                        setSelectedCinemaIds([]);
                    }
                }
            }, [selectedProgrammer]);
            
            const handleListSelect = (id) => {
                setSelectedListId(id);
                if (id === 'default') {
                    const prog = PROGRAMMER_CINEMA_MAP.find(p => p.name === selectedProgrammer);
                    if (prog) {
                        setTo(prog.defaultTo.join('; '));
                        setCc(prog.defaultCC.join('; '));
                    }
                } else {
                    const list = savedLists.find(l => l.id === id);
                    if (list) {
                        setTo(list.to);
                        setCc(list.cc);
                    }
                }
            };

            // Effect: Generate Preview
            React.useEffect(() => {
                if (!isOpen || selectedCinemaIds.length === 0) {
                    setBody(''); setSubject(''); setValidationErrors([]);
                    return;
                }

                // Parse selectedDate (YYYY-MM-DD) as a local date, not UTC
                const [yStr, mStr, dStr] = (selectedDate || '').split('-');
                const scheduleDate = (yStr && mStr && dStr)
                    ? new Date(parseInt(yStr, 10), parseInt(mStr, 10) - 1, parseInt(dStr, 10))
                    : new Date();
                const nth = (d) => {
                    if (d > 3 && d < 21) return 'th';
                    switch (d % 10) {
                        case 1: return "st";
                        case 2: return "nd";
                        case 3: return "rd";
                        default: return "th";
                    }
                };
                const formattedDate = `${scheduleDate.getDate()}${nth(scheduleDate.getDate())} ${scheduleDate.toLocaleString('default', { month: 'long' })} ${scheduleDate.getFullYear()}`;
                
                const template = EMAIL_TEMPLATES.find(t => t.id === selectedTemplateId) || EMAIL_TEMPLATES[0];
                const selectedCinemas = allCinemas.filter(c => selectedCinemaIds.includes(c.id));
                const stateName = selectedState || (selectedCinemas.length > 0 ? CINEMA_STATE_MAP[selectedCinemas[0].name] || 'NORTH' : 'NORTH');
                const cinemaName = selectedCinemas.length === 1 ? selectedCinemas[0].name : "Multiple Cinemas";
                const globalTat = getGlobalTat();

                // Validation Logic
                const errors = [];
                selectedCinemas.forEach(cinema => {
                    const cinemaShows = allShows.filter(s => s.cinemaId === cinema.id);
                    if (cinemaShows.length === 0) {
                        errors.push(`${cinema.name}: No shows scheduled.`);
                    }
                    // Simple overlap check
                    cinema.screens.forEach(screen => {
                        const screenShows = cinemaShows.filter(s => s.screenId === screen.id).sort((a,b) => a.startTime - b.startTime);
                        for(let i=1; i<screenShows.length; i++) {
                            const prev = screenShows[i-1];
                            const movie = allMovies.find(m => m.id === prev.movieId);
                            const prevEnd = prev.startTime + (movie?.duration || 0) + (prev.isWA ? 25 : (screen.audiTat || globalTat));
                            if (screenShows[i].startTime < prevEnd) {
                                errors.push(`${cinema.name} - ${screen.name}: Overlap between ${minutesToTime(prev.startTime)} and ${minutesToTime(screenShows[i].startTime)}`);
                            }
                        }
                    });
                });
                setValidationErrors(errors);

                // Build Table HTML
                let tablesHtml = "";
                const movieMap = new Map(allMovies.map(m => [m.id, m]));

                selectedCinemas.forEach(cinema => {
                    const cinemaShows = allShows.filter(s => s.cinemaId === cinema.id);
                    if (cinemaShows.length === 0) return;

                    const showsByScreen = cinema.screens.reduce((acc, screen) => {
                        acc[screen.id] = cinemaShows.filter(show => show.screenId === screen.id).sort((a, b) => a.startTime - b.startTime);
                        return acc;
                    }, {});

                    const maxShows = Math.max(0, ...Object.values(showsByScreen).map(s => s.length));
                    
                    tablesHtml += `<p style="font-family: Arial, sans-serif; font-weight: bold; font-size: 13px; text-transform: uppercase; margin: 18px 0 4px 0; border-bottom: 2px solid #000; padding-bottom: 2px;">${cinema.name}</p>`;
                    tablesHtml += `
                        <table style="border-collapse: collapse; font-family: Arial, sans-serif; font-size: 10px; margin-bottom: 14px;">
                            <thead>
                                <tr style="background-color: #D9D9D9; font-weight: bold;">
                                    <th style="padding: 4px 8px; border: 1px solid #000; text-align: center;">Session</th>
                                    ${cinema.screens.map(s => `<th style="padding: 4px 6px; border: 1px solid #000; text-align: center;" colspan="2">${s.name}</th>`).join('')}
                                </tr>
                                <tr style="background-color: #D9D9D9; font-weight: bold;">
                                    <th style="padding: 4px 8px; border: 1px solid #000;"></th>
                                    ${cinema.screens.map(() => `<th style="padding: 4px 6px; border: 1px solid #000; text-align: center;">Movie</th><th style="padding: 4px 6px; border: 1px solid #000; text-align: center;">Time</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    const ordinal = (n) => { if(n===1) return '1st'; if(n===2) return '2nd'; if(n===3) return '3rd'; return n+'th'; };
                    for (let i = 0; i < maxShows; i++) {
                        tablesHtml += `<tr>`;
                        tablesHtml += `<td style="padding: 4px 8px; border: 1px solid #000; font-weight: bold; text-align: center; background-color: #FFFFFF; white-space: nowrap;">${ordinal(i+1)}</td>`;
                        cinema.screens.forEach(screen => {
                            const show = showsByScreen[screen.id]?.[i];
                            if (show) {
                                const movie = movieMap.get(show.movieId);
                                const waSuffix = show.isWA ? ' (W/A)' : '';
                                const movieText = movie ? getFullMovieName(movie) + waSuffix : 'N/A';
                                tablesHtml += `<td data-show-id="${show.id}" style="padding: 4px 6px; border: 1px solid #000; background-color: #FFFF00; font-weight: bold; cursor: pointer; white-space: nowrap;">${movieText}</td>`;
                                tablesHtml += `<td data-show-id="${show.id}" style="padding: 4px 6px; border: 1px solid #000; background-color: #FFFFFF; font-weight: bold; text-align: center; cursor: pointer; white-space: nowrap;">${minutesToTime(show.startTime)}</td>`;
                            } else {
                                tablesHtml += `<td style="padding: 4px 6px; border: 1px solid #000; background-color: #FFFF00;"></td><td style="padding: 4px 6px; border: 1px solid #000; background-color: #FFFFFF;"></td>`;
                            }
                        });
                        tablesHtml += `</tr>`;
                    }
                    // END row
                    tablesHtml += `<tr><td style="padding: 4px 8px; border: 1px solid #000; background-color: #FFFFFF;"></td>`;
                    cinema.screens.forEach(() => {
                        tablesHtml += `<td style="padding: 4px 6px; border: 1px solid #000; font-weight: bold; background-color: #FFFF00; text-align: center;">END</td><td style="padding: 4px 6px; border: 1px solid #000; background-color: #FFFFFF;"></td>`;
                    });
                    tablesHtml += `</tr></tbody></table>`;
                });

                // Apply dynamic variables
                const vars = {
                    '{STATE}': stateName,
                    '{DATE}': formattedDate,
                    '{TAT}': globalTat,
                    '{CINEMA_NAME}': cinemaName,
                    '{TABLES}': tablesHtml
                };

                let finalSubject = template.subject;
                let finalBody = template.body;
                Object.entries(vars).forEach(([k, v]) => {
                    finalSubject = finalSubject.replace(new RegExp(k, 'g'), v);
                    finalBody = finalBody.replace(new RegExp(k, 'g'), v);
                });

                setSubject(finalSubject);
                setBody(finalBody);
            }, [isOpen, selectedCinemaIds, selectedTemplateId, selectedProgrammer, selectedState, selectedDate, cellColors, allShows, allMovies]);

            const handleSend = async () => {
                if (!to || selectedCinemaIds.length === 0) return;
                setIsSending(true);
                try {
                    // Optional: trigger Excel downloads so user has files ready to attach in Outlook
                    if (includeExcel) {
                        for (const cid of selectedCinemaIds) {
                            const cinema = allCinemas.find(c => c.id === cid);
                            if (!cinema) continue;
                            try {
                                const wb = XLSX.utils.book_new();
                                const movieMap = new Map(allMovies.map(m => [m.id, m]));
                                const sheetData = [['Screen','Session','Movie','Language','Censor','Start','W/A']];
                                cinema.screens.forEach(screen => {
                                    const shows = allShows.filter(s => s.cinemaId === cinema.id && s.screenId === screen.id).sort((a,b) => a.startTime - b.startTime);
                                    shows.forEach((s, idx) => {
                                        const m = movieMap.get(s.movieId);
                                        sheetData.push([screen.name, idx+1, m?.title || 'N/A', m?.language || '', m?.censorRating || '', minutesToTime(s.startTime), s.isWA ? 'W/A' : '']);
                                    });
                                });
                                const ws = XLSX.utils.aoa_to_sheet(sheetData);
                                XLSX.utils.book_append_sheet(wb, ws, 'Schedule');
                                XLSX.writeFile(wb, `${cinema.name}_Schedule.xlsx`);
                            } catch(e) { console.warn('Excel export failed for', cinema.name, e); }
                        }
                    }

                    await sendOutlookEmail({ to, cc, bcc, subject, body });

                    alert("Outlook is opening with To / CC / Subject pre-filled.\n\nThe formatted schedule (with colors) has been copied to your clipboard.\n\nâžœ In the new Outlook mail, click in the message body and press Ctrl+V to paste it." + (includeExcel ? "\n\nExcel files have been downloaded â€” attach them manually if needed." : ""));

                    // Log to history
                    const log = {
                        id: Date.now(),
                        timestamp: new Date().toISOString(),
                        subject,
                        to,
                        cinemas: allCinemas.filter(c => selectedCinemaIds.includes(c.id)).map(c => c.name)
                    };
                    const history = JSON.parse(localStorage.getItem('sm_email_history') || '[]');
                    localStorage.setItem('sm_email_history', JSON.stringify([log, ...history].slice(0, 50)));

                    onClose();
                } catch (err) {
                    alert("Failed to open Outlook draft: " + (err && err.message ? err.message : err));
                } finally {
                    setIsSending(false);
                }
            };


            const programmerStates = React.useMemo(() => {
                if (!selectedProgrammer) return [];
                const prog = PROGRAMMER_CINEMA_MAP.find(p => p.name === selectedProgrammer);
                if (!prog) return [];
                const states = new Set();
                prog.cinemas.forEach(c => { if(CINEMA_STATE_MAP[c]) states.add(CINEMA_STATE_MAP[c]); });
                return Array.from(states).sort();
            }, [selectedProgrammer]);

            const filteredCinemas = React.useMemo(() => {
                if (!selectedProgrammer) return [];
                const prog = PROGRAMMER_CINEMA_MAP.find(p => p.name === selectedProgrammer);
                if (!prog) return [];
                let list = prog.cinemas;
                if (selectedState) {
                    list = list.filter(c => CINEMA_STATE_MAP[c] === selectedState);
                }
                return allCinemas.filter(c => list.includes(c.name));
            }, [selectedProgrammer, selectedState, allCinemas]);

            const [activeTab, setActiveTab] = React.useState('compose'); // 'compose' or 'history'
            const [history, setHistory] = React.useState([]);

            React.useEffect(() => {
                if (isOpen) {
                    setHistory(JSON.parse(localStorage.getItem('sm_email_history') || '[]'));
                    setSavedLists(JSON.parse(localStorage.getItem('sm_distribution_lists') || '[]'));
                } else {
                    // Clear per-session cell colors when modal closes
                    setCellColors({});
                }
            }, [isOpen]);

            // Reset cell colors when cinema selection changes â€” stale showIds shouldn't carry over
            React.useEffect(() => {
                setCellColors({});
            }, [selectedCinemaIds, selectedTemplateId]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-hidden">
                    <div className="bg-white dark:bg-cinema-surface w-full max-w-6xl h-[90vh] rounded-2xl shadow-2xl flex flex-col border border-gray-200 dark:border-gray-700 animate-in fade-in zoom-in duration-300">
                        {/* Header */}
                        <div className="flex items-center justify-between p-4 border-b dark:border-gray-700 bg-white dark:bg-cinema-surface rounded-t-2xl z-20">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg">
                                        <MailIcon size={20} />
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-bold text-gray-900 dark:text-white leading-none">Smart Email Dispatch</h2>
                                        <p className="text-[10px] text-gray-500 dark:text-gray-400 mt-1 uppercase tracking-wider font-semibold">Outlook Draft Composer</p>
                                    </div>
                                </div>
                                
                                <nav className="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">
                                    <button 
                                        onClick={() => setActiveTab('compose')}
                                        className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'compose' ? 'bg-white dark:bg-gray-700 shadow-sm text-blue-600 dark:text-blue-400' : 'text-gray-500 hover:text-gray-700'}`}
                                    >
                                        Compose
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('history')}
                                        className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'history' ? 'bg-white dark:bg-gray-700 shadow-sm text-blue-600 dark:text-blue-400' : 'text-gray-500 hover:text-gray-700'}`}
                                    >
                                        Logs
                                    </button>
                                </nav>
                            </div>
                            <div className="flex items-center gap-2">
                                {activeTab === 'compose' && (
                                    <button
                                        onClick={handleSend}
                                        disabled={isSending || selectedCinemaIds.length === 0 || validationErrors.length > 0 || !to}
                                        className="px-5 py-2 bg-[#003B7B] text-white rounded-lg font-bold text-xs shadow-md hover:shadow-blue-500/30 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2"
                                        title={!to ? "Enter recipients" : validationErrors.length > 0 ? "Fix validation errors first" : selectedCinemaIds.length === 0 ? "Select at least one cinema" : "Send via Outlook"}
                                    >
                                        {isSending ? (
                                            <><div className="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> SENDINGâ€¦</>
                                        ) : (
                                            <><MailIcon size={14} /> DISPATCH</>
                                        )}
                                    </button>
                                )}
                                <button onClick={onClose} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors text-gray-500"><XIcon size={20} /></button>
                            </div>
                        </div>

                        {activeTab === 'compose' ? (
                            <div className="flex-1 flex min-h-0">
                                {/* Left Panel: Configuration */}
                                <div className="w-64 border-r dark:border-gray-700 flex flex-col min-h-0 bg-gray-50 dark:bg-gray-800/20">
                                    <div className="p-4 space-y-4 overflow-y-auto">
                                        {/* Select Programmer */}
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 ml-1">Programmer</label>
                                            <select 
                                                value={selectedProgrammer} 
                                                onChange={(e) => { setSelectedProgrammer(e.target.value); setSelectedState(''); }}
                                                className="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl text-sm py-2 px-3 focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="">Choose Programmer...</option>
                                                {PROGRAMMER_CINEMA_MAP.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
                                            </select>
                                        </div>

                                        {/* Select State */}
                                        {selectedProgrammer && (
                                            <div>
                                                <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 ml-1">Filter by State</label>
                                                <select
                                                    value={selectedState}
                                                    onChange={(e) => setSelectedState(e.target.value)}
                                                    className="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl text-sm py-2 px-3 transition-all"
                                                >
                                                    <option value="">All States</option>
                                                    {programmerStates.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                        )}

                                        {/* Schedule Date */}
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 ml-1">Schedule Date</label>
                                            <div className="flex gap-2">
                                                <input
                                                    type="date"
                                                    value={selectedDate}
                                                    onChange={(e) => setSelectedDate(e.target.value)}
                                                    className="flex-1 bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-xl text-sm py-2 px-3 focus:ring-2 focus:ring-blue-500"
                                                />
                                                <button
                                                    type="button"
                                                    onClick={() => {
                                                        const d = new Date();
                                                        d.setDate(d.getDate() + 1);
                                                        const pad = (n) => String(n).padStart(2, '0');
                                                        setSelectedDate(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
                                                    }}
                                                    title="Set to tomorrow"
                                                    className="px-2 py-1 text-[10px] font-bold text-blue-600 bg-blue-50 dark:bg-blue-900/20 rounded-lg hover:bg-blue-100 transition-colors"
                                                >
                                                    +1
                                                </button>
                                                <button
                                                    type="button"
                                                    onClick={() => {
                                                        const d = new Date();
                                                        const pad = (n) => String(n).padStart(2, '0');
                                                        setSelectedDate(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
                                                    }}
                                                    title="Set to today"
                                                    className="px-2 py-1 text-[10px] font-bold text-gray-600 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 transition-colors"
                                                >
                                                    Today
                                                </button>
                                            </div>
                                        </div>


                                        {/* Select Cinemas */}
                                        {selectedProgrammer && (
                                            <div>
                                                <div className="flex justify-between items-center mb-1.5">
                                                    <label className="block text-[10px] font-bold text-gray-400 uppercase ml-1">Select Cinemas</label>
                                                    <button 
                                                        onClick={() => setSelectedCinemaIds(selectedCinemaIds.length === filteredCinemas.length ? [] : filteredCinemas.map(c => c.id))}
                                                        className="text-[10px] text-blue-500 font-bold hover:underline"
                                                    >
                                                        {selectedCinemaIds.length === filteredCinemas.length ? 'DESELECT ALL' : 'SELECT ALL'}
                                                    </button>
                                                </div>
                                                <div className="bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl max-h-48 overflow-y-auto p-2 border-dashed border-2">
                                                    {filteredCinemas.length === 0 && <p className="text-[10px] text-gray-400 text-center py-4">No cinemas found</p>}
                                                    {filteredCinemas.map(cinema => (
                                                        <label key={cinema.id} className="flex items-center p-2 hover:bg-gray-50 dark:hover:bg-gray-700/50 rounded-lg cursor-pointer transition-colors">
                                                            <input 
                                                                type="checkbox" 
                                                                checked={selectedCinemaIds.includes(cinema.id)}
                                                                onChange={() => setSelectedCinemaIds(prev => prev.includes(cinema.id) ? prev.filter(id => id !== cinema.id) : [...prev, cinema.id])}
                                                                className="rounded text-blue-600 focus:ring-blue-500"
                                                            />
                                                            <div className="ml-3">
                                                                <div className="text-[11px] font-bold text-gray-700 dark:text-gray-200 leading-tight">{cinema.name}</div>
                                                                <div className="text-[9px] text-gray-400">{CINEMA_STATE_MAP[cinema.name] || 'N/A'}</div>
                                                            </div>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Email Template */}
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 ml-1">Choose Template</label>
                                            <div className="grid grid-cols-1 gap-2">
                                                {EMAIL_TEMPLATES.map(t => (
                                                    <button 
                                                        key={t.id}
                                                        onClick={() => setSelectedTemplateId(t.id)}
                                                        className={`text-left p-3 rounded-xl border transition-all ${selectedTemplateId === t.id ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-500 shadow-sm' : 'bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700 hover:border-gray-300'}`}
                                                    >
                                                        <div className={`text-[11px] font-bold ${selectedTemplateId === t.id ? 'text-blue-600 dark:text-blue-400' : 'text-gray-700 dark:text-gray-300'}`}>{t.name}</div>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Options */}
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 ml-1">Export Options</label>
                                            <div className="space-y-2">
                                                <label className="flex items-center text-[11px] text-gray-600 dark:text-gray-400 cursor-pointer">
                                                    <input type="checkbox" checked={includeExcel} onChange={e => setIncludeExcel(e.target.checked)} className="mr-2 rounded" />
                                                    Include Excel Schedule
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Middle Panel: Meta & Content */}
                                <div className="flex-1 flex flex-col min-h-0">
                                    {/* Recipients Section */}
                                    <div className="p-4 border-b dark:border-gray-700 space-y-3 bg-white dark:bg-cinema-surface z-10">
                                        
                                        {/* Distribution List Controls */}
                                        {selectedProgrammer && (
                                            <div className="flex items-end gap-3 mb-2 p-3 bg-blue-50 dark:bg-gray-800/50 rounded-lg border border-blue-100 dark:border-gray-700">
                                                <div className="flex-1">
                                                    <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Distribution List</label>
                                                    <select 
                                                        value={selectedListId}
                                                        onChange={(e) => handleListSelect(e.target.value)}
                                                        className="w-full bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-lg text-xs py-1.5 px-3 focus:ring-1 focus:ring-blue-500"
                                                    >
                                                        <option value="default">Default for {selectedProgrammer}</option>
                                                        {savedLists.filter(l => l.programmer === selectedProgrammer).map(l => (
                                                            <option key={l.id} value={l.id}>{l.name}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div className="flex-1 flex gap-2 items-center h-full">
                                                    {isSavingList ? (
                                                        <>
                                                            <input type="text" value={newListName} onChange={e => setNewListName(e.target.value)} placeholder="Name (e.g. Bihar)" className="flex-1 bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 rounded-lg text-xs py-1.5 px-3 w-full" />
                                                            <button onClick={() => {
                                                                if(!newListName.trim()) { alert('Enter a name'); return; }
                                                                const newList = {
                                                                    id: Date.now().toString(),
                                                                    name: newListName,
                                                                    programmer: selectedProgrammer,
                                                                    to,
                                                                    cc
                                                                };
                                                                const updated = [...savedLists, newList];
                                                                setSavedLists(updated);
                                                                localStorage.setItem('sm_distribution_lists', JSON.stringify(updated));
                                                                setSelectedListId(newList.id);
                                                                setIsSavingList(false);
                                                                setNewListName('');
                                                            }} className="px-3 py-1.5 bg-cinema-accent text-white text-xs font-bold rounded hover:bg-cinema-accent-hover transition-colors">Save</button>
                                                            <button onClick={() => setIsSavingList(false)} className="px-3 py-1.5 bg-gray-200 text-gray-700 text-xs font-bold rounded hover:bg-gray-300 transition-colors">Cancel</button>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => setIsSavingList(true)} className="px-3 py-1.5 border border-blue-200 text-blue-600 text-[10px] font-bold rounded hover:bg-blue-100 flex-1 transition-colors bg-white h-[32px]">
                                                                SAVE TO DIST LIST
                                                            </button>
                                                            {selectedListId !== 'default' && (
                                                                <button title="Delete current list" onClick={() => {
                                                                    if(window.confirm('Delete this list?')) {
                                                                        const updated = savedLists.filter(l => l.id !== selectedListId);
                                                                        setSavedLists(updated);
                                                                        localStorage.setItem('sm_distribution_lists', JSON.stringify(updated));
                                                                        handleListSelect('default');
                                                                    }
                                                                }} className="px-3 py-1.5 bg-red-50 text-red-600 text-[10px] font-bold rounded hover:bg-red-100 transition-colors h-[32px]">
                                                                    DELETE
                                                                </button>
                                                            )}
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex gap-4">
                                            <div className="flex-1">
                                                <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">To Recipients</label>
                                                <input type="text" value={to} onChange={e => setTo(e.target.value)} placeholder="Email addresses separated by semicolons" className="w-full bg-gray-50 dark:bg-gray-800 border-gray-100 dark:border-gray-700 rounded-lg text-xs py-1.5 px-3" />
                                            </div>
                                        </div>
                                        <div className="flex gap-4">
                                            <div className="flex-1">
                                                <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">CC / BCC</label>
                                                <div className="flex gap-2">
                                                    <input type="text" value={cc} onChange={e => setCc(e.target.value)} placeholder="CC..." className="flex-1 bg-gray-50 dark:bg-gray-800 border-gray-100 dark:border-gray-700 rounded-lg text-[10px] py-1 px-3" />
                                                    <input type="text" value={bcc} onChange={e => setBcc(e.target.value)} placeholder="BCC..." className="flex-1 bg-gray-50 dark:bg-gray-800 border-gray-100 dark:border-gray-700 rounded-lg text-[10px] py-1 px-3" />
                                                </div>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Subject Line</label>
                                            <input type="text" value={subject} onChange={e => setSubject(e.target.value)} placeholder="Subject..." className="w-full bg-gray-50 dark:bg-gray-800 border-gray-100 dark:border-gray-700 rounded-lg text-xs font-bold py-1.5 px-3" />
                                        </div>
                                    </div>

                                    {/* Main Body Preview */}
                                    <div className="flex-1 overflow-y-auto p-4 bg-slate-50 dark:bg-gray-900/50">
                                        <div className="bg-white dark:bg-gray-800 shadow-lg rounded-2xl p-6 w-full border dark:border-gray-700 min-h-[500px]">
                                            {selectedCinemaIds.length === 0 ? (
                                                <div className="flex flex-col items-center justify-center h-full text-center opacity-30 mt-20">
                                                    <MailIcon size={64} />
                                                    <p className="mt-4 text-xl font-bold">Preview Draft</p>
                                                    <p className="text-sm">Select programmer and cinemas to generate the draft</p>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="mb-3 flex items-center gap-3 text-[11px] text-gray-600 dark:text-gray-400 px-1">
                                                        <span className="font-bold uppercase tracking-wider text-[9px] text-gray-400">Click cell to toggle:</span>
                                                        <span className="inline-flex items-center gap-1"><span style={{background:'#FFF9C4'}} className="inline-block w-3 h-3 rounded-sm border border-gray-300"></span>Yellow</span>
                                                        <span className="text-gray-300">â†’</span>

        // --- Custom Hook for History and Persistence ---
        const useHistoryWithPersistence = (key, initialState) => {
            const [state, setState] = React.useState(() => {
                try {
                    let storedState = window.localStorage.getItem(key);
                    if (storedState) {
                        try {
                            const parsed = JSON.parse(storedState);
                            // Robust check for corrupt/legacy state tracking
                            if (parsed && typeof parsed === 'object' && Array.isArray(parsed.history)) {
                                return parsed;
                            }
                        } catch (parseError) {
                            console.warn("Invalid JSON in localStorage, resetting state.");
                        }
                    }
                    return { history: [initialState], currentIndex: 0 };
                } catch (error) {
                    console.error(`Error reading localStorage key "${key}":`, error);
                    return { history: [initialState], currentIndex: 0 };
                }
            });

            const { history, currentIndex } = state;

            const saveState = (newState) => {
                try {
                    window.localStorage.setItem(key, JSON.stringify(newState));
                    setState(newState);
                } catch (error) {
                    console.error(`Error setting localStorage key "${key}":`, error);
                }
            };

            const setCurrentState = (newState) => {
                const newHistory = history.slice(0, currentIndex + 1);
                newHistory.push(newState);
                saveState({ history: newHistory, currentIndex: newHistory.length - 1 });
            };

            const undo = () => {
                if (currentIndex > 0) {
                    saveState({ ...state, currentIndex: currentIndex - 1 });
                }
            };

            const redo = () => {
                if (currentIndex < history.length - 1) {
                    saveState({ ...state, currentIndex: currentIndex + 1 });
                }
            };

            const canUndo = currentIndex > 0;
            const canRedo = currentIndex < history.length - 1;

            return [history[currentIndex], setCurrentState, undo, redo, canUndo, canRedo];
        };

        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        // useCloudMainState (Phase D) â€” drop-in replacement for
        // useHistoryWithPersistence('showtime_manager_state', ...) that:
        //   â€¢ hydrates from Firestore via window.cineMainState._primedState (set by App before mount)
        //   â€¢ pushes diffs to per-cinema Firestore docs on every local change
        //   â€¢ merges remote changes from other users into current state
        //   â€¢ keeps undo/redo history local (per-session; not round-tripped to cloud)
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        const useCloudMainState = (initialState) => {
            const KEY = 'showtime_manager_state';

            const [state, setState] = React.useState(() => {
                // Prefer cloud-primed state on FIRST mount after login. On any subsequent
                // remount (e.g. mode-switch between CINEFLOW and Show Allocation tabs),
                // _primedState must be null â€” otherwise we'd re-seed from the stale login
                // snapshot and wipe out everything the user has done since. Consume-and-clear:
                // the App auth handler owns the lifetime of _primedState and sets it again
                // if/when auth changes.
                const primed = window.cineMainState && window.cineMainState._primedState;
                if (primed) {
                    window.cineMainState._primedState = null;   // one-shot consumption
                    const wrapper = { history: [primed], currentIndex: 0 };
                    try { window.localStorage.setItem(KEY, JSON.stringify(wrapper)); } catch {}
                    return wrapper;
                }
                try {
                    const raw = window.localStorage.getItem(KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (parsed && typeof parsed === 'object' && Array.isArray(parsed.history)) return parsed;
                    }
                } catch (e) { console.warn('useCloudMainState: invalid localStorage, resetting.', e); }
                return { history: [initialState], currentIndex: 0 };
            });

            const { history, currentIndex } = state;
            const currentSlice = history[currentIndex];

            // Save & push â€” used for user-driven changes (not remote merges).
            const saveState = (newWrapper) => {
                try { window.localStorage.setItem(KEY, JSON.stringify(newWrapper)); } catch (e) { console.error('useCloudMainState.save', e); }
                setState(newWrapper);
                if (window.cineMainState) {
                    window.cineMainState.pushDiff(newWrapper.history[newWrapper.currentIndex]);
                }
            };

            const setCurrentState = (newSlice) => {
                const newHistory = history.slice(0, currentIndex + 1);
                newHistory.push(newSlice);
                saveState({ history: newHistory, currentIndex: newHistory.length - 1 });
            };

            const undo = () => { if (currentIndex > 0) saveState({ ...state, currentIndex: currentIndex - 1 }); };
            const redo = () => { if (currentIndex < history.length - 1) saveState({ ...state, currentIndex: currentIndex + 1 }); };

            // Subscribe once on mount. Remote changes mutate the CURRENT history slice in place
            // (replacing the snapshot) â€” we don't push remote-driven updates back to cloud, and
            // we don't grow the undo stack with other users' edits.
            React.useEffect(() => {
                if (!window.cineMainState || !window.cineStorage || !window.cineStorage.uid) return;

                const registryCinemas = (currentSlice && Array.isArray(currentSlice.cinemas)) ? currentSlice.cinemas : [];
                const accessibleIds = window.cineMainState._accessibleIds(registryCinemas);

                const onRemoteChange = (change) => {
                    setState(prev => {
                        const prevSlice = prev.history[prev.currentIndex] || { cinemas: [], movies: [], shows: [], plannedAllocations: {} };
                        let nextSlice = prevSlice;

                        if (change.type === 'registry') {
                            // Phase G: registry holds cinemas only; movies come from per-user catalogs.
                            nextSlice = {
                                ...prevSlice,
                                cinemas: Array.isArray(change.value.cinemas) ? change.value.cinemas : []
                            };
                        } else if (change.type === 'shows') {
                            const others = (prevSlice.shows || []).filter(s => s.cinemaId !== change.cinemaId);
                            const incoming = Array.isArray(change.value) ? change.value : [];
                            nextSlice = { ...prevSlice, shows: [...others, ...incoming] };
                        } else if (change.type === 'allocations') {
                            const nextAllocs = { ...(prevSlice.plannedAllocations || {}) };
                            const allocKey = `${change.cinemaId}_${window.cineMainState._activeDate}`;
                            if (change.value && Object.keys(change.value).length) nextAllocs[allocKey] = change.value;
                            else delete nextAllocs[allocKey];
                            nextSlice = { ...prevSlice, plannedAllocations: nextAllocs };
                        } else if (change.type === 'movies') {
                            // Replace this owner's slice of movies; keep everyone else's.
                            const ownerUid = change.ownerUid;
                            const others = (prevSlice.movies || []).filter(m => (m.ownerUid || null) !== ownerUid);
                            const incoming = Array.isArray(change.value) ? change.value : [];
                            const tagged = incoming.map(m => ({ ...m, ownerUid: m.ownerUid || ownerUid }));
                            nextSlice = { ...prevSlice, movies: [...others, ...tagged] };
                        } else {
                            return prev;
                        }

                        // Replace current snapshot in-place (don't grow undo stack with remote edits).
                        const newHistory = [...prev.history];
                        newHistory[prev.currentIndex] = nextSlice;
                        const newWrapper = { history: newHistory, currentIndex: prev.currentIndex };
                        try { window.localStorage.setItem(KEY, JSON.stringify(newWrapper)); } catch {}

                        // Soft notify the UI (same banner as cineSync: user can refresh if they want).
                        window.dispatchEvent(new CustomEvent('cinesync:update', {
                            detail: { key: 'showtime_manager_state:' + change.type + (change.cinemaId ? ':' + change.cinemaId : '') }
                        }));
                        return newWrapper;
                    });
                };

                window.cineMainState.startSubscriptions(accessibleIds, onRemoteChange);
                return () => { window.cineMainState.stopSubscriptions(); };
                // Intentionally run only once per login â€” accessibleIds at login-time is the subscription set.
                // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            const canUndo = currentIndex > 0;
            const canRedo = currentIndex < history.length - 1;
            return [currentSlice, setCurrentState, undo, redo, canUndo, canRedo];
        };

        // --- Status Bar Component ---
        const StatusBar = ({ cinema, shows, canUndo, canRedo }) => {
            const stats = React.useMemo(() => {
                if (!cinema) return null;
                const cinemaShows = shows.filter(s => s.cinemaId === cinema.id);
                const screensWithShows = new Set(cinemaShows.map(s => s.screenId)).size;
                const totalCapacity = cinema.screens.reduce((sum, s) => {
                    const showsOnScreen = cinemaShows.filter(sh => sh.screenId === s.id).length;
                    return sum + (s.capacity * showsOnScreen);
                }, 0);
                return {
                    totalShows: cinemaShows.length,
                    screensWithShows,
                    totalScreens: cinema.screens.length,
                    totalCapacity,
                };
            }, [cinema, shows]);

            if (!stats) return null;

            return (
                <div className="status-bar flex-shrink-0 px-4 py-1.5 bg-white dark:bg-cinema-surface border-t border-gray-200 dark:border-gray-700/50 flex items-center justify-between text-[10px] text-gray-500 dark:text-gray-400">
                    <div className="flex items-center space-x-4">
                        <span><strong className="text-gray-700 dark:text-gray-300">{stats.totalShows}</strong> shows scheduled</span>
                        <span><strong className="text-gray-700 dark:text-gray-300">{stats.screensWithShows}</strong>/{stats.totalScreens} screens active</span>
                        <span>Total capacity: <strong className="text-gray-700 dark:text-gray-300">{stats.totalCapacity.toLocaleString()}</strong> seats</span>
                    </div>
                    <div className="flex items-center space-x-3">
                        <span>{canUndo ? 'Ctrl+Z to undo' : ''}</span>
                        <span>{canRedo ? 'Ctrl+Y to redo' : ''}</span>
                    </div>
                </div>
            );
        };


        // --- MainApp ---
        const MainApp = ({ user, users, onUpdateUsers, onLogout, selectedDate }) => {
            const initialState = { cinemas: [], movies: [], shows: [], plannedAllocations: {}, };
            // Phase D: cloud-backed main state. Registry + per-cinema docs, split to stay
            // under Firestore's 1 MB limit. Undo history stays local.
            const [state, setState, undo, redo, canUndo, canRedo] = useCloudMainState(initialState);
            const { cinemas: allCinemas, movies, shows: globalShows, plannedAllocations } = state;
            const shows = React.useMemo(() => globalShows.filter(s => s.date === selectedDate), [globalShows, selectedDate]);
            const otherDateShows = React.useMemo(() => globalShows.filter(s => s.date !== selectedDate), [globalShows, selectedDate]);
            
            const cinemas = React.useMemo(() => {
                if (!user) return [];
                if (user.role === 'admin') return allCinemas;
                return allCinemas.filter(c => user.allowedCinemas.includes(c.id));
            }, [allCinemas, user]);
            
            const [selectedCinema, setSelectedCinema] = React.useState(null);
            const [scheduleStartTime, setScheduleStartTime] = React.useState(null);
            const [draggedItem, setDraggedItem] = React.useState(null);
            const [isAddCinemaModalOpen, setAddCinemaModalOpen] = React.useState(false);
            const [isEditModalOpen, setEditModalOpen] = React.useState(false);
            const [cinemaToEdit, setCinemaToEdit] = React.useState(null);
            const [isDeleteModalOpen, setDeleteModalOpen] = React.useState(false);
            const [itemToDelete, setItemToDelete] = React.useState(null);
            const [isUploadCinemaModalOpen, setUploadCinemaModalOpen] = React.useState(false);
            const [isAddMovieModalOpen, setAddMovieModalOpen] = React.useState(false);
            const [movieToEdit, setMovieToEdit] = React.useState(null);
            const [isUploadMoviesModalOpen, setUploadMoviesModalOpen] = React.useState(false);
            const [isUploadScheduleModalOpen, setUploadScheduleModalOpen] = React.useState(false);
            const [alertInfo, setAlertInfo] = React.useState({ isOpen: false, title: '', message: '' });
            const [showAllocations, setShowAllocations] = React.useState([]);
            const [isAllocationModalOpen, setAllocationModalOpen] = React.useState(false);
            const [isBulkAllocationModalOpen, setBulkAllocationModalOpen] = React.useState(false);
            const [isScheduling, setIsScheduling] = React.useState(false);
            const [isScheduleListModalOpen, setScheduleListModalOpen] = React.useState(false);
            const [isExporting, setIsExporting] = React.useState(false);
            const [isDownloadingOps, setIsDownloadingOps] = React.useState(false);
            const [isOpsDownloadModalOpen, setIsOpsDownloadModalOpen] = React.useState(false);
            const [exampleImages, setExampleImages] = React.useState([]);
            const [isAlgoScheduling, setIsAlgoScheduling] = React.useState(false);
            const [activeCell, setActiveCell] = React.useState({ screenId: null, sessionIndex: null, column: 'movie' });
            const [clipboard, setClipboard] = React.useState(null);
            const [tooltip, setTooltip] = React.useState({ show: null, position: null });
            const [isDropdownOpen, setIsDropdownOpen] = React.useState(false);
            const [isTimeEditing, setIsTimeEditing] = React.useState(false);
            const [timeEditInitialKey, setTimeEditInitialKey] = React.useState(null);
            const [isClearDataModalOpen, setIsClearDataModalOpen] = React.useState(false);
            const [isClearScheduleModalOpen, setIsClearScheduleModalOpen] = React.useState(false);
            const [isCopyScheduleModalOpen, setIsCopyScheduleModalOpen] = React.useState(false);
            const [isSwapModeActive, setIsSwapModeActive] = React.useState(false);
            const [swapSourceScreenId, setSwapSourceScreenId] = React.useState(null);

            const handleScreenHeaderClick = (screen) => {
                if (isSwapModeActive) {
                    if (!swapSourceScreenId) {
                        setSwapSourceScreenId(screen.id);
                    } else if (swapSourceScreenId === screen.id) {
                        setSwapSourceScreenId(null);
                    } else {
                        handleSwapScreens(swapSourceScreenId, screen.id);
                        setSwapSourceScreenId(null);
                        setIsSwapModeActive(false);
                    }
                }
            };
            const [isEmailDraftModalOpen, setEmailDraftModalOpen] = React.useState(false);
            const [isScreenTatModalOpen, setScreenTatModalOpen] = React.useState(false);
            const [screenForTat, setScreenForTat] = React.useState(null);
            const [screenContextMenu, setScreenContextMenu] = React.useState(null); // { x, y, screen }

            // New State for Bulk Scheduling
            const [isBulkScheduleModalOpen, setIsBulkScheduleModalOpen] = React.useState(false);
            const [bulkScheduleConfig, setBulkScheduleConfig] = React.useState({ engine: 'ALGO', startTime: '12:00' });
            const [isBulkProcessing, setIsBulkProcessing] = React.useState(false);
            const [isShowAllocationModalOpen, setIsShowAllocationModalOpen] = React.useState(false);
            const [isUserManagementModalOpen, setIsUserManagementModalOpen] = React.useState(false);
            const [isSidebarCollapsed, setIsSidebarCollapsed] = React.useState(false);
            const [viewMode, setViewMode] = React.useState('grid'); // 'grid' or 'timeline'
            // Gemini AI status
            const [aiStatus, setAiStatus] = React.useState({ ok: false, model: null, checking: true });
            const [aiProgress, setAiProgress] = React.useState(null); // { elapsed, done }

            // Ref to always have latest state (fixes stale closure in modals)
            const stateRef = React.useRef(state);
            React.useEffect(() => { stateRef.current = state; }, [state]);
            const hasMigratedLegacyDateDataRef = React.useRef(false);

            React.useEffect(() => {
                if (hasMigratedLegacyDateDataRef.current) return;
                const hasLegacyShows = state.shows.some(s => !s.date);
                const legacyAllocEntries = Object.entries(state.plannedAllocations).filter(([key]) => !key.includes('_'));
                if (!hasLegacyShows && legacyAllocEntries.length === 0) {
                    hasMigratedLegacyDateDataRef.current = true;
                    return;
                }

                const migratedShows = state.shows.map(show => show.date ? show : { ...show, date: selectedDate });
                const migratedAllocations = Object.entries(state.plannedAllocations).reduce((acc, [key, value]) => {
                    if (key.includes('_')) {
                        acc[key] = value;
                    } else {
                        const scopedKey = `${key}_${selectedDate}`;
                        acc[scopedKey] = { ...(value || {}), ...(acc[scopedKey] || {}) };
                    }
                    return acc;
                }, {});

                hasMigratedLegacyDateDataRef.current = true;
                setState({
                    ...state,
                    shows: migratedShows,
                    plannedAllocations: migratedAllocations
                });
            }, [state, selectedDate, setState]);

            // Check Gemini API connection on mount
            React.useEffect(() => {
                const checkConnection = async () => {
                    setAiStatus(prev => ({ ...prev, checking: true }));
                    const result = await testAIConnection();
                    setAiStatus({ ...result, checking: false });
                };
                checkConnection();
            }, []);

            const [theme, setTheme] = React.useState(() => {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme) return savedTheme;
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
                return 'dark'; // Default to dark for cinema theme
            });

            React.useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            React.useEffect(() => {
                const currentCinemaStillExists = selectedCinema && cinemas.some(c => c.id === selectedCinema.id);
                
                if (currentCinemaStillExists) {
                    const updatedCinemaData = cinemas.find(c => c.id === selectedCinema.id);
                    if (JSON.stringify(updatedCinemaData) !== JSON.stringify(selectedCinema)) {
                        setSelectedCinema(updatedCinemaData);
                    }
                } else if (cinemas.length > 0) {
                    setSelectedCinema(cinemas[0]);
                } else {
                    setSelectedCinema(null);
                }
            }, [cinemas]);

            React.useEffect(() => {
                if (selectedCinema) {
                    setScheduleStartTime(selectedCinema.dailyStartTime);
                } else {
                    setScheduleStartTime(null);
                }
            }, [selectedCinema]);

            React.useEffect(() => {
                if (!selectedCinema) {
                    setShowAllocations([]);
                    return;
                };
                const currentShows = shows.filter(s => s.cinemaId === selectedCinema.id);
                const actualCounts = movies.reduce((acc, movie) => {
                    acc[movie.id] = currentShows.filter(show => show.movieId === movie.id).length;
                    return acc;
                }, {});
                const allocKey = `${selectedCinema.id}_${selectedDate}`;
                const cinemaAllocs = plannedAllocations[allocKey] || {};
                const combined = movies.map(movie => ({
                    ...movie,
                    title: getFullMovieName(movie),
                    actual: actualCounts[movie.id] || 0,
                    planned: cinemaAllocs[movie.id] || 0,
                })).filter(alloc => alloc.planned > 0 || alloc.actual > 0);
                combined.sort((a, b) => (b.planned + b.actual) - (a.planned + a.actual));
                setShowAllocations(combined);
            }, [shows, movies, plannedAllocations, selectedCinema]);

                const otherShows = showsToProcess.filter(s => s.screenId !== screenId || s.date !== selectedDate);

                const screenTat = getScreenTat(screenId, selectedCinema);
                const getEffectiveTat = (sh) => sh.isWA ? 25 : screenTat;
                
                let currentTime;
                if (startIndex === 0) {
                    currentTime = scheduleStartTime;
                } else if (showsOnScreen[startIndex - 1]) {
                    const prevShow = showsOnScreen[startIndex - 1];
                    currentTime = prevShow.startTime + prevShow.duration + getEffectiveTat(prevShow);
                } else {
                    currentTime = scheduleStartTime;
                }
                
                for (let i = startIndex; i < showsOnScreen.length; i++) {
                    const show = showsOnScreen[i];
                    show.startTime = roundUp(currentTime);
                    show.tat = getEffectiveTat(show);
                    currentTime = show.startTime + show.duration + show.tat;

                return [...otherShows, ...showsOnScreen];

                const effectiveTatValue = newTat ? parseInt(newTat) : getGlobalTat();
                const getEffectiveTatFn = (sh) => sh.isWA ? 25 : effectiveTatValue;

                const cinemaShows = state.shows.filter(sh => sh.cinemaId === selectedCinema.id);
                const otherShows = state.shows.filter(sh => sh.cinemaId !== selectedCinema.id);

                    const showsOnThisScreen = cinemaShows.filter(sh => sh.screenId === screenId && sh.date === selectedDate).sort((a,b) => a.startTime - b.startTime);
                let currentTime = scheduleStartTime;

                const screenTatVal = getScreenTat(screenId, selectedCinema);

            const handleBulkSaveAllocations = async (updates) => {

            const handleAddCinemasCSV = async (data) => {

            const handleAddMoviesCSV = async (data) => {

            const handleUploadSchedule = (newShows) => {

                const newShowsWithDate = newShows.map(s => ({ ...s, date: selectedDate }));

            const handleImageUpload = (e) => {

            const handleSaveWorkspace = () => {

            const handleAutoSchedule = async (targetCinema = null, overrideStartTime = null, runQuietly = false) => {
                const activeCinema = (targetCinema && targetCinema.nativeEvent === undefined) ? targetCinema : selectedCinema;
                const allocKey = activeCinema ? `${activeCinema.id}_${selectedDate}` : '';
                const allocationsForCinema = plannedAllocations[allocKey] || (activeCinema ? plannedAllocations[activeCinema.id] : {}) || {};
                if (!activeCinema || Object.keys(allocationsForCinema).length === 0) {

                    return null;
                }

                // Quick API check

                        return null;

                }

                // Setup abort controller for cancel support

                const abortSignal = aiAbortController.signal;

                // Elapsed time ticker
                let ticker = null;
                if (!runQuietly) {
                    ticker = setInterval(() => {
                        setAiProgress(prev => prev ? { ...prev, elapsed: Math.floor((Date.now() - startedAt) / 1000) } : null);
                    }, 1000);

                const cinema = activeCinema;

                const allocations = allocationsForCinema;
                const moviesMap = new Map(movies.map(m => [m.id, m]));
                const screensMap = new Map(cinema.screens.map(s => [s.id, s]));

                // Build the v2.0 scheduling skill prompt
                const skillPrompt = buildSchedulingSkill(

                    allocations,
                    effectiveStartTime,
                    minutesToTime
                );

                try {
                    console.log('[Gemini AI] Sending scheduling request...');
                    console.log('[Gemini AI] Skill v2.0 prompt length:', skillPrompt.length, 'chars');

                    const rawResponse = await callGeminiAI(skillPrompt, abortSignal);

                    const elapsedSecs = Math.floor((Date.now() - startedAt) / 1000);
                    console.log(`[Gemini AI] Response in ${elapsedSecs}s, length: ${rawResponse.length} chars`);

                    // Parse the JSON
                    let jsonText = rawResponse.trim();
                    if (jsonText.startsWith('```json')) jsonText = jsonText.slice(7);
                    if (jsonText.startsWith('```')) jsonText = jsonText.slice(3);
                    if (jsonText.endsWith('```')) jsonText = jsonText.slice(0, -3);
                    jsonText = jsonText.trim();

                    let generatedShows;
                    try {
                        generatedShows = JSON.parse(jsonText);
                    } catch(parseErr) {
                        try {
                            // Extract just the array portion first (clears Markdown text)
                            const arrayMatch = jsonText.match(/\[\s*\{[\s\S]*\}\s*/);
                            let repaired = arrayMatch ? arrayMatch[0] : jsonText;
                            
                            // Attempt to auto-repair a truncated JSON array by terminating at the last complete object
                            const lastBraceIdx = repaired.lastIndexOf('}');
                            if (lastBraceIdx !== -1) {
                                repaired = repaired.substring(0, lastBraceIdx + 1) + ']';
                                generatedShows = JSON.parse(repaired);
                                console.warn('[Gemini AI] Auto-repaired truncated JSON response');
                            } else {
                                throw new Error('No valid objects found');
                            }
                        } catch(repairErr) {
                            throw new Error(`Could not parse AI response as JSON. First 500 chars: ${jsonText.substring(0, 500)}`);
                        }
                    }

                    if (!Array.isArray(generatedShows)) {
                        throw new Error('AI returned non-array response');
                    }

                    console.log(`[Gemini AI] Parsed ${generatedShows.length} raw shows`);

                    // POST-PROCESSING: Validate and fix using the hybrid layer

                        };
                    }).filter(Boolean);

                    // Report allocation coverage

                    const missedMovies = [];
                    const extraShows = [];
                    for (const movieId in allocations) {

                        if (needed <= 0) continue;
                        const got = placedCounts[movieId] || 0;

                        if (got < needed) missedMovies.push(`${movie?.title}: ${got}/${needed}`);
                        else if (got > needed) extraShows.push(`${movie?.title}: ${got} (+${got - needed} extra)`);

                    let msg = `Gemini AI generated ${newShows.length} shows across ${cinema.screens.length} screens in ${elapsedSecs}s.`;

            const handleApplyBulkSchedule = async () => {

                const startTimeMins = parseInt(bulkScheduleConfig.startTime.split(':')[0]) * 60 + parseInt(bulkScheduleConfig.startTime.split(':')[1]);

                setAlertInfo({
