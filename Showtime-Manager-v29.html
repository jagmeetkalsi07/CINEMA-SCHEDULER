            const handleAlgoSchedule = (targetCinema = null, overrideStartTime = null, runQuietly = false) => {
                const activeCinema = (targetCinema && targetCinema.nativeEvent === undefined) ? targetCinema : selectedCinema;
                const allocKey = activeCinema ? `${activeCinema.id}_${selectedDate}` : '';
                const allocationsForCinema = plannedAllocations[allocKey] || (activeCinema ? plannedAllocations[activeCinema.id] : {}) || {};
                if (!activeCinema || Object.keys(allocationsForCinema).length === 0) {
                    if (!runQuietly) setAlertInfo({ isOpen: true, title: "Cannot Schedule", message: "Please select a cinema and set show allocations before auto-scheduling." });
                    return null;
                }
                if (!runQuietly) setIsAlgoScheduling(true);

                try {
                    const cinema = activeCinema;
                    const effectiveStartTime = overrideStartTime !== null ? overrideStartTime : scheduleStartTime;
                    const rawAllocations = { ...allocationsForCinema };
                    const moviesMap = new Map(movies.map(m => [m.id, m]));

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  CONSTANTS â€” tuned to match human scheduler patterns
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    const LAST_SHOW_START    = 23 * 60 + 40;   // 11:40 PM
                    const REGIONAL_START     = 14 * 60;         // 2:00 PM
                    const REGIONAL_END       = 21 * 60 + 30;    // 9:30 PM
                    const SINGLE_SHOW_START  = 12 * 60;         // 12:00 PM
                    const SINGLE_SHOW_END    = 21 * 60 + 30;    // 9:30 PM
                    const TWO_SHOW_START     = 12 * 60;         // 12:00 PM
                    const THREE_EARLY_END    = 12 * 60;         // 12:00 PM (1 show before noon)
                    const THREE_LATE_START   = 14 * 60;         // 2:00 PM
                    const MIN_SAME_MOVIE_GAP = 30;              // 30 min between same movie starts
                    const ROUND_TO           = 5;               // round to 5 min
                    const STAGGER_STEP       = 5;               // 5-min stagger per audi

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  HELPERS
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    const roundUp = (t) => Math.ceil(t / ROUND_TO) * ROUND_TO;

                    // --- Regional detection by title keywords ---
                    const REGIONAL_KEYWORDS = [
                        'ODIA', 'BENGALI', 'GUJARATI', 'PUNJABI', 'MARATHI',
                        'TAMIL', 'TELUGU', 'KANNADA', 'MALAYALAM', 'BHOJPURI',
                        'ASSAMESE', 'CHHATTISGARHI', 'RAJASTHANI', 'HARYANVI'
                    ];
                    const isRegionalMovie = (movie) => {
                        if (movie.isRegional) return true;
                        const upper = (movie.title || '').toUpperCase();
                        return REGIONAL_KEYWORDS.some(kw => upper.includes(kw));
                    };

                    // --- Format matching: 3Dâ†’3D/IMAX, IMAXâ†’IMAX, 4DXâ†’4DX, ATMOSâ†’ATMOS ---
                    const SPECIAL_FORMATS = ['IMAX', '4DX', 'ATMOS', 'MX4D', 'SCREENX', '3D'];
                    const formatMatches = (movieFormat, screenFormat) => {
                        const mf = (movieFormat || '2D').toUpperCase().trim();
                        const sf = (screenFormat || '2D').toUpperCase().trim();
                        const movieSpecials = SPECIAL_FORMATS.filter(f => mf.includes(f));
                        const screenSpecials = SPECIAL_FORMATS.filter(f => sf.includes(f));
                        // If movie is special format, screen MUST have that format
                        if (movieSpecials.length > 0) {
                            return movieSpecials.some(f => screenSpecials.includes(f));
                        }
                        // 2D movie: prefer non-special screens, but allow any
                        return true;
                    };

                    // Strict check: screen is special-format only
                    const isSpecialScreen = (screen) => {
                        const sf = (screen.format || '2D').toUpperCase().trim();
                        return SPECIAL_FORMATS.some(f => sf.includes(f));
                    };

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 0: FILTER & CLASSIFY
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    const allocations = {};
                    for (const movieId in rawAllocations) {
                        if (rawAllocations[movieId] > 0 && moviesMap.has(movieId)) {
                            allocations[movieId] = rawAllocations[movieId];
                        }
                    }
                    const totalRequired = Object.values(allocations).reduce((s, c) => s + c, 0);
                    if (totalRequired === 0) {
                        setAlertInfo({ isOpen: true, title: "Nothing to Schedule", message: "No show allocations have been set for this cinema." });
                        setIsAlgoScheduling(false);
                        return;
                    }

                    // Build movie allocation list sorted by count desc
                    const movieAllocs = Object.entries(allocations)
                        .map(([id, count]) => ({ id, count, movie: moviesMap.get(id) }))
                        .filter(m => m.movie)
                        .sort((a, b) => b.count - a.count);

                    // Screens sorted by capacity descending
                    const screensByCapacity = [...cinema.screens].sort((a, b) => b.capacity - a.capacity);

                    // Tiers
                    const heavyMovies    = movieAllocs.filter(m => m.count >= 5);
                    const moderateMovies = movieAllocs.filter(m => m.count === 4);
                    const tripleMovies   = movieAllocs.filter(m => m.count === 3);
                    const doubleMovies   = movieAllocs.filter(m => m.count === 2);
                    const singleMovies   = movieAllocs.filter(m => m.count === 1);

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 1: AUDI ASSIGNMENT (Screen â†” Movie mapping)
                    //  Goal: each movie gets a home screen. Same movie stays
                    //  on same audi. Heavy â†’ biggest, light â†’ smallest.
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    const screenAssignments = {};  // screenId â†’ [{ movieId, count }]
                    cinema.screens.forEach(s => { screenAssignments[s.id] = []; });
                    const movieScreenMap = {};     // movieId â†’ screenId (primary)
                    const assignedMovies = new Set();
                    const dedicatedScreens = new Set(); // screens locked to one heavy movie

                    const getCompatible = (movie) => {
                        return screensByCapacity.filter(s => formatMatches(movie.format, s.format));
                    };

                    // --- Heavy movies (5+ shows): biggest compatible audi, dedicated ---
                    for (const ma of heavyMovies) {
                        const compat = getCompatible(ma.movie).filter(s => !dedicatedScreens.has(s.id));
                        if (compat.length > 0) {
                            const screen = compat[0]; // biggest available
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            dedicatedScreens.add(screen.id);
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Moderate movies (4 shows): next biggest ---
                    for (const ma of moderateMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = getCompatible(ma.movie).filter(s => !dedicatedScreens.has(s.id));
                        if (compat.length > 0) {
                            const screen = compat[0];
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            dedicatedScreens.add(screen.id);
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Triple movies (3 shows): mid-size, can share ---
                    for (const ma of tripleMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = getCompatible(ma.movie);
                        // Prefer non-dedicated screen
                        let screen = compat.find(s => !dedicatedScreens.has(s.id));
                        if (!screen) screen = compat[compat.length - 1]; // smallest compatible
                        if (screen) {
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Double movies (2 shows): smaller audis, share ---
                    const smallScreens = [...screensByCapacity].reverse(); // smallest first
                    for (const ma of doubleMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = smallScreens.filter(s => formatMatches(ma.movie.format, s.format));
                        let screen = compat.find(s => !dedicatedScreens.has(s.id));
                        if (!screen) screen = compat[0];
                        if (screen) {
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Single movies (1 show): smallest audis, share ---
                    for (const ma of singleMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = smallScreens.filter(s => formatMatches(ma.movie.format, s.format));
                        let screen = compat.find(s => !dedicatedScreens.has(s.id));
                        if (!screen) screen = compat[0];
                        if (screen) {
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // Fallback: anything still unassigned
                    for (const ma of movieAllocs) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = getCompatible(ma.movie);
                        // Put on least loaded screen
                        const sorted = [...compat].sort((a, b) =>
                            screenAssignments[a.id].reduce((s, x) => s + x.count, 0) -
                            screenAssignments[b.id].reduce((s, x) => s + x.count, 0)
                        );
                        if (sorted.length > 0) {
                            screenAssignments[sorted[0].id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = sorted[0].id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 2: TIME PLACEMENT
                    //  Place shows per-screen sequentially, respecting rules:
                    //  Â· Heavy (5+): start from audi open, back-to-back all day
                    //  Â· Triple (3): 1 before 12 PM, 2 after 2 PM
                    //  Â· Double (2): both after 12 PM
                    //  Â· Single (1): between 12 PM and 9:30 PM
                    //  Â· Regional: 2 PM â€“ 9:30 PM
                    //  Â· First show W/A (tat = 0): for heavy movies â‰¥5 shows
                    //  Â· Stagger audis by 5 min each
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    let newShows = [];
                    const allPlacedTimes = {};  // movieId â†’ [startTimes]
                    movieAllocs.forEach(m => { allPlacedTimes[m.id] = []; });

                    // Stagger offsets
                    const staggerOffsets = {};
                    screensByCapacity.forEach((screen, idx) => {
                        staggerOffsets[screen.id] = idx * STAGGER_STEP;
                    });

                    // Place a single show, return end time
                    // tatOverride used for W/A (Without Ads) first show = 25 min
                    const WA_TAT = 25;
                    const placeShow = (screen, movie, startTime, tatOverride) => {
                        const screenTat = getScreenTat(screen.id, cinema);
                        const tat = tatOverride !== undefined ? tatOverride : screenTat;
                        const isWAShow = (tatOverride !== undefined && tatOverride === WA_TAT);
                        newShows.push({
                            id: crypto.randomUUID(),
                            cinemaId: cinema.id,
                            screenId: screen.id,
                            movieId: movie.id,
                            title: movie.title,
                            duration: movie.duration,
                            format: movie.format,
                            tat: tat,
                            isWA: isWAShow,
                            date: selectedDate,
                            startTime: startTime
                        });
                        if (!allPlacedTimes[movie.id]) allPlacedTimes[movie.id] = [];
                        allPlacedTimes[movie.id].push(startTime);
                        return startTime + movie.duration + tat;
                    };

                    // Find next valid time (respects same-movie gap)
                    const findValidTime = (movieId, candidateTime, maxTime) => {
                        let t = roundUp(candidateTime);
                        let attempts = 0;
                        while (attempts < 500) {
                            if (t > (maxTime || LAST_SHOW_START)) return null;
                            const tooClose = allPlacedTimes[movieId]?.some(pt => Math.abs(t - pt) < MIN_SAME_MOVIE_GAP);
                            if (!tooClose) return t;
                            t = roundUp(t + ROUND_TO);
                            attempts++;
                        }
                        return null;
                    };

                    // --- Place shows per screen ---
                    for (const screen of screensByCapacity) {
                        const assignments = screenAssignments[screen.id];
                        if (assignments.length === 0) continue;

                        const stagger = staggerOffsets[screen.id];
                        const screenStart = roundUp(effectiveStartTime + stagger);

                        // Sort assignments: most shows first
                        assignments.sort((a, b) => b.count - a.count);

                        // Classify what's on this screen
                        const heavyA  = assignments.filter(a => a.count >= 5);
                        const modA    = assignments.filter(a => a.count === 4);
                        const tripleA = assignments.filter(a => a.count === 3);
                        const doubleA = assignments.filter(a => a.count === 2);
                        const singleA = assignments.filter(a => a.count === 1);

                        let currentTime = screenStart;

                        // â”€â”€ HEAVY (5+): back-to-back from audi start â”€â”€
                        for (const assgn of heavyA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            for (let i = 0; i < assgn.count; i++) {
                                let startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                if (startTime === null) break;
                                // First show is W/A (Without Ads): reduced TAT of 25 min
                                const isWA = (i === 0);
                                currentTime = placeShow(screen, movie, startTime, isWA ? WA_TAT : undefined);
                            }
                        }

                        // â”€â”€ MODERATE (4): back-to-back from audi start â”€â”€
                        for (const assgn of modA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            for (let i = 0; i < assgn.count; i++) {
                                let startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                if (startTime === null) break;
                                // W/A if first movie placed on this screen
                                const isWA = (i === 0 && heavyA.length === 0);
                                currentTime = placeShow(screen, movie, startTime, isWA ? WA_TAT : undefined);
                            }
                        }

                        // â”€â”€ TRIPLE (3): 1 before 12 PM, 2 after 2 PM â”€â”€
                        for (const assgn of tripleA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            const regional = isRegionalMovie(movie);

                            if (!regional) {
                                // Early show: before 12 PM
                                let earlyTime = findValidTime(movie.id, currentTime, THREE_EARLY_END);
                                if (earlyTime !== null && earlyTime < THREE_EARLY_END) {
                                    currentTime = placeShow(screen, movie, earlyTime);
                                } else {
                                    // Can't fit before noon â€” just place it
                                    let fallback = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                    if (fallback !== null) currentTime = placeShow(screen, movie, fallback);
                                }
                                // 2 afternoon shows: after 2 PM
                                for (let i = 0; i < 2; i++) {
                                    let startTime = findValidTime(movie.id, Math.max(currentTime, THREE_LATE_START), LAST_SHOW_START);
                                    if (startTime === null) {
                                        startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                    }
                                    if (startTime === null) break;
                                    currentTime = placeShow(screen, movie, startTime);
                                }
                            } else {
                                // Regional triple: all within 2 PM â€“ 9:30 PM
                                for (let i = 0; i < 3; i++) {
                                    let startTime = findValidTime(movie.id, Math.max(currentTime, REGIONAL_START), REGIONAL_END);
                                    if (startTime === null) {
                                        startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                    }
                                    if (startTime === null) break;
                                    currentTime = placeShow(screen, movie, startTime);
                                }
                            }
                        }

                        // â”€â”€ DOUBLE (2): both after 12 PM â”€â”€
                        for (const assgn of doubleA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            const regional = isRegionalMovie(movie);
                            const windowStart = regional ? REGIONAL_START : TWO_SHOW_START;
                            const windowEnd   = regional ? REGIONAL_END   : LAST_SHOW_START;

                            for (let i = 0; i < 2; i++) {
                                let startTime = findValidTime(movie.id, Math.max(currentTime, windowStart), windowEnd);
                                if (startTime === null) {
                                    startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                }
                                if (startTime === null) break;
                                currentTime = placeShow(screen, movie, startTime);
                            }
                        }

                        // â”€â”€ SINGLE (1): 12 PM â€“ 9:30 PM (regional: 2 PM â€“ 9:30 PM) â”€â”€
                        for (const assgn of singleA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            const regional = isRegionalMovie(movie);
                            const windowStart = regional ? REGIONAL_START : SINGLE_SHOW_START;
                            const windowEnd   = regional ? REGIONAL_END   : SINGLE_SHOW_END;

                            let startTime = findValidTime(movie.id, Math.max(currentTime, windowStart), windowEnd);
                            if (startTime === null) {
                                startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                            }
                            if (startTime !== null) {
                                currentTime = placeShow(screen, movie, startTime);
                            }
                        }
                    }

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 2B: FILL MORNING GAPS ON LIGHT-MOVIE SCREENS
                    //  Screens with only single/double movies have dead morning
                    //  time. Fill with highest-allocation movie (movie of week).
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    for (const screen of screensByCapacity) {
                        const screenShows = newShows
                            .filter(s => s.screenId === screen.id)
                            .sort((a, b) => a.startTime - b.startTime);
                        if (screenShows.length === 0) continue;

                        const firstShowTime = screenShows[0].startTime;
                        const stagger = staggerOffsets[screen.id];
                        const screenStart = roundUp(effectiveStartTime + stagger);

                        // If first show starts â‰¥90 min after screen start â†’ dead time
                        if (firstShowTime - screenStart < 90) continue;

                        // Find highest-allocation compatible non-regional movie
                        const candidates = movieAllocs
                            .filter(m => formatMatches(m.movie.format, screen.format))
                            .filter(m => !isRegionalMovie(m.movie));
                        if (candidates.length === 0) continue;

                        const fillMovie = candidates[0].movie;
                        let fillTime = screenStart;
                        const screenSpecificTat = getScreenTat(screen.id, cinema);
                        while (fillTime + fillMovie.duration + screenSpecificTat <= firstShowTime && fillTime <= LAST_SHOW_START) {
                            let validTime = findValidTime(fillMovie.id, fillTime, firstShowTime - fillMovie.duration);
                            if (validTime === null || validTime + fillMovie.duration + screenSpecificTat > firstShowTime) break;
                            placeShow(screen, fillMovie, validTime);
                            fillTime = validTime + fillMovie.duration + screenSpecificTat;
                        }
                    }

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 3: 100% COVERAGE VALIDATION  (PRIORITY #1)
                    //  If any movie has fewer shows placed than allocated,
                    //  force-place the deficit on the best available screen.
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    const placedCounts = {};
                    newShows.forEach(s => { placedCounts[s.movieId] = (placedCounts[s.movieId] || 0) + 1; });

                    for (const ma of movieAllocs) {
                        const required = allocations[ma.id];
                        const placed   = placedCounts[ma.id] || 0;
                        const deficit  = required - placed;
                        if (deficit <= 0) continue;

                        const movie = ma.movie;
                        const compatible = screensByCapacity.filter(s => formatMatches(movie.format, s.format));

                        for (let d = 0; d < deficit; d++) {
                            let bestScreen = null, bestTime = Infinity;

                            for (const screen of compatible) {
                                const sShows = newShows.filter(s => s.screenId === screen.id).sort((a, b) => a.startTime - b.startTime);
                                const lastShow = sShows[sShows.length - 1];
                                const screenSpecificTat = getScreenTat(screen.id, cinema);
                                let candidateTime = lastShow
                                    ? roundUp(lastShow.startTime + lastShow.duration + screenSpecificTat)
                                    : roundUp(effectiveStartTime);

                                // Respect time windows
                                if (required === 1 && candidateTime < SINGLE_SHOW_START) candidateTime = SINGLE_SHOW_START;
                                if (isRegionalMovie(movie) && candidateTime < REGIONAL_START) candidateTime = REGIONAL_START;

                                let validTime = findValidTime(ma.id, candidateTime, LAST_SHOW_START);
                                if (validTime !== null && validTime < bestTime) {
                                    bestTime = validTime;
                                    bestScreen = screen;
                                }
                            }

                            if (bestScreen && bestTime <= LAST_SHOW_START) {
                                placeShow(bestScreen, movie, bestTime);
                                placedCounts[ma.id] = (placedCounts[ma.id] || 0) + 1;
                            }
                        }
                    }

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 4: GREEDY MAXIMIZATION (over & above allocations)
                    //  Fill remaining time on ALL screens with shows of
                    //  ALLOCATED movies ONLY. Prioritize:
                    //    1. Movie already on that audi
                    //    2. Highest-allocation movie (movie of the week)
                    //  This is OVER AND ABOVE â€” maximize total show count.
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    const allocatedMovieIds = new Set(movieAllocs.map(m => m.id));
                    let greedyPasses = 0;
                    const maxGreedyPasses = cinema.screens.length * 20;

                    while (greedyPasses < maxGreedyPasses) {
                        greedyPasses++;
                        let addedAny = false;

                        for (const screen of screensByCapacity) {
                            const sShows = newShows.filter(s => s.screenId === screen.id).sort((a, b) => a.startTime - b.startTime);
                            const lastShow = sShows[sShows.length - 1];
                            const screenSpecificTat = getScreenTat(screen.id, cinema);
                            let nextAvailable = lastShow
                                ? roundUp(lastShow.startTime + lastShow.duration + screenSpecificTat)
                                : roundUp(effectiveStartTime);

                            if (nextAvailable > LAST_SHOW_START) continue;

                            // Only consider ALLOCATED movies that fit this screen's format
                            const moviesOnScreen = new Set(sShows.map(s => s.movieId));
                            const candidates = movieAllocs
                                .filter(m => allocatedMovieIds.has(m.id))
                                .filter(m => formatMatches(m.movie.format, screen.format))
                                .filter(m => {
                                    if (isRegionalMovie(m.movie) && (nextAvailable < REGIONAL_START || nextAvailable > REGIONAL_END)) return false;
                                    const tooClose = allPlacedTimes[m.id]?.some(t => Math.abs(nextAvailable - t) < MIN_SAME_MOVIE_GAP);
                                    return !tooClose;
                                })
                                .sort((a, b) => {
                                    // Strong preference for movie already on this screen
                                    const aOn = moviesOnScreen.has(a.id) ? 100000 : 0;
                                    const bOn = moviesOnScreen.has(b.id) ? 100000 : 0;
                                    // Then by allocation count (movie of the week wins)
                                    return (bOn + b.count * 100) - (aOn + a.count * 100);
                                });

                            if (candidates.length > 0) {
                                const bestMovie = candidates[0].movie;
                                placeShow(screen, bestMovie, nextAvailable);
                                addedAny = true;
                            }
                        }
                        if (!addedAny) break;
                    }

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 5: TRIM & SORT
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    newShows = newShows.filter(s => s.startTime <= LAST_SHOW_START);
                    newShows.sort((a, b) => {
                        if (a.screenId !== b.screenId) return a.screenId.localeCompare(b.screenId);
                        return a.startTime - b.startTime;
                    });

                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    //  PHASE 6: REPORTING
                    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
                    const finalCounts = {};
                    newShows.forEach(s => { finalCounts[s.movieId] = (finalCounts[s.movieId] || 0) + 1; });

                    const missedMovies = [];
                    const extraShows = [];
                    for (const movieId in allocations) {
                        const needed = allocations[movieId];
                        const got = finalCounts[movieId] || 0;
                        const movie = moviesMap.get(movieId);
                        if (got < needed) {
                            missedMovies.push(`${movie?.title || movieId}: ${got}/${needed}`);
                        } else if (got > needed) {
                            extraShows.push(`${movie?.title || movieId}: ${got} (alloc: ${needed}, +${got - needed} extra)`);
                        }
                    }

                    let msg = `Schedule: ${newShows.length} shows across ${cinema.screens.length} audis.`;
                    if (missedMovies.length > 0) {
                        msg += ` âš ï¸ Shortfalls: ${missedMovies.join(', ')}`;
                    } else {
                        msg += ' âœ… All allocations met!';
                    }
                    if (extraShows.length > 0) {
                        msg += ` ðŸ“ˆ Extra: ${extraShows.join(', ')}`;
                    }

                    if (runQuietly) {
                        return newShows;
                    }
                    
                setState({...state, shows: [...state.shows.filter(s => !(s.cinemaId === cinema.id && s.date === selectedDate)), ...newShows]});
                    setAlertInfo({ isOpen: true, title: "Scheduling Complete", message: msg });

                } catch (error) {
                    console.error("Error during algo scheduling:", error);
                    if (!runQuietly) {
                        setAlertInfo({ isOpen: true, title: "Scheduling Error", message: `Algorithm failed: ${error.message}` });
                    }
                } finally {
                    if (!runQuietly) setIsAlgoScheduling(false);
                }
            };

            const handleExportAllSchedules = () => {
                setIsExporting(true);
                try {
                    const movieMap = new Map(movies.map(m => [m.id, m]));
                    const dataByCinemaAndMovie = {};

                    shows.forEach(show => {
                        const cinemaName = cinemas.find(c => c.id === show.cinemaId)?.name || 'Unknown Cinema';
                        const movie = movieMap.get(show.movieId);
                        if (!movie) return;

                        const fullName = getFullMovieName(movie);
                        const key = `${cinemaName}|${fullName}`;
                        if (!dataByCinemaAndMovie[key]) {
                            dataByCinemaAndMovie[key] = {
                                location: cinemaName,
                                movie: fullName,
                                timings: []
                            };
                        }
                        dataByCinemaAndMovie[key].timings.push(show.startTime);
                    });

                    let csvContent = `Location,Movie,Timing,Timing,Timing,Timing,Timing,Timing,Timing,Timing,Timing,Timing,Timing,Timing\n`;
                    
                    Object.values(dataByCinemaAndMovie).forEach(row => {
                        row.timings.sort((a,b) => a - b);
                        const timingsRow = row.timings.map(t => minutesToTime(t)).join(',');
                        csvContent += `"${row.location}","${row.movie}",${timingsRow}\n`;
                    });

                    downloadCSV(csvContent, 'full_schedule_export.csv');

                } catch (error) {
                    console.error("Error exporting data:", error);
                    setAlertInfo({isOpen: true, title: "Export Error", message: "Could not export data."});
                } finally {
                    setIsExporting(false);
                }
            };

            const handleDownloadSelectedOpsSchedules = (selectedCinemaIds) => {
                setIsDownloadingOps(true);
                try {
                    const selectedCinemas = cinemas.filter(c => selectedCinemaIds.includes(c.id));
                    const movieMap = new Map(movies.map(m => [m.id, m]));

                    const ordinalSuffix = (n) => { if(n===1) return 'st'; if(n===2) return 'nd'; if(n===3) return 'rd'; return 'th'; };

                    let xmlContent = `
                        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                        <head>
                            <meta charset="UTF-8">
                            <!--[if gte mso 9]>
                            <xml>
                                <x:ExcelWorkbook>
                                    <x:ExcelWorksheets>
                                        <x:ExcelWorksheet>
                                            <x:Name>Schedule</x:Name>
                                            <x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
                                        </x:ExcelWorksheet>
                                    </x:ExcelWorksheets>
                                </x:ExcelWorkbook>
                            </xml>
                            <![endif]-->
                            <style>
                                body { font-family: Arial, sans-serif; font-size: 10px; }
                                table { border-collapse: collapse; font-size: 10px; }
                                th, td { border: 1px solid black; padding: 3px 6px; text-align: center; white-space: nowrap; }
                                .cinema-title { font-weight: bold; text-transform: uppercase; font-size: 12px; margin-top: 14px; margin-bottom: 3px; border-bottom: 2px solid #000; padding-bottom: 2px; }
                                .header-row { background-color: #D9D9D9; font-weight: bold; }
                                .session-cell { background-color: #FFFFFF; font-weight: bold; }
                                .show-cell { background-color: #FFFF00; font-weight: bold; }
                                .wa-cell { background-color: #92D050; font-weight: bold; }
                                .time-cell { background-color: #FFFFFF; font-weight: bold; }
                                .end-cell { background-color: #FFFF00; font-weight: bold; }
                            </style>
                        </head>
                        <body>
                    `;

                    selectedCinemas.forEach(cinema => {
                        const showsForCinema = shows.filter(s => s.cinemaId === cinema.id);
                        if (showsForCinema.length === 0) return;

                        const showsByScreen = cinema.screens.reduce((acc, screen) => {
                            acc[screen.id] = showsForCinema
                                .filter(show => show.screenId === screen.id)
                                .sort((a, b) => a.startTime - b.startTime);
                            return acc;
                        }, {});

                        const maxShows = Math.max(0, ...Object.values(showsByScreen).map(s => s.length));
                        if (maxShows === 0) return;

                        xmlContent += `<div class="cinema-title">${cinema.name}</div>`;
                        xmlContent += `<table><thead>`;
                        // Row 1: Session + audi names
                        xmlContent += `<tr class="header-row"><th rowspan="2">Session</th>`;
                        cinema.screens.forEach(screen => { xmlContent += `<th colspan="2">${screen.name}</th>`; });
                        xmlContent += `</tr>`;
                        // Row 2: Movie / Time sub-headers
                        xmlContent += `<tr class="header-row">`;
                        cinema.screens.forEach(() => { xmlContent += `<th>Movie</th><th>Time</th>`; });
                        xmlContent += `</tr></thead><tbody>`;

                        for (let i = 0; i < maxShows; i++) {
                            const sess = (i + 1) + ordinalSuffix(i + 1);
                            xmlContent += `<tr><td class="session-cell">${sess}</td>`;
                            cinema.screens.forEach(screen => {
                                const show = showsByScreen[screen.id]?.[i];
                                if (show) {
                                    const movie = movieMap.get(show.movieId);
                                    const waSuffix = show.isWA ? ' (W/A)' : '';
                                    const movieText = movie ? getFullMovieName(movie) + waSuffix : 'N/A';
                                    const timeText = minutesToTime(show.startTime);
                                    xmlContent += `<td class="show-cell">${movieText}</td><td class="time-cell">${timeText}</td>`;
                                } else {
                                    xmlContent += `<td class="show-cell"></td><td class="time-cell"></td>`;

                                }
                            });
                            xmlContent += `</tr>`;
                        }
                        // END row
                        xmlContent += `<tr><td class="session-cell"></td>`;
                        cinema.screens.forEach(() => { xmlContent += `<td class="end-cell">END</td><td class="time-cell"></td>`; });
                        xmlContent += `</tr></tbody></table><br/>`;
                    });

                    xmlContent += `</body></html>`;
                    downloadFile(xmlContent, 'operations_schedule.xls', 'application/vnd.ms-excel');

                } catch (error) {
                    console.error("Error downloading ops schedule:", error);
                    setAlertInfo({isOpen: true, title: "Download Error", message: "Could not generate the operations schedule."});
                } finally {
                    setIsDownloadingOps(false);
                    setIsOpsDownloadModalOpen(false);
                }
            };

            const handleClearAllData = () => {
                window.localStorage.removeItem('showtime_manager_state');
                window.location.reload();
            };
            const handleClearSchedule = () => {
                if (!selectedCinema) return;
                // Use stateRef to avoid stale closure when modal was opened long ago
                const latestState = stateRef.current;
                setState({...latestState, shows: latestState.shows.filter(s => !(s.cinemaId === selectedCinema.id && s.date === selectedDate))});
                setIsClearScheduleModalOpen(false);
            };

            const handleTimeEditStart = (screenId, sessionIndex, initialKey = null) => {
                if (screenId === null) {
                    setIsTimeEditing(false);
                    setTimeEditInitialKey(null);
                } else {
                    setActiveCell({ screenId, sessionIndex, column: 'time' });
                    setTimeEditInitialKey(initialKey);
                    setIsTimeEditing(true);
                }
            };

            // --- Keyboard Shortcuts ---
            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    const activeElement = document.activeElement;
                    const isTyping = activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA');
                    const isModalOpen = isAddCinemaModalOpen || isEditModalOpen || isDeleteModalOpen || isUploadCinemaModalOpen || isAddMovieModalOpen || isUploadMoviesModalOpen || isUploadScheduleModalOpen || isAllocationModalOpen || isBulkAllocationModalOpen || isScheduleListModalOpen || isOpsDownloadModalOpen || isClearDataModalOpen || isClearScheduleModalOpen || isEmailDraftModalOpen || isCopyScheduleModalOpen;

                    if (e.key === 'Escape') {
                        if (isModalOpen) {
                            if (isDeleteModalOpen) setDeleteModalOpen(false);
                            else if (isClearDataModalOpen) setIsClearDataModalOpen(false);
                            else if (isClearScheduleModalOpen) setIsClearScheduleModalOpen(false);
                            else if (isSwapModeActive) { setIsSwapModeActive(false); setSwapSourceScreenId(null); }
                            else if (isOpsDownloadModalOpen) setIsOpsDownloadModalOpen(false);
                            else if (isScheduleListModalOpen) setScheduleListModalOpen(false);
                            else if (isCopyScheduleModalOpen) setIsCopyScheduleModalOpen(false);
                            else if (isBulkAllocationModalOpen) setBulkAllocationModalOpen(false);
                            else if (isAllocationModalOpen) setAllocationModalOpen(false);
                            else if (isUploadScheduleModalOpen) setUploadScheduleModalOpen(false);
                            else if (isUploadMoviesModalOpen) setUploadMoviesModalOpen(false);
                            else if (isUploadCinemaModalOpen) setUploadCinemaModalOpen(false);
                            else if (isAddMovieModalOpen) setAddMovieModalOpen(false);
                            else if (isEditModalOpen) setEditModalOpen(false);
                            else if (isAddCinemaModalOpen) setAddCinemaModalOpen(false);
                            else if (isEmailDraftModalOpen) setEmailDraftModalOpen(false);
                            return;
                        } else if (activeCell.screenId) {
                            setActiveCell({ screenId: null, sessionIndex: null, column: 'movie' });
                            return;
                        }
                    }
                    
                    if ((e.ctrlKey || e.metaKey)) {
                        if (e.key === 'z') { e.preventDefault(); undo(); }
                        if (e.key === 'y') { e.preventDefault(); redo(); }
                    }

                    if (isTyping || isModalOpen || !activeCell.screenId || !selectedCinema || isDropdownOpen || isTimeEditing) {
                        return;
                    }

                    const showsForCinema = shows.filter(s => s.cinemaId === selectedCinema.id);
                    const showsOnActiveScreen = showsForCinema
                        .filter(sh => sh.screenId === activeCell.screenId)
                        .sort((a,b) => a.startTime - b.startTime);
                    const activeShow = showsOnActiveScreen[activeCell.sessionIndex];

                    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'x')) {
                        if (activeShow) {
                            setClipboard({ movieId: activeShow.movieId });
                            if (e.key === 'x') handleDeleteShow(activeShow.id);
                        }
                    } else if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                        if (clipboard) {
                            const movieToPaste = movies.find(m => m.id === clipboard.movieId);
                            if (movieToPaste) handleShowMove({ type: 'new', data: movieToPaste }, activeCell.screenId, activeCell.sessionIndex);
                        }
                    } else if (e.key === 'Delete' || e.key === 'Backspace') {
                        if (activeShow) handleDeleteShow(activeShow.id);
                    } else if (e.key === 'F2' && activeShow) {
                        handleTimeEditStart(activeCell.screenId, activeCell.sessionIndex);
                    } else if (activeCell.column === 'time' && activeShow && /^[0-9]$/.test(e.key)) {
                        handleTimeEditStart(activeCell.screenId, activeCell.sessionIndex, e.key);
                        e.preventDefault();
                    } else {
                        const screenIds = selectedCinema.screens.map(s => s.id);
                        const currentScreenIndex = screenIds.indexOf(activeCell.screenId);
                        let { screenId, sessionIndex, column } = activeCell;
                        column = column || 'movie';
                        
                        const maxShowsOnAnyScreen = Math.max(0, ...Object.values(shows.reduce((acc, show) => {
                            acc[show.screenId] = (acc[show.screenId] || 0) + 1; return acc;
                        }, {})).map(count => count));
                        const maxGridRows = Math.max(10, maxShowsOnAnyScreen + 1);

                        let shouldPreventDefault = true;
                        switch (e.key) {
                            case 'ArrowUp': sessionIndex = Math.max(0, activeCell.sessionIndex - 1); break;
                            case 'ArrowDown': sessionIndex = Math.min(maxGridRows - 1, activeCell.sessionIndex + 1); break;
                            case 'Enter': sessionIndex = Math.min(maxGridRows - 1, activeCell.sessionIndex + 1); break;
                            case 'ArrowLeft':
                                if (column === 'time') {
                                    column = 'movie'; // time → movie (same screen)
                                } else if (currentScreenIndex > 0) {
                                    screenId = screenIds[currentScreenIndex - 1];
                                    column = 'time'; // movie → prev screen's time
                                }
                                break;
                            case 'ArrowRight':
                                if (column === 'movie') {
                                    column = 'time'; // movie → time (same screen)
                                } else if (currentScreenIndex < screenIds.length - 1) {
                                    screenId = screenIds[currentScreenIndex + 1];
                                    column = 'movie'; // time → next screen's movie
                                }
                                break;
                            case 'Tab':
                                if (e.shiftKey) {
                                    // Shift+Tab: go backwards
                                    if (column === 'time') {
                                        column = 'movie';
                                    } else if (currentScreenIndex > 0) {
                                        screenId = screenIds[currentScreenIndex - 1];
                                        column = 'time';
                                    } else {
                                        screenId = screenIds[screenIds.length - 1];
                                        column = 'time';
                                    }
                                } else {
                                    // Tab: go forwards
                                    if (column === 'movie') {
                                        column = 'time';
                                    } else if (currentScreenIndex < screenIds.length - 1) {
                                        screenId = screenIds[currentScreenIndex + 1];
                                        column = 'movie';
                                    } else {
                                        screenId = screenIds[0];
                                        column = 'movie';
                                    }
                                }
                                break;
                            case 'Home': sessionIndex = 0; break;
                            case 'End':
                                 const showsOnCurrentScreen = shows.filter(s => s.screenId === activeCell.screenId);
                                 sessionIndex = showsOnCurrentScreen.length;
                                 break;
                            default: shouldPreventDefault = false;
                        }
                        
                        if (shouldPreventDefault) {
                            e.preventDefault();
                            setActiveCell({ screenId, sessionIndex, column });
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [activeCell, shows, selectedCinema, clipboard, movies, undo, redo, isDropdownOpen, isTimeEditing, isAddCinemaModalOpen, isEditModalOpen, isDeleteModalOpen, isUploadCinemaModalOpen, isAddMovieModalOpen, isUploadMoviesModalOpen, isUploadScheduleModalOpen, isAllocationModalOpen, isBulkAllocationModalOpen, isScheduleListModalOpen, isOpsDownloadModalOpen, isSwapModeActive, isClearDataModalOpen, isClearScheduleModalOpen, isEmailDraftModalOpen, isCopyScheduleModalOpen]);


            return (
                <>
                    <div className="h-screen w-screen flex flex-col bg-cinema-light-base dark:bg-cinema-base text-gray-900 dark:text-gray-100" onDragEnd={() => { setDraggedItem(null); }}>
                        <main className="flex-1 flex flex-col overflow-hidden">
                            {/* === TOOLBAR === */}
                            <div className="px-3 py-1.5 bg-white dark:bg-cinema-surface border-b border-gray-200 dark:border-gray-700/50 flex items-center justify-between gap-2 flex-shrink-0">

                                            <svg className="h-full w-auto" viewBox="0 0 1000 226.4" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

                                                  <path d="m850.398 39.0703c0-3.6133-2.847-6.457-6.57-6.457-3.719 0-6.676 2.8437-6.676 6.457 0 3.6133 2.957 6.457 6.676 6.457 3.723-.1093 6.57-2.957 6.57-6.457zm-11.601 0c0-2.8476 2.074-5.1445 5.031-5.1445 2.848 0 4.926 2.2969 4.926 5.1445 0 2.8477-2.078 5.1445-4.926 5.1445-2.844 0-5.031-2.2968-5.031-5.1445zm4.047-3.3945h-1.531v6.4609c.546.1094 1.421.2188 2.515.2188 1.203 0 1.75-.2188 2.188-.4375.332-.3282.66-.7696.66-1.4219 0-.6602-.551-1.207-1.317-1.5352v-.1093c.657-.2188.989-.6563 1.204-1.5313.222-.9883.332-1.4219.441-1.6445h-1.645c-.214.2226-.328.8789-.546 1.5351-.106.6563-.547.9844-1.313.9844h-.656zm0 3.6133h.656c.875 0 1.531.3281 1.531.9843 0 .5469-.433.9883-1.422.9883-.437 0-.656 0-.875-.1133z" />
                                               </g>
                                            </svg>
                                        </div>
                                        <div className="w-px h-5 bg-gray-300 dark:bg-gray-700 mx-2"></div>
                                        <span className="text-[#003B7B] dark:text-blue-400 font-extrabold uppercase tracking-tight text-lg">CINEFLOW</span>
                                    </div>
                                    
                                    <div className="h-4 w-px bg-gray-200 dark:bg-gray-700 mx-1"></div>

                                    <select 
                                        id="cinema-select" 
                                        value={selectedCinema?.id || ''} 
                                        onChange={(e) => setSelectedCinema(cinemas.find(c => c.id === e.target.value))} 
                                        className="block w-44 pl-2 py-1 text-xs border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-gray-800 focus:ring-cinema-accent focus:border-cinema-accent font-semibold cursor-pointer shadow-sm"
                                    >
                                        {cinemas.length === 0 && <option value="">No cinemas</option>}
                                        {cinemas.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                    </select>
                                    
                                    {selectedCinema && scheduleStartTime !== null && (
                                            <select 
                                                id="start-time-select" 
                                                value={scheduleStartTime || 0} 
                                                onChange={(e) => setScheduleStartTime(parseInt(e.target.value))} 
                                                className="block w-20 pl-1.5 py-1 text-[11px] border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-gray-800 focus:ring-cinema-accent focus:border-cinema-accent font-bold cursor-pointer"
                                            >
                                                {Array.from({ length: 48 }).map((_, i) => {
                                                    const m = i * 30;
                                                    return <option key={m} value={m}>{minutesToTime(m)}</option>;
                                                })}
                                            </select>
                                    )}
                                </div>

                                {/* Right section: dropdown menus + standalone buttons */}
                                <div className="flex items-center space-x-1">
                                    {/* Group 1: Dropdowns */}
                                    <ToolbarDropdown label="Cinema" icon={<FilmIcon size={12} />}>
                                        <DropdownItem onClick={() => setAddCinemaModalOpen(true)} icon={<PlusIcon size={14} />} label="Add Cinema" />
                                        <DropdownItem onClick={() => setUploadCinemaModalOpen(true)} icon={<UploadIcon size={14} />} label="Upload Cinemas" />
                                        <DropdownItem onClick={() => {
                                            if (selectedCinema) {
                                                setCinemaToEdit(selectedCinema);
                                                setEditModalOpen(true);
                                            }
                                        }} icon={<EditIcon size={14} />} label="Edit Cinema" disabled={!selectedCinema} />
                                        <DropdownItem onClick={() => {
                                            if (selectedCinema) {
                                                setItemToDelete(selectedCinema);
                                                setDeleteModalOpen(true);
                                            }
                                        }} icon={<Trash2Icon size={14} />} label="Delete Cinema" disabled={!selectedCinema} className="text-red-500 dark:text-red-400" />
                                    </ToolbarDropdown>

                                    <ToolbarDropdown label="Schedule" icon={<TargetIcon size={12} />}>
                                        <DropdownItem onClick={() => setUploadScheduleModalOpen(true)} icon={<UploadIcon size={14} />} label="Upload Schedule" disabled={!selectedCinema} />
                                        <DropdownItem 
                                            onClick={handleAutoSchedule} 
                                            icon={
                                                <span className="relative">
                                                    <Wand2Icon size={14} />
                                                    <span className={`absolute -top-0.5 -right-0.5 w-1.5 h-1.5 rounded-full ${aiStatus.ok ? 'bg-green-500' : aiStatus.checking ? 'bg-yellow-500 animate-pulse' : 'bg-red-500'}`}></span>
                                                </span>
                                            } 
                                            label={isScheduling ? `Gemini AI... ${aiProgress ? `${aiProgress.elapsed || 0}s` : ''}` : `Gemini AI ${aiStatus.ok ? '' : '(offline)'}`} 
                                            disabled={isScheduling || !selectedCinema} 
                                        />
                                        {isScheduling && (
                                            <DropdownItem onClick={handleCancelAI} icon={<XIcon size={14} />} label="Cancel AI" className="text-orange-500 dark:text-orange-400" />
                                        )}
                                        <DropdownItem onClick={handleAlgoSchedule} icon={<TargetIcon size={14} />} label={isAlgoScheduling ? 'Scheduling...' : 'Algo Schedule'} disabled={isAlgoScheduling || !selectedCinema} />
                                        <div className="h-px bg-gray-200 dark:bg-gray-700 mx-2 my-1"></div>
                                        <DropdownItem onClick={() => setIsBulkScheduleModalOpen(true)} icon={<GlobeIcon size={14} />} label="Bulk Schedule All..." disabled={cinemas.length === 0} />
                                        <DropdownItem onClick={() => setIsClearScheduleModalOpen(true)} icon={<Trash2Icon size={14} />} label="Clear Schedule" disabled={!selectedCinema} className="text-red-500 dark:text-red-400" />
                                    </ToolbarDropdown>

                                    <ToolbarDropdown label="Data" icon={<UploadIcon size={12} />}>
                                        <DropdownItem onClick={() => setUploadMoviesModalOpen(true)} icon={<UploadIcon size={14} />} label="Upload Movies" />
                                        <DropdownItem onClick={() => setBulkAllocationModalOpen(true)} icon={<UploadIcon size={14} />} label="Bulk Allocations" />
                                        <div className="h-px bg-gray-200 dark:bg-gray-700 mx-2 my-1"></div>
                                        <DropdownItem onClick={handleSaveWorkspace} icon={<DownloadIcon size={14} />} label="Save Workspace to File" />
                                        <DropdownItem onClick={() => document.getElementById('load-workspace-btn').click()} icon={<UploadIcon size={14} />} label="Load Workspace from File" />
                                        <div className="h-px bg-gray-200 dark:bg-gray-700 mx-2 my-1"></div>
                                        <DropdownItem onClick={() => setIsClearDataModalOpen(true)} icon={<Trash2Icon size={14} />} label="Clear All Data" className="text-red-500 dark:text-red-400" />
                                    </ToolbarDropdown>
                                    
                                    {/* Sneaky file input for workspace */}
                                    <label className="hidden" id="example-upload-label">
                                        <input type="file" id="load-workspace-btn" accept=".json" onChange={handleLoadWorkspace} className="hidden"/>
                                    </label>

                                    <ToolbarDropdown label="Export" icon={<DownloadIcon size={12} />}>
                                        <DropdownItem onClick={() => setScheduleListModalOpen(true)} icon={<FilmIcon size={14} />} label="View Schedule List" disabled={!selectedCinema} />
                                        <DropdownItem onClick={() => setIsOpsDownloadModalOpen(true)} icon={<DownloadIcon size={14} />} label="Download Ops Schedule" disabled={cinemas.length === 0} />
                                        <DropdownItem onClick={() => setEmailDraftModalOpen(true)} icon={<MailIcon size={14} />} label="Draft Email" disabled={cinemas.length === 0} />
                                        <DropdownItem onClick={handleExportAllSchedules} icon={<DownloadIcon size={14} />} label="Export All (CSV)" disabled={cinemas.length === 0} />
                                    </ToolbarDropdown>

                                    <div className="h-4 w-px bg-gray-200 dark:bg-gray-700 mx-1"></div>

                                    {/* Group 2: Action Buttons */}
                                    <button onClick={undo} disabled={!canUndo} className="p-1.5 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Undo (Ctrl+Z)"><UndoIcon size={14} /></button>
                                    <button onClick={redo} disabled={!canRedo} className="p-1.5 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed transition-colors" title="Redo (Ctrl+Y)"><RedoIcon size={14} /></button>
                                    <SaveButton />

                                    {selectedCinema && (
                                        <button 
                                            onClick={() => {
                                                if (isSwapModeActive) {
                                                    setIsSwapModeActive(false);
                                                    setSwapSourceScreenId(null);
                                                } else {
                                                    setIsSwapModeActive(true);
                                                }
                                            }} 
                                            className={`flex items-center px-2 py-1.5 text-xs font-medium rounded-md transition-all ${isSwapModeActive ? 'bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-400 ring-2 ring-orange-400/50 shadow-sm' : 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'}`}
                                            title="Swap"
                                        >
                                            <RefreshCwIcon size={14} className={isSwapModeActive ? 'animate-spin-slow' : ''} />
                                            <span className="ml-1">Swap</span>
                                        </button>
                                    )}

                                    <button 
                                        onClick={() => setIsCopyScheduleModalOpen(true)}
                                        disabled={cinemas.length < 2}
                                        className="flex items-center px-2 py-1.5 text-xs font-medium rounded-md transition-all bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                        title="Copy Schedule"
                                    >
                                        <CopyIcon size={14} />
                                        <span className="ml-1">Copy</span>
                                    </button>

                                    <div className="h-4 w-px bg-gray-200 dark:bg-gray-700 mx-1"></div>

                                    {/* Group 3: View & Theme */}
                                    <div className="flex items-center bg-gray-100 dark:bg-gray-800 rounded-lg p-0.5">
                                        <button 
                                            onClick={() => setViewMode('grid')} 
                                            className={`p-1 rounded-md transition-colors ${viewMode === 'grid' ? 'bg-white dark:bg-gray-700 shadow-sm text-cinema-accent' : 'text-gray-400 hover:text-gray-600'}`}
                                            title="Grid View"
                                        ><GridIcon size={14} /></button>
                                        <button 
                                            onClick={() => setViewMode('timeline')} 
                                            className={`p-1 rounded-md transition-colors ${viewMode === 'timeline' ? 'bg-white dark:bg-gray-700 shadow-sm text-cinema-accent' : 'text-gray-400 hover:text-gray-600'}`}
                                            title="Timeline View"
                                        ><BarChartIcon size={14} /></button>
                                    </div>

                                    <button 
                                        onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} 
                                        className="p-1.5 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 rounded-lg transition-colors"
                                        title={theme === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'}
                                    >
                                        {theme === 'light' ? <MoonIcon size={14} /> : <SunIcon size={14} />}
                                    </button>

                                    <div className="h-4 w-px bg-gray-200 dark:bg-gray-700 mx-0.5"></div>
                                    
                                    <div className="flex items-center space-x-2 pl-1">
                                        {user && user.role === 'admin' && (
                                            <button 
                                                onClick={() => setIsUserManagementModalOpen(true)}
                                                className="p-1.5 text-gray-500 dark:text-gray-400 hover:text-cinema-accent hover:bg-gray-100 dark:hover:bg-gray-800/50 rounded-lg transition-colors"
                                                title="Manage Users"
                                            >
                                                <UserIcon size={14} />
                                            </button>
                                        )}
                                        <div className="flex items-center space-x-1 justify-center w-6 h-6 rounded-full bg-cinema-accent/20 text-cinema-accent" title={`Logged in as ${user?.username}`}>
                                            <span className="text-[10px] font-bold uppercase">{user ? user.username.substring(0,2) : 'US'}</span>
                                        </div>
                                        <button 
                                            onClick={onLogout}
                                            className="p-1.5 text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors"
                                            title="Logout"
                                        >
                                            <LogOutIcon size={14} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Example Images */}
                            {exampleImages.length > 0 && (
                                <div className="p-1.5 px-3 bg-gray-50 dark:bg-cinema-surface/50 border-b border-gray-200 dark:border-gray-700/50 flex items-center space-x-2">
                                    <span className="text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Examples:</span>
                                    {exampleImages.map((img, index) => (
                                        <div key={index} className="flex items-center space-x-1 bg-white dark:bg-gray-800 p-0.5 rounded-md border border-gray-200 dark:border-gray-700">
                                            <img src={img.data} className="h-6 w-10 object-cover rounded-sm"/>
                                            <span className="text-[10px] text-gray-600 dark:text-gray-300 pr-1">{img.name}</span>
                                        </div>
                                    ))}
                                    <button onClick={() => setExampleImages([])} className="text-red-400 hover:text-red-600 text-[10px] font-semibold transition-colors">Clear</button>
                                </div>
                            )}

                            {/* Allocation Ribbon */}
                            <ShowAllocationRibbon allocations={showAllocations} onEdit={() => setAllocationModalOpen(true)} />

                            {/* Main content */}
                            <div className="flex flex-1 overflow-hidden">
                                <div className={`flex flex-col ${isSidebarCollapsed ? 'flex-1' : 'w-4/5'} transition-all`}>
                                    {viewMode === 'grid' ? (
                                        <ExcelScheduler 
                                            cinema={selectedCinema} 
                                            shows={shows} 
                                            movies={movies}
                                            onShowMove={handleShowMove}
                                            onShowMovieChange={handleShowMovieChange}
                                            onShowTimeChange={handleShowTimeChange}
                                            onDeleteShow={handleDeleteShow}
                                            onToggleWA={handleToggleWA}
                                            setDraggedItem={setDraggedItem}
                                            draggedItem={draggedItem}
                                            onDeselect={() => setActiveCell({ screenId: null, sessionIndex: null, column: 'movie' })}
                                            activeCell={activeCell}
                                            setActiveCell={setActiveCell}
                                            onDropdownOpenChange={setIsDropdownOpen}
                                            isTimeEditing={isTimeEditing}
                                            timeEditInitialKey={timeEditInitialKey}
                                            onTimeEditStart={handleTimeEditStart}
                                            onScreenContextMenu={(e, screen) => setScreenContextMenu({ x: e.clientX, y: e.clientY, screen })}
                                            onTimeHover={(e, show) => {
                                                if (show) setTooltip({ show, position: { x: e.clientX, y: e.clientY } });
                                                else setTooltip({ show: null, position: null });
                                            }}
                                            onScreenHeaderClick={handleScreenHeaderClick}
                                            isSwapModeActive={isSwapModeActive}
                                            swapSourceScreenId={swapSourceScreenId}
                                        />
                                    ) : (
                                        <div className="flex-1 overflow-auto">
                                            <TimelineView 
                                                cinema={selectedCinema} 
                                                shows={shows} 
                                                movies={movies} 
                                                onScreenHeaderClick={handleScreenHeaderClick}
                                                isSwapModeActive={isSwapModeActive}
                                                swapSourceScreenId={swapSourceScreenId}
                                            />
                                            {!selectedCinema && (
                                                <div className="flex-1 flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 p-8 min-h-[400px]">
                                                    <ClapperboardIcon size={64} />
                                                    <p className="mt-4 text-lg font-medium">Create your first cinema to get started</p>
                                                    <p className="mt-1 text-sm">Use the Cinema menu in the toolbar to add or upload cinemas</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                <FilmStock 
                                    movies={movies} 
                                    onAddMovieClick={() => { setMovieToEdit(null); setAddMovieModalOpen(true); }} 
                                    onUploadMoviesClick={() => setUploadMoviesModalOpen(true)} 
                                    onDeleteMovie={handleDeleteMovie}
                                    onEditMovie={(movie) => { setMovieToEdit(movie); setAddMovieModalOpen(true); }}
                                    setDraggedItem={setDraggedItem}
                                    isCollapsed={isSidebarCollapsed}
                                    onToggleCollapse={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
