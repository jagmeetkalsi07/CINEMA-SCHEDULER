<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showtime Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            colors: {
              cinema: {
                base: '#1a1a2e',
                surface: '#16213e',
                accent: '#e2b616',
                'accent-hover': '#c99e10',
                'accent-soft': '#e2b61620',
                gold: '#f0c832',
                light: { base: '#fafafa', surface: '#f1f5f9', border: '#e2e8f0' }
              }
            }
          }
        }
      }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        button, a, .transition-all { transition: all 0.2s ease; }
        /* Excel grid */
        .excel-table td, .excel-table th {
            border: 1px solid #e2e8f0;
            padding: 4px;
            text-align: center;
            font-size: 12px;
            white-space: nowrap;
            position: relative;
            transition: background-color 0.15s ease;
        }
        .dark .excel-table td, .dark .excel-table th { border-color: #2d3a50; }
        .excel-table th { font-weight: 600; }
        .drag-over { background-color: #e2b61620 !important; box-shadow: inset 0 0 0 2px #e2b616; }
        .dark .drag-over { background-color: #e2b61630 !important; }
        .active-cell::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 2px solid #e2b616;
            pointer-events: none;
            border-radius: 2px;
        }
        /* Modal animations */
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-animate { animation: modalSlideUp 0.25s ease-out forwards; }
        /* Sticky header shadow */
        .sticky-shadow { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .dark .sticky-shadow { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        /* Dropdown menu */
        @keyframes dropdownOpen {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-menu { animation: dropdownOpen 0.15s ease-out forwards; }
        /* Alternating rows */
        .excel-table tbody tr:nth-child(even) td { background-color: rgba(0,0,0,0.015); }
        .dark .excel-table tbody tr:nth-child(even) td { background-color: rgba(255,255,255,0.015); }
        /* Status bar */
        .status-bar { font-variant-numeric: tabular-nums; }
        /* Timeline */
        .timeline-bar { border-radius: 4px; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        /* Film palette sidebar transition */
        .sidebar-collapse { transition: width 0.3s ease, opacity 0.3s ease, padding 0.3s ease; }
        /* Focus rings */
        input:focus, select:focus, textarea:focus {
            outline: none;
            ring: 2px;
            border-color: #e2b616 !important;
            box-shadow: 0 0 0 2px #e2b61640;
        }
        /* Allocation progress bar */
        .alloc-progress { height: 4px; border-radius: 2px; transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-cinema-light-base dark:bg-cinema-base text-gray-900 dark:text-gray-100">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="w-8 h-8 border-2 border-cinema-accent border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                <p class="text-sm text-gray-500">Loading Showtime Manager...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // --- Helper Functions ---
        const formatDuration = (minutes) => {
            if (isNaN(minutes) || minutes < 0) return '0h 0m';
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return `${h}h ${m}m`;
        };
        const minutesToTime = (totalMinutes) => {
            if (isNaN(totalMinutes)) return "00:00";
            const h = Math.floor(totalMinutes / 60) % 24;
            const m = Math.round(totalMinutes % 60);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const twelveHour = h % 12 === 0 ? 12 : h % 12;
            return `${String(twelveHour).padStart(2, '0')}:${String(m).padStart(2, '0')} ${ampm}`;
        };
        const timeToMinutes = (timeString) => {
            if (!timeString || typeof timeString !== 'string') return null;
            const formattedString = timeString.toUpperCase().replace(/\s/g, '');
            const match12hr = formattedString.match(/^(\d{1,2}):(\d{2})(AM|PM)$/);
            if (match12hr) {
                let [, hours, minutes, modifier] = match12hr;
                hours = parseInt(hours, 10);
                minutes = parseInt(minutes, 10);
                if (hours < 1 || hours > 12 || minutes < 0 || minutes > 59) return null;
                if (modifier === 'AM' && hours === 12) hours = 0;
                if (modifier === 'PM' && hours < 12) hours += 12;
                return hours * 60 + minutes;
            }
            const match24hr = timeString.match(/^(\d{1,2}):(\d{2})$/);
            if (match24hr) {
                let [, hours, minutes] = match24hr;
                hours = parseInt(hours, 10);
                minutes = parseInt(minutes, 10);
                if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
                return hours * 60 + minutes;
            }
            return null;
        };
        const downloadFile = (content, fileName, contentType) => {
            const blob = new Blob([content], { type: contentType });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };
        const downloadCSV = (content, fileName) => {
             downloadFile(content, fileName, 'text/csv;charset=utf-8;');
        };
        // Generate consistent color from string hash
        const stringToColor = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash) % 360;
            return { hue, pastel: `hsl(${hue}, 65%, 88%)`, dark: `hsl(${hue}, 50%, 25%)`, text: `hsl(${hue}, 70%, 30%)`, darkText: `hsl(${hue}, 60%, 75%)` };
        };

        // --- SVG Icon Components ---
        const FilmIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h18"/><path d="M3 12h18"/><path d="M3 16.5h18"/><path d="M17 3v18"/></svg>;
        const Wand2Icon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7H14"/><path d="M10.2 14.2 3 21m0 0 .7-.7a2.12 2.12 0 0 1 3 3l-.7.7Z"/><path d="M14 10.2 21 3m0 0-.7.7a2.12 2.12 0 0 1-3 3l.7-.7Z"/></svg>;
        const PlusIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>;
        const UploadIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const XIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Trash2Icon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const DownloadIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const EditIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>;
        const AlertTriangleIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
        const RefreshCwIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>;
        const UndoIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
        const RedoIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>;
        const TargetIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const ImageIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const MailIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const SunIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const MoonIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const ChevronDownIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
        const MoreHorizontalIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>;
        const LogOutIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const UserIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const GridIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>;
        const BarChartIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>;
        const PanelLeftIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>;
        const SearchIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const ClapperboardIcon = ({size=48}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 4"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>;

        // --- Modal Component (Improved) ---
        const Modal = ({ children, isOpen, onClose, title }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-center items-center p-4 transition-opacity duration-200" onClick={onClose}>
                    <div className="bg-white dark:bg-cinema-surface rounded-lg shadow-2xl w-full max-w-4xl modal-animate border border-gray-200 dark:border-gray-700/50" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center px-6 py-4 border-b border-gray-200 dark:border-gray-700/50">
                            <h3 className="text-lg font-semibold text-gray-900 dark:text-white">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-white rounded-lg p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors focus:outline-none focus:ring-2 focus:ring-cinema-accent"><XIcon size={18} /></button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        const CustomAlertModal = ({ isOpen, onClose, title, message }) => {
            if (!isOpen) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={title}>
                    <div className="text-center">
                        <div className="mx-auto w-12 h-12 rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center mb-4">
                            <AlertTriangleIcon size={24} />
                        </div>
                        <p className="text-gray-700 dark:text-gray-300">{message}</p>
                        <div className="mt-6">
                            <button onClick={onClose} className="px-6 py-2.5 bg-cinema-accent text-cinema-base font-semibold rounded-lg hover:bg-cinema-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cinema-accent transition-colors">OK</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const ConfirmationModal = ({ isOpen, onClose, onConfirm, title, message, confirmText = "Confirm", confirmColor = "red" }) => {
            if (!isOpen) return null;
            const colorClasses = {
                red: 'bg-red-600 hover:bg-red-700 focus:ring-red-500',
                blue: 'bg-blue-600 hover:bg-blue-700 focus:ring-blue-500',
                green: 'bg-green-600 hover:bg-green-700 focus:ring-green-500',
            };
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={title}>
                    <div className="text-center">
                        <div className="mx-auto w-12 h-12 rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center mb-4">
                            <AlertTriangleIcon size={24} />
                        </div>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mt-2 px-4">{message}</p>
                        <div className="mt-6 flex items-center justify-center space-x-3">
                            <button onClick={onClose} className="px-4 py-2.5 bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 font-medium transition-colors">Cancel</button>
                            <button onClick={onConfirm} className={`px-4 py-2.5 text-white rounded-lg font-medium ${colorClasses[confirmColor]} focus:outline-none focus:ring-2 focus:ring-offset-2 transition-colors`}>{confirmText}</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const DeleteConfirmationModal = ({ isOpen, onClose, onConfirm, itemType, itemName }) => {
            if (!isOpen) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Delete ${itemType}`}>
                    <div className="text-center">
                        <div className="mx-auto w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mb-4">
                            <AlertTriangleIcon size={24} />
                        </div>
                        <h3 className="text-lg font-medium text-gray-900 dark:text-white">Delete {itemType}</h3>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mt-2 px-4">Are you sure you want to delete "{itemName}"? This will also delete all associated showtimes. This action cannot be undone.</p>
                        <div className="mt-6 flex items-center justify-center space-x-3">
                            <button onClick={onClose} className="px-4 py-2.5 bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 font-medium transition-colors">Cancel</button>
                            <button onClick={onConfirm} className="px-4 py-2.5 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium transition-colors">Delete</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- Toolbar Dropdown Component ---
        const ToolbarDropdown = ({ label, icon, children }) => {
            const [isOpen, setIsOpen] = React.useState(false);
            const ref = React.useRef(null);

            React.useEffect(() => {
                const handleClickOutside = (e) => {
                    if (ref.current && !ref.current.contains(e.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            return (
                <div className="relative" ref={ref}>
                    <button
                        onClick={() => setIsOpen(!isOpen)}
                        className={`flex items-center space-x-1 px-2.5 py-1.5 text-xs font-medium rounded-lg transition-colors ${isOpen ? 'bg-cinema-accent text-cinema-base' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700/50'}`}
                    >
                        {icon}
                        <span>{label}</span>
                        <ChevronDownIcon size={12} />
                    </button>
                    {isOpen && (
                        <div className="dropdown-menu absolute top-full left-0 mt-1 w-52 bg-white dark:bg-cinema-surface rounded-lg shadow-xl border border-gray-200 dark:border-gray-700/50 py-1 z-50">
                            {React.Children.map(children, child =>
                                child ? React.cloneElement(child, { onClick: (...args) => { child.props.onClick?.(...args); setIsOpen(false); } }) : null
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const DropdownItem = ({ onClick, icon, label, disabled, className = '' }) => (
            <button
                onClick={onClick}
                disabled={disabled}
                className={`w-full flex items-center space-x-2.5 px-3 py-2 text-xs text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors ${className}`}
            >
                {icon}
                <span>{label}</span>
            </button>
        );

        // --- CinemaForm ---
        const CinemaForm = ({ onSave, onCancel, initialData = null }) => {
            const [cinemaName, setCinemaName] = React.useState(initialData?.name || '');
            const [programmerName, setProgrammerName] = React.useState(initialData?.programmerName || '');
            const [screens, setScreens] = React.useState(initialData?.screens || [{ id: `temp_${Date.now()}_${Math.random()}`, name: 'Screen 1', format: '2D', capacity: 100 }]);
            const [dailyStartTime, setDailyStartTime] = React.useState(initialData?.dailyStartTime || (9 * 60));
            const [alertInfo, setAlertInfo] = React.useState({ isOpen: false, message: '' });
            
            const handleAddScreen = () => {
                if (screens.length < 15) {
                    setScreens([...screens, { id: `temp_${Date.now()}_${Math.random()}`, name: `Screen ${screens.length + 1}`, format: '2D', capacity: 100 }]);
                } else {
                    setAlertInfo({ isOpen: true, message: 'A maximum of 15 screens is allowed.' });
                }
            };
            const handleRemoveScreen = (index) => setScreens(screens.filter((_, i) => i !== index));
            const handleScreenChange = (index, field, value) => {
                const newScreens = [...screens];
                newScreens[index][field] = value;
                setScreens(newScreens);
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!cinemaName || screens.length === 0) {
                    setAlertInfo({ isOpen: true, message: 'Please provide a cinema name and at least one screen.' });
                    return;
                }
                const cinemaData = { name: cinemaName, programmerName, screens: screens.map(s => ({...s, capacity: Number(s.capacity) || 0})), dailyStartTime: Number(dailyStartTime) };
                await onSave(cinemaData);
            };

            return (
                <>
                    <form onSubmit={handleSubmit} className="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Cinema Name</label>
                            <input type="text" value={cinemaName} onChange={e => setCinemaName(e.target.value)} required className="block w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm"/>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Programmer Name</label>
                            <input type="text" value={programmerName} onChange={e => setProgrammerName(e.target.value)} className="block w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm"/>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Default Daily Start Time</label>
                             <select 
                                value={dailyStartTime} 
                                onChange={e => setDailyStartTime(Number(e.target.value))} 
                                required 
                                className="block w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm"
                            >
                                {Array.from({ length: (13 - 5) * 4 + 1 }).map((_, i) => {
                                    const totalMinutes = (5 * 60) + (i * 15);
                                    return <option key={totalMinutes} value={totalMinutes}>{minutesToTime(totalMinutes)}</option>
                                })}
                            </select>
                        </div>
                        <h4 className="text-sm font-semibold border-t pt-4 dark:border-gray-700">Screens</h4>
                        {screens.map((screen, index) => (
                            <div key={screen.id} className="grid grid-cols-1 md:grid-cols-4 gap-3 p-3 border dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50">
                                <input type="text" placeholder="Screen Name" value={screen.name} onChange={e => handleScreenChange(index, 'name', e.target.value)} required className="md:col-span-2 block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                                <input type="text" placeholder="Format (e.g., IMAX)" value={screen.format} onChange={e => handleScreenChange(index, 'format', e.target.value)} required className="block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                                <div className="flex items-center gap-2"><input type="number" placeholder="Capacity" value={screen.capacity} onChange={e => handleScreenChange(index, 'capacity', e.target.value)} required className="block w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/><button type="button" onClick={() => handleRemoveScreen(index)} className="text-red-500 hover:text-red-700 p-1"><Trash2Icon size={18}/></button></div>
                            </div>
                        ))}
                        <button type="button" onClick={handleAddScreen} className="w-full flex items-center justify-center px-4 py-2.5 text-sm font-medium text-cinema-accent border-2 border-dashed border-cinema-accent/40 rounded-lg hover:bg-cinema-accent/5 transition-colors">Add Screen</button>
                        <div className="flex justify-end space-x-3 pt-4"><button type="button" onClick={onCancel} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button><button type="submit" className="px-4 py-2.5 text-sm font-medium text-cinema-base bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors">Save Cinema</button></div>
                    </form>
                    <CustomAlertModal isOpen={alertInfo.isOpen} onClose={() => setAlertInfo({ isOpen: false, message: '' })} title="Input Error" message={alertInfo.message} />
                </>
            );
        };

        // --- UploadCSVForm ---
        const UploadCSVForm = ({ onSave, onCancel, itemType }) => {
            const [file, setFile] = React.useState(null);
            const [error, setError] = React.useState('');
            const [isProcessing, setIsProcessing] = React.useState(false);
            const handleFileChange = (e) => { setError(''); setFile(e.target.files[0]); };
            
            const handleDownloadTemplate = () => {
                const cinemaContent = "cinema_name,programmer_name,screen_name,screen_format,screen_capacity,daily_start_time\n";
                const movieContent = "title,duration,censor_rating,format,tat,is_regional\n";
                downloadCSV(itemType === 'Cinemas' ? cinemaContent : movieContent, `${itemType.toLowerCase()}_template.csv`);
            };

            const handleUpload = () => {
                if (!file) { setError('Please select a CSV file.'); return; }
                if (!window.Papa) { setError('CSV parsing library not ready. Please refresh.'); return; }
                setIsProcessing(true);
                window.Papa.parse(file, {
                    header: true, skipEmptyLines: true,
                    complete: async (results) => {
                        try {
                            const { data, errors } = results;
                            if (errors.length) { 
                                setError(`Error parsing CSV: ${errors[0].message}`); 
                                return; 
                            }
                            
                            if (itemType === 'Cinemas') {
                                const cinemasData = data.reduce((acc, row) => {
                                    const cinemaName = row.cinema_name;
                                    if (!cinemaName) return acc;
                                    if (!acc[cinemaName]) { acc[cinemaName] = { id: crypto.randomUUID(), name: cinemaName, programmerName: row.programmer_name || '', screens: [], dailyStartTime: Number(row.daily_start_time) || (9 * 60) }; }
                                    const screenIndex = acc[cinemaName].screens.length;
                                    const screenName = (row.screen_name || 'screen').replace(/\s/g, '_');
                                    const uniqueId = `csv_${cinemaName.replace(/\s/g, '_')}_${screenName}_${screenIndex}_${Math.random()}`;
                                    acc[cinemaName].screens.push({ id: uniqueId, name: row.screen_name || 'Unnamed Screen', format: row.screen_format || '2D', capacity: Number(row.screen_capacity) || 0 });
                                    return acc;
                                }, {});
                                await onSave(Object.values(cinemasData));
                            } else {
                                const moviesData = data.map(row => ({
                                    id: crypto.randomUUID(),
                                    title: row.title,
                                    duration: Number(row.duration) || 0,
                                    censorRating: row.censor_rating || '',
                                    format: row.format || '2D',
                                    tat: Number(row.tat) || 15,
                                    isRegional: (row.is_regional || 'false').toLowerCase() === 'true'
                                })).filter(movie => movie.title && movie.duration);
                                await onSave(moviesData);
                            }
                        } catch (e) {
                            setError(`An unexpected error occurred: ${e.message}`);
                        } finally {
                            setIsProcessing(false);
                        }
                    },
                    error: (err) => { setError(`File reading error: ${err.message}`); setIsProcessing(false); }
                });
            };
            return (
                <div className="space-y-4">
                    <div className="p-6 border-2 border-dashed rounded-lg text-center dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50">
                        <p className="mb-3 text-sm text-gray-600 dark:text-gray-400">Select a CSV file or download the template.</p>
                        <input type="file" accept=".csv" onChange={handleFileChange} className="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cinema-accent/10 file:text-cinema-accent hover:file:bg-cinema-accent/20"/>
                        <button type="button" onClick={handleDownloadTemplate} className="mt-3 inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-lg shadow-sm text-white bg-gray-600 hover:bg-gray-700 transition-colors"><DownloadIcon size={14} /><span className="ml-1.5">Download Template</span></button>
                    </div>
                    {error && <p className="text-red-500 text-sm">{error}</p>}
                    <div className="flex justify-end space-x-3 pt-4"><button onClick={onCancel} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button><button onClick={handleUpload} disabled={isProcessing || !file} className="px-4 py-2.5 text-sm font-medium text-cinema-base bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover disabled:opacity-50 transition-colors">{isProcessing ? 'Processing...' : 'Upload & Save'}</button></div>
                </div>
            );
        };

        // --- AddMovieForm ---
        const AddMovieForm = ({ onSave, onCancel }) => {
            const [title, setTitle] = React.useState('');
            const [duration, setDuration] = React.useState('');
            const [censorRating, setCensorRating] = React.useState('');
            const [format, setFormat] = React.useState('');
            const [synopsis, setSynopsis] = React.useState('');
            const [tat, setTat] = React.useState(15);
            const [isRegional, setIsRegional] = React.useState(false);
            const [isGenerating, setIsGenerating] = React.useState(false);
            const [alertInfo, setAlertInfo] = React.useState({ isOpen: false, message: '' });

            const handleGenerateDetails = async () => {
                if (!title) {
                    setAlertInfo({ isOpen: true, message: 'Please enter a movie title first.' });
                    return;
                }
                setIsGenerating(true);
                try {
                    const prompt = `For the movie titled '${title}', provide a brief, one-sentence synopsis, its likely censor rating in India (e.g., U, U/A, A), and its typical format (e.g., 2D, 3D, IMAX). Return this as a JSON object with keys: "synopsis", "censorRating", and "format".`;
                    
                    let chatHistory = [{ role: "user", parts: [{ text: prompt }] }];
                    const payload = { 
                        contents: chatHistory,
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    "synopsis": { "type": "STRING" },
                                    "censorRating": { "type": "STRING" },
                                    "format": { "type": "STRING" }
                                },
                                required: ["synopsis", "censorRating", "format"]
                            }
                        }
                    };
                    const apiKey = ""; 
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`API request failed with status ${response.status}`);
                    }

                    const result = await response.json();
                    
                    if (result.candidates && result.candidates[0].content && result.candidates[0].content.parts &&
                        result.candidates[0].content.parts.length > 0) {
                        const jsonText = result.candidates[0].content.parts[0].text;
                        const parsedJson = JSON.parse(jsonText);
                        setSynopsis(parsedJson.synopsis || '');
                        setCensorRating(parsedJson.censorRating || '');
                        setFormat(parsedJson.format || '');
                    } else {
                        throw new Error("Unexpected response structure from API.");
                    }
                } catch (error) {
                    console.error("Error generating movie details:", error);
                    setAlertInfo({ isOpen: true, message: `Failed to generate details. ${error.message}` });
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!title || !duration) { 
                    setAlertInfo({isOpen: true, message: 'Title and Duration are required.'});
                    return; 
                }
                const movieData = { title, duration: Number(duration), censorRating, format, synopsis, tat: Number(tat), isRegional };
                await onSave(movieData);
            };

            return (
                <>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="flex items-center space-x-2">
                            <input type="text" placeholder="Movie Title" value={title} onChange={e => setTitle(e.target.value)} required className="flex-grow px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                            <button type="button" onClick={handleGenerateDetails} disabled={isGenerating || !title} className="px-3 py-2.5 text-sm font-medium text-white bg-purple-600 rounded-lg hover:bg-purple-700 flex items-center disabled:bg-purple-400 transition-colors whitespace-nowrap">
                                <Wand2Icon size={14} /><span className="ml-1.5">{isGenerating ? 'Generating...' : 'Generate Details'}</span>
                            </button>
                        </div>
                        <textarea placeholder="Synopsis" value={synopsis} onChange={e => setSynopsis(e.target.value)} rows="3" className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <input type="number" placeholder="Duration (minutes)" value={duration} onChange={e => setDuration(e.target.value)} required className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <input type="number" placeholder="Turnaround Time (minutes)" value={tat} onChange={e => setTat(e.target.value)} required className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <input type="text" placeholder="Censor Rating (e.g., U/A)" value={censorRating} onChange={e => setCensorRating(e.target.value)} className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <input type="text" placeholder="Format (e.g., 2D, 3D)" value={format} onChange={e => setFormat(e.target.value)} className="w-full px-3 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"/>
                        <div className="flex items-center mt-2">
                            <input type="checkbox" id="isRegional" checked={isRegional} onChange={e => setIsRegional(e.target.checked)} className="mr-2 accent-cinema-accent"/>
                            <label htmlFor="isRegional" className="text-sm text-gray-700 dark:text-gray-300">Regional Content (Schedule after 3 PM)</label>
                        </div>
                        <div className="flex justify-end space-x-3 pt-4"><button type="button" onClick={onCancel} className="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 dark:bg-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button><button type="submit" className="px-4 py-2.5 text-sm font-medium text-cinema-base bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors">Save Movie</button></div>
                    </form>
                    <CustomAlertModal isOpen={alertInfo.isOpen} onClose={() => setAlertInfo({ isOpen: false, message: '' })} title="Input Error" message={alertInfo.message} />
                </>
            );
        };

        // --- SearchableDropdown ---
        const SearchableDropdown = ({ movies, value, onChange, placeholder = "+ Add Show", onOpenChange, isActive }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const [isOpen, setIsOpen] = React.useState(false);
            const [activeIndex, setActiveIndex] = React.useState(0);
            const dropdownRef = React.useRef(null);
            const inputRef = React.useRef(null);
            const listRef = React.useRef(null);

            const selectedMovie = React.useMemo(() => movies.find(m => m.id === value), [movies, value]);

            const filteredMovies = React.useMemo(() =>
                movies.filter(movie =>
                    movie.title.toLowerCase().includes(searchTerm.toLowerCase())
                ), [movies, searchTerm]);

            React.useEffect(() => {
                onOpenChange(isOpen);
                if (isOpen) {
                    setTimeout(() => inputRef.current?.focus(), 0);
                }
            }, [isOpen]);

            React.useEffect(() => {
                setActiveIndex(0);
            }, [searchTerm]);

            React.useEffect(() => {
                if (isOpen && listRef.current) {
                    const activeElement = listRef.current.children[activeIndex];
                    if (activeElement) {
                        activeElement.scrollIntoView({ block: 'nearest' });
                    }
                }
            }, [activeIndex, isOpen]);

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            
            React.useEffect(() => {
                if (isActive && !isOpen) {
                    const handleStartSearch = (e) => {
                        if (e.ctrlKey || e.metaKey || e.altKey) return;
                        const target = e.target;
                        if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable) {
                            return;
                        }
                        if (e.key.length === 1 && e.key.match(/\S/)) {
                            e.preventDefault();
                            e.stopPropagation();
                            setIsOpen(true);
                            setSearchTerm(e.key);
                        }
                    };
                    document.addEventListener('keydown', handleStartSearch);
                    return () => {
                        document.removeEventListener('keydown', handleStartSearch);
                    };
                }
            }, [isActive, isOpen]);

            const handleSelect = (movie) => {
                onChange(movie);
                setIsOpen(false);
                setSearchTerm('');
            };

            const handleKeyDown = (e) => {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    setActiveIndex(prev => (prev + 1) % filteredMovies.length);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    setActiveIndex(prev => (prev - 1 + filteredMovies.length) % filteredMovies.length);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (filteredMovies[activeIndex]) {
                        handleSelect(filteredMovies[activeIndex]);
                    }
                } else if (e.key === 'Escape') {
                    setIsOpen(false);
                }
            };

            if (!isOpen) {
                const movieColor = selectedMovie ? stringToColor(selectedMovie.title) : null;
                return (
                       <div
                            onClick={() => setIsOpen(true)}
                            className={`w-full border-none rounded p-1 text-xs cursor-pointer text-center truncate transition-colors`}
                            style={selectedMovie ? {
                                backgroundColor: movieColor.pastel,
                                color: movieColor.text,
                            } : undefined}
                        >
                            {selectedMovie ? selectedMovie.title : <span className="text-gray-400">+</span>}
                        </div>
                );
            }

            return (
                <div className="relative" ref={dropdownRef}>
                       <input
                            ref={inputRef}
                            type="text"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            onKeyDown={handleKeyDown}
                            placeholder="Search movie..."
                            className="w-full p-1 text-xs border-b dark:border-gray-700 focus:ring-0 focus:border-cinema-accent dark:bg-cinema-base bg-white text-center"
                            onClick={(e) => e.stopPropagation()}
                        />
                    {isOpen && (
                        <div className="absolute z-20 w-full mt-1 bg-white dark:bg-cinema-surface border dark:border-gray-700 rounded-lg shadow-xl">
                            <ul ref={listRef} className="max-h-40 overflow-y-auto text-left">
                                {filteredMovies.length > 0 ? filteredMovies.map((movie, index) => (
                                    <li
                                        key={movie.id}
                                        onClick={() => handleSelect(movie)}
                                        className={`px-2 py-1.5 text-xs cursor-pointer transition-colors ${index === activeIndex ? 'bg-cinema-accent/20 dark:bg-cinema-accent/20' : 'hover:bg-gray-50 dark:hover:bg-gray-700/50'}`}
                                    >
                                        {movie.title}
                                    </li>
                                )) : (
                                     <li className="px-2 py-1.5 text-xs text-gray-500">No movies found</li>
                                )}
                            </ul>
                        </div>
                    )}
                </div>
            );
        };

        // --- TimeInput ---
        const TimeInput = ({ initialTime, onSave, onCancel }) => {
            const [timeStr, setTimeStr] = React.useState(minutesToTime(initialTime));
            const inputRef = React.useRef(null);

            React.useEffect(() => {
                inputRef.current?.focus();
                inputRef.current?.select();
            }, []);

            const handleBlur = () => {
                const newMinutes = timeToMinutes(timeStr);
                if (newMinutes !== null && newMinutes !== initialTime) {
                    onSave(newMinutes);
                } else {
                    onCancel();
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleBlur();
                } else if (e.key === 'Escape') {
                    onCancel();
                }
            };

            return (
                <input
                    ref={inputRef}
                    type="text"
                    value={timeStr}
                    onChange={(e) => setTimeStr(e.target.value)}
                    onBlur={handleBlur}
                    onKeyDown={handleKeyDown}
                    onClick={(e) => e.stopPropagation()}
                    className="absolute inset-0 w-full h-full p-1 text-xs text-center bg-white dark:bg-gray-800 border-2 border-cinema-accent focus:outline-none z-10"
                />
            );
        };

        // --- ExcelScheduler (Improved) ---
        const ExcelScheduler = ({ cinema, shows, movies, onShowMove, onShowMovieChange, onDeleteShow, onShowTimeChange, onToggleWA, setDraggedItem, draggedItem, onDeselect, activeCell, setActiveCell, onTimeHover, onDropdownOpenChange, onTimeEditStart, isTimeEditing }) => {
            const [dragOverCell, setDragOverCell] = React.useState(null);
            const [contextMenu, setContextMenu] = React.useState(null); // { x, y, show }

            React.useEffect(() => {
                const closeMenu = () => setContextMenu(null);
                document.addEventListener('click', closeMenu);
                document.addEventListener('contextmenu', closeMenu);
                return () => { document.removeEventListener('click', closeMenu); document.removeEventListener('contextmenu', closeMenu); };
            }, []);
            
            const { showsByScreen, maxShows } = React.useMemo(() => {
                if (!cinema) return { showsByScreen: {}, maxShows: 0 };
                const grouped = {};
                cinema.screens.forEach(screen => {
                    grouped[screen.id] = shows
                        .filter(show => show.screenId === screen.id)
                        .sort((a, b) => a.startTime - b.startTime);
                });
                const max = Math.max(0, ...Object.values(grouped).map(s => s.length));
                return { showsByScreen: grouped, maxShows: Math.max(10, max + 1) };
            }, [shows, cinema]);

            const handleDragStart = (e, show) => {

                setDragOverCell({ screenId, sessionIndex });

                            <tr>
                                {cinema.screens.map(screen => (
                                    <React.Fragment key={screen.id}>
                                        <th className="w-48 bg-gray-50 dark:bg-cinema-surface/80">Movie</th>
                                        <th className="w-24 min-w-[6rem] bg-gray-50 dark:bg-cinema-surface/80">Time</th>

                            </tr>
                        </thead>
                        <tbody>
                            {Array.from({ length: maxShows }).map((_, sessionIndex) => (
                                <tr key={sessionIndex}>
                                    <td className="font-semibold bg-gray-50 dark:bg-cinema-surface/50">

                                        return (
                                            <React.Fragment key={screen.id}>
                                                <td
                                                    onClick={(e) => { e.stopPropagation(); setActiveCell({ screenId: screen.id, sessionIndex }); }}
                                                    onDoubleClick={() => { if(show) onTimeEditStart(screen.id, sessionIndex); }}
                                                    onDragOver={(e) => handleDragOver(e, screen.id, sessionIndex)}
                                                    onDrop={(e) => handleDrop(e, screen.id, sessionIndex)}

                                                >
                                                    {show ? (
                                                        <div
                                                            draggable
                                                            onDragStart={(e) => handleDragStart(e, show)}

                                                            className="cursor-grab relative group"
                                                        >
                                                             <SearchableDropdown
                                                                isActive={isActive}
                                                                movies={movies}
                                                                value={show.movieId}
                                                                onOpenChange={onDropdownOpenChange}
                                                                onChange={(newMovie) => {
                                                                    onShowMovieChange(show, newMovie);
                                                                    setActiveCell(prev => ({ ...prev, sessionIndex: prev.sessionIndex + 1 }));
                                                                }}
                                                            />
                                                            {show.isWA && <span className="block text-center text-[8px] font-bold text-orange-500 dark:text-orange-400 -mt-0.5">(W/A)</span>}
                                                            <button 
                                                                onClick={(e) => { e.preventDefault(); e.stopPropagation(); onDeleteShow(show.id); }}
                                                                className="absolute -top-1 -right-1 p-0.5 rounded-full bg-red-500 text-white opacity-0 group-hover:opacity-100 transition-opacity z-10"

                                                                <XIcon size={10}/>

                                                        <SearchableDropdown
                                                            isActive={isActive}
                                                            movies={movies}
                                                            value={null}
                                                            onOpenChange={onDropdownOpenChange}

                                                                onShowMove({ type: 'new', data: newMovie }, screen.id, sessionIndex);
                                                                setActiveCell({ screenId: screen.id, sessionIndex: sessionIndex + 1 });

                                                    )}
                                                </td>
                                                <td
                                                    onClick={(e) => { e.stopPropagation(); setActiveCell({ screenId: screen.id, sessionIndex }); }}
                                                    onDoubleClick={() => { if (show) onTimeEditStart(screen.id, sessionIndex); }}
                                                    onDragOver={(e) => handleDragOver(e, screen.id, sessionIndex)}
                                                    onDrop={(e) => handleDrop(e, screen.id, sessionIndex)}
                                                    onMouseEnter={(e) => onTimeHover(e, show)}
                                                    onMouseLeave={() => onTimeHover(null, null)}
                                                    className={`w-24 min-w-[6rem] ${isDragOver ? 'drag-over' : ''} cursor-pointer ${isActive ? 'active-cell' : ''}`}

                                                    <span className={isCurrentlyEditingTime ? 'opacity-0' : ''}>
                                                      {show ? (

                                                    </span>
                                                    {isCurrentlyEditingTime && (
                                                        <TimeInput 
                                                            initialTime={show.startTime}
                                                            onSave={(newMinutes) => onShowTimeChange(show.id, newMinutes)}

                                                </td>
                                            </React.Fragment>
                                        );
                                    })}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
                {/* Right-click context menu for W/A toggle */}
                {contextMenu && ReactDOM.createPortal(
                    <div

                            onClick={() => { onDeleteShow(contextMenu.show.id); setContextMenu(null); }}
                        >
