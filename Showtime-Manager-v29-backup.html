        };

        // --- Custom Hook for History and Persistence ---
        const useHistoryWithPersistence = (key, initialState) => {
            const [state, setState] = React.useState(() => {
                try {
                    const storedState = window.localStorage.getItem(key);
                    return storedState ? JSON.parse(storedState) : { history: [initialState], currentIndex: 0 };
                } catch (error) {
                    console.error(`Error reading localStorage key "${key}":`, error);
                    return { history: [initialState], currentIndex: 0 };
                }
            });

            const { history, currentIndex } = state;

            const saveState = (newState) => {
                try {
                    window.localStorage.setItem(key, JSON.stringify(newState));
                    setState(newState);
                } catch (error) {
                    console.error(`Error setting localStorage key "${key}":`, error);
                }
            };

            const setCurrentState = (newState) => {
                const newHistory = history.slice(0, currentIndex + 1);
                newHistory.push(newState);
                saveState({ history: newHistory, currentIndex: newHistory.length - 1 });
            };

            const undo = () => {
                if (currentIndex > 0) {
                    saveState({ ...state, currentIndex: currentIndex - 1 });
                }
            };

            const redo = () => {
                if (currentIndex < history.length - 1) {
                    saveState({ ...state, currentIndex: currentIndex + 1 });
                }
            };

            const canUndo = currentIndex > 0;
            const canRedo = currentIndex < history.length - 1;

            return [history[currentIndex], setCurrentState, undo, redo, canUndo, canRedo];
        };

        // --- Status Bar Component ---
        const StatusBar = ({ cinema, shows, canUndo, canRedo }) => {
            const stats = React.useMemo(() => {
                if (!cinema) return null;
                const cinemaShows = shows.filter(s => s.cinemaId === cinema.id);
                const screensWithShows = new Set(cinemaShows.map(s => s.screenId)).size;
                const totalCapacity = cinema.screens.reduce((sum, s) => {
                    const showsOnScreen = cinemaShows.filter(sh => sh.screenId === s.id).length;
                    return sum + (s.capacity * showsOnScreen);
                }, 0);
                return {
                    totalShows: cinemaShows.length,
                    screensWithShows,
                    totalScreens: cinema.screens.length,
                    totalCapacity,
                };
            }, [cinema, shows]);

            if (!stats) return null;

            return (
                <div className="status-bar flex-shrink-0 px-4 py-1.5 bg-white dark:bg-cinema-surface border-t border-gray-200 dark:border-gray-700/50 flex items-center justify-between text-[10px] text-gray-500 dark:text-gray-400">
                    <div className="flex items-center space-x-4">
                        <span><strong className="text-gray-700 dark:text-gray-300">{stats.totalShows}</strong> shows scheduled</span>
                        <span><strong className="text-gray-700 dark:text-gray-300">{stats.screensWithShows}</strong>/{stats.totalScreens} screens active</span>
                        <span>Total capacity: <strong className="text-gray-700 dark:text-gray-300">{stats.totalCapacity.toLocaleString()}</strong> seats</span>
                    </div>
                    <div className="flex items-center space-x-3">
                        <span>{canUndo ? 'Ctrl+Z to undo' : ''}</span>
                        <span>{canRedo ? 'Ctrl+Y to redo' : ''}</span>
                    </div>
                </div>
            );
        };


        // --- MainApp ---
        const MainApp = ({ user, users, onUpdateUsers, onLogout }) => {
            const initialState = { cinemas: [], movies: [], shows: [], plannedAllocations: {}, };
            const [state, setState, undo, redo, canUndo, canRedo] = useHistoryWithPersistence('showtime_manager_state', initialState);
            const { cinemas: allCinemas, movies, shows, plannedAllocations } = state;
            
            const cinemas = React.useMemo(() => {
                if (!user) return [];
                if (user.role === 'admin') return allCinemas;
                return allCinemas.filter(c => user.allowedCinemas.includes(c.id));
            }, [allCinemas, user]);
            
            const [selectedCinema, setSelectedCinema] = React.useState(null);
            const [scheduleStartTime, setScheduleStartTime] = React.useState(null);
            const [draggedItem, setDraggedItem] = React.useState(null);
            const [isAddCinemaModalOpen, setAddCinemaModalOpen] = React.useState(false);
            const [isEditModalOpen, setEditModalOpen] = React.useState(false);
            const [cinemaToEdit, setCinemaToEdit] = React.useState(null);
            const [isDeleteModalOpen, setDeleteModalOpen] = React.useState(false);
            const [itemToDelete, setItemToDelete] = React.useState(null);
            const [isUploadCinemaModalOpen, setUploadCinemaModalOpen] = React.useState(false);
            const [isAddMovieModalOpen, setAddMovieModalOpen] = React.useState(false);
            const [isUploadMoviesModalOpen, setUploadMoviesModalOpen] = React.useState(false);
            const [isUploadScheduleModalOpen, setUploadScheduleModalOpen] = React.useState(false);
            const [alertInfo, setAlertInfo] = React.useState({ isOpen: false, title: '', message: '' });
            const [showAllocations, setShowAllocations] = React.useState([]);
            const [isAllocationModalOpen, setAllocationModalOpen] = React.useState(false);
            const [isBulkAllocationModalOpen, setBulkAllocationModalOpen] = React.useState(false);
            const [isScheduling, setIsScheduling] = React.useState(false);
            const [isScheduleListModalOpen, setScheduleListModalOpen] = React.useState(false);
            const [isExporting, setIsExporting] = React.useState(false);
            const [isDownloadingOps, setIsDownloadingOps] = React.useState(false);
            const [isOpsDownloadModalOpen, setIsOpsDownloadModalOpen] = React.useState(false);
            const [exampleImages, setExampleImages] = React.useState([]);
            const [isAlgoScheduling, setIsAlgoScheduling] = React.useState(false);
            const [activeCell, setActiveCell] = React.useState({ screenId: null, sessionIndex: null });
            const [clipboard, setClipboard] = React.useState(null);
            const [tooltip, setTooltip] = React.useState({ show: null, position: null });
            const [isDropdownOpen, setIsDropdownOpen] = React.useState(false);
            const [isTimeEditing, setIsTimeEditing] = React.useState(false);
            const [isClearDataModalOpen, setIsClearDataModalOpen] = React.useState(false);
            const [isClearScheduleModalOpen, setIsClearScheduleModalOpen] = React.useState(false);
            const [isSwapModalOpen, setIsSwapModalOpen] = React.useState(false);
            const [isEmailDraftModalOpen, setEmailDraftModalOpen] = React.useState(false);
            const [isUserManagementModalOpen, setIsUserManagementModalOpen] = React.useState(false);
            const [isSidebarCollapsed, setIsSidebarCollapsed] = React.useState(false);
            const [viewMode, setViewMode] = React.useState('grid'); // 'grid' or 'timeline'
            const [theme, setTheme] = React.useState(() => {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme) return savedTheme;
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
                return 'dark'; // Default to dark for cinema theme
            });

            React.useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            React.useEffect(() => {
                const currentCinemaStillExists = selectedCinema && cinemas.some(c => c.id === selectedCinema.id);
                
                if (currentCinemaStillExists) {
                    const updatedCinemaData = cinemas.find(c => c.id === selectedCinema.id);
                    if (JSON.stringify(updatedCinemaData) !== JSON.stringify(selectedCinema)) {
                        setSelectedCinema(updatedCinemaData);
                    }
                } else if (cinemas.length > 0) {
                    setSelectedCinema(cinemas[0]);
                } else {
                    setSelectedCinema(null);
                }
            }, [cinemas]);

            React.useEffect(() => {
                if (selectedCinema) {
                    setScheduleStartTime(selectedCinema.dailyStartTime);
                } else {
                    setScheduleStartTime(null);
                }
            }, [selectedCinema]);

            React.useEffect(() => {
                if (!selectedCinema) {
                    setShowAllocations([]);
                    return;
                };
                const actualCounts = movies.reduce((acc, movie) => {
                    acc[movie.id] = shows.filter(show => show.movieId === movie.id && show.cinemaId === selectedCinema.id).length;
                    return acc;
                }, {});
                const cinemaAllocs = plannedAllocations[selectedCinema.id] || {};
                const combined = movies.map(movie => ({
                    ...movie,
                    actual: actualCounts[movie.id] || 0,
                    planned: cinemaAllocs[movie.id] || 0,
                })).filter(alloc => alloc.planned > 0 || alloc.actual > 0);
                combined.sort((a, b) => (b.planned + b.actual) - (a.planned + a.actual));
                setShowAllocations(combined);
            }, [shows, movies, plannedAllocations, selectedCinema]);

            const repackScreenFromIndex = (showsToProcess, screenId, startIndex = 0) => {
                if (!selectedCinema) {
                    return showsToProcess
                }
                const otherShows = showsToProcess.filter(s => s.screenId !== screenId);
                const showsOnScreen = showsToProcess.filter(s => s.screenId === screenId);
                let currentTime;
                if (startIndex === 0) {
                    currentTime = scheduleStartTime;
                } else if (showsOnScreen[startIndex - 1]) {
                    const prevShow = showsOnScreen[startIndex - 1];
                    currentTime = prevShow.startTime + prevShow.duration + (prevShow.tat || 0);
                } else {
                    currentTime = scheduleStartTime;
                }
                for (let i = startIndex; i < showsOnScreen.length; i++) {
                    const show = showsOnScreen[i];
                    show.startTime = currentTime;
                    currentTime += show.duration + (show.tat || 0);
                }
                return [...otherShows, ...showsOnScreen];
            };
            const handleAddCinema = async (cinemaData) => { 
                setState({ ...state, cinemas: [...state.cinemas, { id: crypto.randomUUID(), ...cinemaData }] });
                setAddCinemaModalOpen(false); 
            };
            const handleUpdateCinema = async (cinemaData) => { 
                setState({ ...state, cinemas: state.cinemas.map(c => c.id === cinemaToEdit.id ? { ...c, ...cinemaData } : c) });
                setEditModalOpen(false); 
            };
            const handleDeleteCinema = async () => {
                if (!itemToDelete) return;
                const newAllocs = { ...state.plannedAllocations };
                delete newAllocs[itemToDelete.id];
                setState({
                    ...state,
                    cinemas: state.cinemas.filter(c => c.id !== itemToDelete.id),
                    shows: state.shows.filter(s => s.cinemaId !== itemToDelete.id),
                    plannedAllocations: newAllocs
                });
                setDeleteModalOpen(false);
                setItemToDelete(null);
            };
            const handleAddMovie = async (movieData) => { 
                setState({ ...state, movies: [...state.movies, { id: crypto.randomUUID(), ...movieData }] });
                setAddMovieModalOpen(false); 
            };
            const handleDeleteMovie = async (movieId) => { 
                const showToDelete = state.shows.find(s => s.movieId === movieId);
                const remainingShows = state.shows.filter(s => s.movieId !== movieId);
                let newShows = remainingShows;
                if (showToDelete) {
                    newShows = repackScreenFromIndex(remainingShows, showToDelete.screenId);
                }
                const newAllocs = {};
                for (const cinemaId in state.plannedAllocations) {
                    const cinemaAllocs = { ...state.plannedAllocations[cinemaId] };
                    delete cinemaAllocs[movieId];
                    newAllocs[cinemaId] = cinemaAllocs;
                }
                setState({
                    ...state,
                    movies: state.movies.filter(m => m.id !== movieId),
                    shows: newShows,
                    plannedAllocations: newAllocs
                });
            };
            const handleShowMove = (draggedItem, screenId, sessionIndex) => {
                let showToMove;
                let intermediateShows;
                if (draggedItem.type === 'existing') {
                    showToMove = { ...draggedItem.data };
                    intermediateShows = state.shows.filter(s => s.id !== draggedItem.data.id);
                } else {
                    const movie = draggedItem.data;
                    showToMove = {
                        id: crypto.randomUUID(),
                        cinemaId: selectedCinema.id,
                        movieId: movie.id,
                        title: movie.title,
                        duration: movie.duration,
                        format: movie.format,
                        tat: movie.tat,
                        startTime: 0
                    };
                    intermediateShows = [...state.shows];
                }
                showToMove.screenId = screenId;
                let showsOnScreen = intermediateShows
                    .filter(s => s.screenId === screenId)
                    .sort((a, b) => a.startTime - b.startTime);
                showsOnScreen.splice(sessionIndex, 0, showToMove);
                const otherShows = intermediateShows.filter(s => s.screenId !== screenId);
                const newShows = repackScreenFromIndex([...otherShows, ...showsOnScreen], screenId, sessionIndex);
                setState({ ...state, shows: newShows });
            };
            const handleShowMovieChange = (showToUpdate, newMovie) => {
                const updatedShows = state.shows.map(s => 
                    s.id === showToUpdate.id 
                    ? { ...s, 
                        movieId: newMovie.id, 
                        title: newMovie.title, 
                        duration: newMovie.duration, 
                        format: newMovie.format, 
                        tat: newMovie.tat 
                      } 
                    : s
                );
                const showIndex = updatedShows
                    .filter(s => s.screenId === showToUpdate.screenId)
                    .sort((a, b) => a.startTime - b.startTime)
                    .findIndex(s => s.id === showToUpdate.id);
                const newShows = repackScreenFromIndex(updatedShows, showToUpdate.screenId, showIndex);
                setState({ ...state, shows: newShows });
            };
            const handleShowTimeChange = (showId, newStartTime) => {
                setIsTimeEditing(false);
                const showToUpdate = state.shows.find(s => s.id === showId);
                if (!showToUpdate) return;
                const updatedShows = state.shows.map(s => s.id === showId ? {...s, startTime: newStartTime} : s);
                const showIndex = updatedShows
                    .filter(s => s.screenId === showToUpdate.screenId)
                    .sort((a, b) => a.startTime - b.startTime)
                    .findIndex(s => s.id === showId);
                const newShows = repackScreenFromIndex(updatedShows, showToUpdate.screenId, showIndex + 1);
                setState({ ...state, shows: newShows });
            };
            const handleDeleteShow = (showId) => {
                const showToDelete = state.shows.find(s => s.id === showId);
                if (!showToDelete) return;
                const remainingShows = state.shows.filter(s => s.id !== showId);
                const showIndex = state.shows
                    .filter(s => s.screenId === showToDelete.screenId)
                    .sort((a, b) => a.startTime - b.startTime)
                    .findIndex(s => s.id === showId);
                const newShows = repackScreenFromIndex(remainingShows, showToDelete.screenId, showIndex);
                setState({ ...state, shows: newShows });
            };
            const WA_TAT_VALUE = 25;
            const handleToggleWA = (showId) => {
                const show = state.shows.find(s => s.id === showId);
                if (!show) return;
                const movie = movies.find(m => m.id === show.movieId);
                const normalTat = movie ? (movie.tat || 15) : 15;
                const newIsWA = !show.isWA;
                const newTat = newIsWA ? WA_TAT_VALUE : normalTat;
                const updatedShows = state.shows.map(s =>
                    s.id === showId ? { ...s, isWA: newIsWA, tat: newTat } : s
                );
                // Repack subsequent shows on same screen
                const showIndex = updatedShows
                    .filter(s => s.screenId === show.screenId)
                    .sort((a, b) => a.startTime - b.startTime)
                    .findIndex(s => s.id === showId);
                const newShows = repackScreenFromIndex(updatedShows, show.screenId, showIndex + 1);
                setState({ ...state, shows: newShows });
            };
            const handleSwapScreens = (screenAId, screenBId) => {
                const showsForCinema = shows.filter(s => s.cinemaId === selectedCinema.id);
                const otherCinemaShows = shows.filter(s => s.cinemaId !== selectedCinema.id);
                const showsForA = showsForCinema.filter(s => s.screenId === screenAId);
                const showsForB = showsForCinema.filter(s => s.screenId === screenBId);
                const otherShowsOnThisCinema = showsForCinema.filter(s => s.screenId !== screenAId && s.screenId !== screenBId);
                const swappedShowsA = showsForA.map(s => ({ ...s, screenId: screenBId }));
                const swappedShowsB = showsForB.map(s => ({ ...s, screenId: screenAId }));
                setState({ ...state, shows: [...otherCinemaShows, ...otherShowsOnThisCinema, ...swappedShowsA, ...swappedShowsB] });
            };
            const handleSaveAllocations = async (newAllocations) => {
                if (!selectedCinema) return;
                setState({ ...state, plannedAllocations: { ...state.plannedAllocations, [selectedCinema.id]: newAllocations } });
            };
            const handleBulkSaveAllocations = async (updates) => {
                const newPlannedAllocations = { ...state.plannedAllocations };
                for (const cinemaId in updates) {
                    newPlannedAllocations[cinemaId] = updates[cinemaId];
                }
                setState({ ...state, plannedAllocations: newPlannedAllocations });
            };
            const handleAddCinemasCSV = async (data) => { 
                setState({ ...state, cinemas: [...state.cinemas, ...data] });
                setUploadCinemaModalOpen(false); 
            };
            const handleAddMoviesCSV = async (data) => { 
                setState({ ...state, movies: [...state.movies, ...data] });
                setUploadMoviesModalOpen(false); 
            };
            const handleUploadSchedule = (newShows) => {
                if (!selectedCinema) return;
                const otherCinemaShows = state.shows.filter(s => s.cinemaId !== selectedCinema.id);
                setState({ ...state, shows: [...otherCinemaShows, ...newShows] });
                setUploadScheduleModalOpen(false);
            };
            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                const imagePromises = files.map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            resolve({
                                name: file.name,
                                data: event.target.result,
                                mimeType: file.type,
                            });
                        };
                        reader.onerror = (err) => reject(err);
                        reader.readAsDataURL(file);
                    });
                });
                Promise.all(imagePromises).then(images => {
                    setExampleImages(prev => [...prev, ...images]);
                });
            };

            const handleAutoSchedule = async () => {
                if (!selectedCinema || !plannedAllocations[selectedCinema.id] || Object.keys(plannedAllocations[selectedCinema.id]).length === 0) {
                    setAlertInfo({ isOpen: true, title: "Cannot Schedule", message: "Please select a cinema and set show allocations before auto-scheduling." });
                    return;
                }
                setIsScheduling(true);

                const cinema = selectedCinema;
                const allocations = plannedAllocations[cinema.id];
                const moviesMap = new Map(movies.map(m => [m.id, m]));
                const screensMap = new Map(cinema.screens.map(s => [s.id, s]));

                const textPrompt = `You are an expert cinema scheduler. Your goal is to create an optimal, compact schedule.

**Input Data:**
- **Cinema:** ${cinema.name}
- **Daily Start Time:** ${minutesToTime(scheduleStartTime)}
- **Screens:**
${cinema.screens.map(s => `  - ${s.name} (ID: ${s.id}, Capacity: ${s.capacity})`).join('\n')}
- **Movies & Allocations (Required Shows):**
${Object.entries(allocations).map(([movieId, count]) => {
    const movie = moviesMap.get(movieId);
    return `- "${movie.title}" (ID: ${movieId}, Duration: ${movie.duration}m, TAT: ${movie.tat || 15}m, Regional: ${movie.isRegional}): ${count} shows`;
}).join('\n')}

**Scheduling Constraints (Must be followed):**
1.  **Exact Allocations:** Schedule the exact number of shows for each movie as specified above.
2.  **No Overlaps:** A show's start time must be >= the previous show's end time (start + duration + TAT) on the same screen.
3.  **Time Bounds:** No show can start after 11:30 PM (1410 mins).
4.  **Regional Window:** If a movie is 'Regional: true', it must start between 12:00 PM (720 mins) and 8:30 PM (1290 mins).
5.  **Rounding:** All start times must be a multiple of 5 minutes.

**Optimization Goals (Try your best to achieve):**
- **Compactness:** Minimize empty gaps between shows on each screen. Schedules should be back-to-back.
- **Screen Filling:** After meeting allocations, intelligently add more shows to fill available time on screens, prioritizing movies that are already on that screen.
- **Auditorium Logic:** Assign movies with more shows to larger capacity screens. Try to keep all shows of a major movie (5+ shows) on the same screen.
- **Stagger Starts:** Avoid starting more than two shows at the exact same time across the cinema.

**Output:**
Return a valid JSON array of show objects. Each object must have "movieId", "screenId", and "startTime" (in minutes from midnight).
`;

                const payload = {
                    contents: [{ role: "user", parts: [{text: textPrompt}] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    "movieId": { "type": "STRING" },
                                    "screenId": { "type": "STRING" },
                                    "startTime": { "type": "NUMBER" }
                                },
                                required: ["movieId", "screenId", "startTime"]
                            }
                        }
                    }
                };
                
                try {
                    const apiKey = "";
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorBody = await response.text();
                        throw new Error(`API request failed with status ${response.status}: ${errorBody}`);
                    }

                    const result = await response.json();
                    
                    if (result.candidates && result.candidates[0].content && result.candidates[0].content.parts) {
                        const jsonText = result.candidates[0].content.parts[0].text;
                        const generatedShows = JSON.parse(jsonText);

                        const newShows = generatedShows.map(show => {
                            const movie = moviesMap.get(show.movieId);
                            if (!movie || !screensMap.has(show.screenId)) {
                                console.warn("AI returned a show for an unknown movie or screen:", show);
                                return null;
                            }
                            return {
                                id: crypto.randomUUID(),
                                cinemaId: cinema.id,
                                screenId: show.screenId,
                                movieId: show.movieId,
                                title: movie.title,
                                duration: movie.duration,
                                format: movie.format,
                                tat: movie.tat || 15,
                                startTime: show.startTime
                            };
                        }).filter(Boolean);

                        setState({...state, shows: [...state.shows.filter(s => s.cinemaId !== cinema.id), ...newShows]});
                        setAlertInfo({ isOpen: true, title: "Scheduling Complete", message: `Gemini has generated a schedule with ${newShows.length} shows.` });

                    } else {
                         throw new Error("Invalid response structure from Gemini API. The response might be empty or blocked.");
                    }
                } catch (error) {
                    console.error("Error during Gemini auto-scheduling:", error);
                    setAlertInfo({ isOpen: true, title: "Scheduling Error", message: `Failed to auto-schedule with AI: ${error.message}` });
                } finally {
                    setIsScheduling(false);
                }
            };

            const handleAlgoSchedule = () => {
                if (!selectedCinema || !plannedAllocations[selectedCinema.id] || Object.keys(plannedAllocations[selectedCinema.id]).length === 0) {
                    setAlertInfo({ isOpen: true, title: "Cannot Schedule", message: "Please select a cinema and set show allocations before auto-scheduling." });
                    return;
                }
                setIsAlgoScheduling(true);

                try {
                    const cinema = selectedCinema;
                    const rawAllocations = { ...plannedAllocations[cinema.id] };
                    const moviesMap = new Map(movies.map(m => [m.id, m]));

                    // ══════════════════════════════════════════════════════════
                    //  CONSTANTS — tuned to match human scheduler patterns
                    // ══════════════════════════════════════════════════════════
                    const LAST_SHOW_START    = 23 * 60 + 40;   // 11:40 PM
                    const REGIONAL_START     = 14 * 60;         // 2:00 PM
                    const REGIONAL_END       = 21 * 60 + 30;    // 9:30 PM
                    const SINGLE_SHOW_START  = 12 * 60;         // 12:00 PM
                    const SINGLE_SHOW_END    = 21 * 60 + 30;    // 9:30 PM
                    const TWO_SHOW_START     = 12 * 60;         // 12:00 PM
                    const THREE_EARLY_END    = 12 * 60;         // 12:00 PM (1 show before noon)
                    const THREE_LATE_START   = 14 * 60;         // 2:00 PM
                    const MIN_SAME_MOVIE_GAP = 30;              // 30 min between same movie starts
                    const ROUND_TO           = 5;               // round to 5 min
                    const STAGGER_STEP       = 5;               // 5-min stagger per audi

                    // ══════════════════════════════════════════════════════════
                    //  HELPERS
                    // ══════════════════════════════════════════════════════════
                    const roundUp = (t) => Math.ceil(t / ROUND_TO) * ROUND_TO;

                    // --- Regional detection by title keywords ---
                    const REGIONAL_KEYWORDS = [
                        'ODIA', 'BENGALI', 'GUJARATI', 'PUNJABI', 'MARATHI',
                        'TAMIL', 'TELUGU', 'KANNADA', 'MALAYALAM', 'BHOJPURI',
                        'ASSAMESE', 'CHHATTISGARHI', 'RAJASTHANI', 'HARYANVI'
                    ];
                    const isRegionalMovie = (movie) => {
                        if (movie.isRegional) return true;
                        const upper = (movie.title || '').toUpperCase();
                        return REGIONAL_KEYWORDS.some(kw => upper.includes(kw));
                    };

                    // --- Format matching: 3D→3D/IMAX, IMAX→IMAX, 4DX→4DX, ATMOS→ATMOS ---
                    const SPECIAL_FORMATS = ['IMAX', '4DX', 'ATMOS', 'MX4D', 'SCREENX', '3D'];
                    const formatMatches = (movieFormat, screenFormat) => {
                        const mf = (movieFormat || '2D').toUpperCase().trim();
                        const sf = (screenFormat || '2D').toUpperCase().trim();
                        const movieSpecials = SPECIAL_FORMATS.filter(f => mf.includes(f));
                        const screenSpecials = SPECIAL_FORMATS.filter(f => sf.includes(f));
                        // If movie is special format, screen MUST have that format
                        if (movieSpecials.length > 0) {
                            return movieSpecials.some(f => screenSpecials.includes(f));
                        }
                        // 2D movie: prefer non-special screens, but allow any
                        return true;
                    };

                    // Strict check: screen is special-format only
                    const isSpecialScreen = (screen) => {
                        const sf = (screen.format || '2D').toUpperCase().trim();
                        return SPECIAL_FORMATS.some(f => sf.includes(f));
                    };

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 0: FILTER & CLASSIFY
                    // ══════════════════════════════════════════════════════════
                    const allocations = {};
                    for (const movieId in rawAllocations) {
                        if (rawAllocations[movieId] > 0 && moviesMap.has(movieId)) {
                            allocations[movieId] = rawAllocations[movieId];
                        }
                    }
                    const totalRequired = Object.values(allocations).reduce((s, c) => s + c, 0);
                    if (totalRequired === 0) {
                        setAlertInfo({ isOpen: true, title: "Nothing to Schedule", message: "No show allocations have been set for this cinema." });
                        setIsAlgoScheduling(false);
                        return;
                    }

                    // Build movie allocation list sorted by count desc
                    const movieAllocs = Object.entries(allocations)
                        .map(([id, count]) => ({ id, count, movie: moviesMap.get(id) }))
                        .filter(m => m.movie)
                        .sort((a, b) => b.count - a.count);

                    // Screens sorted by capacity descending
                    const screensByCapacity = [...cinema.screens].sort((a, b) => b.capacity - a.capacity);

                    // Tiers
                    const heavyMovies    = movieAllocs.filter(m => m.count >= 5);
                    const moderateMovies = movieAllocs.filter(m => m.count === 4);
                    const tripleMovies   = movieAllocs.filter(m => m.count === 3);
                    const doubleMovies   = movieAllocs.filter(m => m.count === 2);
                    const singleMovies   = movieAllocs.filter(m => m.count === 1);

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 1: AUDI ASSIGNMENT (Screen ↔ Movie mapping)
                    //  Goal: each movie gets a home screen. Same movie stays
                    //  on same audi. Heavy → biggest, light → smallest.
                    // ══════════════════════════════════════════════════════════
                    const screenAssignments = {};  // screenId → [{ movieId, count }]
                    cinema.screens.forEach(s => { screenAssignments[s.id] = []; });
                    const movieScreenMap = {};     // movieId → screenId (primary)
                    const assignedMovies = new Set();
                    const dedicatedScreens = new Set(); // screens locked to one heavy movie

                    const getCompatible = (movie) => {
                        return screensByCapacity.filter(s => formatMatches(movie.format, s.format));
                    };

                    // --- Heavy movies (5+ shows): biggest compatible audi, dedicated ---
                    for (const ma of heavyMovies) {
                        const compat = getCompatible(ma.movie).filter(s => !dedicatedScreens.has(s.id));
                        if (compat.length > 0) {
                            const screen = compat[0]; // biggest available
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            dedicatedScreens.add(screen.id);
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Moderate movies (4 shows): next biggest ---
                    for (const ma of moderateMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = getCompatible(ma.movie).filter(s => !dedicatedScreens.has(s.id));
                        if (compat.length > 0) {
                            const screen = compat[0];
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            dedicatedScreens.add(screen.id);
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Triple movies (3 shows): mid-size, can share ---
                    for (const ma of tripleMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = getCompatible(ma.movie);
                        // Prefer non-dedicated screen
                        let screen = compat.find(s => !dedicatedScreens.has(s.id));
                        if (!screen) screen = compat[compat.length - 1]; // smallest compatible
                        if (screen) {
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Double movies (2 shows): smaller audis, share ---
                    const smallScreens = [...screensByCapacity].reverse(); // smallest first
                    for (const ma of doubleMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = smallScreens.filter(s => formatMatches(ma.movie.format, s.format));
                        let screen = compat.find(s => !dedicatedScreens.has(s.id));
                        if (!screen) screen = compat[0];
                        if (screen) {
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // --- Single movies (1 show): smallest audis, share ---
                    for (const ma of singleMovies) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = smallScreens.filter(s => formatMatches(ma.movie.format, s.format));
                        let screen = compat.find(s => !dedicatedScreens.has(s.id));
                        if (!screen) screen = compat[0];
                        if (screen) {
                            screenAssignments[screen.id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = screen.id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // Fallback: anything still unassigned
                    for (const ma of movieAllocs) {
                        if (assignedMovies.has(ma.id)) continue;
                        const compat = getCompatible(ma.movie);
                        // Put on least loaded screen
                        const sorted = [...compat].sort((a, b) =>
                            screenAssignments[a.id].reduce((s, x) => s + x.count, 0) -
                            screenAssignments[b.id].reduce((s, x) => s + x.count, 0)
                        );
                        if (sorted.length > 0) {
                            screenAssignments[sorted[0].id].push({ movieId: ma.id, count: ma.count });
                            movieScreenMap[ma.id] = sorted[0].id;
                            assignedMovies.add(ma.id);
                        }
                    }

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 2: TIME PLACEMENT
                    //  Place shows per-screen sequentially, respecting rules:
                    //  · Heavy (5+): start from audi open, back-to-back all day
                    //  · Triple (3): 1 before 12 PM, 2 after 2 PM
                    //  · Double (2): both after 12 PM
                    //  · Single (1): between 12 PM and 9:30 PM
                    //  · Regional: 2 PM – 9:30 PM
                    //  · First show W/A (tat = 0): for heavy movies ≥5 shows
                    //  · Stagger audis by 5 min each
                    // ══════════════════════════════════════════════════════════
                    let newShows = [];
                    const allPlacedTimes = {};  // movieId → [startTimes]
                    movieAllocs.forEach(m => { allPlacedTimes[m.id] = []; });

                    // Stagger offsets
                    const staggerOffsets = {};
                    screensByCapacity.forEach((screen, idx) => {
                        staggerOffsets[screen.id] = idx * STAGGER_STEP;
                    });

                    // Place a single show, return end time
                    // tatOverride used for W/A (Without Ads) first show = 25 min
                    const WA_TAT = 25;
                    const placeShow = (screen, movie, startTime, tatOverride) => {
                        const tat = tatOverride !== undefined ? tatOverride : (movie.tat || 15);
                        const isWAShow = (tatOverride !== undefined && tatOverride === WA_TAT);
                        newShows.push({
                            id: crypto.randomUUID(),
                            cinemaId: cinema.id,
                            screenId: screen.id,
                            movieId: movie.id,
                            title: movie.title,
                            duration: movie.duration,
                            format: movie.format,
                            tat: tat,
                            isWA: isWAShow,
                            startTime: startTime
                        });
                        if (!allPlacedTimes[movie.id]) allPlacedTimes[movie.id] = [];
                        allPlacedTimes[movie.id].push(startTime);
                        return startTime + movie.duration + tat;
                    };

                    // Find next valid time (respects same-movie gap)
                    const findValidTime = (movieId, candidateTime, maxTime) => {
                        let t = roundUp(candidateTime);
                        let attempts = 0;
                        while (attempts < 500) {
                            if (t > (maxTime || LAST_SHOW_START)) return null;
                            const tooClose = allPlacedTimes[movieId]?.some(pt => Math.abs(t - pt) < MIN_SAME_MOVIE_GAP);
                            if (!tooClose) return t;
                            t = roundUp(t + ROUND_TO);
                            attempts++;
                        }
                        return null;
                    };

                    // --- Place shows per screen ---
                    for (const screen of screensByCapacity) {
                        const assignments = screenAssignments[screen.id];
                        if (assignments.length === 0) continue;

                        const stagger = staggerOffsets[screen.id];
                        const screenStart = roundUp(scheduleStartTime + stagger);

                        // Sort assignments: most shows first
                        assignments.sort((a, b) => b.count - a.count);

                        // Classify what's on this screen
                        const heavyA  = assignments.filter(a => a.count >= 5);
                        const modA    = assignments.filter(a => a.count === 4);
                        const tripleA = assignments.filter(a => a.count === 3);
                        const doubleA = assignments.filter(a => a.count === 2);
                        const singleA = assignments.filter(a => a.count === 1);

                        let currentTime = screenStart;

                        // ── HEAVY (5+): back-to-back from audi start ──
                        for (const assgn of heavyA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            for (let i = 0; i < assgn.count; i++) {
                                let startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                if (startTime === null) break;
                                // First show is W/A (Without Ads): reduced TAT of 25 min
                                const isWA = (i === 0);
                                currentTime = placeShow(screen, movie, startTime, isWA ? WA_TAT : undefined);
                            }
                        }

                        // ── MODERATE (4): back-to-back from audi start ──
                        for (const assgn of modA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            for (let i = 0; i < assgn.count; i++) {
                                let startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                if (startTime === null) break;
                                // W/A if first movie placed on this screen
                                const isWA = (i === 0 && heavyA.length === 0);
                                currentTime = placeShow(screen, movie, startTime, isWA ? WA_TAT : undefined);
                            }
                        }

                        // ── TRIPLE (3): 1 before 12 PM, 2 after 2 PM ──
                        for (const assgn of tripleA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            const regional = isRegionalMovie(movie);

                            if (!regional) {
                                // Early show: before 12 PM
                                let earlyTime = findValidTime(movie.id, currentTime, THREE_EARLY_END);
                                if (earlyTime !== null && earlyTime < THREE_EARLY_END) {
                                    currentTime = placeShow(screen, movie, earlyTime);
                                } else {
                                    // Can't fit before noon — just place it
                                    let fallback = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                    if (fallback !== null) currentTime = placeShow(screen, movie, fallback);
                                }
                                // 2 afternoon shows: after 2 PM
                                for (let i = 0; i < 2; i++) {
                                    let startTime = findValidTime(movie.id, Math.max(currentTime, THREE_LATE_START), LAST_SHOW_START);
                                    if (startTime === null) {
                                        startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                    }
                                    if (startTime === null) break;
                                    currentTime = placeShow(screen, movie, startTime);
                                }
                            } else {
                                // Regional triple: all within 2 PM – 9:30 PM
                                for (let i = 0; i < 3; i++) {
                                    let startTime = findValidTime(movie.id, Math.max(currentTime, REGIONAL_START), REGIONAL_END);
                                    if (startTime === null) {
                                        startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                    }
                                    if (startTime === null) break;
                                    currentTime = placeShow(screen, movie, startTime);
                                }
                            }
                        }

                        // ── DOUBLE (2): both after 12 PM ──
                        for (const assgn of doubleA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            const regional = isRegionalMovie(movie);
                            const windowStart = regional ? REGIONAL_START : TWO_SHOW_START;
                            const windowEnd   = regional ? REGIONAL_END   : LAST_SHOW_START;

                            for (let i = 0; i < 2; i++) {
                                let startTime = findValidTime(movie.id, Math.max(currentTime, windowStart), windowEnd);
                                if (startTime === null) {
                                    startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                                }
                                if (startTime === null) break;
                                currentTime = placeShow(screen, movie, startTime);
                            }
                        }

                        // ── SINGLE (1): 12 PM – 9:30 PM (regional: 2 PM – 9:30 PM) ──
                        for (const assgn of singleA) {
                            const movie = moviesMap.get(assgn.movieId);
                            if (!movie) continue;
                            const regional = isRegionalMovie(movie);
                            const windowStart = regional ? REGIONAL_START : SINGLE_SHOW_START;
                            const windowEnd   = regional ? REGIONAL_END   : SINGLE_SHOW_END;

                            let startTime = findValidTime(movie.id, Math.max(currentTime, windowStart), windowEnd);
                            if (startTime === null) {
                                startTime = findValidTime(movie.id, currentTime, LAST_SHOW_START);
                            }
                            if (startTime !== null) {
                                currentTime = placeShow(screen, movie, startTime);
                            }
                        }
                    }

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 2B: FILL MORNING GAPS ON LIGHT-MOVIE SCREENS
                    //  Screens with only single/double movies have dead morning
                    //  time. Fill with highest-allocation movie (movie of week).
                    // ══════════════════════════════════════════════════════════
                    for (const screen of screensByCapacity) {
                        const screenShows = newShows
                            .filter(s => s.screenId === screen.id)
                            .sort((a, b) => a.startTime - b.startTime);
                        if (screenShows.length === 0) continue;

                        const firstShowTime = screenShows[0].startTime;
                        const stagger = staggerOffsets[screen.id];
                        const screenStart = roundUp(scheduleStartTime + stagger);

                        // If first show starts ≥90 min after screen start → dead time
                        if (firstShowTime - screenStart < 90) continue;

                        // Find highest-allocation compatible non-regional movie
                        const candidates = movieAllocs
                            .filter(m => formatMatches(m.movie.format, screen.format))
                            .filter(m => !isRegionalMovie(m.movie));
                        if (candidates.length === 0) continue;

                        const fillMovie = candidates[0].movie;
                        let fillTime = screenStart;
                        while (fillTime + fillMovie.duration + (fillMovie.tat || 15) <= firstShowTime && fillTime <= LAST_SHOW_START) {
                            let validTime = findValidTime(fillMovie.id, fillTime, firstShowTime - fillMovie.duration);
                            if (validTime === null || validTime + fillMovie.duration + (fillMovie.tat || 15) > firstShowTime) break;
                            placeShow(screen, fillMovie, validTime);
                            fillTime = validTime + fillMovie.duration + (fillMovie.tat || 15);
                        }
                    }

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 3: 100% COVERAGE VALIDATION  (PRIORITY #1)
                    //  If any movie has fewer shows placed than allocated,
                    //  force-place the deficit on the best available screen.
                    // ══════════════════════════════════════════════════════════
                    const placedCounts = {};
                    newShows.forEach(s => { placedCounts[s.movieId] = (placedCounts[s.movieId] || 0) + 1; });

                    for (const ma of movieAllocs) {
                        const required = allocations[ma.id];
                        const placed   = placedCounts[ma.id] || 0;
                        const deficit  = required - placed;
                        if (deficit <= 0) continue;

                        const movie = ma.movie;
                        const compatible = screensByCapacity.filter(s => formatMatches(movie.format, s.format));

                        for (let d = 0; d < deficit; d++) {
                            let bestScreen = null, bestTime = Infinity;

                            for (const screen of compatible) {
                                const sShows = newShows.filter(s => s.screenId === screen.id).sort((a, b) => a.startTime - b.startTime);
                                const lastShow = sShows[sShows.length - 1];
                                let candidateTime = lastShow
                                    ? roundUp(lastShow.startTime + lastShow.duration + (lastShow.tat || 15))
                                    : roundUp(scheduleStartTime);

                                // Respect time windows
                                if (required === 1 && candidateTime < SINGLE_SHOW_START) candidateTime = SINGLE_SHOW_START;
                                if (isRegionalMovie(movie) && candidateTime < REGIONAL_START) candidateTime = REGIONAL_START;

                                let validTime = findValidTime(ma.id, candidateTime, LAST_SHOW_START);
                                if (validTime !== null && validTime < bestTime) {
                                    bestTime = validTime;
                                    bestScreen = screen;
                                }
                            }

                            if (bestScreen && bestTime <= LAST_SHOW_START) {
                                placeShow(bestScreen, movie, bestTime);
                                placedCounts[ma.id] = (placedCounts[ma.id] || 0) + 1;
                            }
                        }
                    }

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 4: GREEDY MAXIMIZATION (over & above allocations)
                    //  Fill remaining time on ALL screens with shows of
                    //  ALLOCATED movies ONLY. Prioritize:
                    //    1. Movie already on that audi
                    //    2. Highest-allocation movie (movie of the week)
                    //  This is OVER AND ABOVE — maximize total show count.
                    // ══════════════════════════════════════════════════════════
                    const allocatedMovieIds = new Set(movieAllocs.map(m => m.id));
                    let greedyPasses = 0;
                    const maxGreedyPasses = cinema.screens.length * 20;

                    while (greedyPasses < maxGreedyPasses) {
                        greedyPasses++;
                        let addedAny = false;

                        for (const screen of screensByCapacity) {
                            const sShows = newShows.filter(s => s.screenId === screen.id).sort((a, b) => a.startTime - b.startTime);
                            const lastShow = sShows[sShows.length - 1];
                            let nextAvailable = lastShow
                                ? roundUp(lastShow.startTime + lastShow.duration + (lastShow.tat || 15))
                                : roundUp(scheduleStartTime);

                            if (nextAvailable > LAST_SHOW_START) continue;

                            // Only consider ALLOCATED movies that fit this screen's format
                            const moviesOnScreen = new Set(sShows.map(s => s.movieId));
                            const candidates = movieAllocs
                                .filter(m => allocatedMovieIds.has(m.id))
                                .filter(m => formatMatches(m.movie.format, screen.format))
                                .filter(m => {
                                    if (isRegionalMovie(m.movie) && (nextAvailable < REGIONAL_START || nextAvailable > REGIONAL_END)) return false;
                                    const tooClose = allPlacedTimes[m.id]?.some(t => Math.abs(nextAvailable - t) < MIN_SAME_MOVIE_GAP);
                                    return !tooClose;
                                })
                                .sort((a, b) => {
                                    // Strong preference for movie already on this screen
                                    const aOn = moviesOnScreen.has(a.id) ? 100000 : 0;
                                    const bOn = moviesOnScreen.has(b.id) ? 100000 : 0;
                                    // Then by allocation count (movie of the week wins)
                                    return (bOn + b.count * 100) - (aOn + a.count * 100);
                                });

                            if (candidates.length > 0) {
                                const bestMovie = candidates[0].movie;
                                placeShow(screen, bestMovie, nextAvailable);
                                addedAny = true;
                            }
                        }
                        if (!addedAny) break;
                    }

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 5: TRIM & SORT
                    // ══════════════════════════════════════════════════════════
                    newShows = newShows.filter(s => s.startTime <= LAST_SHOW_START);
                    newShows.sort((a, b) => {
                        if (a.screenId !== b.screenId) return a.screenId.localeCompare(b.screenId);
                        return a.startTime - b.startTime;
                    });

                    // ══════════════════════════════════════════════════════════
                    //  PHASE 6: REPORTING
                    // ══════════════════════════════════════════════════════════
                    const finalCounts = {};
                    newShows.forEach(s => { finalCounts[s.movieId] = (finalCounts[s.movieId] || 0) + 1; });

                    const missedMovies = [];
                    const extraShows = [];
                    for (const movieId in allocations) {
                        const needed = allocations[movieId];
                        const got = finalCounts[movieId] || 0;
                        const movie = moviesMap.get(movieId);
                        if (got < needed) {
                            missedMovies.push(`${movie?.title || movieId}: ${got}/${needed}`);
                        } else if (got > needed) {
                            extraShows.push(`${movie?.title || movieId}: ${got} (alloc: ${needed}, +${got - needed} extra)`);
                        }
                    }

                    let msg = `Schedule: ${newShows.length} shows across ${cinema.screens.length} audis.`;
                    if (missedMovies.length > 0) {
                        msg += ` ⚠️ Shortfalls: ${missedMovies.join(', ')}`;
                    } else {
                        msg += ' ✅ All allocations met!';
                    }
                    if (extraShows.length > 0) {
                        msg += ` 📈 Extra: ${extraShows.join(', ')}`;
                    }

                    setState({...state, shows: [...state.shows.filter(s => s.cinemaId !== cinema.id), ...newShows]});
                    setAlertInfo({ isOpen: true, title: "Scheduling Complete", message: msg });

                } catch (error) {
                    console.error("Error during algo scheduling:", error);
                    setAlertInfo({ isOpen: true, title: "Scheduling Error", message: `Algorithm failed: ${error.message}` });
                } finally {
                    setIsAlgoScheduling(false);
                }
            };

            const handleExportAllSchedules = () => {
                setIsExporting(true);
                try {

                    const dataByCinemaAndMovie = {};

            const handleDownloadSelectedOpsSchedules = (selectedCinemaIds) => {

                    let xmlContent = `

                            <xml>
                                <x:ExcelWorkbook>

                                                <x:DisplayGridlines/>

                            </style>
                        </head>
                        <body>
                    `;

                    selectedCinemas.forEach(cinema => {
                        const showsForCinema = shows.filter(s => s.cinemaId === cinema.id);
                        if (showsForCinema.length === 0) return;

                        const showsByScreen = cinema.screens.reduce((acc, screen) => {
                            acc[screen.id] = showsForCinema
                                .filter(show => show.screenId === screen.id)
                                .sort((a, b) => a.startTime - b.startTime);
                            return acc;
                        }, {});

                        const maxShows = Math.max(0, ...Object.values(showsByScreen).map(s => s.length));

                        xmlContent += `<div class="cinema-title">${cinema.name}</div>`;

                        cinema.screens.forEach(screen => {
                            xmlContent += `<th colspan="2">${screen.name}</th>`;
                        });
                        xmlContent += `</tr><tr class="header-row">`;
                        cinema.screens.forEach(screen => {
                            xmlContent += `<td>Start</td><td>Time</td>`;
                        });
                        xmlContent += `</tr></thead><tbody>`;

                        for (let i = 0; i < maxShows; i++) {
                            const sessionNumber = i + 1;
                            let sessionSuffix;
                            if (sessionNumber === 1) sessionSuffix = 'st';
                            else if (sessionNumber === 2) sessionSuffix = 'nd';
                            else if (sessionNumber === 3) sessionSuffix = 'rd';
                            else sessionSuffix = 'th';

                            cinema.screens.forEach(screen => {

                                    const movie = movieMap.get(show.movieId);
                                    const waSuffix = show.isWA ? ' (W/A)' : '';
                                    const movieText = movie ? `${movie.title.toUpperCase()} (${movie.censorRating || 'U/A'}) (${movie.format || '2D'})${waSuffix}` : 'N/A';
                                    const timeText = minutesToTime(show.startTime);
                                    xmlContent += `<td>${movieText}</td><td>${timeText}</td>`;
                                } else {
                                    xmlContent += `<td></td><td></td>`;
                                }
                            });
                            xmlContent += `</tr>`;
                        }
                        xmlContent += `<tr class="show-row"><td></td>`;
                        cinema.screens.forEach(() => {
                            xmlContent += `<td style="font-weight: bold;">END</td><td></td>`;
                        });
                        xmlContent += `</tr></tbody></table><br/>`;

                    xmlContent += `</body></html>`;
                    downloadFile(xmlContent, 'operations_schedule.xls', 'application/vnd.ms-excel');

                    const isModalOpen = isAddCinemaModalOpen || isEditModalOpen || isDeleteModalOpen || isUploadCinemaModalOpen || isAddMovieModalOpen || isUploadMoviesModalOpen || isUploadScheduleModalOpen || isAllocationModalOpen || isBulkAllocationModalOpen || isScheduleListModalOpen || isOpsDownloadModalOpen || isSwapModalOpen || isClearDataModalOpen || isClearScheduleModalOpen || isEmailDraftModalOpen;

                    if (e.key === 'Escape') {
                        if (isModalOpen) {
                            if (isDeleteModalOpen) setDeleteModalOpen(false);
                            else if (isClearDataModalOpen) setIsClearDataModalOpen(false);
                            else if (isClearScheduleModalOpen) setIsClearScheduleModalOpen(false);
                            else if (isSwapModalOpen) setIsSwapModalOpen(false);
                            else if (isOpsDownloadModalOpen) setIsOpsDownloadModalOpen(false);
                            else if (isScheduleListModalOpen) setScheduleListModalOpen(false);
                            else if (isBulkAllocationModalOpen) setBulkAllocationModalOpen(false);
                            else if (isAllocationModalOpen) setAllocationModalOpen(false);
                            else if (isUploadScheduleModalOpen) setUploadScheduleModalOpen(false);
                            else if (isUploadMoviesModalOpen) setUploadMoviesModalOpen(false);
                            else if (isUploadCinemaModalOpen) setUploadCinemaModalOpen(false);
                            else if (isAddMovieModalOpen) setAddMovieModalOpen(false);
                            else if (isEditModalOpen) setEditModalOpen(false);
                            else if (isAddCinemaModalOpen) setAddCinemaModalOpen(false);
                            else if (isEmailDraftModalOpen) setEmailDraftModalOpen(false);
                            return;
                        } else if (activeCell.screenId) {
                            setActiveCell({ screenId: null, sessionIndex: null });
                            return;
                        }
                    }
                    
                    if ((e.ctrlKey || e.metaKey)) {
                        if (e.key === 'z') { e.preventDefault(); undo(); }
                        if (e.key === 'y') { e.preventDefault(); redo(); }
                    }

                    if (isTyping || isModalOpen || !activeCell.screenId || !selectedCinema || isDropdownOpen || isTimeEditing) {
                        return;
                    }

                    const showsForCinema = shows.filter(s => s.cinemaId === selectedCinema.id);
                    const showsOnActiveScreen = showsForCinema
                        .filter(sh => sh.screenId === activeCell.screenId)
                        .sort((a,b) => a.startTime - b.startTime);
                    const activeShow = showsOnActiveScreen[activeCell.sessionIndex];

                    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'x')) {
                        if (activeShow) {
                            setClipboard({ movieId: activeShow.movieId });
                            if (e.key === 'x') handleDeleteShow(activeShow.id);
                        }
                    } else if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                        if (clipboard) {
                            const movieToPaste = movies.find(m => m.id === clipboard.movieId);
                            if (movieToPaste) handleShowMove({ type: 'new', data: movieToPaste }, activeCell.screenId, activeCell.sessionIndex);
                        }
                    } else if (e.key === 'Delete' || e.key === 'Backspace') {
                        if (activeShow) handleDeleteShow(activeShow.id);
                    } else if (e.key === 'F2' && activeShow) {
                        handleTimeEditStart(activeCell.screenId, activeCell.sessionIndex);
                    } else {
                        const screenIds = selectedCinema.screens.map(s => s.id);
                        const currentScreenIndex = screenIds.indexOf(activeCell.screenId);
                        let { screenId, sessionIndex } = activeCell;
                        
                        const maxShowsOnAnyScreen = Math.max(0, ...Object.values(shows.reduce((acc, show) => {
                            acc[show.screenId] = (acc[show.screenId] || 0) + 1; return acc;
                        }, {})).map(count => count));
                        const maxGridRows = Math.max(10, maxShowsOnAnyScreen + 1);

                        let shouldPreventDefault = true;
                        switch (e.key) {
                            case 'ArrowUp': sessionIndex = Math.max(0, activeCell.sessionIndex - 1); break;
                            case 'ArrowDown': sessionIndex = Math.min(maxGridRows - 1, activeCell.sessionIndex + 1); break;
                            case 'Enter': sessionIndex = Math.min(maxGridRows - 1, activeCell.sessionIndex + 1); break;
                            case 'ArrowLeft': if (currentScreenIndex > 0) screenId = screenIds[currentScreenIndex - 1]; break;
                            case 'ArrowRight': if (currentScreenIndex < screenIds.length - 1) screenId = screenIds[currentScreenIndex + 1]; break;
                            case 'Tab':
                                let nextScreenIndex = e.shiftKey ? currentScreenIndex - 1 : currentScreenIndex + 1;
                                if (nextScreenIndex >= 0 && nextScreenIndex < screenIds.length) {
                                    screenId = screenIds[nextScreenIndex];
                                } else {
                                    screenId = e.shiftKey ? screenIds[screenIds.length - 1] : screenIds[0];
                                }
                                break;
                            case 'Home': sessionIndex = 0; break;
                            case 'End':
                                 const showsOnCurrentScreen = shows.filter(s => s.screenId === activeCell.screenId);
                                 sessionIndex = showsOnCurrentScreen.length;
                                 break;
                            default: shouldPreventDefault = false;
                        }
                        
                        if (shouldPreventDefault) {
                            e.preventDefault();
                            setActiveCell({ screenId, sessionIndex });
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [activeCell, shows, selectedCinema, clipboard, movies, undo, redo, isDropdownOpen, isTimeEditing, isAddCinemaModalOpen, isEditModalOpen, isDeleteModalOpen, isUploadCinemaModalOpen, isAddMovieModalOpen, isUploadMoviesModalOpen, isUploadScheduleModalOpen, isAllocationModalOpen, isBulkAllocationModalOpen, isScheduleListModalOpen, isOpsDownloadModalOpen, isSwapModalOpen, isClearDataModalOpen, isClearScheduleModalOpen, isEmailDraftModalOpen]);


            return (
                <>

                                    <select 
                                        id="cinema-select" 
                                        value={selectedCinema?.id || ''} 
                                        onChange={(e) => setSelectedCinema(cinemas.find(c => c.id === e.target.value))} 
                                        className="block w-44 pl-2 pr-8 py-1 text-xs border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-gray-800 focus:ring-cinema-accent focus:border-cinema-accent"
                                    >
                                        {cinemas.length === 0 && <option value="">No cinemas</option>}

                                    </select>
                                    
                                    {selectedCinema && scheduleStartTime !== null && (
                                        <div className="flex items-center space-x-1">
                                            <label htmlFor="start-time-select" className="text-[10px] font-medium text-gray-400 whitespace-nowrap">Start:</label>

                                            >
                                                {Array.from({ length: (13 - 5) * 4 + 1 }).map((_, i) => {

                                        </div>

                                </div>

                                <div className="flex items-center space-x-1">

                                        <DropdownItem onClick={() => setUploadCinemaModalOpen(true)} icon={<UploadIcon size={14} />} label="Upload Cinemas" />
                                        <DropdownItem onClick={() => {

                                        <DropdownItem onClick={() => {

                                        <DropdownItem onClick={handleAutoSchedule} icon={<Wand2Icon size={14} />} label={isScheduling ? 'AI Scheduling...' : 'AI Schedule'} disabled={isScheduling || !selectedCinema} />
                                        <DropdownItem onClick={handleAlgoSchedule} icon={<TargetIcon size={14} />} label={isAlgoScheduling ? 'Scheduling...' : 'Algo Schedule'} disabled={isAlgoScheduling || !selectedCinema} />
                                        <DropdownItem onClick={() => setIsClearScheduleModalOpen(true)} icon={<Trash2Icon size={14} />} label="Clear Schedule" disabled={!selectedCinema} className="text-red-500 dark:text-red-400" />
