                    </div>,
                    document.body
                )}
                </React.Fragment>
            );
        };

        // --- FilmStock (Improved Collapsible Sidebar with Search) ---
        const FilmStock = ({ movies, onAddMovieClick, onUploadMoviesClick, onDeleteMovie, setDraggedItem, isCollapsed, onToggleCollapse }) => {
            const [searchTerm, setSearchTerm] = React.useState('');
            const handleDragStart = (e, movie) => {
                setDraggedItem({ type: 'new', data: movie });
            };

            const filteredMovies = React.useMemo(() => {
                if (!searchTerm) return movies;
                return movies.filter(m => m.title.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [movies, searchTerm]);

            const getFormatBorder = (format) => {
                const f = (format || '').toLowerCase();
                if (f.includes('imax')) return 'border-l-cinema-accent';
                if (f.includes('3d')) return 'border-l-blue-400';
                if (f.includes('4dx')) return 'border-l-purple-400';
                return 'border-l-gray-300 dark:border-l-gray-600';
            };

            if (isCollapsed) {
                return (
                    <aside className="w-10 bg-white dark:bg-cinema-surface border-l border-gray-200 dark:border-gray-700/50 flex flex-col items-center pt-2 sidebar-collapse">
                        <button onClick={onToggleCollapse} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors" title="Show Palette">
                            <PanelLeftIcon size={16} />
                        </button>
                        <div className="mt-2 -rotate-90 whitespace-nowrap text-[10px] font-medium text-gray-400 tracking-wider uppercase">Palette ({movies.length})</div>
                    </aside>
                );
            }

            return (
                <aside className="w-1/5 min-w-[200px] bg-white dark:bg-cinema-surface border-l border-gray-200 dark:border-gray-700/50 flex flex-col sidebar-collapse">
                    <div className="p-2 border-b border-gray-200 dark:border-gray-700/50 flex-shrink-0 flex items-center justify-between">
                        <div className="flex items-center space-x-2">
                            <h2 className="text-sm font-semibold text-gray-900 dark:text-white">Palette</h2>
                            <span className="text-[10px] font-medium bg-cinema-accent/10 text-cinema-accent px-1.5 py-0.5 rounded-full">{movies.length}</span>
                        </div>
                        <button onClick={onToggleCollapse} className="p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors" title="Collapse Palette">
                            <PanelLeftIcon size={14} />
                        </button>
                    </div>
                    
                    <div className="px-2 pt-2 flex-shrink-0">
                        <div className="relative">
                            <input 
                                type="search" 
                                placeholder="Search movies..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full pl-7 pr-2 py-1.5 text-xs bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-1 focus:ring-cinema-accent focus:border-cinema-accent"
                                style={{ paddingLeft: '28px' }}
                            />
                            <div className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400">
                                <SearchIcon size={12} />
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-2 space-y-1 overflow-y-auto">
                        {filteredMovies.length === 0 && movies.length === 0 && (
                            <div className="text-center py-8 px-4">
                                <FilmIcon size={32} />
                                <p className="mt-2 text-xs text-gray-400">Add movies to your palette to begin scheduling</p>
                            </div>
                        )}
                        {filteredMovies.length === 0 && movies.length > 0 && (
                            <p className="text-center text-xs text-gray-400 py-4">No movies match "{searchTerm}"</p>
                        )}
                        {filteredMovies.map(movie => {
                            const movieColor = stringToColor(movie.title);
                            return (
                            <div 
                                key={movie.id} 
                                draggable 
                                onDragStart={(e) => handleDragStart(e, movie)}
                                onDragEnd={() => setDraggedItem(null)}
                                className={`py-1 px-2 rounded-lg border-l-[3px] ${getFormatBorder(movie.format)} bg-gray-50 dark:bg-gray-800/50 cursor-grab group relative hover:shadow-sm transition-shadow`}
                            >
                                <p className="font-semibold text-[11px] text-gray-900 dark:text-white truncate">{movie.title}</p>
                                <div className="text-[10px] text-gray-500 dark:text-gray-400 flex justify-between items-center">
                                    <span>{formatDuration(movie.duration)} + {movie.tat || 0}m</span>
                                    <div className="flex items-center space-x-1">
                                        {movie.censorRating && <span className="bg-gray-200 dark:bg-gray-700 px-1 rounded text-[9px]">{movie.censorRating}</span>}
                                        {movie.format && <span className="bg-gray-200 dark:bg-gray-700 px-1 rounded text-[9px]">{movie.format}</span>}
                                    </div>
                                </div>
                                <button onClick={() => onDeleteMovie(movie.id)} className="absolute top-0.5 right-0.5 p-0.5 rounded-full bg-red-500 text-white opacity-0 group-hover:opacity-100 transition-opacity">
                                    <XIcon size={10}/>
                                </button>
                            </div>
                            );
                        })}
                    </div>

                    <div className="flex-shrink-0 p-2 space-y-1.5 border-t border-gray-200 dark:border-gray-700/50">
                        <button onClick={onAddMovieClick} className="w-full flex items-center justify-center px-3 py-2 text-xs font-medium text-cinema-base bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover transition-colors"><PlusIcon size={12} /><span className="ml-1.5">Add Movie</span></button>
                        <button onClick={onUploadMoviesClick} className="w-full flex items-center justify-center px-3 py-2 text-xs font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600 transition-colors"><UploadIcon size={12} /><span className="ml-1.5">Upload Movies</span></button>
                    </div>
                </aside>
            );
        };

        // --- Tooltip (Improved) ---
        const Tooltip = ({ show, position }) => {
            if (!show || !position) return null;
            const effectiveDuration = show.duration + (show.tat || 0);
            const movieObj = show;
            return (
                <div 
                    className="fixed z-50 p-3 bg-gray-900 dark:bg-gray-800 text-white rounded-lg shadow-2xl pointer-events-none border border-gray-700 min-w-[180px]"
                    style={{ top: position.y + 15, left: position.x + 15 }}
                >
                    <p className="font-bold text-sm">{show.title}</p>
                    <div className="mt-1.5 space-y-0.5">
                        <div className="flex justify-between text-xs">
                            <span className="text-gray-400">Time</span>
                            <span className="font-medium">{minutesToTime(show.startTime)} — {minutesToTime(show.startTime + effectiveDuration)}</span>
                        </div>
                        <div className="flex justify-between text-xs">
                            <span className="text-gray-400">Duration</span>
                            <span>{formatDuration(show.duration)}</span>
                        </div>
                        {show.tat > 0 && <div className="flex justify-between text-xs">
                            <span className="text-gray-400">TAT</span>
                            <span>{show.tat}m</span>
                        </div>}
                    </div>
                    <div className="mt-2 flex items-center space-x-1.5">
                        {show.censorRating && <span className="text-[10px] bg-blue-500/20 text-blue-300 px-1.5 py-0.5 rounded font-medium">{show.censorRating}</span>}
                        {show.format && <span className="text-[10px] bg-purple-500/20 text-purple-300 px-1.5 py-0.5 rounded font-medium">{show.format}</span>}
                    </div>
                </div>
            );
        };

        // --- ShowAllocationRibbon (Improved with progress bars) ---
        const ShowAllocationRibbon = ({ allocations, onEdit }) => {
            return (
                <div className="bg-white dark:bg-cinema-surface/80 border-b border-gray-200 dark:border-gray-700/50 flex-shrink-0">
                    <div className="flex items-center space-x-2 p-1.5 px-3">
                        <h3 className="text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider flex-shrink-0">Allocations</h3>
                        <div className="flex-1 flex items-center space-x-2 overflow-x-auto py-0.5">
                            {allocations.length === 0 && <p className="text-center text-[11px] text-gray-400 italic">No allocations set. Click Edit to set targets.</p>}
                            {allocations.map(alloc => {
                                const pct = alloc.planned > 0 ? Math.min(100, (alloc.actual / alloc.planned) * 100) : (alloc.actual > 0 ? 100 : 0);
                                const barColor = pct >= 100 ? 'bg-green-500' : pct > 0 ? 'bg-amber-500' : 'bg-red-400';
                                const textColor = pct >= 100 ? 'text-green-600 dark:text-green-400' : pct > 0 ? 'text-amber-600 dark:text-amber-400' : 'text-red-500';
                                return (
                                    <div key={alloc.id} className="flex-shrink-0 px-2 py-1 rounded-lg bg-gray-50 dark:bg-gray-800/50 min-w-[130px]">
                                        <div className="flex items-center justify-between">
                                            <p className="text-[10px] font-medium text-gray-700 dark:text-gray-300 truncate max-w-[80px]">{alloc.title}</p>
                                            <span className={`text-[10px] font-bold ${textColor}`}>{alloc.actual}/{alloc.planned}</span>
                                        </div>
                                        <div className="mt-0.5 w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1">
                                            <div className={`alloc-progress ${barColor} rounded-full`} style={{ width: `${pct}%` }}></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <button onClick={onEdit} className="ml-1 flex-shrink-0 px-2.5 py-1 text-[11px] font-medium text-cinema-base bg-cinema-accent rounded-lg hover:bg-cinema-accent-hover flex items-center transition-colors"><EditIcon size={10} /><span className="ml-1">Edit</span></button>
                    </div>
                </div>
            );
        };

        // --- Timeline / Gantt View ---
        const TimelineView = ({ cinema, shows, movies }) => {
            if (!cinema) return null;

            const TIMELINE_START = 8 * 60; // 8 AM
            const TIMELINE_END = 24 * 60; // Midnight
            const TOTAL_MINUTES = TIMELINE_END - TIMELINE_START;
            const hourMarkers = [];
            for (let h = 8; h <= 24; h++) {
                hourMarkers.push(h);
            }

            const movieMap = new Map(movies.map(m => [m.id, m]));
            const cinemaShows = shows.filter(s => s.cinemaId === cinema.id);

            return (
                <div className="p-3 overflow-auto border-t border-gray-200 dark:border-gray-700/50 bg-gray-50 dark:bg-cinema-base/50">
                    <h3 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Timeline View — {cinema.name}</h3>
                    <div className="min-w-[800px]">
                        {/* Time axis */}
                        <div className="flex items-end mb-1 ml-[120px]">
                            {hourMarkers.map(h => (
                                <div key={h} className="text-[9px] text-gray-400 dark:text-gray-500" style={{ position: 'absolute', left: `calc(120px + ${((h * 60 - TIMELINE_START) / TOTAL_MINUTES) * 100}% * (100% - 120px) / 100%)` }}>
                                </div>
                            ))}
                            <div className="flex-1 flex">
                                {hourMarkers.map((h, i) => (
                                    <div key={h} className="text-[9px] text-gray-400 dark:text-gray-500 font-medium" style={{ width: `${(60 / TOTAL_MINUTES) * 100}%` }}>
                                        {h <= 12 ? `${h}AM` : h === 12 ? '12PM' : h === 24 ? '12AM' : `${h - 12}PM`}
                                    </div>
                                ))}
                            </div>
                        </div>
                        {/* Screen rows */}
                        {cinema.screens.map(screen => {
                            const screenShows = cinemaShows.filter(s => s.screenId === screen.id).sort((a, b) => a.startTime - b.startTime);
                            return (
                                <div key={screen.id} className="flex items-center mb-1">
                                    <div className="w-[120px] flex-shrink-0 text-[10px] font-medium text-gray-600 dark:text-gray-400 truncate pr-2">{screen.name}</div>
                                    <div className="flex-1 relative h-7 bg-gray-100 dark:bg-gray-800/50 rounded overflow-hidden">
                                        {/* Hour grid lines */}
                                        {hourMarkers.map(h => (
                                            <div key={h} className="absolute top-0 bottom-0 border-l border-gray-200 dark:border-gray-700/30" style={{ left: `${((h * 60 - TIMELINE_START) / TOTAL_MINUTES) * 100}%` }} />
                                        ))}
                                        {/* Show bars */}
                                        {screenShows.map(show => {
                                            const movie = movieMap.get(show.movieId);
                                            if (!movie) return null;
                                            const duration = movie.duration + (movie.tat || 0);
                                            const left = Math.max(0, ((show.startTime - TIMELINE_START) / TOTAL_MINUTES) * 100);
                                            const width = (duration / TOTAL_MINUTES) * 100;
                                            const color = stringToColor(movie.title);
                                            return (
                                                <div
                                                    key={show.id}
                                                    className="timeline-bar absolute top-0.5 bottom-0.5 flex items-center px-1.5"
                                                    style={{ left: `${left}%`, width: `${width}%`, backgroundColor: color.pastel, color: color.text, minWidth: '2px' }}
                                                    title={`${movie.title}${show.isWA ? ' (W/A)' : ''}: ${minutesToTime(show.startTime)} - ${minutesToTime(show.startTime + duration)}`}
                                                >
                                                    <span className="truncate font-medium">{movie.title}{show.isWA ? ' (W/A)' : ''}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- AllocationModal ---
        const AllocationModal = ({ isOpen, onClose, movies, onSave, initialAllocations }) => {
            const [allocations, setAllocations] = React.useState({});
            const [activeTab, setActiveTab] = React.useState('manual');
            const [file, setFile] = React.useState(null);
            const [error, setError] = React.useState('');

            React.useEffect(() => {
                setAllocations(initialAllocations || {});
            }, [initialAllocations]);

            const handleManualChange = (movieId, value) => {
                setAllocations(prev => ({ ...prev, [movieId]: Number(value) || 0 }));
            };
            
            const handleFileChange = (e) => { setError(''); setFile(e.target.files[0]); };

            const handleCSVUpload = () => {
                if (!file) { setError('Please select a CSV file.'); return; }
                if (!window.Papa) { setError('CSV parsing library not ready. Please refresh.'); return; }
                
                window.Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    transformHeader: header => header.trim().toLowerCase().replace(/\s+/g, '_'),
                    complete: (results) => {
                        const { data, errors } = results;
                        if (errors.length) {
                            setError(`Error parsing CSV: ${errors[0].message}`);
                            return;
                        }
                        
                        const newAllocations = {};
                        data.forEach(row => {
                            const movieTitleFromCSV = row.movie_title;
                            const plannedShowsFromCSV = row.planned_shows;

                            if (movieTitleFromCSV && plannedShowsFromCSV) {
                                const movie = movies.find(m => m.title.trim().toLowerCase() === String(movieTitleFromCSV).trim().toLowerCase());
                                if (movie) {
                                    const count = parseInt(plannedShowsFromCSV, 10);
                                    if (!isNaN(count)) {
                                        newAllocations[movie.id] = count;
                                    }
                                }
                            }
                        });
                        setAllocations(newAllocations);
                        setError('');
                        setFile(null);
                        setActiveTab('manual');
                    },
                    error: (err) => { setError(`File reading error: ${err.message}`); }
                });
            };

            const handleSave = () => {
                onSave(allocations);
                onClose();
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Manage Show Allocations">
                    <div className="space-y-4">
                        <div className="border-b border-gray-200 dark:border-gray-700">

            const handleDownloadTemplate = () => {
                const header = "Movies," + cinemas.map(c => `"${c.name}"`).join(',');
                const movieRows = movies.map(m => `"${m.title}",` + cinemas.map(() => '').join(','));
                const content = [header, ...movieRows].join("\n") + "\n";
                downloadCSV(content, 'bulk_allocations_template.csv');
            };

            const handleUpload = () => {
                if (!file) { setError('Please select a CSV file.'); return; }
                if (!window.Papa) { setError('CSV parsing library not ready. Please refresh.'); return; }
                setIsProcessing(true);

                window.Papa.parse(file, {
                    skipEmptyLines: true,
                    complete: (results) => {
                        const { data } = results;
                        if (data.length < 2) {
                            setError("Invalid CSV. Must have a header row and at least one movie row.");
                            setIsProcessing(false);
                            return;
                        }

                        const headerRow = data[0];
                        const cinemaNamesFromCSV = headerRow.slice(1).map(name => name.trim().toLowerCase());
                        const movieRows = data.slice(1);

                        const updates = {};

                        cinemaNamesFromCSV.forEach((csvCinemaName, index) => {
                            const cinema = cinemas.find(c => c.name.trim().toLowerCase() === csvCinemaName);

            const currentCinemaShows = shows.filter(show => show.cinemaId === cinema.id);

            currentCinemaShows.forEach(show => {

                        groupedShowsByMovieTitle[movieTitle] = [];

                    groupedShowsByMovieTitle[movieTitle].push(show.startTime);
                }

            for (const key in groupedShowsByMovieTitle) {
                groupedShowsByMovieTitle[key].sort((a, b) => a - b); 
                groupedShowsByMovieTitle[key] = groupedShowsByMovieTitle[key].map(minutesToTime);

            const movieTitles = Object.keys(groupedShowsByMovieTitle);

            const tableRows = [];
            for (let i = 0; i < maxShowtimesPerMovie; i++) {

        // --- EmailDraftModal ---
        const EmailDraftModal = ({ isOpen, onClose, allCinemas, allShows, allMovies }) => {
            const [to, setTo] = React.useState('operations-team@example.com');
            const [cc, setCc] = React.useState('');
            const [bcc, setBcc] = React.useState('');
            const [subject, setSubject] = React.useState('');
            const [body, setBody] = React.useState('');
            const [selectedCinemaIds, setSelectedCinemaIds] = React.useState([]);

            const handleSelectAll = (e) => {
                if (e.target.checked) {
                    setSelectedCinemaIds(allCinemas.map(c => c.id));
                } else {
                    setSelectedCinemaIds([]);
                }
            };

            const handleSelectCinema = (cinemaId) => {
                setSelectedCinemaIds(prev => 
                    prev.includes(cinemaId) 
                        ? prev.filter(id => id !== cinemaId)
                        : [...prev, cinemaId]
                );
            };

            React.useEffect(() => {
                if (!isOpen || selectedCinemaIds.length === 0) {
                    setBody('');
                    setSubject('');
                    return;
                };

                const today = new Date();
                const nth = (d) => {
                    if (d > 3 && d < 21) return 'th';
                    switch (d % 10) {
                        case 1: return "st";
                        case 2: return "nd";
                        case 3: return "rd";
                        default: return "th";
                    }
                };
                const day = today.getDate();
                const dateString = `${day}${nth(day)} ${today.toLocaleString('default', { month: 'long' })} ${today.getFullYear()}`;
                
                const selectedCinemas = allCinemas.filter(c => selectedCinemaIds.includes(c.id));
                const location = selectedCinemas.length > 0 ? selectedCinemas[0].name.split(' ')[0] : 'Cinemas';
                const newSubject = `SCHEDULE - ${location.toUpperCase()} - ${dateString} Onwards`;
                setSubject(newSubject);
                
                const movieMap = new Map(allMovies.map(m => [m.id, m]));

                let emailHtml = `
                    <div style="font-family: Arial, sans-serif; font-size: 14px;">
                    <p><b>SCHEDULE - ${location.toUpperCase()} - ${dateString} Onwards</b></p>
                    <p><b>TAT – 40 MINS</b></p>
                    <p style="color: red;"><b>Keep red marked shows on Hold.</b></p>
                `;

                selectedCinemas.forEach(cinema => {
                    const showsForCinema = allShows.filter(s => s.cinemaId === cinema.id);
                    if (showsForCinema.length === 0) return;

                    const showsByScreen = cinema.screens.reduce((acc, screen) => {
                        acc[screen.id] = showsForCinema
                            .filter(show => show.screenId === screen.id)
                            .sort((a, b) => a.startTime - b.startTime);
                        return acc;
                    }, {});

                    const maxShows = Math.max(0, ...Object.values(showsByScreen).map(s => s.length));
                    if (maxShows === 0) return;
                    
                    emailHtml += `<h3 style="font-family: Arial, sans-serif; font-weight: bold; text-transform: uppercase; margin-top: 10px; margin-bottom: 5px;">${cinema.name}</h3>`;
                    emailHtml += `
                        <table style="width: 100%; border-collapse: collapse; font-family: Arial, sans-serif; font-size: 10px; border: 1px solid black;">
                            <thead>
                                <tr style="background-color: #D9D9D9; font-weight: bold;">
                                    <th style="padding: 3px; border: 1px solid black;">Session</th>
                    `;
                    cinema.screens.forEach(screen => {
                        emailHtml += `<th style="padding: 3px; border: 1px solid black;" colspan="2">${screen.name}</th>`;
                    });
                    emailHtml += `</tr><tr style="background-color: #D9D9D9; font-weight: bold;">
                        <td style="padding: 3px; border: 1px solid black;"></td>
                        ${cinema.screens.map(() => `<td style="padding: 3px; border: 1px solid black;">Start</td><td style="padding: 3px; border: 1px solid black;">Time</td>`).join('')}
                    </tr></thead><tbody>`;

                    for (let i = 0; i < maxShows; i++) {
                        const sessionNumber = i + 1;

                        cinema.screens.forEach(screen => {

                                emailHtml += `<td style="padding: 3px; border: 1px solid black;">${movieText}</td><td style="padding: 3px; border: 1px solid black;">${timeText}</td>`;
                            } else {
                                emailHtml += `<td style="padding: 3px; border: 1px solid black;"></td><td style="padding: 3px; border: 1px solid black;"></td>`;
                            }
                        });
                        emailHtml += `</tr>`;
                    }
                     emailHtml += `
                        <tr style="background-color: #FDE698;">
                            <td style="padding: 3px; border: 1px solid black;"></td>
                            ${cinema.screens.map(() => `<td style="padding: 3px; border: 1px solid black; font-weight: bold;">END</td><td style="padding: 3px; border: 1px solid black;"></td>`).join('')}
                        </tr>
                     `;

                    emailHtml += `</tbody></table>`;
                });

                emailHtml += `</div>`;

                setBody(emailHtml);

            }, [isOpen, selectedCinemaIds, allCinemas, allShows, allMovies]);

            const handleOpenOutlook = () => {

                const mailtoLink = `mailto:${encodeURIComponent(to)}?` +
