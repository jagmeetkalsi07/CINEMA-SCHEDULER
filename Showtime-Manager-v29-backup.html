                                        <button 
                                            onClick={() => setViewMode('timeline')} 
                                            className={`p-1 rounded-md transition-colors ${viewMode === 'timeline' ? 'bg-white dark:bg-gray-700 shadow-sm text-cinema-accent' : 'text-gray-400 hover:text-gray-600'}`}
                                            title="Timeline View"
                                        ><BarChartIcon size={14} /></button>
                                    </div>

                                    {/* More menu */}
                                    <ToolbarDropdown label="" icon={<MoreHorizontalIcon size={14} />}>
                                        <DropdownItem onClick={() => setIsSwapModalOpen(true)} icon={<RefreshCwIcon size={14} />} label="Swap Screens" disabled={!selectedCinema} />
                                        <label className="w-full flex items-center space-x-2.5 px-3 py-2 text-xs text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer transition-colors">
                                            <ImageIcon size={14} />
                                            <span>Upload Examples</span>
                                            <input type="file" multiple accept="image/*" onChange={handleImageUpload} className="hidden"/>
                                        </label>
                                        <div className="border-t border-gray-200 dark:border-gray-700 my-1"></div>
                                        <DropdownItem onClick={() => setIsClearDataModalOpen(true)} icon={<Trash2Icon size={14} />} label="Clear All Data" className="text-red-500 dark:text-red-400" />
                                    </ToolbarDropdown>

                                    {/* Theme toggle */}
                                    <button 
                                        onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} 
                                        className="p-1.5 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 rounded-lg transition-colors"
                                        title={theme === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'}
                                    >
                                        {theme === 'light' ? <MoonIcon size={14} /> : <SunIcon size={14} />}
                                    </button>

                                    <div className="h-4 w-px bg-gray-200 dark:bg-gray-700 mx-0.5"></div>
                                    
                                    <div className="flex items-center space-x-2 pl-1">
                                        {user && user.role === 'admin' && (
                                            <button 
                                                onClick={() => setIsUserManagementModalOpen(true)}
                                                className="p-1.5 text-gray-500 dark:text-gray-400 hover:text-cinema-accent hover:bg-gray-100 dark:hover:bg-gray-800/50 rounded-lg transition-colors"
                                                title="Manage Users"
                                            >
                                                <UserIcon size={14} />
                                            </button>
                                        )}
                                        <div className="flex items-center space-x-1 justify-center w-6 h-6 rounded-full bg-cinema-accent/20 text-cinema-accent" title={`Logged in as ${user?.username}`}>
                                            <span className="text-[10px] font-bold uppercase">{user ? user.username.substring(0,2) : 'US'}</span>
                                        </div>
                                        <button 
                                            onClick={onLogout}
                                            className="p-1.5 text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors"
                                            title="Logout"
                                        >
                                            <LogOutIcon size={14} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Example Images */}
                            {exampleImages.length > 0 && (
                                <div className="p-1.5 px-3 bg-gray-50 dark:bg-cinema-surface/50 border-b border-gray-200 dark:border-gray-700/50 flex items-center space-x-2">
                                    <span className="text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Examples:</span>
                                    {exampleImages.map((img, index) => (
                                        <div key={index} className="flex items-center space-x-1 bg-white dark:bg-gray-800 p-0.5 rounded-md border border-gray-200 dark:border-gray-700">
                                            <img src={img.data} className="h-6 w-10 object-cover rounded-sm"/>
                                            <span className="text-[10px] text-gray-600 dark:text-gray-300 pr-1">{img.name}</span>
                                        </div>
                                    ))}
                                    <button onClick={() => setExampleImages([])} className="text-red-400 hover:text-red-600 text-[10px] font-semibold transition-colors">Clear</button>
                                </div>
                            )}

                            {/* Allocation Ribbon */}
                            <ShowAllocationRibbon allocations={showAllocations} onEdit={() => setAllocationModalOpen(true)} />

                            {/* Main content */}
                            <div className="flex flex-1 overflow-hidden">
                                <div className={`flex flex-col ${isSidebarCollapsed ? 'flex-1' : 'w-4/5'} transition-all`}>
                                    {viewMode === 'grid' ? (
                                        <ExcelScheduler 
                                            cinema={selectedCinema} 
                                            shows={shows} 
                                            movies={movies}
                                            onShowMove={handleShowMove}
                                            onShowMovieChange={handleShowMovieChange}
                                            onShowTimeChange={handleShowTimeChange}
                                            onDeleteShow={handleDeleteShow}
                                            onToggleWA={handleToggleWA}
                                            setDraggedItem={setDraggedItem}
                                            draggedItem={draggedItem}
                                            onDeselect={() => setActiveCell({ screenId: null, sessionIndex: null })}
                                            activeCell={activeCell}
                                            setActiveCell={setActiveCell}
                                            onDropdownOpenChange={setIsDropdownOpen}
                                            isTimeEditing={isTimeEditing}
                                            onTimeEditStart={handleTimeEditStart}
                                            onTimeHover={(e, show) => {
                                                if (show) setTooltip({ show, position: { x: e.clientX, y: e.clientY } });
                                                else setTooltip({ show: null, position: null });
                                            }}
                                        />
                                    ) : (
                                        <div className="flex-1 overflow-auto">
                                            <TimelineView cinema={selectedCinema} shows={shows} movies={movies} />
                                            {!selectedCinema && (
                                                <div className="flex-1 flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 p-8 min-h-[400px]">
                                                    <ClapperboardIcon size={64} />
                                                    <p className="mt-4 text-lg font-medium">Create your first cinema to get started</p>
                                                    <p className="mt-1 text-sm">Use the Cinema menu in the toolbar to add or upload cinemas</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                <FilmStock 
                                    movies={movies} 
                                    onAddMovieClick={() => setAddMovieModalOpen(true)} 
                                    onUploadMoviesClick={() => setUploadMoviesModalOpen(true)} 
                                    onDeleteMovie={handleDeleteMovie} 
                                    setDraggedItem={setDraggedItem}
                                    isCollapsed={isSidebarCollapsed}
                                    onToggleCollapse={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                                />
                            </div>

                            {/* Status Bar */}
                            <StatusBar cinema={selectedCinema} shows={shows} canUndo={canUndo} canRedo={canRedo} />
                        </main>
                    </div>
                    {/* All modals */}
                    <Tooltip show={tooltip.show} position={tooltip.position} />
                    <Modal isOpen={isAddCinemaModalOpen} onClose={() => setAddCinemaModalOpen(false)} title="Add New Cinema"><CinemaForm onSave={handleAddCinema} onCancel={() => setAddCinemaModalOpen(false)} /></Modal>
                    <Modal isOpen={isEditModalOpen} onClose={() => setEditModalOpen(false)} title="Edit Cinema"><CinemaForm initialData={cinemaToEdit} onSave={handleUpdateCinema} onCancel={() => setEditModalOpen(false)} /></Modal>
                    <Modal isOpen={isUploadCinemaModalOpen} onClose={() => setUploadCinemaModalOpen(false)} title="Upload Cinemas"><UploadCSVForm itemType="Cinemas" onSave={handleAddCinemasCSV} onCancel={() => setUploadCinemaModalOpen(false)} /></Modal>
                    <Modal isOpen={isAddMovieModalOpen} onClose={() => setAddMovieModalOpen(false)} title="Add New Movie"><AddMovieForm onSave={handleAddMovie} onCancel={() => setAddMovieModalOpen(false)} /></Modal>
                    <Modal isOpen={isUploadMoviesModalOpen} onClose={() => setUploadMoviesModalOpen(false)} title="Upload Movies"><UploadCSVForm itemType="Movies" onSave={handleAddMoviesCSV} onCancel={() => setUploadMoviesModalOpen(false)} /></Modal>
                    <UploadScheduleModal isOpen={isUploadScheduleModalOpen} onClose={() => setUploadScheduleModalOpen(false)} onSave={handleUploadSchedule} movies={movies} cinema={selectedCinema} />
                    <AllocationModal isOpen={isAllocationModalOpen} onClose={() => setAllocationModalOpen(false)} movies={movies} initialAllocations={selectedCinema ? (plannedAllocations[selectedCinema.id] || {}) : {}} onSave={handleSaveAllocations} />
                    <BulkAllocationModal isOpen={isBulkAllocationModalOpen} onClose={() => setBulkAllocationModalOpen(false)} movies={movies} cinemas={cinemas} onSave={handleBulkSaveAllocations} />
                    <OpsDownloadModal isOpen={isOpsDownloadModalOpen} onClose={() => setIsOpsDownloadModalOpen(false)} cinemas={cinemas} onDownload={handleDownloadSelectedOpsSchedules} />
                    <SwapScreensModal isOpen={isSwapModalOpen} onClose={() => setIsSwapModalOpen(false)} screens={selectedCinema?.screens || []} onSwap={handleSwapScreens} />
                    <DeleteConfirmationModal isOpen={isDeleteModalOpen} onClose={() => setDeleteModalOpen(false)} itemType="Cinema" itemName={itemToDelete?.name} onConfirm={handleDeleteCinema} />
                    <ConfirmationModal 
                        isOpen={isClearDataModalOpen} 
                        onClose={() => setIsClearDataModalOpen(false)} 
                        onConfirm={handleClearAllData}
                        title="Clear All Data"
                        message="Are you sure you want to delete all your work? This action cannot be undone."
                        confirmText="Yes, Clear Everything"
                    />
                     <ConfirmationModal 
                        isOpen={isClearScheduleModalOpen} 
                        onClose={() => setIsClearScheduleModalOpen(false)} 
                        onConfirm={handleClearSchedule}
                        title="Clear Schedule"
                        message={`Are you sure you want to clear the entire schedule for "${selectedCinema?.name}"? This action cannot be undone.`}
                        confirmText="Yes, Clear Schedule"
                    />
                    <CustomAlertModal isOpen={alertInfo.isOpen} onClose={() => setAlertInfo({ isOpen: false })} title={alertInfo.title} message={alertInfo.message} />
                    <ScheduleListModal isOpen={isScheduleListModalOpen} onClose={() => setScheduleListModalOpen(false)} cinema={selectedCinema} movies={movies} shows={shows} />
                    <EmailDraftModal 
                        isOpen={isEmailDraftModalOpen} 
                        onClose={() => setEmailDraftModalOpen(false)} 
                        allCinemas={cinemas}
                        allShows={shows}
                        allMovies={movies}
                    />
                    <UserManagementModal 
                        isOpen={isUserManagementModalOpen} 
                        onClose={() => setIsUserManagementModalOpen(false)} 
                        users={users} 
                        onSaveUsers={onUpdateUsers} 
                        allCinemas={allCinemas} 
                    />
                </>
            );
        };

        const UserManagementModal = ({ isOpen, onClose, users, onSaveUsers, allCinemas }) => {
            const [editingUsers, setEditingUsers] = React.useState([]);

            React.useEffect(() => {
                if (isOpen) setEditingUsers(JSON.parse(JSON.stringify(users)));
            }, [isOpen, users]);

            if (!isOpen) return null;

            const handleAddUser = () => {
                setEditingUsers([...editingUsers, { username: '', password: '', role: 'programmer', allowedCinemas: [] }]);
            };

            const handleUpdateUser = (index, field, value) => {
                const updated = [...editingUsers];
                updated[index][field] = value;
                setEditingUsers(updated);
            };

            const handleToggleCinema = (index, cinemaId) => {
                const updated = [...editingUsers];
                const currentUser = updated[index];
                if (currentUser.allowedCinemas.includes(cinemaId)) {
                    currentUser.allowedCinemas = currentUser.allowedCinemas.filter(id => id !== cinemaId);
                } else {
                    currentUser.allowedCinemas.push(cinemaId);
                }
                setEditingUsers(updated);
            };

            const handleDeleteUser = (index) => {
                if (editingUsers[index].username === 'admin') {
                    alert('Cannot delete the primary admin account.');
                    return;
                }
                setEditingUsers(editingUsers.filter((_, i) => i !== index));
            };

            const handleSave = () => {
                if (editingUsers.some(u => !u.username.trim() || !u.password.trim())) {
                    alert('All users must have a username and password.');
                    return;
                }
                onSaveUsers(editingUsers);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                    <div className="bg-white dark:bg-cinema-surface rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] flex flex-col border border-gray-200 dark:border-gray-700">
                        <div className="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
                            <h2 className="text-lg font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                                <UserIcon size={20} className="text-cinema-accent"/>
                                User Management
                            </h2>
                            <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md text-gray-500 transition-colors">
                                <XIcon size={20} />
                            </button>
                        </div>
                        
                        <div className="p-4 flex-1 overflow-y-auto space-y-4">
                            {editingUsers.map((u, i) => (
                                <div key={i} className="border border-gray-200 dark:border-gray-700 rounded-lg p-4 bg-gray-50 dark:bg-gray-800/30">
                                    <div className="flex gap-4 items-start">
                                        <div className="flex-1 space-y-3">
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Username</label>
                                                    <input type="text" value={u.username} onChange={e => handleUpdateUser(i, 'username', e.target.value)} disabled={u.username === 'admin'} className="w-full text-sm p-2 border border-gray-200 dark:border-gray-700 rounded bg-white dark:bg-gray-800 dark:text-white" />
                                                </div>
                                                <div className="flex-1">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Password</label>
                                                    <input type="text" value={u.password} onChange={e => handleUpdateUser(i, 'password', e.target.value)} className="w-full text-sm p-2 border border-gray-200 dark:border-gray-700 rounded bg-white dark:bg-gray-800 dark:text-white" />
                                                </div>
                                                <div className="w-32">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Role</label>
                                                    <select value={u.role} onChange={e => handleUpdateUser(i, 'role', e.target.value)} disabled={u.username === 'admin'} className="w-full text-sm p-2 border border-gray-200 dark:border-gray-700 rounded bg-white dark:bg-gray-800 dark:text-white">
                                                        <option value="admin">Admin</option>
                                                        <option value="programmer">Programmer</option>
                                                    </select>
                                                </div>
                                            </div>
                                            
                                            {u.role === 'programmer' && (
                                                <div>
                                                    <label className="block text-xs font-medium text-gray-500 mb-2">Assigned Cinemas</label>
                                                    <div className="flex flex-wrap gap-2">
                                                        {allCinemas.length === 0 ? <span className="text-xs text-gray-400">No cinemas available to assign.</span> : null}
                                                        {allCinemas.map(cinema => (
                                                            <label key={cinema.id} className="flex items-center space-x-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-3 py-1.5 rounded-full cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={u.allowedCinemas.includes(cinema.id)}
                                                                    onChange={() => handleToggleCinema(i, cinema.id)}
                                                                    className="rounded border-gray-300 text-cinema-accent focus:ring-cinema-accent"
                                                                />
                                                                <span className="text-gray-700 dark:text-gray-300">{cinema.name}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        <button onClick={() => handleDeleteUser(i)} disabled={u.username === 'admin'} className="mt-6 p-2 text-gray-400 hover:text-red-500 disabled:opacity-30 transition-colors">
                                            <Trash2Icon size={18} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                            
                            <button onClick={handleAddUser} className="w-full py-3 border-2 border-dashed border-gray-300 dark:border-gray-700 text-gray-500 hover:text-cinema-accent hover:border-cinema-accent hover:bg-cinema-accent-soft rounded-lg transition-colors flex justify-center items-center gap-2 text-sm font-medium">
                                <PlusIcon size={16} /> Add New User
                            </button>
                        </div>
                        
                        <div className="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-2 bg-gray-50 dark:bg-gray-800/50 rounded-b-xl">
                            <button onClick={onClose} className="px-4 py-2 border border-gray-200 dark:border-gray-700 rounded text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</button>
                            <button onClick={handleSave} className="px-4 py-2 bg-cinema-accent text-white rounded text-sm font-medium hover:bg-cinema-accent-hover shadow-sm">Save Changes</button>
                        </div>
                    </div>
                </div>
            );
        };

        const LoginForm = ({ users, onLogin }) => {
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const matchedUser = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
                
                if (matchedUser) {
                    onLogin(matchedUser);
                } else {
                    setError('Invalid username or password');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-cinema-base text-gray-900 dark:text-gray-100">
                    <div className="max-w-md w-full p-8 bg-white dark:bg-cinema-surface rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 bg-cinema-accent rounded-full flex items-center justify-center mb-4 text-white">
                                <FilmIcon size={32} />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 dark:text-white mb-2">Showtime Manager</h2>
                            <p className="text-gray-500 dark:text-gray-400 text-sm text-center">Please sign in to access the scheduling system</p>
                        </div>
                        
                        {error && (
                            <div className="mb-4 p-3 bg-red-100 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded text-red-600 dark:text-red-400 text-sm">
                                {error}
                            </div>
                        )}
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
                                <input 
                                    type="text" 
                                    className="w-full p-2.5 border border-gray-300 dark:border-gray-600 rounded bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-white focus:ring-cinema-accent focus:border-cinema-accent transition-colors"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                                <input 
                                    type="password" 
                                    className="w-full p-2.5 border border-gray-300 dark:border-gray-600 rounded bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-white focus:ring-cinema-accent focus:border-cinema-accent transition-colors"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <button 
                                type="submit"
                                className="w-full py-2.5 mt-2 bg-cinema-accent text-white font-medium text-sm rounded hover:bg-cinema-accent-hover transition-colors"
                            >
                                Sign In
                            </button>
                        </form>
                        
                        <div className="mt-6 text-xs text-gray-400 dark:text-gray-500 text-center space-y-1">
                            <p>Demo accounts (User / Pass):</p>
                            <p>admin / cinepolis123</p>
                            <p>programmer / schedule2026</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [users, setUsers] = React.useState(() => {
                const local = localStorage.getItem('sm_users_db');
                if (local) return JSON.parse(local);
                const def = [
                    { username: 'admin', password: 'cinepolis123', role: 'admin', allowedCinemas: [] },
                    { username: 'programmer', password: 'schedule2026', role: 'programmer', allowedCinemas: [] }
                ];
                localStorage.setItem('sm_users_db', JSON.stringify(def));
                return def;
            });

            const [user, setUser] = React.useState(() => {
                const localUser = localStorage.getItem('sm_current_user');
                if (localUser) {
                    try {
                        const parsed = JSON.parse(localUser);
                        // verify user still exists in DB
                        const match = users.find(u => u.username === parsed.username);
                        if (match) return match;
                    } catch(e) {}
                }
                return null;
            });

            const handleLogin = (matchedUser) => {
                localStorage.setItem('sm_current_user', JSON.stringify(matchedUser));
                setUser(matchedUser);
            };

            const handleLogout = () => {
                localStorage.removeItem('sm_current_user');
                setUser(null);
            };

            const handleUpdateUsers = (newUsers) => {
                localStorage.setItem('sm_users_db', JSON.stringify(newUsers));
                setUsers(newUsers);
            };

            if (!user) return <LoginForm users={users} onLogin={handleLogin} />;
            return <MainApp user={user} users={users} onUpdateUsers={handleUpdateUsers} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
